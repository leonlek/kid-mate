<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🎈 ป๊อปลูกโป่ง — เกมสำหรับเด็ก</title>
<meta name="description" content="เกมป๊อปลูกโป่งตามลำดับตัวเลข ฝึกการนับสำหรับเด็ก">
<meta name="theme-color" content="#ff6b9d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ป๊อปลูกโป่ง">
<meta name="mobile-web-app-capable" content="yes">

<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../icons/icon.svg">
<link rel="manifest" href="../manifest.webmanifest">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Itim&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-3: #b5e8ff; --grass-1: #7ed957;
    --brand: #ff6b9d; --brand-dark: #e54b82;
    --gold: #ffd93d; --good: #5bc13a; --good-dark: #3fa024;
    --bad: #ff5757; --bad-dark: #d83838;
    --ink: #2d3436; --card: #ffffff; --card-border: #ffd6e4;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Mitr', -apple-system, sans-serif;
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 10%, #fff9c4 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, #ffcfd2 0%, transparent 45%),
      linear-gradient(180deg, var(--sky-3) 0%, #d9f3c9 65%, var(--grass-1) 100%);
    background-attachment: fixed;
    user-select: none;
    -webkit-user-select: none;
  }
  body::before {
    content: '☁️ ☁️     ☁️';
    position: fixed; top: 20px; left: 0; right: 0;
    text-align: center; font-size: 42px;
    opacity: 0.55; pointer-events: none;
    letter-spacing: 80px;
    animation: drift 40s linear infinite;
    z-index: 0;
  }
  @keyframes drift {
    from { transform: translateX(-10%); }
    to { transform: translateX(10%); }
  }

  .app { max-width: 880px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
  body:has(#gameScreen.active) .app {
    max-width: 100%; padding: 0; height: 100vh; height: 100dvh;
  }
  body:has(#gameScreen.active)::before { display: none; }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn .35s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero { text-align: center; padding: 14px 10px 24px; }
  .hero h1 {
    font-family: 'Itim', cursive;
    font-size: clamp(42px, 9vw, 68px);
    margin: 0; color: var(--brand-dark);
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
    letter-spacing: 1px;
  }
  .hero p {
    font-size: clamp(16px, 3.4vw, 22px);
    margin: 12px 0 0; color: #555; font-weight: 500;
  }

  .speed-row {
    display: flex; justify-content: center; align-items: center;
    gap: 10px; margin: 8px 0 18px; flex-wrap: wrap;
  }
  .speed-label {
    font-family: 'Itim', cursive; font-size: 22px;
    color: var(--brand-dark); margin-right: 4px;
    text-shadow: 2px 2px 0 #fff;
  }
  .speed-pill {
    font-family: inherit; font-size: 18px; font-weight: 600;
    padding: 10px 22px; border: 3px solid #fff; border-radius: 999px;
    background: #fff; color: #777; cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.08);
    transition: transform .12s, background .15s, color .15s, box-shadow .12s;
    min-width: 92px;
  }
  .speed-pill:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.08); }
  .speed-pill.active {
    background: var(--brand); color: #fff; border-color: #fff;
    box-shadow: 0 4px 0 var(--brand-dark);
  }

  .lgrid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px; margin: 10px 0 32px;
  }
  .lcard {
    background: var(--card); border: 4px solid var(--card-border);
    border-radius: 24px; padding: 22px 14px 18px; text-align: center;
    cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.07);
    transition: transform .15s, box-shadow .15s, border-color .15s;
    position: relative; overflow: hidden;
  }
  .lcard:active { transform: scale(0.96) translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.07); }
  .lcard:hover { border-color: var(--brand); }
  .lcard .preview {
    font-size: 56px; line-height: 1;
    filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.12));
    margin-bottom: 6px;
  }
  .lcard .ltitle {
    font-family: 'Itim', cursive; font-size: 26px;
    color: var(--brand-dark); text-shadow: 2px 2px 0 #fff;
  }
  .lcard .lsub { font-size: 14px; color: #777; font-weight: 500; margin-top: 4px; }
  .lcard .stars {
    position: absolute; top: 10px; right: 10px;
    font-size: 18px; letter-spacing: 1px;
  }

  /* Game */
  #gameScreen.active {
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .status-banner {
    flex: 0 0 auto;
    margin: 12px 14px 0;
    border-radius: 22px; padding: 12px 20px;
    background: linear-gradient(180deg, #fff8c8, #ffe88a);
    border: 4px solid #fff;
    box-shadow: 0 5px 0 rgba(0,0,0,0.10);
    text-align: center; line-height: 1.1;
    font-family: 'Itim', cursive;
    font-size: clamp(26px, 5vw, 36px);
    color: #6b4f00;
    text-shadow: 2px 2px 0 rgba(255,255,255,0.7);
    transition: transform .25s, background .3s;
    display: flex; justify-content: center; align-items: center;
    gap: 14px; flex-wrap: wrap;
  }
  .status-banner.flash { transform: scale(1.04); box-shadow: 0 0 0 6px var(--gold), 0 8px 0 rgba(0,0,0,0.10); }
  .next-bubble {
    background: var(--brand);
    color: #fff;
    border-radius: 999px;
    padding: 4px 22px;
    font-size: clamp(36px, 6.5vw, 56px);
    text-shadow: 2px 2px 0 var(--brand-dark);
    box-shadow: 0 4px 0 var(--brand-dark);
    min-width: 80px;
    line-height: 1.1;
  }
  .next-bubble.bump { animation: bump .35s ease; }
  @keyframes bump {
    0% { transform: scale(1); } 50% { transform: scale(1.18); } 100% { transform: scale(1); }
  }

  .hud {
    flex: 0 0 auto; display: flex; justify-content: space-between;
    align-items: center; gap: 8px;
    margin: 10px 14px 0;
    font-family: 'Itim', cursive; font-size: 22px;
  }
  .hud-item {
    background: #fff; border: 3px solid var(--card-border);
    border-radius: 999px; padding: 6px 16px;
    box-shadow: 0 3px 0 rgba(0,0,0,0.08);
    min-width: 80px; text-align: center;
  }
  .hud-item.score { color: var(--good-dark); }
  .hud-item.time  { color: #2980b9; }

  .play-area {
    flex: 1 1 auto;
    position: relative; overflow: hidden;
    margin: 12px;
    background: linear-gradient(180deg, rgba(181, 232, 255, 0.45), rgba(255, 255, 255, 0.15) 60%, rgba(126, 217, 87, 0.25));
    border-radius: 26px;
    border: 3px dashed rgba(255,255,255,0.7);
    min-height: 260px;
    touch-action: manipulation;
  }

  .balloon {
    position: absolute;
    width: 90px; height: 110px;
    will-change: transform;
    cursor: pointer;
    pointer-events: auto;
  }
  .balloon-body {
    width: 100%; height: 88%;
    border-radius: 50% 50% 48% 48% / 55% 55% 45% 45%;
    background: radial-gradient(ellipse at 30% 25%, rgba(255,255,255,0.55), transparent 50%),
                var(--bcol, #ff6b9d);
    box-shadow: inset -8px -10px 0 rgba(0,0,0,0.12);
    position: relative;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-family: 'Itim', cursive;
    font-size: 38px;
    line-height: 1;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.25);
  }
  .balloon-string {
    position: absolute;
    bottom: -2px; left: 50%;
    width: 2px; height: 14%;
    background: rgba(0,0,0,0.35);
    transform: translateX(-50%);
  }
  .balloon.popping {
    animation: balloonPop .45s ease forwards;
    pointer-events: none;
  }
  @keyframes balloonPop {
    0%   { transform: scale(1); opacity: 1; }
    20%  { transform: scale(1.4); opacity: 1; }
    100% { transform: scale(0.2); opacity: 0; }
  }
  .balloon.shake {
    animation: balloonShake .35s ease;
  }
  @keyframes balloonShake {
    0%, 100% { transform: translateX(0); }
    25%      { transform: translateX(-12px); }
    75%      { transform: translateX(12px); }
  }
  .balloon.gone {
    pointer-events: none;
    opacity: 0;
  }
  .pop-burst {
    position: absolute;
    pointer-events: none;
    font-size: 56px;
    transform: translate(-50%, -50%);
    z-index: 5;
    animation: popBurst .5s ease-out forwards;
  }
  @keyframes popBurst {
    0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.6); opacity: 0; }
  }
  .pop-score {
    position: absolute;
    pointer-events: none;
    font-family: 'Itim', cursive;
    font-size: 36px;
    color: var(--gold);
    text-shadow: 2px 2px 0 #fff, 4px 4px 0 var(--brand-dark);
    transform: translate(-50%, -50%);
    z-index: 6;
    animation: popScore .9s ease-out forwards;
  }
  @keyframes popScore {
    0%   { transform: translate(-50%, -50%) scale(0.6); opacity: 0; }
    20%  { transform: translate(-50%, -90%) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%, -200%) scale(1); opacity: 0; }
  }

  /* Overlay */
  .overlay-msg {
    position: fixed; inset: 0;
    display: none; align-items: center; justify-content: center;
    pointer-events: none; z-index: 100;
    font-family: 'Itim', cursive; color: #fff; text-align: center;
  }
  .overlay-msg.shown { display: flex; }
  .overlay-msg .msg {
    background: var(--brand); border: 4px solid #fff; border-radius: 32px;
    padding: 28px 48px; font-size: clamp(44px, 8vw, 80px); line-height: 1.1;
    box-shadow: 0 8px 0 rgba(0,0,0,0.18);
    animation: msgPop .5s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-shadow: 3px 3px 0 var(--brand-dark);
    max-width: 90vw;
  }
  .overlay-msg .msg.go { background: var(--good); text-shadow: 3px 3px 0 var(--good-dark); }
  .overlay-msg .msg.win {
    background: var(--gold); color: var(--ink);
    text-shadow: 3px 3px 0 #fff, 4px 4px 0 rgba(0,0,0,0.15);
  }
  @keyframes msgPop {
    0%   { transform: scale(0.4) rotate(-6deg); opacity: 0; }
    60%  { transform: scale(1.1) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  /* Results */
  #resultsScreen { text-align: center; padding-top: 20px; }
  .trophy {
    font-size: clamp(120px, 22vw, 180px); line-height: 1;
    filter: drop-shadow(4px 6px 0 rgba(0,0,0,0.18));
    animation: bobBig 1.2s ease-in-out infinite;
  }
  @keyframes bobBig {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-12px) rotate(4deg); }
  }
  .winner-name {
    font-family: 'Itim', cursive;
    font-size: clamp(44px, 9vw, 72px);
    color: var(--brand-dark); margin: 18px 0 6px;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
  }
  .winner-sub {
    font-size: clamp(18px, 4vw, 24px);
    color: #555; margin: 0 0 6px; font-weight: 500;
  }
  .stars-row {
    font-size: clamp(48px, 10vw, 72px); line-height: 1;
    margin: 8px 0 4px; letter-spacing: 4px;
    filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.12));
  }
  .rating-text {
    font-family: 'Itim', cursive;
    font-size: clamp(28px, 6vw, 40px);
    color: var(--brand-dark); margin: 4px 0 16px;
  }
  .action-bar {
    display: flex; gap: 12px; justify-content: center; align-items: center;
    margin-top: 12px; flex-wrap: wrap;
  }
  .btn-main {
    font-family: 'Itim', cursive;
    font-size: 28px; padding: 16px 36px;
    border: 4px solid #fff; border-radius: 999px;
    background: var(--brand); color: #fff;
    box-shadow: 0 6px 0 var(--brand-dark);
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
    text-shadow: 2px 2px 0 var(--brand-dark);
  }
  .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--brand-dark); }
  .btn-ghost {
    font-family: 'Itim', cursive;
    font-size: 24px; padding: 14px 30px;
    border: 4px solid var(--brand); border-radius: 999px;
    background: #fff; color: var(--brand-dark);
    box-shadow: 0 5px 0 rgba(0,0,0,0.12);
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
  }
  .btn-ghost:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }

  .confetti {
    position: fixed; top: -20px;
    width: 12px; height: 18px;
    z-index: 90; pointer-events: none;
    animation: fall linear forwards;
  }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

  .home-btn {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    left: 12px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #fff; border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; text-decoration: none; z-index: 60;
    transition: transform .12s;
  }
  .home-btn:active { transform: scale(0.92); }

  @media (min-width: 768px) {
    .balloon { width: 110px; height: 134px; }
    .balloon-body { font-size: 46px; }
    .lgrid { grid-template-columns: repeat(4, 1fr); gap: 18px; }
    .status-banner { padding: 16px 24px; }
    .hud { font-size: 26px; }
    .hud-item { padding: 8px 22px; min-width: 110px; }
  }
  @media (min-width: 1024px) {
    .balloon { width: 120px; height: 146px; }
    .balloon-body { font-size: 52px; }
  }
  @media (max-width: 480px) {
    .balloon { width: 72px; height: 88px; }
    .balloon-body { font-size: 30px; }
    .lcard { padding: 16px 10px 14px; border-width: 3px; border-radius: 20px; }
    .lcard .ltitle { font-size: 22px; }
    .status-banner { padding: 8px 14px; margin: 8px 8px 0; }
    .hud { font-size: 18px; margin: 8px 10px 0; }
    .hud-item { padding: 5px 12px; min-width: 60px; }
    .play-area { margin: 8px; }
    .next-bubble { padding: 4px 16px; }
  }
</style>
</head>
<body>
<a class="home-btn" href="../" aria-label="กลับหน้าหลัก">🏠</a>
<div class="app">

  <section id="selectScreen" class="screen active">
    <header class="hero">
      <h1>🎈 ป๊อปลูกโป่ง</h1>
      <p>ป๊อปลูกโป่งตามลำดับเลข — เริ่มที่ 1 ก่อน!<br/><small style="font-size:.85em;color:#888">ผิดลำดับ = ลูกโป่งสั่น (ไม่หาย ลองใหม่ได้)</small></p>
    </header>

    <div class="speed-row" id="speedRow">
      <div class="speed-label">ลอยช้า/เร็ว:</div>
      <button class="speed-pill" data-speed="slow" type="button">🐢 ช้า</button>
      <button class="speed-pill active" data-speed="medium" type="button">🐇 กลาง</button>
      <button class="speed-pill" data-speed="fast" type="button">⚡ เร็ว</button>
    </div>

    <div id="levelGrid" class="lgrid"></div>
  </section>

  <section id="gameScreen" class="screen">
    <div id="statusBanner" class="status-banner">
      <span>ป๊อป →</span>
      <span id="nextBubble" class="next-bubble">1</span>
    </div>
    <div class="hud">
      <div class="hud-item score">💯 <span id="scoreCount">0</span></div>
      <div class="hud-item time">⏱ <span id="timeLeft">60</span></div>
    </div>
    <div class="play-area" id="playArea"></div>
  </section>

  <section id="resultsScreen" class="screen">
    <div class="trophy">🏆</div>
    <h2 id="resultScore" class="winner-name">0 คะแนน</h2>
    <p id="resultSub" class="winner-sub">นับครบ X ครั้ง</p>
    <div id="resultStars" class="stars-row">⭐</div>
    <div id="resultText" class="rating-text">ลองอีกที!</div>
    <div class="action-bar">
      <button id="againBtn" class="btn-ghost">🔄 เล่นอีก</button>
      <button id="newBtn" class="btn-main">เลือกใหม่</button>
    </div>
  </section>

</div>

<div id="overlayMsg" class="overlay-msg"></div>

<script>
'use strict';

// ============================================================================
// LEVELS — what number range to count, increment, and how many balloons on screen
// ============================================================================
const LEVELS = [
  { id: 1, stars: 1, name: '1 ถึง 5',    subtitle: 'นับ 1-5 วนซ้ำ',      preview: '1️⃣',
    rangeMax: 5,  step: 1, maxBalloons: 4 },
  { id: 2, stars: 1, name: '1 ถึง 10',   subtitle: 'นับ 1-10 วนซ้ำ',     preview: '🔢',
    rangeMax: 10, step: 1, maxBalloons: 5 },
  { id: 3, stars: 2, name: '1 ถึง 20',   subtitle: 'นับยาวขึ้น',         preview: '2️⃣',
    rangeMax: 20, step: 1, maxBalloons: 6 },
  { id: 4, stars: 3, name: 'นับทีละ 2',  subtitle: '2, 4, 6, ... ถึง 20',preview: '🔟',
    rangeMax: 20, step: 2, maxBalloons: 6 },
];

const ROUND_MS    = 60000;
const SPAWN_MIN_MS = 700;
const SPAWN_MAX_MS = 1300;
const BALLOON_RISE_MS = 9000;     // base time to drift from bottom to top
const SPEED_LEVELS = {
  slow:   { riseMul: 1.5,  spawnMul: 1.4 },
  medium: { riseMul: 1.0,  spawnMul: 1.0 },
  fast:   { riseMul: 0.7,  spawnMul: 0.7 },
};
const SPEED_KEY = 'numberPopSpeed';

const BALLOON_COLORS = [
  '#ff6b9d', '#3498db', '#f1c40f', '#2ecc71', '#9b59b6', '#e67e22', '#1abc9c', '#e74c3c'
];

// ============================================================================
// STATE
// ============================================================================
const state = {
  level: null,
  speed: 'medium',
  score: 0,
  loops: 0,                  // how many times we've hit rangeMax (and reset to 1)
  expectedNum: 1,
  balloons: new Map(),       // id -> { id, num, el, riseMs, startedAt }
  balloonSeq: 0,
  startTime: 0,
  endTime: 0,
  timeLeftSec: 60,
  running: false,
  spawnTimer: null,
  tickTimer: null,
  pendingTimers: [],
};

// ============================================================================
// AUDIO
// ============================================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
}
function tone(freq, ms, type='sine', vol=0.18) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  o.connect(g).connect(audioCtx.destination);
  const t = audioCtx.currentTime, d = ms/1000;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.01);
  g.gain.linearRampToValueAtTime(0, t + d);
  o.start(t); o.stop(t + d + 0.02);
}
function playPop(num) {
  // Pitch rises with the number — feels like climbing a scale
  const base = 220;
  const mult = 1 + (num % 12) * 0.08;
  tone(base * mult, 100, 'triangle', 0.18);
  setTimeout(() => tone(base * mult * 1.5, 80, 'sine', 0.10), 50);
}
function playWrong() {
  tone(160, 220, 'sawtooth', 0.18);
}

// ============================================================================
// DOM
// ============================================================================
const $ = (id) => document.getElementById(id);
const screens = {
  select:  $('selectScreen'),
  game:    $('gameScreen'),
  results: $('resultsScreen'),
};
const levelGrid    = $('levelGrid');
const statusBanner = $('statusBanner');
const nextBubble   = $('nextBubble');
const playArea     = $('playArea');
const overlay      = $('overlayMsg');
const scoreCount   = $('scoreCount');
const timeLeftEl   = $('timeLeft');

// ============================================================================
// UTIL
// ============================================================================
function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function buzz(p)   { if (navigator.vibrate) navigator.vibrate(p); }
function showScreen(name) { for (const k of Object.keys(screens)) screens[k].classList.toggle('active', k===name); }
function speedPreset() { return SPEED_LEVELS[state.speed] || SPEED_LEVELS.medium; }
function later(fn, ms) {
  const id = setTimeout(fn, ms);
  state.pendingTimers.push(id);
  return id;
}
function clearTimers() {
  for (const id of state.pendingTimers) clearTimeout(id);
  state.pendingTimers = [];
}

// ============================================================================
// SELECT
// ============================================================================
function renderLevels() {
  levelGrid.innerHTML = '';
  for (const lvl of LEVELS) {
    const c = document.createElement('div');
    c.className = 'lcard';
    c.innerHTML = `
      <div class="stars">${'⭐'.repeat(lvl.stars)}</div>
      <div class="preview">${lvl.preview}</div>
      <div class="ltitle">${lvl.name}</div>
      <div class="lsub">${lvl.subtitle}</div>
    `;
    c.addEventListener('click', () => { ensureAudio(); startGame(lvl); });
    levelGrid.appendChild(c);
  }
}

// ============================================================================
// GAME
// ============================================================================
function startGame(level) {
  state.level = level;
  state.score = 0;
  state.loops = 0;
  state.expectedNum = level.step;   // 1 if step 1; 2 if step 2
  state.balloons.clear();
  state.balloonSeq = 0;
  state.timeLeftSec = Math.ceil(ROUND_MS / 1000);
  scoreCount.textContent = '0';
  timeLeftEl.textContent = state.timeLeftSec;
  nextBubble.textContent = state.expectedNum;
  // Clear DOM
  playArea.innerHTML = '';
  clearTimers();
  showScreen('game');
  state.startTime = performance.now();
  state.endTime = state.startTime + ROUND_MS;
  state.running = true;
  state.tickTimer = setInterval(tick, 200);
  scheduleSpawn();
  // Spawn one immediately so kid sees something right away
  later(spawn, 350);
}

function tick() {
  if (!state.running) return;
  const remain = Math.max(0, state.endTime - performance.now());
  const newSec = Math.ceil(remain / 1000);
  if (newSec !== state.timeLeftSec) {
    state.timeLeftSec = newSec;
    timeLeftEl.textContent = newSec;
  }
  if (remain <= 0) endRound();
}

function scheduleSpawn() {
  if (!state.running) return;
  const interval = (SPAWN_MIN_MS + Math.random() * (SPAWN_MAX_MS - SPAWN_MIN_MS)) * speedPreset().spawnMul;
  state.spawnTimer = later(() => {
    if (state.running && state.balloons.size < state.level.maxBalloons) spawn();
    scheduleSpawn();
  }, interval);
}

function spawn() {
  if (!state.running) return;
  const id = ++state.balloonSeq;
  // 70% chance the balloon is the EXPECTED next number (ensures playable)
  // 30% chance it's some other valid number in the range
  let num;
  if (Math.random() < 0.7) {
    num = state.expectedNum;
  } else {
    // Random valid number that's NOT the expected (provides distractors)
    const choices = [];
    const max = state.level.rangeMax;
    const step = state.level.step;
    for (let n = step; n <= max; n += step) {
      if (n !== state.expectedNum) choices.push(n);
    }
    num = pick(choices) || state.expectedNum;
  }
  const color = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
  const el = document.createElement('div');
  el.className = 'balloon';
  el.style.setProperty('--bcol', color);
  el.innerHTML = `
    <div class="balloon-body">${num}</div>
    <div class="balloon-string"></div>
  `;
  // Random horizontal position (keeping inside)
  const r = playArea.getBoundingClientRect();
  const balloonW = window.innerWidth >= 1024 ? 120 : window.innerWidth >= 768 ? 110 : (window.innerWidth >= 480 ? 90 : 72);
  const startXpx = 20 + Math.random() * (r.width - balloonW - 40);
  el.style.left = startXpx + 'px';
  // Start below visible area, animate to above
  const riseMs = BALLOON_RISE_MS * speedPreset().riseMul * (0.85 + Math.random() * 0.3);
  el.style.bottom = '-160px';
  // Use Web Animations API to drift up
  playArea.appendChild(el);
  const anim = el.animate([
    { transform: 'translate(0, 0)' },
    { transform: 'translate(0, -' + (r.height + 200) + 'px)' },
  ], { duration: riseMs, easing: 'linear', fill: 'forwards' });
  // When animation ends, balloon is off-screen — auto remove
  anim.onfinish = () => {
    if (state.balloons.has(id)) {
      el.remove();
      state.balloons.delete(id);
    }
  };
  el.addEventListener('click', () => onBalloonTap(id));
  state.balloons.set(id, { id, num, el, anim });
}

function onBalloonTap(id) {
  const b = state.balloons.get(id);
  if (!b || !state.running) return;
  if (b.num === state.expectedNum) {
    // Correct!
    state.score += 1;
    scoreCount.textContent = state.score;
    state.balloons.delete(id);
    popBalloon(b);
    playPop(b.num);
    buzz(20);
    advanceExpected();
  } else {
    // Wrong — shake, no score change, balloon stays
    b.el.classList.add('shake');
    setTimeout(() => b.el.classList.remove('shake'), 360);
    playWrong();
    buzz([30, 60, 30]);
  }
}

function popBalloon(b) {
  const r = b.el.getBoundingClientRect();
  const arr = playArea.getBoundingClientRect();
  const x = r.left + r.width/2 - arr.left;
  const y = r.top + r.height/2 - arr.top;
  // Burst + score float
  const burst = document.createElement('div');
  burst.className = 'pop-burst';
  burst.textContent = pick(['💥', '✨', '⭐']);
  burst.style.left = x + 'px';
  burst.style.top  = y + 'px';
  playArea.appendChild(burst);
  setTimeout(() => burst.remove(), 600);
  const ps = document.createElement('div');
  ps.className = 'pop-score';
  ps.textContent = '+1';
  ps.style.left = x + 'px';
  ps.style.top  = y + 'px';
  playArea.appendChild(ps);
  setTimeout(() => ps.remove(), 950);
  b.el.classList.add('popping');
  if (b.anim) b.anim.cancel();
  setTimeout(() => b.el.remove(), 480);
}

function advanceExpected() {
  state.expectedNum += state.level.step;
  if (state.expectedNum > state.level.rangeMax) {
    state.expectedNum = state.level.step;
    state.loops += 1;
    flashOverlay('นับครบ! 🎉', 600, 'win');
  }
  nextBubble.classList.remove('bump');
  void nextBubble.offsetWidth;
  nextBubble.classList.add('bump');
  nextBubble.textContent = state.expectedNum;
}

function flashOverlay(text, ms, extra) {
  overlay.classList.add('shown');
  overlay.innerHTML = `<div class="msg ${extra || ''}">${text}</div>`;
  setTimeout(() => { overlay.classList.remove('shown'); overlay.innerHTML = ''; }, ms);
}

function endRound() {
  state.running = false;
  if (state.spawnTimer) clearTimeout(state.spawnTimer);
  if (state.tickTimer)  clearInterval(state.tickTimer);
  for (const b of state.balloons.values()) {
    if (b.anim) b.anim.cancel();
    b.el.remove();
  }
  state.balloons.clear();
  showResults();
}

// ============================================================================
// RESULTS
// ============================================================================
function showResults() {
  $('resultScore').textContent = state.score + ' คะแนน!';
  $('resultSub').textContent   = `นับครบ ${state.loops} รอบ · ${state.level.name}`;
  const r = ratingFor(state.score);
  $('resultStars').textContent = r.stars;
  $('resultText').textContent  = r.text;
  showScreen('results');
  celebrate(r.confettiCount);
  buzz([60, 40, 60, 40, 100]);
}

function ratingFor(score) {
  if (score >= 50) return { stars: '🌟🌟🌟🌟🌟', text: 'สุดยอด!',     confettiCount: 160 };
  if (score >= 35) return { stars: '⭐⭐⭐⭐',     text: 'เก่งมาก!',    confettiCount: 120 };
  if (score >= 20) return { stars: '⭐⭐⭐',        text: 'เก่ง!',        confettiCount: 90  };
  if (score >= 10) return { stars: '⭐⭐',           text: 'ดีมาก!',      confettiCount: 60  };
  if (score >= 1)  return { stars: '⭐',                text: 'ดี!',          confettiCount: 40  };
  return                  { stars: '✨',                  text: 'ลองอีกที!',  confettiCount: 20  };
}

function celebrate(n) {
  const colors = ['#ff6b9d', '#ffd93d', '#7ed957', '#5bc0eb', '#ff914d', '#b388ff'];
  for (let i = 0; i < n; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = Math.random() * 0.8 + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    if (Math.random() > 0.5) c.style.borderRadius = '50%';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

// ============================================================================
// EVENTS
// ============================================================================
$('againBtn').addEventListener('click', () => {
  if (!state.level) { showScreen('select'); return; }
  ensureAudio();
  startGame(state.level);
});
$('newBtn').addEventListener('click', () => {
  state.level = null;
  clearTimers();
  showScreen('select');
});

let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd < 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

function setSpeed(s) {
  if (!SPEED_LEVELS[s]) s = 'medium';
  state.speed = s;
  try { localStorage.setItem(SPEED_KEY, s); } catch (e) {}
  for (const btn of document.querySelectorAll('.speed-pill')) {
    btn.classList.toggle('active', btn.dataset.speed === s);
  }
}
$('speedRow').addEventListener('click', (e) => {
  const btn = e.target.closest('.speed-pill');
  if (!btn) return;
  setSpeed(btn.dataset.speed);
});

// Init
let savedSpeed = null;
try { savedSpeed = localStorage.getItem(SPEED_KEY); } catch (e) {}
setSpeed(savedSpeed || 'medium');
renderLevels();
</script>
</body>
</html>
