<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🔷 แตะตามรูปร่าง — เกมสำหรับเด็ก</title>
<meta name="description" content="เกมเรียงรูปทรงสำหรับเด็กไทย ลากใส่ช่องที่ตรงกัน">
<meta name="theme-color" content="#ff6b9d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="รูปร่าง">
<meta name="mobile-web-app-capable" content="yes">

<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../icons/icon.svg">
<link rel="manifest" href="../manifest.webmanifest">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Itim&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #ff6b9d; --brand-dark: #e54b82;
    --gold: #ffd93d;
    --ink: #2d3436;
    --slot-bg: #d8d4cc;
    --slot-shadow: #b3afa6;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Mitr', -apple-system, sans-serif;
    color: var(--ink);
    overflow: hidden;
    height: 100vh; height: 100dvh;
    background: linear-gradient(180deg, #fff5da 0%, #ffe2ec 100%);
    user-select: none; -webkit-user-select: none;
    touch-action: none;
  }

  .home-btn {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top)); left: 12px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #fff; border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; text-decoration: none; color: var(--ink);
    z-index: 60; transition: transform .12s;
  }
  .home-btn:active { transform: scale(0.92); }

  .stars {
    position: fixed;
    top: calc(14px + env(safe-area-inset-top));
    right: 14px;
    background: #fff;
    border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    border-radius: 999px;
    padding: 6px 18px;
    font-family: 'Itim', cursive;
    font-size: 22px;
    color: var(--brand-dark);
    z-index: 60;
    display: flex; align-items: center; gap: 6px;
  }
  .stars.bump { animation: bump .4s ease; }
  @keyframes bump { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }

  .board {
    position: relative;
    width: 100vw;
    height: 100vh; height: 100dvh;
  }

  /* Slots area — fixed bottom */
  .slots {
    position: absolute;
    bottom: max(20px, env(safe-area-inset-bottom));
    left: 0; right: 0;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    padding: 0 16px;
    max-width: 360px;
    margin: 0 auto;
  }
  .slot {
    aspect-ratio: 1;
    background: #fff;
    border: 4px dashed var(--slot-shadow);
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    box-shadow: inset 0 4px 0 rgba(0,0,0,0.04);
  }
  .slot.matched {
    border-style: solid;
    border-color: var(--gold);
    animation: slotFlash .5s ease;
  }
  @keyframes slotFlash {
    0%, 100% { transform: scale(1); }
    40%      { transform: scale(1.08); box-shadow: 0 0 0 8px rgba(255,217,61,0.4); }
  }
  .slot svg.silhouette {
    width: 78%; height: 78%;
    opacity: 0.22;
    transition: opacity .25s;
  }
  .slot.matched svg.silhouette { opacity: 1; }

  /* Shapes area — top */
  .pieces {
    position: absolute;
    top: 80px; left: 0; right: 0;
    bottom: 320px;
    pointer-events: none;
  }
  @media (max-height: 700px) {
    .pieces { bottom: 280px; }
    .slot { border-width: 3px; }
  }

  .piece {
    position: absolute;
    width: 100px; height: 100px;
    cursor: grab;
    pointer-events: auto;
    touch-action: none;
    filter: drop-shadow(0 5px 0 rgba(0,0,0,0.15));
    transition: filter .15s;
    will-change: transform;
  }
  .piece svg { width: 100%; height: 100%; display: block; }
  .piece.dragging {
    cursor: grabbing;
    filter: drop-shadow(0 10px 4px rgba(0,0,0,0.25));
    z-index: 50;
  }
  .piece.placed {
    pointer-events: none;
    filter: drop-shadow(0 3px 0 rgba(0,0,0,0.12));
    transition: left .35s cubic-bezier(.34,1.56,.64,1),
                top .35s cubic-bezier(.34,1.56,.64,1),
                width .35s, height .35s;
  }
  .piece.wiggle {
    animation: wiggle .4s ease;
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(0); }
    25%      { transform: rotate(-8deg); }
    75%      { transform: rotate(8deg); }
  }

  /* Celebration */
  .celebrate {
    position: fixed; inset: 0;
    background: rgba(255, 245, 218, 0.96);
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column;
    z-index: 100;
    text-align: center;
    padding: 20px;
  }
  .celebrate.on { display: flex; animation: fadeIn .3s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .celebrate-emoji {
    font-size: 120px;
    animation: spin 2s ease-in-out infinite;
  }
  @keyframes spin {
    0%, 100% { transform: rotate(-10deg) scale(1); }
    50%      { transform: rotate(10deg) scale(1.1); }
  }
  .celebrate h2 {
    font-family: 'Itim', cursive;
    font-size: 56px;
    color: var(--brand-dark);
    margin: 12px 0 8px;
    text-shadow: 3px 3px 0 #fff;
  }
  .celebrate p {
    font-size: 22px;
    color: #555;
    margin: 0 0 24px;
  }
  .celebrate .stars-row { font-size: 56px; letter-spacing: 8px; margin: 8px 0 20px; }
  .play-again {
    background: var(--brand);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 18px 42px;
    font-family: 'Itim', cursive;
    font-size: 30px;
    box-shadow: 0 5px 0 var(--brand-dark);
    cursor: pointer;
  }
  .play-again:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--brand-dark); }

  /* Confetti */
  .confetti {
    position: absolute;
    width: 12px; height: 12px;
    pointer-events: none;
    animation: fall 1.2s ease-out forwards;
    z-index: 70;
  }
  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(200px) rotate(540deg); opacity: 0; }
  }

  /* Top label */
  .top-label {
    position: absolute;
    top: calc(80px + env(safe-area-inset-top));
    left: 0; right: 0;
    text-align: center;
    font-family: 'Itim', cursive;
    font-size: 24px;
    color: var(--brand-dark);
    pointer-events: none;
    text-shadow: 2px 2px 0 #fff;
  }
</style>
</head>
<body>
<a class="home-btn" href="../" aria-label="กลับหน้าหลัก">🏠</a>
<div class="stars">⭐ <span id="starCount" class="count-num">0</span></div>

<div class="board" id="board">
  <div class="top-label" id="topLabel">ลากใส่ช่องที่ตรงกัน!</div>
  <div class="pieces" id="pieces"></div>
  <div class="slots" id="slots"></div>
</div>

<div class="celebrate" id="celebrate">
  <div class="celebrate-emoji">🎉</div>
  <h2>เก่งมาก!</h2>
  <div class="stars-row" id="starRow">⭐⭐⭐⭐⭐</div>
  <p>เล่นต่อกันมั้ย?</p>
  <button class="play-again" id="playAgain">เล่นอีก</button>
</div>

<script>
const SHAPES = {
  circle:   { name: 'วงกลม',    color: '#ff6b6b', path: 'circle' },
  triangle: { name: 'สามเหลี่ยม', color: '#ffd93d', path: 'M50,8 L92,82 L8,82 Z' },
  square:   { name: 'สี่เหลี่ยม',  color: '#4fc3f7', path: 'rect' },
  star:     { name: 'ดาว',      color: '#7ed957', path: 'M50,5 L61,38 L95,38 L67,58 L78,92 L50,72 L22,92 L33,58 L5,38 L39,38 Z' },
  heart:    { name: 'หัวใจ',     color: '#ff8fb3', path: 'M50,85 C20,65 8,42 25,25 C38,15 50,28 50,38 C50,28 62,15 75,25 C92,42 80,65 50,85 Z' },
  diamond:  { name: 'สี่เหลี่ยมข้าวหลามตัด', color: '#a78bfa', path: 'M50,6 L92,50 L50,94 L8,50 Z' },
  hexagon:  { name: 'หกเหลี่ยม',  color: '#ff9f43', path: 'M50,5 L90,28 L90,72 L50,95 L10,72 L10,28 Z' },
  plus:     { name: 'บวก',      color: '#22d3ee', path: 'M35,10 L65,10 L65,35 L90,35 L90,65 L65,65 L65,90 L35,90 L35,65 L10,65 L10,35 L35,35 Z' },
};
const SHAPE_KEYS = Object.keys(SHAPES);

const board = document.getElementById('board');
const piecesEl = document.getElementById('pieces');
const slotsEl = document.getElementById('slots');
const starCountEl = document.getElementById('starCount');
const starsEl = document.querySelector('.stars');
const celebrate = document.getElementById('celebrate');
const playAgain = document.getElementById('playAgain');
const starRow = document.getElementById('starRow');
const topLabel = document.getElementById('topLabel');

let stars = 0;
let roundNum = 0;
let placedCount = 0;
let currentShapes = [];

function shapeSvg(key, fillColor) {
  const s = SHAPES[key];
  const fill = fillColor || s.color;
  if (s.path === 'circle') {
    return `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="${fill}" stroke="${darken(fill)}" stroke-width="4"/></svg>`;
  }
  if (s.path === 'rect') {
    return `<svg viewBox="0 0 100 100"><rect x="10" y="10" width="80" height="80" rx="10" fill="${fill}" stroke="${darken(fill)}" stroke-width="4"/></svg>`;
  }
  return `<svg viewBox="0 0 100 100"><path d="${s.path}" fill="${fill}" stroke="${darken(fill)}" stroke-width="4" stroke-linejoin="round"/></svg>`;
}

function silhouetteSvg(key) {
  const s = SHAPES[key];
  const fill = '#9c9489';
  if (s.path === 'circle') return `<svg class="silhouette" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="${fill}"/></svg>`;
  if (s.path === 'rect') return `<svg class="silhouette" viewBox="0 0 100 100"><rect x="10" y="10" width="80" height="80" rx="10" fill="${fill}"/></svg>`;
  return `<svg class="silhouette" viewBox="0 0 100 100"><path d="${s.path}" fill="${fill}"/></svg>`;
}

function darken(hex) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.max(0, ((n >> 16) & 255) - 50);
  const g = Math.max(0, ((n >> 8) & 255) - 50);
  const b = Math.max(0, (n & 255) - 50);
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickShapesForRound() {
  // round 1-2: 4 simple shapes
  // round 3-4: 4 random from full pool (some harder)
  // round 5+: 4 from full pool
  if (roundNum < 2) return shuffle(['circle','triangle','square','star']).slice(0, 4);
  return shuffle(SHAPE_KEYS).slice(0, 4);
}

function setupRound() {
  placedCount = 0;
  currentShapes = pickShapesForRound();
  slotsEl.innerHTML = '';
  piecesEl.innerHTML = '';

  // Render slots in shuffled order (so kid can't memorize position)
  const slotOrder = shuffle(currentShapes);
  slotOrder.forEach(key => {
    const slot = document.createElement('div');
    slot.className = 'slot';
    slot.dataset.shape = key;
    slot.innerHTML = silhouetteSvg(key);
    slotsEl.appendChild(slot);
  });

  // Render pieces scattered in pieces area
  const piecesArea = piecesEl.getBoundingClientRect();
  const pieceSize = 100;
  const cols = 2;
  currentShapes.forEach((key, i) => {
    const piece = document.createElement('div');
    piece.className = 'piece';
    piece.dataset.shape = key;
    piece.innerHTML = shapeSvg(key);
    // Grid scatter with jitter
    const col = i % cols;
    const row = Math.floor(i / cols);
    const w = Math.max(piecesArea.width, 320);
    const cellW = w / cols;
    const cellH = Math.max(120, (piecesArea.height) / 2);
    const jitterX = (Math.random() - 0.5) * 20;
    const jitterY = (Math.random() - 0.5) * 20;
    const x = col * cellW + cellW / 2 - pieceSize / 2 + jitterX;
    const y = row * cellH + 10 + jitterY;
    piece.style.left = x + 'px';
    piece.style.top = y + 'px';
    piece.dataset.homeX = x;
    piece.dataset.homeY = y;
    piecesEl.appendChild(piece);
    attachDrag(piece);
  });

  topLabel.textContent = roundNum === 0 ? 'ลากใส่ช่องที่ตรงกัน!' : `รอบที่ ${roundNum + 1}`;
}

// Drag logic with pointer events
function attachDrag(el) {
  let dragging = false;
  let startPointerX = 0, startPointerY = 0;
  let startElX = 0, startElY = 0;

  el.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    dragging = true;
    el.classList.add('dragging');
    startPointerX = e.clientX;
    startPointerY = e.clientY;
    startElX = parseFloat(el.style.left);
    startElY = parseFloat(el.style.top);
    el.setPointerCapture(e.pointerId);
    vibrate(8);
  });

  el.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - startPointerX;
    const dy = e.clientY - startPointerY;
    el.style.left = (startElX + dx) + 'px';
    el.style.top = (startElY + dy) + 'px';
  });

  function endDrag(e) {
    if (!dragging) return;
    dragging = false;
    el.classList.remove('dragging');
    try { el.releasePointerCapture(e.pointerId); } catch (_) {}

    // Find nearest slot for THIS shape only
    const targetSlot = [...document.querySelectorAll('.slot')].find(s => s.dataset.shape === el.dataset.shape && !s.classList.contains('matched'));
    if (!targetSlot) return;
    const pr = el.getBoundingClientRect();
    const sr = targetSlot.getBoundingClientRect();
    const dx = (pr.left + pr.width/2) - (sr.left + sr.width/2);
    const dy = (pr.top + pr.height/2) - (sr.top + sr.height/2);
    const dist = Math.hypot(dx, dy);

    if (dist < 90) {
      placeInSlot(el, targetSlot);
    } else {
      // bounce back
      bounceBack(el);
    }
  }

  el.addEventListener('pointerup', endDrag);
  el.addEventListener('pointercancel', endDrag);
}

function bounceBack(el) {
  el.style.transition = 'left .3s, top .3s';
  el.style.left = el.dataset.homeX + 'px';
  el.style.top = el.dataset.homeY + 'px';
  el.classList.add('wiggle');
  setTimeout(() => {
    el.style.transition = '';
    el.classList.remove('wiggle');
  }, 400);
}

function placeInSlot(piece, slot) {
  // calculate slot center in viewport coords, then convert to pieces parent coords
  const sr = slot.getBoundingClientRect();
  const pp = piecesEl.getBoundingClientRect();
  const targetX = sr.left - pp.left + sr.width/2 - 50;
  const targetY = sr.top - pp.top + sr.height/2 - 50;
  piece.classList.add('placed');
  piece.style.left = targetX + 'px';
  piece.style.top = targetY + 'px';
  piece.style.width = (sr.width * 0.78) + 'px';
  piece.style.height = (sr.height * 0.78) + 'px';

  slot.classList.add('matched');
  vibrate([20, 30, 30]);
  speak(SHAPES[piece.dataset.shape].name);
  popConfetti(sr.left + sr.width/2, sr.top + sr.height/2);
  placedCount++;

  if (placedCount === currentShapes.length) {
    setTimeout(() => endRound(), 700);
  }
}

function endRound() {
  roundNum++;
  stars++;
  starCountEl.textContent = stars;
  starsEl.classList.remove('bump');
  void starsEl.offsetWidth;
  starsEl.classList.add('bump');

  if (roundNum >= 5) {
    showCelebrate();
  } else {
    setTimeout(setupRound, 600);
  }
}

function showCelebrate() {
  celebrate.classList.add('on');
  starRow.textContent = '⭐'.repeat(Math.min(5, stars));
  // Big confetti burst
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < 30; i++) {
    setTimeout(() => popConfetti(cx + (Math.random() - 0.5) * 200, cy - 100 + Math.random() * 100), i * 30);
  }
  speak('เก่งมาก');
}

playAgain.addEventListener('click', () => {
  celebrate.classList.remove('on');
  stars = 0;
  roundNum = 0;
  starCountEl.textContent = '0';
  setupRound();
});

function popConfetti(x, y) {
  const colors = ['#ff6b6b','#ffd93d','#4fc3f7','#7ed957','#ff8fb3','#a78bfa','#ff9f43','#22d3ee'];
  for (let i = 0; i < 8; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    const angle = (Math.random() - 0.5) * Math.PI;
    const dist = 60 + Math.random() * 80;
    c.style.left = x + 'px';
    c.style.top = y + 'px';
    c.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    c.style.animation = `confettiFly 1s ease-out forwards`;
    document.body.appendChild(c);
    requestAnimationFrame(() => {
      c.style.transform = `translate(${Math.cos(angle) * dist}px, ${100 + Math.random() * 60}px) rotate(${Math.random() * 720}deg)`;
      c.style.opacity = '0';
      c.style.transition = 'transform 1s ease-out, opacity 1s ease-out';
    });
    setTimeout(() => c.remove(), 1100);
  }
}

function vibrate(p) {
  try { if (navigator.vibrate) navigator.vibrate(p); } catch (_) {}
}

function speak(text) {
  try {
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'th-TH';
    u.rate = 0.95;
    u.pitch = 1.1;
    speechSynthesis.speak(u);
  } catch (_) {}
}

// Start
window.addEventListener('load', () => {
  setupRound();
});
window.addEventListener('resize', () => {
  // re-layout if not in middle of placing
  if (placedCount === 0) setupRound();
});
</script>
</body>
</html>
