<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🃏 จับคู่ภาพ — เกมสำหรับเด็ก</title>
<meta name="description" content="เกมพลิกการ์ดจับคู่ภาพเหมือน ฝึกความจำสำหรับเด็ก">
<meta name="theme-color" content="#ff6b9d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="จับคู่ภาพ">
<meta name="mobile-web-app-capable" content="yes">

<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../icons/icon.svg">
<link rel="manifest" href="../manifest.webmanifest">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Itim&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-3: #b5e8ff; --grass-1: #7ed957;
    --brand: #ff6b9d; --brand-dark: #e54b82;
    --gold: #ffd93d; --good: #5bc13a; --good-dark: #3fa024;
    --bad: #ff5757; --bad-dark: #d83838;
    --ink: #2d3436; --card: #ffffff; --card-border: #ffd6e4;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Mitr', -apple-system, sans-serif;
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 10%, #fff9c4 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, #ffcfd2 0%, transparent 45%),
      linear-gradient(180deg, var(--sky-3) 0%, #d9f3c9 65%, var(--grass-1) 100%);
    background-attachment: fixed;
    user-select: none;
    -webkit-user-select: none;
  }
  body::before {
    content: '☁️ ☁️     ☁️';
    position: fixed; top: 20px; left: 0; right: 0;
    text-align: center; font-size: 42px;
    opacity: 0.55; pointer-events: none;
    letter-spacing: 80px;
    animation: drift 40s linear infinite;
    z-index: 0;
  }
  @keyframes drift { from { transform: translateX(-10%); } to { transform: translateX(10%); } }

  .app { max-width: 880px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
  body:has(#gameScreen.active) .app {
    max-width: 100%; padding: 0; min-height: 100vh; min-height: 100dvh;
  }
  body:has(#gameScreen.active)::before { display: none; }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn .35s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero { text-align: center; padding: 14px 10px 18px; }
  .hero h1 {
    font-family: 'Itim', cursive;
    font-size: clamp(42px, 9vw, 68px);
    margin: 0; color: var(--brand-dark);
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
    letter-spacing: 1px;
  }
  .howto {
    list-style: none; padding: 12px 18px; margin: 8px auto 18px;
    max-width: 360px; background: rgba(255,255,255,0.55);
    border: 2px dashed var(--card-border); border-radius: 18px;
    font-size: 16px; color: #555; font-weight: 500; text-align: left;
  }
  .howto li { display: flex; align-items: center; gap: 10px; padding: 3px 0; line-height: 1.3; }
  .howto-icon { font-size: 22px; flex-shrink: 0; width: 28px; text-align: center; }
  @media (min-width: 768px) { .howto { font-size: 18px; max-width: 440px; } .howto-icon { font-size: 26px; } }

  .lgrid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px; margin: 10px 0 32px;
  }
  .lcard {
    background: var(--card); border: 4px solid var(--card-border);
    border-radius: 24px; padding: 22px 14px 18px; text-align: center;
    cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.07);
    transition: transform .15s, box-shadow .15s, border-color .15s;
    position: relative; overflow: hidden;
  }
  .lcard:active { transform: scale(0.96) translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.07); }
  .lcard:hover { border-color: var(--brand); }
  .lcard .preview {
    font-size: 56px; line-height: 1;
    filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.12));
    margin-bottom: 6px;
  }
  .lcard .ltitle {
    font-family: 'Itim', cursive; font-size: 26px;
    color: var(--brand-dark); text-shadow: 2px 2px 0 #fff;
  }
  .lcard .lsub { font-size: 14px; color: #777; font-weight: 500; margin-top: 4px; }
  .lcard .stars { position: absolute; top: 10px; right: 10px; font-size: 18px; letter-spacing: 1px; }

  /* Game */
  #gameScreen.active {
    display: flex; flex-direction: column;
    min-height: 100vh; min-height: 100dvh;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .hud {
    flex: 0 0 auto; display: flex; justify-content: center; gap: 10px;
    margin: 10px 14px 0; font-family: 'Itim', cursive; font-size: 22px;
    flex-wrap: wrap;
  }
  .hud-item {
    background: #fff; border: 3px solid var(--card-border);
    border-radius: 999px; padding: 6px 16px;
    box-shadow: 0 3px 0 rgba(0,0,0,0.08);
    min-width: 80px; text-align: center;
  }
  .hud-item.match { color: var(--good-dark); }
  .hud-item.moves { color: #2980b9; }
  .hud-item.time  { color: var(--brand-dark); }

  .board-wrap {
    flex: 1 1 auto;
    display: flex; align-items: center; justify-content: center;
    padding: 14px;
  }
  .board {
    display: grid;
    gap: 10px;
    width: 100%;
    max-width: 560px;
  }
  .board.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .board.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .board.cols-5 { grid-template-columns: repeat(5, 1fr); }
  @media (max-width: 480px) {
    .board { gap: 6px; }
    .board-wrap { padding: 8px; }
  }

  .mcard {
    aspect-ratio: 1;
    position: relative;
    cursor: pointer;
    perspective: 800px;
  }
  .mcard-inner {
    position: absolute; inset: 0;
    transition: transform .5s;
    transform-style: preserve-3d;
  }
  .mcard.flipped .mcard-inner,
  .mcard.matched .mcard-inner { transform: rotateY(180deg); }
  .mface {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 18px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border: 3px solid #fff;
    box-shadow: 0 4px 0 rgba(0,0,0,0.10);
  }
  .mface-back {
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
    font-family: 'Itim', cursive;
    font-size: clamp(28px, 8vw, 52px);
    color: #fff;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.18);
  }
  .mface-front {
    background: #fffef9;
    transform: rotateY(180deg);
    font-size: clamp(40px, 12vw, 80px);
    line-height: 1;
  }
  .mcard.matched .mface-front {
    background: #e8ffe0;
    border-color: var(--good);
    animation: matchedPulse .55s ease;
  }
  .mcard.shake .mcard-inner { animation: shake .4s ease; }
  @keyframes shake {
    0%, 100% { transform: rotateY(180deg) translateX(0); }
    25%      { transform: rotateY(180deg) translateX(-8px); }
    75%      { transform: rotateY(180deg) translateX(8px); }
  }
  @keyframes matchedPulse {
    0%   { transform: rotateY(180deg) scale(1); }
    50%  { transform: rotateY(180deg) scale(1.1); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  /* Results */
  #resultsScreen { text-align: center; padding-top: 20px; }
  .trophy {
    font-size: clamp(120px, 22vw, 180px); line-height: 1;
    filter: drop-shadow(4px 6px 0 rgba(0,0,0,0.18));
    animation: bobBig 1.2s ease-in-out infinite;
  }
  @keyframes bobBig {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-12px) rotate(4deg); }
  }
  .winner-name {
    font-family: 'Itim', cursive;
    font-size: clamp(44px, 9vw, 72px);
    color: var(--brand-dark); margin: 18px 0 6px;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
  }
  .winner-sub {
    font-size: clamp(18px, 4vw, 24px);
    color: #555; margin: 0 0 6px; font-weight: 500;
  }
  .stars-row {
    font-size: clamp(48px, 10vw, 72px); line-height: 1;
    margin: 8px 0 4px; letter-spacing: 4px;
    filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.12));
  }
  .rating-text {
    font-family: 'Itim', cursive;
    font-size: clamp(28px, 6vw, 40px);
    color: var(--brand-dark); margin: 4px 0 16px;
  }
  .action-bar {
    display: flex; gap: 12px; justify-content: center; align-items: center;
    margin-top: 12px; flex-wrap: wrap;
  }
  .btn-main {
    font-family: 'Itim', cursive;
    font-size: 28px; padding: 16px 36px;
    border: 4px solid #fff; border-radius: 999px;
    background: var(--brand); color: #fff;
    box-shadow: 0 6px 0 var(--brand-dark);
    cursor: pointer; text-shadow: 2px 2px 0 var(--brand-dark);
    transition: transform .12s, box-shadow .12s;
  }
  .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--brand-dark); }
  .btn-ghost {
    font-family: 'Itim', cursive;
    font-size: 24px; padding: 14px 30px;
    border: 4px solid var(--brand); border-radius: 999px;
    background: #fff; color: var(--brand-dark);
    box-shadow: 0 5px 0 rgba(0,0,0,0.12); cursor: pointer;
    transition: transform .12s, box-shadow .12s;
  }
  .btn-ghost:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }

  .confetti {
    position: fixed; top: -20px;
    width: 12px; height: 18px;
    z-index: 90; pointer-events: none;
    animation: fall linear forwards;
  }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

  .home-btn, .back-btn {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #fff; border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    align-items: center; justify-content: center;
    font-size: 24px; text-decoration: none; color: var(--ink);
    z-index: 60;
    transition: transform .12s;
    font-family: inherit; padding: 0; cursor: pointer;
  }
  .home-btn { left: 12px; display: flex; font-size: 26px; }
  .back-btn { right: 12px; display: none; }
  .back-btn.show { display: flex; }
  .home-btn:active, .back-btn:active { transform: scale(0.92); }

  @media (min-width: 768px) {
    .lgrid { grid-template-columns: repeat(4, 1fr); gap: 18px; }
    .hud { font-size: 26px; }
    .hud-item { padding: 8px 22px; min-width: 110px; }
  }
  @media (max-width: 480px) {
    .lcard { padding: 16px 10px 14px; border-width: 3px; border-radius: 20px; }
    .lcard .ltitle { font-size: 22px; }
    .hud { font-size: 18px; margin: 8px 10px 0; }
    .hud-item { padding: 5px 12px; min-width: 60px; }
  }
</style>
</head>
<body>
<a class="home-btn" href="../" aria-label="กลับหน้าหลัก">🏠</a>
<button class="back-btn" id="backBtn" type="button" aria-label="เลือกด่านใหม่">📋</button>
<div class="app">

  <section id="selectScreen" class="screen active">
    <header class="hero">
      <h1>🃏 จับคู่ภาพ</h1>
      <ul class="howto">
        <li><span class="howto-icon">👆</span> แตะการ์ดเพื่อพลิก</li>
        <li><span class="howto-icon">👀</span> หาคู่เหมือนกัน 2 ใบ</li>
        <li><span class="howto-icon">🏆</span> พลิกครบทุกคู่ให้เร็วที่สุด!</li>
      </ul>
    </header>

    <div id="levelGrid" class="lgrid"></div>
  </section>

  <section id="gameScreen" class="screen">
    <div class="hud">
      <div class="hud-item match">🎯 <span id="matchCount">0</span>/<span id="matchTotal">0</span></div>
      <div class="hud-item moves">👆 <span id="moveCount">0</span></div>
      <div class="hud-item time">⏱ <span id="timeText">0:00</span></div>
    </div>
    <div class="board-wrap">
      <div id="board" class="board"></div>
    </div>
  </section>

  <section id="resultsScreen" class="screen">
    <div class="trophy">🏆</div>
    <h2 id="resultTitle" class="winner-name">เก่งมาก!</h2>
    <p id="resultSub" class="winner-sub">ใช้ 0 ครั้ง · 0:00</p>
    <div id="resultStars" class="stars-row">⭐</div>
    <div id="resultText" class="rating-text">ลองอีกที!</div>
    <div class="action-bar">
      <button id="againBtn" class="btn-ghost">🔄 เล่นอีก</button>
      <button id="newBtn" class="btn-main">เลือกใหม่</button>
    </div>
  </section>

</div>

<script>
'use strict';

// THEMES — pools of emoji per theme
const THEMES = {
  animals:  ['🦁','🐯','🐶','🐱','🐰','🦊','🐻','🐼','🐨','🐮','🐷','🐸'],
  fruits:   ['🍎','🍌','🍇','🍓','🍊','🍉','🍑','🍐','🥝','🍒','🥭','🍍'],
  vehicles: ['🚗','🚕','🚌','🚓','🚑','🚒','🚜','🏎','🚲','✈️','🚀','🚁'],
  sea:      ['🐟','🐠','🐡','🦈','🐬','🐳','🦀','🐙','🦑','🦐','🐢','🦞'],
  food:     ['🍕','🍔','🌭','🍟','🌮','🍝','🍣','🍩','🍪','🎂','🍦','🍿'],
};

const LEVELS = [
  { id: 1, stars: 1, name: 'ง่ายมาก',  subtitle: '6 ใบ · 3 คู่',  preview: '🍎', pairs: 3,  cols: 3, theme: 'fruits',   parScore: { gold: 3, silver: 5 } },
  { id: 2, stars: 1, name: 'ง่าย',      subtitle: '8 ใบ · 4 คู่',  preview: '🐶', pairs: 4,  cols: 4, theme: 'animals',  parScore: { gold: 5, silver: 7 } },
  { id: 3, stars: 2, name: 'ปานกลาง',  subtitle: '12 ใบ · 6 คู่', preview: '🚗', pairs: 6,  cols: 4, theme: 'vehicles', parScore: { gold: 8, silver: 12 } },
  { id: 4, stars: 2, name: 'ยาก',       subtitle: '16 ใบ · 8 คู่', preview: '🐟', pairs: 8,  cols: 4, theme: 'sea',      parScore: { gold: 12, silver: 18 } },
  { id: 5, stars: 3, name: 'ยากมาก',    subtitle: '20 ใบ · 10 คู่',preview: '🍕', pairs: 10, cols: 5, theme: 'food',     parScore: { gold: 16, silver: 24 } },
];

// STATE
const state = {
  level: null,
  cards: [],     // array of { id, emoji, matched, el }
  first: null,
  lock: false,
  matched: 0,
  moves: 0,
  startTime: 0,
  endTime: 0,
  tickTimer: null,
  pendingTimers: [],
};

// AUDIO
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
}
function tone(freq, ms, type='sine', vol=0.18) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  o.connect(g).connect(audioCtx.destination);
  const t = audioCtx.currentTime, d = ms/1000;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.01);
  g.gain.linearRampToValueAtTime(0, t + d);
  o.start(t); o.stop(t + d + 0.02);
}
function playFlip()  { tone(440, 90, 'sine', 0.10); }
function playMatch() { tone(660, 110, 'triangle', 0.16); setTimeout(()=>tone(880, 130, 'triangle', 0.14), 100); }
function playMiss()  { tone(180, 200, 'sawtooth', 0.14); }
function playWin()   {
  const notes = [523, 659, 784, 1047];
  notes.forEach((f, i) => setTimeout(()=>tone(f, 200, 'triangle', 0.18), i * 130));
}

// DOM
const $ = (id) => document.getElementById(id);
const screens = { select: $('selectScreen'), game: $('gameScreen'), results: $('resultsScreen') };
const levelGrid = $('levelGrid');
const board = $('board');

// UTIL
function shuffle(a) { const r = a.slice(); for (let i=r.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [r[i],r[j]]=[r[j],r[i]]; } return r; }
function pick(a)    { return a[Math.floor(Math.random()*a.length)]; }
function buzz(p)    { if (navigator.vibrate) navigator.vibrate(p); }
function showScreen(name) {
  for (const k of Object.keys(screens)) screens[k].classList.toggle('active', k===name);
  $('backBtn').classList.toggle('show', name === 'game');
}
function later(fn, ms) {
  const id = setTimeout(fn, ms); state.pendingTimers.push(id); return id;
}
function clearTimers() {
  for (const id of state.pendingTimers) clearTimeout(id);
  state.pendingTimers = [];
}
function abortGame() {
  if (state.tickTimer) clearInterval(state.tickTimer);
  clearTimers();
  board.innerHTML = '';
}

// SELECT
function renderLevels() {
  levelGrid.innerHTML = '';
  for (const lvl of LEVELS) {
    const c = document.createElement('div');
    c.className = 'lcard';
    c.innerHTML = `
      <div class="stars">${'⭐'.repeat(lvl.stars)}</div>
      <div class="preview">${lvl.preview}</div>
      <div class="ltitle">${lvl.name}</div>
      <div class="lsub">${lvl.subtitle}</div>
    `;
    c.addEventListener('click', () => { ensureAudio(); startGame(lvl); });
    levelGrid.appendChild(c);
  }
}

// GAME
function startGame(level) {
  state.level = level;
  state.first = null; state.lock = false;
  state.matched = 0; state.moves = 0;
  state.cards = [];
  clearTimers();
  if (state.tickTimer) clearInterval(state.tickTimer);

  const pool = shuffle(THEMES[level.theme]).slice(0, level.pairs);
  const deck = shuffle([...pool, ...pool]);
  board.innerHTML = '';
  board.className = 'board cols-' + level.cols;

  deck.forEach((emoji, idx) => {
    const card = document.createElement('div');
    card.className = 'mcard';
    card.innerHTML = `
      <div class="mcard-inner">
        <div class="mface mface-back">?</div>
        <div class="mface mface-front">${emoji}</div>
      </div>
    `;
    const entry = { id: idx, emoji, matched: false, el: card };
    state.cards.push(entry);
    card.addEventListener('click', () => onCardTap(entry));
    board.appendChild(card);
  });

  $('matchCount').textContent = '0';
  $('matchTotal').textContent = level.pairs;
  $('moveCount').textContent  = '0';
  $('timeText').textContent   = '0:00';

  showScreen('game');
  state.startTime = performance.now();
  state.tickTimer = setInterval(tickTime, 250);
}

function tickTime() {
  const ms = performance.now() - state.startTime;
  const s = Math.floor(ms / 1000);
  const mm = Math.floor(s / 60);
  const ss = String(s % 60).padStart(2, '0');
  $('timeText').textContent = mm + ':' + ss;
}

function onCardTap(card) {
  if (state.lock || card.matched || card === state.first) return;
  flipUp(card);
  playFlip();
  buzz(15);

  if (!state.first) {
    state.first = card;
    return;
  }

  // second card
  state.moves += 1;
  $('moveCount').textContent = state.moves;
  const a = state.first, b = card;
  state.first = null;

  if (a.emoji === b.emoji) {
    a.matched = true; b.matched = true;
    a.el.classList.add('matched');
    b.el.classList.add('matched');
    state.matched += 1;
    $('matchCount').textContent = state.matched;
    playMatch();
    buzz([20, 40, 20]);
    if (state.matched === state.level.pairs) {
      later(endRound, 600);
    }
  } else {
    state.lock = true;
    playMiss();
    buzz([30, 80, 30]);
    a.el.classList.add('shake');
    b.el.classList.add('shake');
    later(() => {
      a.el.classList.remove('shake', 'flipped');
      b.el.classList.remove('shake', 'flipped');
      state.lock = false;
    }, 850);
  }
}

function flipUp(card) {
  card.el.classList.add('flipped');
}

function endRound() {
  if (state.tickTimer) clearInterval(state.tickTimer);
  state.endTime = performance.now();
  showResults();
}

// RESULTS
function showResults() {
  const seconds = Math.floor((state.endTime - state.startTime) / 1000);
  const mm = Math.floor(seconds / 60);
  const ss = String(seconds % 60).padStart(2, '0');
  const r = ratingFor(state.moves, state.level);
  $('resultTitle').textContent = r.title;
  $('resultSub').textContent   = `${state.moves} ครั้ง · ${mm}:${ss}`;
  $('resultStars').textContent = r.stars;
  $('resultText').textContent  = r.text;
  showScreen('results');
  celebrate(r.confetti);
  playWin();
  buzz([60, 40, 60, 40, 100]);
}

function ratingFor(moves, level) {
  const minMoves = level.pairs;
  if (moves <= level.parScore.gold)   return { stars: '🌟🌟🌟', text: 'สุดยอด!',   title: 'เก่งมาก!',  confetti: 140 };
  if (moves <= level.parScore.silver) return { stars: '⭐⭐',     text: 'เก่ง!',      title: 'ผ่านแล้ว!', confetti: 90  };
  return                                     { stars: '⭐',         text: 'ดีมาก!',    title: 'ผ่านแล้ว!', confetti: 50  };
}

function celebrate(n) {
  const colors = ['#ff6b9d', '#ffd93d', '#7ed957', '#5bc0eb', '#ff914d', '#b388ff'];
  for (let i = 0; i < n; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = Math.random() * 0.8 + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    if (Math.random() > 0.5) c.style.borderRadius = '50%';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

// EVENTS
$('backBtn').addEventListener('click', () => {
  abortGame(); renderLevels(); showScreen('select');
});
$('againBtn').addEventListener('click', () => {
  if (!state.level) { showScreen('select'); return; }
  ensureAudio(); startGame(state.level);
});
$('newBtn').addEventListener('click', () => {
  state.level = null; clearTimers(); showScreen('select');
});

let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd < 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

renderLevels();
</script>
