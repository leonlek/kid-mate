<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>📦 ดันกล่อง — เกมสำหรับเด็ก</title>
<meta name="description" content="เกมดันกล่องเข้าจุดเป้าหมาย ฝึกการวางแผนและการแก้ปัญหาสำหรับเด็ก">
<meta name="theme-color" content="#ff6b9d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ดันกล่อง">
<meta name="mobile-web-app-capable" content="yes">

<meta property="og:type" content="website">
<meta property="og:title" content="📦 ดันกล่อง — เกมสำหรับเด็ก">
<meta property="og:description" content="ดันกล่องเข้าจุดเป้าหมาย ฝึกการวางแผนและแก้ปัญหา">
<meta property="og:locale" content="th_TH">

<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../icons/icon.svg">
<link rel="manifest" href="../manifest.webmanifest">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Itim&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-3: #b5e8ff;
    --grass-1: #7ed957;
    --brand: #ff6b9d;
    --brand-dark: #e54b82;
    --gold: #ffd93d;
    --good: #5bc13a;
    --good-dark: #3fa024;
    --ink: #2d3436;
    --paper: #fffef9;
    --card: #ffffff;
    --card-border: #ffd6e4;

    --wall: #8b6b4a;
    --wall-dark: #6b4f33;
    --floor: #fff5e1;
    --floor-dark: #f0e2bf;
    --target: #ffe9a0;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Mitr', -apple-system, sans-serif;
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 10%, #fff9c4 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, #ffcfd2 0%, transparent 45%),
      linear-gradient(180deg, var(--sky-3) 0%, #d9f3c9 65%, var(--grass-1) 100%);
    background-attachment: fixed;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  body::before {
    content: '☁️ ☁️     ☁️';
    position: fixed; top: 20px; left: 0; right: 0;
    text-align: center; font-size: 42px;
    opacity: 0.55; pointer-events: none;
    letter-spacing: 80px;
    animation: drift 40s linear infinite;
    z-index: 0;
  }
  @keyframes drift {
    from { transform: translateX(-10%); }
    to { transform: translateX(10%); }
  }

  .app { max-width: 880px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
  body:has(#gameScreen.active) .app {
    max-width: 100%;
    padding: 0;
  }
  body:has(#gameScreen.active)::before { display: none; }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn .35s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Hero */
  .hero { text-align: center; padding: 14px 10px 18px; }
  .hero h1 {
    font-family: 'Itim', 'Mitr', cursive;
    font-size: clamp(42px, 9vw, 68px);
    margin: 0;
    color: var(--brand-dark);
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
    letter-spacing: 1px;
  }
  .hero p.hint {
    font-family: 'Itim', cursive;
    font-size: clamp(20px, 4vw, 28px);
    margin: 8px 0 0;
    color: var(--brand-dark);
  }

  /* Home + back buttons */
  .home-btn, .back-btn {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #fff;
    border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    align-items: center; justify-content: center;
    font-size: 26px;
    text-decoration: none;
    color: var(--ink);
    z-index: 60;
    transition: transform .12s;
    font-family: inherit;
    padding: 0;
    cursor: pointer;
  }
  .home-btn { left: 12px; display: flex; }
  .back-btn { right: 12px; display: none; }
  .back-btn.show { display: flex; }
  .home-btn:active, .back-btn:active { transform: scale(0.92); }

  /* How-to */
  .howto {
    list-style: none;
    padding: 12px 18px;
    margin: 8px auto 14px;
    max-width: 380px;
    background: rgba(255,255,255,0.55);
    border: 2px dashed var(--card-border);
    border-radius: 18px;
    font-size: 16px;
    color: #555;
    font-weight: 500;
    text-align: left;
  }
  .howto li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 3px 0;
    line-height: 1.3;
  }
  .howto-icon { font-size: 22px; flex-shrink: 0; width: 28px; text-align: center; }

  /* Level grid */
  .lgrid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin: 14px 0;
  }
  .lcard {
    background: var(--card);
    border: 4px solid var(--card-border);
    border-radius: 22px;
    padding: 14px 10px 12px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 5px 0 rgba(0,0,0,0.08);
    transition: transform .15s, box-shadow .15s, border-color .15s;
    position: relative;
  }
  .lcard:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.08); }
  .lcard.cleared { border-color: var(--good); }
  .lcard.cleared::before {
    content: '⭐';
    position: absolute;
    top: -10px; right: -8px;
    font-size: 32px;
    filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.15));
  }
  .lcard .ltitle {
    font-family: 'Itim', cursive;
    font-size: 22px;
    color: var(--brand-dark);
    margin-bottom: 6px;
  }
  .lcard .preview {
    display: grid;
    gap: 1px;
    width: 100%;
    max-width: 120px;
    margin: 0 auto;
    aspect-ratio: 1 / 1;
  }
  .lcard .preview .p-cell {
    border-radius: 2px;
    background: var(--floor);
  }
  .lcard .preview .p-cell.wall { background: var(--wall); }
  .lcard .preview .p-cell.target { background: var(--gold); }
  .lcard .preview .p-cell.outside { background: transparent; }
  .lcard .preview .p-cell.box { background: #c69b6b; box-shadow: inset 0 0 0 1px #8b6b4a; }
  .lcard .preview .p-cell.player { background: var(--brand); border-radius: 50%; }

  @media (min-width: 480px) {
    .lgrid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (min-width: 720px) {
    .lgrid { grid-template-columns: repeat(4, 1fr); }
  }

  /* Game screen */
  #gameScreen {
    height: 100vh;
    height: 100dvh;
    display: none;
    flex-direction: column;
    padding: calc(12px + env(safe-area-inset-top)) 8px calc(12px + env(safe-area-inset-bottom));
  }
  #gameScreen.active { display: flex; }

  .hud {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 60px 0 8px;
    font-family: 'Itim', cursive;
    font-size: 22px;
  }
  .hud-item {
    background: #fff;
    border: 3px solid var(--card-border);
    box-shadow: 0 3px 0 rgba(0,0,0,0.08);
    border-radius: 999px;
    padding: 6px 18px;
    min-width: 90px;
    text-align: center;
    color: var(--brand-dark);
  }
  .hud-item span { color: var(--ink); font-weight: 700; }

  .stage-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    min-height: 0;
  }

  .board {
    position: relative;
    background: #fff;
    border: 4px solid var(--card-border);
    border-radius: 18px;
    padding: 10px;
    display: grid;
    box-shadow: 0 6px 0 rgba(0,0,0,0.08);
    touch-action: none;
  }
  .cell {
    width: var(--cs);
    height: var(--cs);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: var(--floor);
  }
  .cell.wall {
    background: var(--wall);
    background-image:
      linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 40%),
      linear-gradient(45deg, transparent 60%, rgba(0,0,0,0.25) 100%);
    box-shadow: inset 0 0 0 2px var(--wall-dark);
    border-radius: 6px;
  }
  .cell.target {
    background: var(--target);
  }
  .cell.target::after {
    content: '⭐';
    font-size: calc(var(--cs) * 0.42);
    opacity: 0.55;
  }
  .cell.outside { background: transparent; }

  .actor {
    position: absolute;
    width: var(--cs);
    height: var(--cs);
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    transition: transform .14s ease-out;
    left: 10px;
    top: 10px;
  }
  .actor .face {
    font-size: calc(var(--cs) * 0.75);
    line-height: 1;
    transition: transform .14s ease-out;
  }
  .actor.player { z-index: 3; }
  .actor.player .face { font-size: calc(var(--cs) * 0.78); filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.12)); }
  .actor.box { z-index: 2; }
  .actor.box .face { filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.18)); }
  .actor.box.placed .face {
    animation: pop 0.5s ease-out;
    filter: drop-shadow(0 0 8px var(--gold)) drop-shadow(2px 2px 0 rgba(0,0,0,0.18));
  }
  @keyframes pop {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.25); }
  }
  .actor.bump .face { animation: bump .2s; }
  @keyframes bump {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(var(--bx, 0), var(--by, 0)); }
  }

  /* Controls */
  .controls {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 8px;
    padding: 8px 12px 0;
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
  }
  .dpad {
    display: grid;
    grid-template-columns: repeat(3, 64px);
    grid-template-rows: repeat(3, 64px);
    gap: 4px;
  }
  .dpad .ctrl-btn { grid-row: 2; grid-column: 2; opacity: 0; pointer-events: none; }
  .dpad .ctrl-btn[data-dir="up"]    { grid-row: 1; grid-column: 2; opacity: 1; pointer-events: auto; }
  .dpad .ctrl-btn[data-dir="left"]  { grid-row: 2; grid-column: 1; opacity: 1; pointer-events: auto; }
  .dpad .ctrl-btn[data-dir="right"] { grid-row: 2; grid-column: 3; opacity: 1; pointer-events: auto; }
  .dpad .ctrl-btn[data-dir="down"]  { grid-row: 3; grid-column: 2; opacity: 1; pointer-events: auto; }

  .ctrl-btn {
    background: #fff;
    border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    border-radius: 18px;
    width: 64px;
    height: 64px;
    font-size: 30px;
    cursor: pointer;
    transition: transform .08s;
    padding: 0;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ctrl-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--brand-dark); }
  .ctrl-btn.aux {
    width: 64px; height: 64px;
    border-color: #aaa;
    box-shadow: 0 3px 0 #888;
  }
  .controls .left-aux { justify-self: end; }
  .controls .right-aux { justify-self: start; }

  /* Win overlay */
  .win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    animation: fadeIn .35s;
  }
  .win-overlay.show { display: flex; }
  .win-card {
    background: #fff;
    border: 5px solid var(--gold);
    border-radius: 28px;
    padding: 28px 28px 24px;
    text-align: center;
    box-shadow: 0 8px 0 rgba(0,0,0,0.15);
    max-width: 320px;
    width: 86%;
    animation: pop-in .4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop-in {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .win-card h2 {
    font-family: 'Itim', cursive;
    color: var(--brand-dark);
    font-size: 44px;
    margin: 0 0 4px;
    text-shadow: 2px 2px 0 #fff, 4px 4px 0 rgba(0,0,0,0.08);
  }
  .win-card .moves-result {
    font-size: 18px;
    color: #555;
    margin-bottom: 18px;
  }
  .win-card .moves-result b { color: var(--brand-dark); font-size: 22px; }
  .win-card .big-btn {
    display: block;
    width: 100%;
    margin: 8px 0;
    padding: 14px 18px;
    border: none;
    border-radius: 999px;
    font-family: 'Itim', cursive;
    font-size: 24px;
    color: #fff;
    background: var(--brand);
    box-shadow: 0 4px 0 var(--brand-dark);
    cursor: pointer;
    transition: transform .1s;
  }
  .win-card .big-btn.secondary {
    background: #fff;
    color: var(--brand-dark);
    border: 3px solid var(--brand);
    box-shadow: 0 4px 0 var(--brand-dark);
  }
  .win-card .big-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--brand-dark); }

  /* Confetti */
  .confetti {
    position: fixed;
    top: -20px;
    width: 14px; height: 18px;
    z-index: 90; pointer-events: none;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }

  /* Phone */
  @media (max-width: 480px) {
    .ctrl-btn, .dpad .ctrl-btn[data-dir] { width: 58px; height: 58px; font-size: 26px; border-radius: 16px; }
    .dpad { grid-template-columns: repeat(3, 58px); grid-template-rows: repeat(3, 58px); }
    .controls { padding: 4px 8px 0; }
    .hud { font-size: 18px; margin-top: 56px; }
    .hud-item { padding: 4px 14px; min-width: 80px; }
    .lcard { padding: 10px 6px 8px; border-width: 3px; border-radius: 18px; }
    .lcard .ltitle { font-size: 18px; }
  }

  /* iPad */
  @media (min-width: 768px) {
    .ctrl-btn, .dpad .ctrl-btn[data-dir] { width: 72px; height: 72px; font-size: 34px; }
    .dpad { grid-template-columns: repeat(3, 72px); grid-template-rows: repeat(3, 72px); }
  }
</style>
</head>
<body>
<a class="home-btn" href="../" aria-label="กลับหน้าหลัก">🏠</a>
<button class="back-btn" id="backBtn" type="button" aria-label="เลือกด่านใหม่">📋</button>

<div class="app">

  <!-- SELECT -->
  <section id="selectScreen" class="screen active">
    <header class="hero">
      <h1>📦 ดันกล่อง</h1>
      <ul class="howto">
        <li><span class="howto-icon">📦</span> ดันกล่องไปวางบนจุด ⭐</li>
        <li><span class="howto-icon">👆</span> ปัดนิ้วบนกระดาน หรือกดปุ่มลูกศร</li>
        <li><span class="howto-icon">↩️</span> ทำผิดได้ กด ↩️ ย้อนกลับ</li>
        <li><span class="howto-icon">🔄</span> เริ่มด่านใหม่ได้ตลอด</li>
      </ul>
      <p class="hint">เลือกด่าน</p>
    </header>
    <div class="lgrid" id="levelGrid"></div>
  </section>

  <!-- GAME -->
  <section id="gameScreen" class="screen">
    <div class="hud">
      <div class="hud-item">ด่าน <span id="levelNum">1</span></div>
      <div class="hud-item">เดิน <span id="moveCount">0</span></div>
    </div>
    <div class="stage-area">
      <div class="board" id="board"></div>
    </div>
    <div class="controls">
      <button class="ctrl-btn aux left-aux" id="undoBtn" aria-label="ย้อนกลับ">↩️</button>
      <div class="dpad">
        <button class="ctrl-btn" data-dir="up" aria-label="ขึ้น">⬆️</button>
        <button class="ctrl-btn" data-dir="left" aria-label="ซ้าย">⬅️</button>
        <button class="ctrl-btn" data-dir="right" aria-label="ขวา">➡️</button>
        <button class="ctrl-btn" data-dir="down" aria-label="ลง">⬇️</button>
      </div>
      <button class="ctrl-btn aux right-aux" id="resetBtn" aria-label="เริ่มใหม่">🔄</button>
    </div>
  </section>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-card">
    <h2>เก่งมาก! 🎉</h2>
    <div class="moves-result">ใช้ทั้งหมด <b id="winMoves">0</b> ก้าว</div>
    <button class="big-btn" id="nextBtn">ด่านต่อไป ➡️</button>
    <button class="big-btn secondary" id="selectBtn">เลือกด่านอื่น</button>
  </div>
</div>

<script>
'use strict';

// ---------- Levels ----------
// Legend: '#' wall, '.' floor, 'T' target, '$' box, '*' box-on-target, '@' player, '+' player-on-target, ' ' outside
const LEVELS = [
  // 1: push up
  [
    '#####',
    '#.T.#',
    '#.$.#',
    '#.@.#',
    '#####',
  ],
  // 2: push down
  [
    '#####',
    '#.@.#',
    '#.$.#',
    '#.T.#',
    '#####',
  ],
  // 3: push right (longer)
  [
    '#######',
    '#@$..T#',
    '#######',
  ],
  // 4: push left
  [
    '#######',
    '#T..$@#',
    '#######',
  ],
  // 5: turn the corner
  [
    '######',
    '#T...#',
    '#.$..#',
    '#.@..#',
    '######',
  ],
  // 6: two boxes side by side
  [
    '########',
    '#.TT...#',
    '#......#',
    '#.$$...#',
    '#.@....#',
    '########',
  ],
  // 7: around a wall
  [
    '#######',
    '#T....#',
    '#.#...#',
    '#.$...#',
    '#.@...#',
    '#######',
  ],
  // 8: split corridor
  [
    '########',
    '#..T...#',
    '#......#',
    '#.###..#',
    '#.$....#',
    '#.@....#',
    '########',
  ],
  // 9: two boxes, two targets
  [
    '########',
    '#.T..T.#',
    '#......#',
    '#.$..$.#',
    '#......#',
    '#..@...#',
    '########',
  ],
  // 10: little maze
  [
    '########',
    '#T.....#',
    '#.##.#.#',
    '#.$....#',
    '#......#',
    '#..@...#',
    '########',
  ],
  // 11: corridor push with side wall
  [
    '#########',
    '#.T.....#',
    '###.#####',
    '#..$....#',
    '#..@....#',
    '#########',
  ],
  // 12: trickier — three boxes
  [
    '#########',
    '#.T.T.T.#',
    '#.......#',
    '#.$.$.$.#',
    '#.......#',
    '#...@...#',
    '#########',
  ],
];

// Pad lines so every row has equal length, and convert ' ' outside.
function normalizeLevel(rows) {
  const w = Math.max(...rows.map(r => r.length));
  return rows.map(r => r.padEnd(w, ' '));
}

// ---------- State ----------
const state = {
  levelIdx: 0,
  player: { x: 0, y: 0 },
  boxes: [],          // [{x,y, el}]
  targets: [],        // [{x,y}]
  cells: [],          // 2D 'wall'|'floor'|'target'|'outside'
  width: 0,
  height: 0,
  history: [],
  moves: 0,
  won: false,
  cellSize: 48,
  playerEl: null,
  cleared: new Set(),
};

const STORAGE_KEY = 'push-box-cleared-v1';

function loadCleared() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const arr = JSON.parse(raw);
      if (Array.isArray(arr)) state.cleared = new Set(arr);
    }
  } catch (_) { /* ignore */ }
}
function saveCleared() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...state.cleared]));
  } catch (_) { /* ignore */ }
}

// ---------- Level select ----------
function renderLevelSelect() {
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  LEVELS.forEach((rawRows, i) => {
    const rows = normalizeLevel(rawRows);
    const card = document.createElement('div');
    card.className = 'lcard' + (state.cleared.has(i) ? ' cleared' : '');
    card.innerHTML = `<div class="ltitle">ด่าน ${i + 1}</div>`;

    const prev = document.createElement('div');
    prev.className = 'preview';
    const w = rows[0].length, h = rows.length;
    prev.style.gridTemplateColumns = `repeat(${w}, 1fr)`;
    prev.style.gridTemplateRows = `repeat(${h}, 1fr)`;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const ch = rows[y][x];
        const p = document.createElement('div');
        p.className = 'p-cell';
        if (ch === '#') p.classList.add('wall');
        else if (ch === ' ') p.classList.add('outside');
        else if (ch === 'T' || ch === '+') p.classList.add('target');
        if (ch === '$' || ch === '*') p.classList.add('box');
        if (ch === '@' || ch === '+') p.classList.add('player');
        prev.appendChild(p);
      }
    }
    card.appendChild(prev);
    card.addEventListener('click', () => startLevel(i));
    grid.appendChild(card);
  });
}

// ---------- Build level ----------
function startLevel(idx) {
  state.levelIdx = idx;
  state.history = [];
  state.moves = 0;
  state.won = false;
  state.boxes = [];
  state.targets = [];

  const rows = normalizeLevel(LEVELS[idx]);
  state.width = rows[0].length;
  state.height = rows.length;

  state.cells = Array.from({ length: state.height }, () => new Array(state.width).fill('outside'));

  for (let y = 0; y < state.height; y++) {
    for (let x = 0; x < state.width; x++) {
      const ch = rows[y][x];
      if (ch === '#') state.cells[y][x] = 'wall';
      else if (ch === ' ') state.cells[y][x] = 'outside';
      else state.cells[y][x] = 'floor';

      if (ch === 'T' || ch === '+' || ch === '*') {
        state.cells[y][x] = 'target';
        state.targets.push({ x, y });
      }
      if (ch === '$' || ch === '*') state.boxes.push({ x, y, el: null });
      if (ch === '@' || ch === '+') state.player = { x, y };
    }
  }

  document.getElementById('levelNum').textContent = idx + 1;
  document.getElementById('moveCount').textContent = '0';
  document.getElementById('winOverlay').classList.remove('show');

  document.getElementById('selectScreen').classList.remove('active');
  document.getElementById('gameScreen').classList.add('active');
  document.getElementById('backBtn').classList.add('show');

  renderBoard();
  if (navigator.vibrate) navigator.vibrate(8);
}

function computeCellSize() {
  // Fit board into viewport — leave room for HUD (top) and controls (bottom)
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const padding = 36;                    // board internal padding
  const reservedTop = 130;               // hero + hud
  const reservedBottom = vw < 480 ? 200 : 230; // controls
  const maxW = Math.min(vw - 16, 560) - padding;
  const maxH = vh - reservedTop - reservedBottom - padding;
  const cellW = Math.floor(maxW / state.width);
  const cellH = Math.floor(maxH / state.height);
  let cs = Math.max(28, Math.min(cellW, cellH, 80));
  return cs;
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  const cs = computeCellSize();
  state.cellSize = cs;
  board.style.setProperty('--cs', cs + 'px');
  board.style.gridTemplateColumns = `repeat(${state.width}, ${cs}px)`;
  board.style.gridTemplateRows = `repeat(${state.height}, ${cs}px)`;
  board.style.width = (cs * state.width + 20) + 'px';
  board.style.height = (cs * state.height + 20) + 'px';

  for (let y = 0; y < state.height; y++) {
    for (let x = 0; x < state.width; x++) {
      const cell = document.createElement('div');
      cell.className = 'cell ' + state.cells[y][x];
      board.appendChild(cell);
    }
  }

  // Boxes
  state.boxes.forEach(b => {
    const el = document.createElement('div');
    el.className = 'actor box';
    el.style.transform = `translate(${b.x * cs}px, ${b.y * cs}px)`;
    const face = document.createElement('div');
    face.className = 'face';
    face.textContent = '📦';
    el.appendChild(face);
    board.appendChild(el);
    b.el = el;
    if (isOnTarget(b)) el.classList.add('placed');
  });

  // Player
  const p = document.createElement('div');
  p.className = 'actor player';
  p.style.transform = `translate(${state.player.x * cs}px, ${state.player.y * cs}px)`;
  const pFace = document.createElement('div');
  pFace.className = 'face';
  pFace.textContent = '🤖';
  p.appendChild(pFace);
  board.appendChild(p);
  state.playerEl = p;
}

function isOnTarget(b) {
  return state.targets.some(t => t.x === b.x && t.y === b.y);
}

// ---------- Movement ----------
const DIRS = {
  up:    { dx:  0, dy: -1 },
  down:  { dx:  0, dy:  1 },
  left:  { dx: -1, dy:  0 },
  right: { dx:  1, dy:  0 },
};

function tileAt(x, y) {
  if (y < 0 || y >= state.height || x < 0 || x >= state.width) return 'outside';
  return state.cells[y][x];
}

function boxAt(x, y) {
  return state.boxes.find(b => b.x === x && b.y === y);
}

function isBlocked(x, y) {
  const t = tileAt(x, y);
  return t === 'wall' || t === 'outside';
}

function move(dir) {
  if (state.won) return;
  const { dx, dy } = DIRS[dir];
  const nx = state.player.x + dx;
  const ny = state.player.y + dy;

  if (isBlocked(nx, ny)) {
    bumpPlayer(dir);
    return;
  }

  const box = boxAt(nx, ny);
  if (box) {
    const bx = box.x + dx;
    const by = box.y + dy;
    if (isBlocked(bx, by) || boxAt(bx, by)) {
      bumpPlayer(dir);
      return;
    }
    // Save undo state
    state.history.push({
      px: state.player.x, py: state.player.y,
      boxes: state.boxes.map(b => ({ x: b.x, y: b.y })),
    });
    box.x = bx; box.y = by;
    box.el.style.transform = `translate(${bx * state.cellSize}px, ${by * state.cellSize}px)`;
    box.el.classList.toggle('placed', isOnTarget(box));
  } else {
    state.history.push({
      px: state.player.x, py: state.player.y,
      boxes: state.boxes.map(b => ({ x: b.x, y: b.y })),
    });
  }

  state.player.x = nx;
  state.player.y = ny;
  state.playerEl.style.transform = `translate(${nx * state.cellSize}px, ${ny * state.cellSize}px)`;
  state.moves++;
  document.getElementById('moveCount').textContent = state.moves;
  if (navigator.vibrate) navigator.vibrate(6);

  if (checkWin()) onWin();
}

function bumpPlayer(dir) {
  const { dx, dy } = DIRS[dir];
  const face = state.playerEl.querySelector('.face');
  face.style.setProperty('--bx', (dx * 6) + 'px');
  face.style.setProperty('--by', (dy * 6) + 'px');
  state.playerEl.classList.remove('bump');
  void state.playerEl.offsetWidth;
  state.playerEl.classList.add('bump');
  if (navigator.vibrate) navigator.vibrate(12);
}

function undo() {
  if (state.won || state.history.length === 0) return;
  const prev = state.history.pop();
  state.player.x = prev.px;
  state.player.y = prev.py;
  state.playerEl.style.transform = `translate(${prev.px * state.cellSize}px, ${prev.py * state.cellSize}px)`;
  prev.boxes.forEach((b, i) => {
    state.boxes[i].x = b.x;
    state.boxes[i].y = b.y;
    state.boxes[i].el.style.transform = `translate(${b.x * state.cellSize}px, ${b.y * state.cellSize}px)`;
    state.boxes[i].el.classList.toggle('placed', isOnTarget(state.boxes[i]));
  });
  state.moves = Math.max(0, state.moves - 1);
  document.getElementById('moveCount').textContent = state.moves;
  if (navigator.vibrate) navigator.vibrate(8);
}

function resetLevel() {
  startLevel(state.levelIdx);
}

function checkWin() {
  return state.boxes.every(b => isOnTarget(b));
}

function onWin() {
  state.won = true;
  state.cleared.add(state.levelIdx);
  saveCleared();
  document.getElementById('winMoves').textContent = state.moves;
  setTimeout(() => {
    document.getElementById('winOverlay').classList.add('show');
    confetti();
  }, 380);
  if (navigator.vibrate) navigator.vibrate([20, 50, 20, 50, 20]);
}

function nextLevel() {
  const next = state.levelIdx + 1;
  if (next < LEVELS.length) startLevel(next);
  else backToSelect();
}

function backToSelect() {
  document.getElementById('gameScreen').classList.remove('active');
  document.getElementById('selectScreen').classList.add('active');
  document.getElementById('backBtn').classList.remove('show');
  document.getElementById('winOverlay').classList.remove('show');
  renderLevelSelect();
}

// ---------- Confetti ----------
function confetti() {
  const colors = ['#ff6b9d', '#ffd93d', '#5bc13a', '#74b9ff', '#fd79a8', '#fdcb6e'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[i % colors.length];
    c.style.animationDuration = (1.4 + Math.random() * 1.2) + 's';
    c.style.animationDelay = (Math.random() * 0.4) + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3000);
  }
}

// ---------- Input ----------
// D-pad
document.querySelectorAll('.dpad .ctrl-btn').forEach(btn => {
  btn.addEventListener('click', () => move(btn.dataset.dir));
});
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('resetBtn').addEventListener('click', resetLevel);
document.getElementById('backBtn').addEventListener('click', backToSelect);
document.getElementById('nextBtn').addEventListener('click', nextLevel);
document.getElementById('selectBtn').addEventListener('click', backToSelect);

// Keyboard
document.addEventListener('keydown', (e) => {
  if (!document.getElementById('gameScreen').classList.contains('active')) return;
  const map = {
    'ArrowUp': 'up', 'ArrowDown': 'down', 'ArrowLeft': 'left', 'ArrowRight': 'right',
    'w': 'up', 's': 'down', 'a': 'left', 'd': 'right',
    'W': 'up', 'S': 'down', 'A': 'left', 'D': 'right',
  };
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); return; }
  if (e.key === 'z' || e.key === 'Z' || e.key === 'Backspace') { e.preventDefault(); undo(); }
  if (e.key === 'r' || e.key === 'R') { e.preventDefault(); resetLevel(); }
});

// Swipe on board
(() => {
  const board = document.getElementById('board');
  let sx = 0, sy = 0, t0 = 0, active = false;
  board.addEventListener('pointerdown', (e) => {
    sx = e.clientX; sy = e.clientY; t0 = Date.now(); active = true;
  });
  board.addEventListener('pointerup', (e) => {
    if (!active) return;
    active = false;
    const dx = e.clientX - sx;
    const dy = e.clientY - sy;
    const ax = Math.abs(dx), ay = Math.abs(dy);
    const threshold = 16;
    if (ax < threshold && ay < threshold) return;
    if (ax > ay) move(dx > 0 ? 'right' : 'left');
    else move(dy > 0 ? 'down' : 'up');
  });
  board.addEventListener('pointercancel', () => { active = false; });
})();

// Resize
let resizeTimer = null;
window.addEventListener('resize', () => {
  if (!document.getElementById('gameScreen').classList.contains('active')) return;
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => renderBoard(), 120);
});

// ---------- Init ----------
loadCleared();
renderLevelSelect();
</script>
</body>
</html>
