<!DOCTYPE html>
<!--
  เขียนจีน-ญี่ปุ่น (write-cjk) — a trace-the-character mini-game for the เกมเด็ก hub.
  Stroke path data for every character is from KanjiVG (http://kanjivg.tagaini.net),
  Copyright (C) 2009-2011 Ulrich Apel, distributed under Creative Commons
  Attribution-Share Alike 3.0. This file (a derivative work that embeds a subset of
  that data) is therefore likewise available under CC BY-SA 3.0. See ../CREDITS.md.
-->
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>✏️ เขียนจีน-ญี่ปุ่น — เกมสำหรับเด็ก</title>
<meta name="description" content="หัดเขียนตัวอักษรจีนและญี่ปุ่นง่ายๆ ลากนิ้วทับเส้น เลข 一-十 คำภาพ 山 木 火 และฮิรางานะ พร้อมคำอ่านให้ผู้ปกครองอ่านให้ฟัง">
<meta name="theme-color" content="#ff6b9d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="เขียนจีน-ญี่ปุ่น">
<meta name="mobile-web-app-capable" content="yes">

<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../icons/icon.svg">
<link rel="manifest" href="../manifest.webmanifest">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Itim&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-3: #b5e8ff; --grass-1: #7ed957;
    --brand: #ff6b9d; --brand-dark: #e54b82;
    --gold: #ffd93d; --good: #5bc13a;
    --ink: #2d3436; --card: #ffffff; --card-border: #ffd6e4;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Mitr', -apple-system, sans-serif;
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 10%, #fff9c4 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, #ffcfd2 0%, transparent 45%),
      linear-gradient(180deg, var(--sky-3) 0%, #d9f3c9 65%, var(--grass-1) 100%);
    background-attachment: fixed;
    user-select: none; -webkit-user-select: none;
  }
  body::before {
    content: '☁️ ☁️     ☁️';
    position: fixed; top: 20px; left: 0; right: 0;
    text-align: center; font-size: 42px;
    opacity: 0.55; pointer-events: none;
    letter-spacing: 80px;
    animation: drift 40s linear infinite;
    z-index: 0;
  }
  @keyframes drift { from { transform: translateX(-10%);} to { transform: translateX(10%);} }

  /* CJK glyph font — falls back across iOS / Android / Windows system fonts */
  .cjk {
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic",
      "Noto Sans CJK SC", "Noto Sans CJK JP", "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  .app { max-width: 880px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
  body:has(#gameScreen.active) .app { max-width: 100%; padding: 0; height: 100vh; height: 100dvh; }
  body:has(#gameScreen.active)::before { display: none; }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn .35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: translateY(0);} }

  .hero { text-align: center; padding: 14px 10px 18px; }
  .hero h1 {
    font-family: 'Itim', cursive;
    font-size: clamp(34px, 7.5vw, 58px);
    margin: 0; color: var(--brand-dark);
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
    letter-spacing: 1px;
  }
  .howto {
    list-style: none; padding: 12px 18px; margin: 14px auto 4px;
    max-width: 400px; background: rgba(255,255,255,0.55);
    border: 2px dashed var(--card-border); border-radius: 18px;
    font-size: 16px; color: #555; font-weight: 500; text-align: left;
  }
  .howto li { display: flex; align-items: center; gap: 10px; padding: 3px 0; line-height: 1.3; }
  .howto-icon { font-size: 22px; flex-shrink: 0; width: 28px; text-align: center; }

  /* SELECT */
  .cat-header {
    font-family: 'Itim', cursive;
    font-size: clamp(22px, 5vw, 30px);
    color: var(--brand-dark);
    margin: 26px 6px 12px;
    text-shadow: 2px 2px 0 #fff;
  }
  .glyph-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
    gap: 12px;
  }
  .gcard {
    background: var(--card); border: 4px solid var(--card-border);
    border-radius: 22px; aspect-ratio: 1 / 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.07);
    transition: transform .12s, box-shadow .12s, border-color .12s;
    overflow: hidden; position: relative;
  }
  .gcard:active { transform: scale(0.94) translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.07); }
  .gcard:hover { border-color: var(--brand); }
  .gcard .glyph { font-size: 50px; line-height: 1; color: var(--ink); }
  .gcard .pname {
    font-family: 'Mitr', sans-serif; font-weight: 600;
    font-size: 13px; color: var(--brand-dark); line-height: 1.05; text-align: center;
  }
  .gcard .pmini { font-size: 11px; color: #9aa3ab; font-weight: 500; line-height: 1; }
  .gcard.done::after {
    content: '⭐'; position: absolute; top: 4px; right: 6px; font-size: 18px;
  }
  @media (min-width: 560px) {
    .glyph-grid { grid-template-columns: repeat(auto-fill, minmax(108px, 1fr)); }
    .gcard .glyph { font-size: 58px; }
    .gcard .pname { font-size: 14px; }
  }

  /* GAME */
  #gameScreen.active {
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .top-bar {
    flex: 0 0 auto;
    display: flex; justify-content: space-between; align-items: center;
    gap: 6px; margin: 12px 76px 0 76px; flex-wrap: nowrap;
  }
  .glyph-title {
    font-family: 'Itim', cursive;
    font-size: clamp(22px, 5vw, 34px);
    color: var(--brand-dark);
    text-shadow: 2px 2px 0 #fff;
    white-space: nowrap; min-width: 0; flex: 0 1 auto;
    overflow: hidden; text-overflow: ellipsis;
  }
  .glyph-title .tchar { font-size: 1.35em; vertical-align: -0.12em; margin-right: 6px; }
  .top-bar-buttons { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn {
    background: #fff; border: 3px solid var(--card-border);
    border-radius: 999px; padding: 8px 13px;
    font-family: 'Itim', cursive; font-size: 18px; cursor: pointer;
    box-shadow: 0 3px 0 rgba(0,0,0,0.08);
    transition: transform .12s, box-shadow .12s, opacity .12s;
    color: var(--ink);
  }
  .icon-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.08); }
  .icon-btn:disabled { opacity: 0.4; pointer-events: none; }
  .icon-btn .btn-label { display: inline; margin-left: 4px; }
  @media (max-width: 640px) {
    .icon-btn { padding: 8px 10px; font-size: 20px; }
    .icon-btn .btn-label { display: none; }
    .top-bar { margin: 8px 62px 0 62px; }
  }

  .canvas-area {
    flex: 1 1 auto;
    display: flex; align-items: center; justify-content: center;
    padding: 12px; min-height: 0;
  }
  .canvas-stage {
    background: #fff; border: 4px solid #fff;
    border-radius: 28px; box-shadow: 0 6px 0 rgba(0,0,0,0.10);
    aspect-ratio: 1 / 1;
    width: min(100%, 540px, calc(100dvh - 230px));
    overflow: hidden; touch-action: none; position: relative;
  }
  /* faint center guide lines (helps placement, like a 田字格 writing grid) */
  .canvas-stage::before, .canvas-stage::after {
    content: ''; position: absolute; background: #f3eaf0; pointer-events: none; z-index: 0;
  }
  .canvas-stage::before { left: 50%; top: 6%; bottom: 6%; width: 2px; transform: translateX(-1px); }
  .canvas-stage::after { top: 50%; left: 6%; right: 6%; height: 2px; transform: translateY(-1px); }
  .canvas-stage svg { width: 100%; height: 100%; display: block; touch-action: none; position: relative; z-index: 1; }
  .canvas-stage.pop { animation: pop .7s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes pop {
    0% { transform: scale(1);} 40% { transform: scale(1.06) rotate(-2deg);}
    70% { transform: scale(0.98) rotate(1deg);} 100% { transform: scale(1);}
  }

  /* SVG layers — widths tuned for the 109x109 KanjiVG viewBox */
  .ghost { fill: none; stroke: #eaeef2; stroke-width: 9; stroke-linecap: round; stroke-linejoin: round; }
  .guide { fill: none; stroke: #c1cad3; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 0.5 4.5; }
  .trail { fill: none; stroke: var(--brand); stroke-width: 7.2; stroke-linecap: round; stroke-linejoin: round; }
  .trail.glow { animation: trailGlow 1.6s ease-in-out; }
  @keyframes trailGlow {
    0%,100% { filter: drop-shadow(0 0 0 transparent); }
    50% { filter: drop-shadow(0 0 3px var(--gold)) drop-shadow(0 0 5px var(--brand)); }
  }
  .startdot { fill: var(--good); stroke: #fff; stroke-width: 1.4; }
  .startdot.pulse { animation: dotPulse 1.1s ease-in-out infinite; }
  @keyframes dotPulse { 0%,100% { transform: scale(1);} 50% { transform: scale(1.35);} }

  .palette {
    flex: 0 0 auto;
    display: flex; justify-content: center; align-items: center;
    gap: 10px; padding: 12px 14px env(safe-area-inset-bottom);
    flex-wrap: wrap;
  }
  .swatch {
    width: 50px; height: 50px; border-radius: 50%;
    border: 4px solid #fff; box-shadow: 0 4px 0 rgba(0,0,0,0.18);
    cursor: pointer; transition: transform .12s, box-shadow .12s; position: relative;
  }
  .swatch:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.18); }
  .swatch.active {
    border-color: var(--gold); transform: scale(1.12);
    box-shadow: 0 6px 0 rgba(0,0,0,0.18), 0 0 0 4px var(--gold);
  }
  @media (max-width: 480px) {
    .swatch { width: 42px; height: 42px; border-width: 3px; }
    .palette { gap: 8px; padding: 8px 10px env(safe-area-inset-bottom); }
    .top-bar { margin: 8px 60px 0 60px; }
    .canvas-area { padding: 8px; }
  }
  @media (min-width: 768px) { .swatch { width: 58px; height: 58px; } .palette { gap: 14px; } }

  .overlay-msg {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    pointer-events: none; z-index: 100;
    font-family: 'Itim', cursive; color: #fff; text-align: center;
  }
  .overlay-msg.shown { display: flex; }
  .overlay-msg .msg {
    background: var(--gold); color: var(--ink); border: 4px solid #fff; border-radius: 32px;
    padding: 24px 44px; font-size: clamp(34px, 6vw, 56px); line-height: 1.1;
    box-shadow: 0 8px 0 rgba(0,0,0,0.18);
    animation: msgPop .5s cubic-bezier(0.34,1.56,0.64,1);
    text-shadow: 3px 3px 0 #fff; max-width: 90vw;
  }
  @keyframes msgPop {
    0% { transform: scale(0.4) rotate(-6deg); opacity: 0; }
    60% { transform: scale(1.1) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .confetti {
    position: fixed; top: -20px; width: 12px; height: 18px;
    z-index: 90; pointer-events: none; animation: fall linear forwards;
  }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

  /* COMPLETION READING CARD — celebratory + shows the reading for a parent */
  .done-card {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center;
    pointer-events: none; z-index: 80;
    background: rgba(45,52,54,0.12);
  }
  .done-card.shown { display: flex; animation: fadeIn .25s ease; }
  .dc-inner {
    pointer-events: auto;
    background: #fffef9; border: 5px solid var(--gold);
    border-radius: 30px; box-shadow: 0 10px 0 rgba(0,0,0,0.16);
    padding: 18px 24px 22px; width: min(90vw, 360px);
    text-align: center; animation: msgPop .45s cubic-bezier(0.34,1.56,0.64,1);
  }
  .dc-glyph { font-size: 86px; line-height: 1; color: var(--brand-dark); }
  .dc-emoji { font-size: 34px; line-height: 1; margin-top: 2px; }
  .dc-th { font-family: 'Itim', cursive; font-size: 28px; color: var(--ink); margin: 6px 0 4px; }
  .dc-read { margin: 8px auto 4px; display: flex; flex-direction: column; gap: 5px; }
  .dc-line {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: #fff5f9; border: 2px solid var(--card-border); border-radius: 14px;
    padding: 6px 12px; font-size: 17px; font-weight: 600;
  }
  .dc-line b { color: var(--brand-dark); font-weight: 700; }
  .dc-line .romaji { color: var(--ink); }
  .dc-line .phon { color: #7a8085; font-weight: 500; }
  .dc-btns { display: flex; gap: 8px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
  .dc-btn {
    border: none; border-radius: 999px; padding: 11px 18px;
    font-family: 'Itim', cursive; font-size: 18px; cursor: pointer;
    background: #fff; color: var(--ink); border: 3px solid var(--card-border);
    box-shadow: 0 4px 0 rgba(0,0,0,0.10); transition: transform .12s, box-shadow .12s;
  }
  .dc-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.10); }
  .dc-btn.primary { background: var(--brand); color: #fff; border-color: var(--brand-dark); box-shadow: 0 4px 0 var(--brand-dark); }

  .home-btn, .back-btn {
    position: fixed; top: calc(12px + env(safe-area-inset-top));
    width: 52px; height: 52px; border-radius: 50%;
    background: #fff; border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    align-items: center; justify-content: center;
    font-size: 24px; text-decoration: none; color: var(--ink);
    z-index: 120; transition: transform .12s;
    font-family: inherit; padding: 0; cursor: pointer;
  }
  .home-btn { left: 12px; display: flex; font-size: 26px; }
  .back-btn { right: 12px; display: none; }
  .back-btn.show { display: flex; }
  .home-btn:active, .back-btn:active { transform: scale(0.92); }

  .nav-btn {
    position: fixed; top: 50%; transform: translateY(-50%);
    width: 52px; height: 52px; border-radius: 50%;
    background: #fff; border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    display: none; align-items: center; justify-content: center;
    color: var(--ink); z-index: 60; cursor: pointer; padding: 0;
    transition: transform .12s;
  }
  .nav-btn.show { display: flex; }
  .nav-btn.nav-prev { left: 10px; }
  .nav-btn.nav-next { right: 10px; }
  .nav-btn:active { transform: translateY(-50%) scale(0.9); }
  @media (max-width: 480px) { .nav-btn { width: 46px; height: 46px; } }
</style>
</head>
<body>
<a class="home-btn" href="../" aria-label="กลับหน้าหลัก">🏠</a>
<button class="back-btn" id="backBtn" type="button" aria-label="เลือกตัวใหม่">📋</button>
<button class="nav-btn nav-prev" id="prevBtn" type="button" aria-label="ตัวก่อนหน้า">
  <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path d="M15 5 L8 12 L15 19" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
</button>
<button class="nav-btn nav-next" id="nextBtn" type="button" aria-label="ตัวถัดไป">
  <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path d="M9 5 L16 12 L9 19" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
</button>
<div class="app">

  <section id="selectScreen" class="screen active">
    <header class="hero">
      <h1>✏️ เขียนจีน-ญี่ปุ่น</h1>
      <ul class="howto">
        <li><span class="howto-icon">🟢</span> เริ่มลากที่จุดสีเขียว</li>
        <li><span class="howto-icon">✏️</span> ลากนิ้วทับเส้นจางๆ เส้นไหนก่อนก็ได้</li>
        <li><span class="howto-icon">👀</span> กดปุ่ม "ดู" ถ้าอยากเห็นวิธีเขียนก่อน</li>
        <li><span class="howto-icon">🔊</span> เขียนครบแล้ว ฟังคำอ่านให้ลูกฟังได้</li>
      </ul>
    </header>
    <div id="glyphList"></div>
  </section>

  <section id="gameScreen" class="screen">
    <div class="top-bar">
      <div class="glyph-title" id="glyphTitle">ตัวอักษร</div>
      <div class="top-bar-buttons">
        <button class="icon-btn" id="watchBtn" aria-label="ดูวิธีเขียน"><span aria-hidden="true">👀</span><span class="btn-label">ดู</span></button>
        <button class="icon-btn" id="resetBtn" aria-label="เริ่มใหม่"><span aria-hidden="true">🔄</span><span class="btn-label">ใหม่</span></button>
        <button class="icon-btn" id="sayBtn" aria-label="ฟังเสียง"><span aria-hidden="true">🔊</span><span class="btn-label">ฟัง</span></button>
      </div>
    </div>
    <div class="canvas-area">
      <div class="canvas-stage" id="canvasStage">
        <svg id="traceSvg" viewBox="0 0 109 109" preserveAspectRatio="xMidYMid meet">
          <g id="ghostGroup"></g>
          <g id="guideGroup"></g>
          <g id="trailGroup"></g>
          <g id="startGroup"></g>
        </svg>
      </div>
    </div>
    <div class="palette" id="palette"></div>
  </section>

</div>

<div id="overlayMsg" class="overlay-msg"></div>

<div id="doneCard" class="done-card">
  <div class="dc-inner">
    <div class="dc-glyph cjk" id="dcGlyph">山</div>
    <div class="dc-emoji" id="dcEmoji">⛰️</div>
    <div class="dc-th" id="dcTh">ภูเขา</div>
    <div class="dc-read" id="dcRead"></div>
    <div class="dc-btns">
      <button class="dc-btn" id="dcReplay">✏️ เขียนอีกครั้ง</button>
      <button class="dc-btn" id="dcSay">🔊 ฟัง</button>
      <button class="dc-btn primary" id="dcNext">ตัวต่อไป ▶</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ============================================================================
// CHARACTER STROKE DATA  (viewBox 0 0 109 109)
// Strokes are KanjiVG centerlines, in the canonical stroke order. We do NOT
// enforce that order during play — any stroke can be traced first — but a real
// order means the "ดู" (watch) demo draws each character the proper way.
//   cn/cnTh = Mandarin pinyin + Thai phonetic ; jp/jpTh = romaji + Thai phonetic
// ============================================================================
const CHARS = [
  { id:"n1", char:"一", grp:"number", emoji:"1️⃣", th:"หนึ่ง", cn:"yī", cnTh:"อี", jp:"ichi", jpTh:"อิจิ", strokes:[
    'M11,54.25c3.19,0.62,6.25,0.75,9.73,0.5c20.64-1.5,50.39-5.12,68.58-5.24c3.6-0.02,5.77,0.24,7.57,0.49'
  ]},
  { id:"n2", char:"二", grp:"number", emoji:"2️⃣", th:"สอง", cn:"èr", cnTh:"เอ้อ", jp:"ni", jpTh:"นิ", strokes:[
    'M25.25,32.4c1.77,0.37,4.78,0.56,6.55,0.37c10.82-1.15,28.82-3.4,41.24-3.76c2.95-0.09,4.73,0.18,6.21,0.36',
    'M12,80.75c2.37,0.5,6.73,0.67,9.09,0.5c23.79-1.75,45.04-4.12,67.49-4.74c3.95-0.11,6.32,0.24,8.3,0.49'
  ]},
  { id:"n3", char:"三", grp:"number", emoji:"3️⃣", th:"สาม", cn:"sān", cnTh:"ซาน", jp:"san", jpTh:"ซัง", strokes:[
    'M27.5,23.65c3.09,0.73,6.29,0.36,9.4,0.06c10.2-1,27-2.94,38.97-3.57c3.06-0.16,6.09-0.2,9.14,0.23',
    'M28.75,55.14c3.13,0.76,6.46,0.43,9.64,0.2c10.03-0.72,23.97-2.63,34.73-3.12c2.7-0.12,5.45-0.16,8.13,0.3',
    'M13,87.83c3.94,1.01,7.72,0.96,11.75,0.72c18.41-1.07,41.27-3.39,61.12-4.07c3.63-0.13,7.2-0.1,10.75,0.78'

  { id:"h_ke", char:"け", grp:"hiragana", emoji:"", th:"เสียง ke", cn:"", cnTh:"", jp:"ke", jpTh:"เคะ", strokes:[
    'M24.67,19.75c1.25,1.5,2.62,3.75,2.12,6.38c-3,15.88-6.5,29.5-4.88,44.62c2.02,18.84,2.25,4.75,6.75-3.5',
    'M53.67,38.62c2.12,1.38,4.28,1.89,6.88,1.5c8.25-1.25,15.39-2.57,20.62-4c2.76-0.74,5.26-1.12,6.88-1.12',
    'M71.67,14.38c2.13,1.37,2.88,3.35,2.88,5.12c0,11.62,0.12,20.38,0.12,30.12c0,20.75-0.62,30.88-12.5,42.25'
  ]},
  { id:"h_ko", char:"こ", grp:"hiragana", emoji:"", th:"เสียง ko", cn:"", cnTh:"", jp:"ko", jpTh:"โคะ", strokes:[
    'M34.75,26.75c1.12,0.88,2.91,2.01,6,1.5c7.62-1.25,14.11-2.56,22.38-2.62c15.5-0.12,5.88,5-5.75,9',
    'M30,68.12c2.25,14.5,15.26,17.96,31,16.75c6.5-0.5,11.88-1.25,17.62-2.88'
  ]},
];

const GROUPS = [
  { id: 'number',   label: '🔢 ตัวเลข จีน·ญี่ปุ่น' },
  { id: 'picture',  label: '🖼️ คำภาพ จีน·ญี่ปุ่น' },
  { id: 'hiragana', label: '🇯🇵 ฮิรางานะ (ญี่ปุ่น)' },
];

// Crayon colors (cosmetic; default pink)
const COLORS = ['#ff6b9d', '#ff914d', '#f1c40f', '#7ed957', '#5bc0eb', '#9b59b6'];
const DEMO_COLOR = '#8e7cff';

const TOL = 15;           // how far (in viewBox units) a finger may stray
const DONE_FRAC = 0.78;   // fraction of a stroke's samples to count it complete
const PROGRESS_KEY = 'writeCjkProgress';

// ============================================================================
// SPEECH
// ============================================================================
function voiceFor(pref) {
  try {
    const vs = speechSynthesis.getVoices() || [];
    return vs.find(v => (v.lang || '').toLowerCase().startsWith(pref)) || null;
  } catch (e) { return null; }
}
if ('speechSynthesis' in window) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}
function speakRaw(text, lang, rate, voice) {
  if (!('speechSynthesis' in window) || !text) return;
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang || 'th-TH'; u.rate = rate || 0.9; u.pitch = 1.05;
    if (voice) u.voice = voice;
    speechSynthesis.speak(u);
  } catch (e) {}
}
// Say the Thai meaning (reliable everywhere) then, if a native voice exists,
// the character itself in Mandarin or Japanese.
function sayChar(c) {
  if (!('speechSynthesis' in window) || !c) return;
  try { speechSynthesis.cancel(); } catch (e) {}
  speakRaw(c.th, 'th-TH', 0.9, voiceFor('th'));
  const prefs = c.cn ? ['zh', 'ja'] : ['ja'];
  let nv = null;
  for (const p of prefs) { const v = voiceFor(p); if (v) { nv = v; break; } }
  if (nv) speakRaw(c.char, nv.lang, 0.7, nv);
}

// ============================================================================
// AUDIO (Web Audio blips)
// ============================================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
}
function blip(freq) {
  if (!audioCtx) return;
  try {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    o.connect(g).connect(audioCtx.destination);
    const t = audioCtx.currentTime, d = 0.12;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.12, t + 0.01);
    g.gain.linearRampToValueAtTime(0, t + d);
    o.start(t); o.stop(t + d + 0.02);
  } catch(e) {}
}
function playWin() {
  [523, 659, 784, 1046].forEach((f,i) => setTimeout(() => {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    o.connect(g).connect(audioCtx.destination);
    const t = audioCtx.currentTime, d = 0.22;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.18, t + 0.01);
    g.gain.linearRampToValueAtTime(0, t + d);
    o.start(t); o.stop(t + d + 0.02);
  }, i * 110));
}

// ============================================================================
// UTIL
// ============================================================================
const $ = (id) => document.getElementById(id);
const SVGNS = 'http://www.w3.org/2000/svg';
function buzz(p) { if (navigator.vibrate) navigator.vibrate(p); }
function el(tag, attrs) {
  const e = document.createElementNS(SVGNS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}
function showScreen(name) {
  $('selectScreen').classList.toggle('active', name === 'select');
  $('gameScreen').classList.toggle('active', name === 'game');
  const onGame = name === 'game';
  $('backBtn').classList.toggle('show', onGame);
  $('prevBtn').classList.toggle('show', onGame);
  $('nextBtn').classList.toggle('show', onGame);
}

// ============================================================================
// STATE
// ============================================================================
const state = {
  char: null,
  index: 0,
  color: COLORS[0],
  strokes: [],     // [{ d, len, pts:[{x,y}], covered:Uint8Array, coveredCount, trail, done }]
  drawing: false,
  pointerId: null,
  done: false,
  demo: false,
};

const svg = $('traceSvg');
const ghostGroup = $('ghostGroup');
const guideGroup = $('guideGroup');
const trailGroup = $('trailGroup');
const startGroup = $('startGroup');

// Hidden measuring path for getPointAtLength
let measure = el('path', { d: '', fill: 'none' });
measure.style.visibility = 'hidden';
svg.appendChild(measure);

// ============================================================================
// OPEN A CHARACTER
// ============================================================================
function openChar(c) {
  if (!c) c = CHARS[0];
  state.char = c;
  const i = CHARS.indexOf(c);
  if (i >= 0) state.index = i;
  state.done = false;
  state.demo = false;
  state.drawing = false;
  state.strokes = [];

  const titleEmoji = c.emoji ? ' ' + c.emoji : '';
  $('glyphTitle').innerHTML = `<span class="tchar cjk">${c.char}</span>${c.th}${titleEmoji}`;

  ghostGroup.innerHTML = '';
  guideGroup.innerHTML = '';
  trailGroup.innerHTML = '';
  startGroup.innerHTML = '';
  hideDoneCard();

  c.strokes.forEach((d) => {
    ghostGroup.appendChild(el('path', { d, class: 'ghost' }));
    guideGroup.appendChild(el('path', { d, class: 'guide' }));
    const trail = el('path', { d, class: 'trail' });
    trail.style.stroke = state.color;
    trail.style.display = 'none';
    trailGroup.appendChild(trail);

    measure.setAttribute('d', d);
    const len = measure.getTotalLength();
    const N = Math.max(6, Math.ceil(len / 2.2));
    const pts = [];
    for (let k = 0; k < N; k++) {
      const p = measure.getPointAtLength(N === 1 ? 0 : len * k / (N - 1));
      pts.push({ x: p.x, y: p.y });
    }
    trail.style.strokeDasharray = len;
    trail.style.strokeDashoffset = len;
    state.strokes.push({ d, len, pts, covered: new Uint8Array(N), coveredCount: 0, trail, done: false });
  });

  renderStartDots();
  showScreen('game');
}

function renderStartDots() {
  startGroup.innerHTML = '';
  if (state.done || state.demo) return;
  state.strokes.forEach((s) => {
    if (s.done) return;
    const p = s.pts[0];
    const dot = el('circle', { cx: p.x, cy: p.y, r: 4.2, class: 'startdot pulse' });
    dot.style.transformOrigin = p.x + 'px ' + p.y + 'px';
    startGroup.appendChild(dot);
  });
}

// ============================================================================
// DRAWING — coverage based, order & direction agnostic.
// Mark whichever (not-done) stroke the finger is closest to.
// ============================================================================
function toView(e) {
  const rect = svg.getBoundingClientRect();
  const s = 109 / rect.width;   // square stage, xMidYMid meet
  return { x: (e.clientX - rect.left) * s, y: (e.clientY - rect.top) * s };
}

function advance(x, y) {
  if (state.done || state.demo) return;
  let bestS = null, bestD = Infinity;
  for (const s of state.strokes) {
    if (s.done) continue;
    for (const p of s.pts) {
      const dd = (p.x - x) * (p.x - x) + (p.y - y) * (p.y - y);
      if (dd < bestD) { bestD = dd; bestS = s; }
    }
  }
  if (!bestS || bestD > TOL * TOL) return;   // finger not on any stroke

  const t2 = TOL * TOL;
  let changed = false;
  for (let i = 0; i < bestS.pts.length; i++) {
    if (bestS.covered[i]) continue;
    const p = bestS.pts[i];
    const dd = (p.x - x) * (p.x - x) + (p.y - y) * (p.y - y);
    if (dd <= t2) { bestS.covered[i] = 1; bestS.coveredCount++; changed = true; }
  }
  if (!changed) return;

  const frac = bestS.coveredCount / bestS.pts.length;
  bestS.trail.style.display = 'block';
  bestS.trail.style.strokeDashoffset = bestS.len * (1 - Math.min(1, frac));
  if (frac >= DONE_FRAC) finishStroke(bestS);
}

function finishStroke(s) {
  if (s.done) return;
  s.done = true;
  s.coveredCount = s.pts.length;
  s.trail.style.display = 'block';
  s.trail.style.strokeDashoffset = 0;
  blip(600 + state.strokes.indexOf(s) * 45);
  buzz(12);
  renderStartDots();
  if (state.strokes.every(k => k.done)) celebrate();
}

// ============================================================================
// POINTER EVENTS
// ============================================================================
svg.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  ensureAudio();
  if (state.done || state.demo) return;
  state.drawing = true;
  state.pointerId = e.pointerId;
  try { svg.setPointerCapture(e.pointerId); } catch(_) {}
  const p = toView(e);
  advance(p.x, p.y);
});
svg.addEventListener('pointermove', (e) => {
  if (!state.drawing || e.pointerId !== state.pointerId) return;
  e.preventDefault();
  const evs = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
  for (const ev of (evs.length ? evs : [e])) {
    const p = toView(ev);
    advance(p.x, p.y);
  }
});
function endStroke() {
  if (!state.drawing) return;
  state.drawing = false;
  state.pointerId = null;
}
svg.addEventListener('pointerup', endStroke);
svg.addEventListener('pointercancel', endStroke);

// ============================================================================
// WATCH DEMO — draw each stroke in the canonical order
// ============================================================================
function clearTrails() {
  state.strokes.forEach((s) => {
    s.covered.fill(0); s.coveredCount = 0; s.done = false;
    s.trail.style.transition = 'none';
    s.trail.style.stroke = state.color;
    s.trail.classList.remove('glow');
    s.trail.style.strokeDashoffset = s.len;
    s.trail.style.display = 'none';
  });
}
function playDemo() {
  if (state.demo || state.done || !state.strokes.length) return;
  state.demo = true;
  clearTrails();
  startGroup.innerHTML = '';
  let i = 0;
  const step = () => {
    if (!state.demo) return;            // aborted (e.g. nav away)
    if (i >= state.strokes.length) {
      state.demo = false;
      clearTrails();
      renderStartDots();
      return;
    }
    const s = state.strokes[i];
    s.trail.style.stroke = DEMO_COLOR;
    s.trail.style.display = 'block';
    s.trail.style.transition = 'none';
    s.trail.style.strokeDashoffset = s.len;
    // force reflow, then animate the offset to 0
    void s.trail.getBoundingClientRect();
    s.trail.style.transition = 'stroke-dashoffset .55s linear';
    s.trail.style.strokeDashoffset = 0;
    i++;
    setTimeout(step, 720);
  };
  step();
}

// ============================================================================
// COMPLETION CARD
// ============================================================================
function readLine(flagLabel, romaji, phon) {
  return `<div class="dc-line"><b>${flagLabel}</b> <span class="romaji">${romaji}</span> <span class="phon">「${phon}」</span></div>`;
}
function showDoneCard(c) {
  $('dcGlyph').textContent = c.char;
  $('dcEmoji').textContent = c.emoji || '';
  $('dcEmoji').style.display = c.emoji ? '' : 'none';
  $('dcTh').textContent = c.th;
  let html = '';
  if (c.cn) html += readLine('จีน', c.cn, c.cnTh);
  if (c.jp) html += readLine('ญี่ปุ่น', c.jp, c.jpTh);
  $('dcRead').innerHTML = html;
  $('doneCard').classList.add('shown');
}
function hideDoneCard() { $('doneCard').classList.remove('shown'); }

// ============================================================================
// CELEBRATION
// ============================================================================
function celebrate() {
  if (state.done) return;
  state.done = true;
  saveProgress();
  startGroup.innerHTML = '';
  state.strokes.forEach((s) => {
    s.trail.classList.add('glow');
    s.trail.style.strokeDashoffset = 0;
    s.trail.style.display = 'block';
  });
  const stage = $('canvasStage');
  stage.classList.remove('pop'); void stage.offsetWidth; stage.classList.add('pop');
  const praises = ['เก่งมาก! 🌟', 'สุดยอด! 🎉', 'เยี่ยมเลย! 👏', 'สวยมาก! ✨'];
  flashOverlay(praises[Math.floor(Math.random() * praises.length)], 1300);
  playWin();
  confetti(140);
  buzz([40, 30, 60]);
  setTimeout(() => sayChar(state.char), 500);
  setTimeout(() => showDoneCard(state.char), 1250);
}

// ============================================================================
// SELECT SCREEN
// ============================================================================
function loadProgress() {
  try { return JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}'); } catch(e) { return {}; }
}
function saveProgress() {
  if (!state.char) return;
  const p = loadProgress();
  p[state.char.id] = (p[state.char.id] || 0) + 1;
  try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(p)); } catch(e) {}
}
function renderSelect() {
  const list = $('glyphList');
  const progress = loadProgress();
  list.innerHTML = '';
  for (const grp of GROUPS) {
    const h = document.createElement('h2');
    h.className = 'cat-header';
    h.textContent = grp.label;
    list.appendChild(h);
    const grid = document.createElement('div');
    grid.className = 'glyph-grid';
    for (const c of CHARS.filter(x => x.grp === grp.id)) {
      const card = document.createElement('div');
      card.className = 'gcard' + (progress[c.id] ? ' done' : '');
      const mini = c.cn ? (c.cn + ' · ' + c.jp) : c.jp;
      card.innerHTML = `<span class="glyph cjk">${c.char}</span><span class="pname">${c.th}</span><span class="pmini">${mini}</span>`;
      card.addEventListener('click', () => { ensureAudio(); openChar(c); });
      grid.appendChild(card);
    }
    list.appendChild(grid);
  }
}

// ============================================================================
// PALETTE
// ============================================================================
function renderPalette() {
  const palette = $('palette');
  palette.innerHTML = '';
  COLORS.forEach((col, i) => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (i === 0 ? ' active' : '');
    sw.style.background = col;
    sw.addEventListener('click', () => selectColor(col, sw));
    palette.appendChild(sw);
  });
}
function selectColor(col, elm) {
  state.color = col;
  for (const s of $('palette').querySelectorAll('.swatch')) s.classList.remove('active');
  elm.classList.add('active');
  state.strokes.forEach((s) => { if (!s.done) s.trail.style.stroke = col; });
}

// ============================================================================
// BUTTONS / NAV (wrap around — no dead ends)
// ============================================================================
$('backBtn').addEventListener('click', () => {
  state.demo = false;
  hideDoneCard();
  $('overlayMsg').classList.remove('shown');
  renderSelect();
  showScreen('select');
});
function goTo(delta) {
  const n = CHARS.length;
  const idx = ((state.index + delta) % n + n) % n;
  buzz(10);
  openChar(CHARS[idx]);
}
$('prevBtn').addEventListener('click', () => goTo(-1));
$('nextBtn').addEventListener('click', () => goTo(1));
$('resetBtn').addEventListener('click', () => { buzz(20); if (state.char) openChar(state.char); });
$('watchBtn').addEventListener('click', () => { ensureAudio(); if (state.char && !state.done) playDemo(); });
$('sayBtn').addEventListener('click', () => { ensureAudio(); if (state.char) sayChar(state.char); });

$('dcReplay').addEventListener('click', () => { buzz(15); if (state.char) openChar(state.char); });
$('dcNext').addEventListener('click', () => { hideDoneCard(); goTo(1); });
$('dcSay').addEventListener('click', () => { ensureAudio(); if (state.char) sayChar(state.char); });

// ============================================================================
// EFFECTS
// ============================================================================
function flashOverlay(text, ms) {
  const overlay = $('overlayMsg');
  overlay.classList.add('shown');
  overlay.innerHTML = `<div class="msg">${text}</div>`;
  setTimeout(() => { overlay.classList.remove('shown'); overlay.innerHTML = ''; }, ms);
}
function confetti(n) {
  const cols = ['#ff6b9d', '#ffd93d', '#7ed957', '#5bc0eb', '#ff914d', '#b388ff'];
  for (let i = 0; i < n; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = cols[Math.floor(Math.random() * cols.length)];
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = Math.random() * 0.8 + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    if (Math.random() > 0.5) c.style.borderRadius = '50%';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

// ============================================================================
// MISC — block double-tap zoom
// ============================================================================
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd < 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

// Init
renderPalette();
renderSelect();
</script>
