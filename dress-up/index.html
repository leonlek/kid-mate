<meta name="theme-color" content="#ff6b9d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
  :root {
    --sky-3: #b5e8ff; --grass-1: #7ed957;
    --brand: #ff6b9d; --brand-dark: #e54b82;
    --gold: #ffd93d;
    --ink: #2d3436; --card: #ffffff; --card-border: #ffd6e4;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Mitr', -apple-system, sans-serif;
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
    background: linear-gradient(180deg, #ffd6e4 0%, #fff2c0 100%);
    background-attachment: fixed;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
  }

  .home-btn, .photo-btn {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #fff; border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; text-decoration: none; color: var(--ink);
    z-index: 60; transition: transform .12s;
    font-family: inherit; padding: 0; cursor: pointer;
  }
  .home-btn { left: 12px; }
  .photo-btn { right: 12px; background: var(--brand); color: #fff; }
  .home-btn:active, .photo-btn:active { transform: scale(0.92); }

  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 76px 12px 16px;
    display: flex; flex-direction: column;
    min-height: 100vh; min-height: 100dvh;
  }

  /* DOLL STAGE */
  .stage {
    position: relative;
    background: linear-gradient(180deg, #fff7d6 0%, #ffe9b3 100%);
    border: 4px solid #fff;
    border-radius: 28px;
    box-shadow: 0 6px 0 rgba(0,0,0,0.08);
    overflow: hidden;
    aspect-ratio: 3 / 4;
    max-height: 52vh;
    margin: 0 auto 12px;
    width: 100%;
    max-width: 340px;
  }
  .stage.flash::after {
    content: '';
    position: absolute; inset: 0;
    background: #fff;
    animation: flash .5s ease-out forwards;
    pointer-events: none;
    z-index: 30;
  }
  @keyframes flash {
    0% { opacity: 0; }
    20% { opacity: 1; }
    100% { opacity: 0; }
  }

  .bg-deco {
    position: absolute; inset: 0;
    pointer-events: none;
    font-size: 28px;
    line-height: 1;
    opacity: 0.95;
  }
  .bg-deco span { position: absolute; }

  /* Backgrounds */
  .bg-garden  { background: linear-gradient(180deg, #cdf2ff 0%, #d9f3c9 50%, #7ed957 100%); }
  .bg-beach   { background: linear-gradient(180deg, #87ceeb 0%, #b5e8ff 55%, #ffe7a8 100%); }
  .bg-party   { background: linear-gradient(180deg, #f3c6ff 0%, #ffd6e4 60%, #ffeb98 100%); }
  .bg-night   { background: linear-gradient(180deg, #1e2a5e 0%, #4a3e7a 70%, #6e4d8a 100%); }

  /* Doll wrapper centered */
  .doll-wrap {
    position: absolute;
    left: 50%; bottom: 4%;
    transform: translateX(-50%);
    height: 92%;
    aspect-ratio: 1 / 2;
    z-index: 5;
    filter: drop-shadow(0 4px 0 rgba(0,0,0,0.1));
  }
  .doll-wrap svg { width: 100%; height: 100%; display: block; }

  /* TABS */
  .tabs {
    display: flex;
    gap: 6px;
    padding: 0 4px;
    margin-bottom: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 1 0 auto;
    min-width: 54px;
    padding: 8px 4px;
    border: 3px solid var(--card-border);
    border-radius: 18px;
    background: #fff;
    font-size: 26px;
    font-family: inherit;
    cursor: pointer;
    transition: transform .12s, border-color .15s, background .15s;
    box-shadow: 0 3px 0 rgba(0,0,0,0.06);
  }
  .tab:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.06); }
  .tab.active { border-color: var(--brand); background: #fff5f8; }

  /* PALETTE */
  .palette {
    background: #fff;
    border: 4px solid var(--card-border);
    border-radius: 22px;
    padding: 10px;
    flex: 1 1 auto;
    overflow-y: auto;
    box-shadow: 0 4px 0 rgba(0,0,0,0.06);
    min-height: 130px;
  }
  .palette-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
    gap: 8px;
  }
  .item-btn {
    background: #fff8fb;
    border: 3px solid var(--card-border);
    border-radius: 14px;
    padding: 4px;
    cursor: pointer;
    transition: transform .12s, border-color .12s, background .15s;
    aspect-ratio: 1 / 1;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit;
  }
  .item-btn svg { width: 100%; height: 100%; }
  .item-btn:active { transform: scale(0.94); }
  .item-btn.selected {
    border-color: var(--brand);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(255,107,157,0.2);
  }
  .item-btn.bg-pick {
    aspect-ratio: 1 / 1;
    font-size: 28px;
    overflow: hidden;
    position: relative;
  }
  .item-btn.bg-pick.preview-garden { background: linear-gradient(180deg, #cdf2ff 0%, #7ed957 100%); }
  .item-btn.bg-pick.preview-beach  { background: linear-gradient(180deg, #87ceeb 0%, #ffe7a8 100%); }
  .item-btn.bg-pick.preview-party  { background: linear-gradient(180deg, #f3c6ff 0%, #ffeb98 100%); }
  .item-btn.bg-pick.preview-night  { background: linear-gradient(180deg, #1e2a5e 0%, #6e4d8a 100%); }

  /* CONFETTI */
  .confetti {
    position: fixed;
    top: -20px;
    font-size: 24px;
    pointer-events: none;
    z-index: 100;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }

  /* TOAST */
  .toast {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    background: #fff;
    border: 4px solid var(--brand);
    box-shadow: 0 6px 0 var(--brand-dark);
    border-radius: 22px;
    padding: 18px 28px;
    font-family: 'Itim', cursive;
    font-size: 28px;
    color: var(--brand-dark);
    z-index: 80;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s, transform .3s cubic-bezier(.34,1.56,.64,1);
  }
  .toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  @media (min-width: 600px) {
    .stage { max-width: 380px; max-height: 56vh; }
    .tab { font-size: 30px; min-width: 64px; }
    .palette-grid { grid-template-columns: repeat(auto-fill, minmax(78px, 1fr)); }
  }
  @media (max-height: 700px) {
    .stage { max-height: 46vh; }
  }
</style>

// ===== STATE =====
const state = {
  hair: null, top: null, bottom: null, shoes: null, hat: null, accessory: null,
  bg: 'bg1',
  cat: 'hair'
};

// ===== ELEMENTS =====
const stage = document.getElementById('stage');
const bgDeco = document.getElementById('bgDeco');
const paletteGrid = document.getElementById('paletteGrid');
const tabsEl = document.getElementById('tabs');
const slotBack = document.getElementById('slot-back');
const undie = document.getElementById('undie');
const photoBtn = document.getElementById('photoBtn');
const toast = document.getElementById('toast');

// ===== HELPERS =====
function vibrate(ms) { try { navigator.vibrate && navigator.vibrate(ms); } catch (e) {} }

function applyBg() {
  const def = ITEMS.bg.find(b => b.id === state.bg);
  if (!def) return;
  stage.className = 'stage ' + def.className;
  bgDeco.innerHTML = def.deco.map(d =>
    `<span style="left:${d.x}%;top:${d.y}%;">${d.e}</span>`
  ).join('');
}

function setItem(cat, id) {
  if (cat === 'bg') {
    state.bg = id;
    applyBg();
    vibrate(8);
    renderPalette();
    return;
  }
  // Toggle off if same
  if (state[cat] === id) {
    state[cat] = null;
  } else {
    state[cat] = id;
  }
  renderDoll();
  renderPalette();
  vibrate(10);
}

function renderDoll() {
  // Clear all slot groups except face/base
  ['slot-bottom', 'slot-top', 'slot-shoes', 'slot-hair', 'slot-hat', 'slot-accessory']
    .forEach(s => document.getElementById(s).innerHTML = '');
  slotBack.innerHTML = '';

  let backHtml = '';
  for (const cat of ['hair', 'top', 'bottom', 'shoes', 'hat', 'accessory']) {
    const id = state[cat];
    if (!id) continue;
    const item = ITEMS[cat].find(x => x.id === id);
    if (!item) continue;
    if (item.backSvg) backHtml += item.backSvg;
    if (item.svg) {
      document.getElementById('slot-' + cat).innerHTML = item.svg;
    }
  }
  slotBack.innerHTML = backHtml;

  // Hide underwear if bottom or long-dress top selected
  const dressTops = ['t2']; // dresses cover legs
  const hasBottomCover = state.bottom || dressTops.includes(state.top);
  undie.style.display = hasBottomCover ? 'none' : '';
}

function makePreviewSvg(cat, item) {
  // Render a small doll silhouette + the item so kid sees how it looks
  const silhouette = `
    <circle cx="100" cy="80" r="55" fill="#ffe5d0"/>
    <rect x="88" y="125" width="24" height="22" fill="#ffe5d0"/>
    <path d="M70 152 Q60 232 78 252 L122 252 Q140 232 130 152 Z" fill="#ffe5d0"/>
    <rect x="50" y="150" width="18" height="98" rx="9" fill="#ffe5d0"/>
    <rect x="132" y="150" width="18" height="98" rx="9" fill="#ffe5d0"/>
    <rect x="80" y="248" width="18" height="115" rx="9" fill="#ffe5d0"/>
    <rect x="102" y="248" width="18" height="115" rx="9" fill="#ffe5d0"/>
    <ellipse cx="89" cy="365" rx="14" ry="6" fill="#ffe5d0"/>
    <ellipse cx="111" cy="365" rx="14" ry="6" fill="#ffe5d0"/>
  `;
  const back = item.backSvg || '';
  const front = item.svg || '';
  return `<svg viewBox="0 0 200 400">${back}${silhouette}${front}</svg>`;
}

function renderPalette() {
  paletteGrid.innerHTML = '';
  if (state.cat === 'bg') {
    ITEMS.bg.forEach(b => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'item-btn bg-pick preview-' + b.className.replace('bg-', '');
      btn.dataset.id = b.id;
      if (state.bg === b.id) btn.classList.add('selected');
      btn.innerHTML = `<span>${b.deco[0].e}</span>`;
      btn.addEventListener('click', () => setItem('bg', b.id));
      paletteGrid.appendChild(btn);
    });
    return;
  }
  const list = ITEMS[state.cat] || [];
  list.forEach(item => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'item-btn';
    btn.dataset.id = item.id;
    if (state[state.cat] === item.id) btn.classList.add('selected');
    btn.innerHTML = makePreviewSvg(state.cat, item);
    btn.addEventListener('click', () => setItem(state.cat, item.id));
    paletteGrid.appendChild(btn);
  });
}

// ===== TABS =====
tabsEl.addEventListener('click', (e) => {
  const t = e.target.closest('.tab');
  if (!t) return;
  state.cat = t.dataset.cat;
  tabsEl.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x === t));
  renderPalette();
  vibrate(6);
});

// ===== PHOTO =====
const CONFETTI_EMOJI = ['🌟','💖','✨','🎀','💕','⭐','🌸','💫'];
function confettiBurst() {
  for (let i = 0; i < 30; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.textContent = CONFETTI_EMOJI[Math.floor(Math.random()*CONFETTI_EMOJI.length)];
    c.style.left = Math.random() * 100 + '%';
    c.style.animationDuration = (1.6 + Math.random() * 1.4) + 's';
    c.style.animationDelay = (Math.random() * 0.4) + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

photoBtn.addEventListener('click', () => {
  vibrate([20, 30, 60]);
  stage.classList.remove('flash');
  void stage.offsetWidth;
  stage.classList.add('flash');
  confettiBurst();
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1600);
});

// ===== INIT =====
applyBg();
// Default outfit so doll isn't naked on first open
state.hair = 'h2';
state.top = 't1';
state.bottom = 'b1';
state.shoes = 's1';
renderDoll();
renderPalette();
</script>
