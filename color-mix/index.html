<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🎨 ผสมสี — เกมสำหรับเด็ก</title>
<meta name="description" content="เกมผสมสี เรียนรู้ว่าสีอะไรผสมกันได้สีใหม่อะไร สำหรับเด็กไทย">
<meta name="theme-color" content="#ff6b9d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ผสมสี">
<meta name="mobile-web-app-capable" content="yes">

<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../icons/icon.svg">
<link rel="manifest" href="../manifest.webmanifest">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Itim&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-3: #b5e8ff; --grass-1: #7ed957;
    --brand: #ff6b9d; --brand-dark: #e54b82;
    --gold: #ffd93d; --good: #5bc13a; --good-dark: #3fa024;
    --bad: #ff5757; --bad-dark: #d83838;
    --ink: #2d3436; --card: #ffffff; --card-border: #ffd6e4;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Mitr', -apple-system, sans-serif;
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 10%, #fff9c4 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, #ffcfd2 0%, transparent 45%),
      linear-gradient(180deg, var(--sky-3) 0%, #d9f3c9 65%, var(--grass-1) 100%);
    background-attachment: fixed;
    user-select: none;
    -webkit-user-select: none;
  }
  body::before {
    content: '☁️ ☁️     ☁️';
    position: fixed; top: 20px; left: 0; right: 0;
    text-align: center; font-size: 42px;
    opacity: 0.55; pointer-events: none;
    letter-spacing: 80px;
    animation: drift 40s linear infinite;
    z-index: 0;
  }
  @keyframes drift { from { transform: translateX(-10%); } to { transform: translateX(10%); } }

  .app { max-width: 880px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
  body:has(#freeScreen.active) .app,
  body:has(#targetScreen.active) .app,
  body:has(#quizScreen.active) .app {
    max-width: 100%; padding: 0; min-height: 100vh; min-height: 100dvh;
  }
  body:has(#freeScreen.active)::before,
  body:has(#targetScreen.active)::before,
  body:has(#quizScreen.active)::before { display: none; }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn .35s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero { text-align: center; padding: 14px 10px 18px; }
  .hero h1 {
    font-family: 'Itim', cursive;
    font-size: clamp(42px, 9vw, 68px);
    margin: 0; color: var(--brand-dark);
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
    letter-spacing: 1px;
  }
  .howto {
    list-style: none; padding: 12px 18px; margin: 8px auto 18px;
    max-width: 360px; background: rgba(255,255,255,0.55);
    border: 2px dashed var(--card-border); border-radius: 18px;
    font-size: 16px; color: #555; font-weight: 500; text-align: left;
  }
  .howto li { display: flex; align-items: center; gap: 10px; padding: 3px 0; line-height: 1.3; }
  .howto-icon { font-size: 22px; flex-shrink: 0; width: 28px; text-align: center; }
  @media (min-width: 768px) { .howto { font-size: 18px; max-width: 440px; } .howto-icon { font-size: 26px; } }

  .lgrid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px; margin: 10px 0 32px;
  }
  .lcard {
    background: var(--card); border: 4px solid var(--card-border);
    border-radius: 24px; padding: 22px 14px 18px; text-align: center;
    cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.07);
    transition: transform .15s, box-shadow .15s, border-color .15s;
    position: relative; overflow: hidden;
  }
  .lcard:active { transform: scale(0.96) translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.07); }
  .lcard:hover { border-color: var(--brand); }
  .lcard .preview { font-size: 56px; line-height: 1; margin-bottom: 6px; filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.12)); }
  .lcard .ltitle { font-family: 'Itim', cursive; font-size: 26px; color: var(--brand-dark); text-shadow: 2px 2px 0 #fff; }
  .lcard .lsub { font-size: 14px; color: #777; font-weight: 500; margin-top: 4px; }
  .lcard .stars { position: absolute; top: 10px; right: 10px; font-size: 18px; letter-spacing: 1px; }
  .lcard .mode-tag {
    display: inline-block; font-family: 'Itim', cursive; font-size: 13px;
    color: #fff; background: var(--brand); padding: 2px 12px;
    border-radius: 999px; margin-bottom: 6px;
  }
  .lcard .mode-tag.free   { background: #2980b9; }
  .lcard .mode-tag.target { background: var(--good-dark); }
  .lcard .mode-tag.quiz   { background: #c0392b; }

  /* Game shell */
  .game-screen.active {
    display: flex; flex-direction: column;
    min-height: 100vh; min-height: 100dvh;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .hud {
    flex: 0 0 auto; display: flex; justify-content: center; gap: 10px;
    margin: 10px 14px 0; font-family: 'Itim', cursive; font-size: 22px;
    flex-wrap: wrap;
  }
  .hud-item {
    background: #fff; border: 3px solid var(--card-border);
    border-radius: 999px; padding: 6px 16px;
    box-shadow: 0 3px 0 rgba(0,0,0,0.08);
    min-width: 80px; text-align: center;
  }

  .stage {
    flex: 1 1 auto;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 14px;
    gap: 14px;
    overflow-y: auto;
  }

  /* Beaker */
  .beaker-row { display: flex; gap: 18px; align-items: flex-end; flex-wrap: wrap; justify-content: center; }
  .beaker-cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .beaker-label {
    font-family: 'Itim', cursive; font-size: 18px; color: var(--brand-dark);
    text-shadow: 2px 2px 0 #fff; min-height: 22px;
  }
  .beaker {
    width: 110px; height: 150px;
    border: 5px solid var(--ink);
    border-top: 0; border-radius: 0 0 32px 32px;
    background: rgba(255,255,255,0.6);
    box-shadow: 0 5px 0 rgba(0,0,0,0.10), inset 0 0 16px rgba(0,0,0,0.06);
    position: relative;
    overflow: hidden;
  }
  .beaker::before {
    /* mouth ring */
    content: '';
    position: absolute;
    top: -10px; left: -8px; right: -8px;
    height: 12px;
    border: 5px solid var(--ink);
    border-radius: 14px;
    background: linear-gradient(180deg, #fff, #efefef);
  }
  .beaker .liquid {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 0;
    background: transparent;
    transition: height 0.4s ease, background 0.45s ease;
    overflow: hidden;
  }
  .beaker .liquid.fill1 { height: 50%; }
  .beaker .liquid.fill2 { height: 78%; }
  .beaker .liquid::after {
    /* surface highlight */
    content: '';
    position: absolute;
    top: -5px; left: 0; right: 0; height: 10px;
    background: rgba(255,255,255,0.45);
    border-radius: 50%;
  }
  .beaker.muddy .liquid {
    background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.06) 0 6px, transparent 6px 12px);
  }
  .beaker.shake { animation: bShake .35s ease; }
  @keyframes bShake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px) rotate(-2deg); }
    75% { transform: translateX(8px) rotate(2deg); }
  }
  .beaker.pop { animation: bPop .5s ease; }
  @keyframes bPop {
    0% { transform: scale(1); } 50% { transform: scale(1.12); } 100% { transform: scale(1); }
  }
  .beaker.target {
    box-shadow: 0 5px 0 rgba(0,0,0,0.10), inset 0 0 16px rgba(0,0,0,0.06), 0 0 0 4px var(--gold);
  }
  .beaker .drop-anim {
    position: absolute;
    left: 50%; top: -40px;
    width: 36px; height: 50px;
    transform: translate(-50%, 0);
    pointer-events: none;
    z-index: 5;
    animation: dropFall .55s cubic-bezier(0.5, 0, 0.7, 1) forwards;
  }
  .drop-shape {
    width: 100%; height: 100%;
    background: var(--dropC, #999);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    border: 3px solid rgba(0,0,0,0.18);
    box-shadow: inset -4px -4px 0 rgba(0,0,0,0.18);
  }
  @keyframes dropFall {
    0%   { transform: translate(-50%, -10px); }
    65%  { transform: translate(-50%, calc(150px - 60px)); }
    80%  { transform: translate(-50%, calc(150px - 50px)) scaleY(0.5); }
    100% { transform: translate(-50%, calc(150px - 50px)) scaleY(0.5); opacity: 0; }
  }

  .equation {
    font-family: 'Itim', cursive;
    font-size: clamp(28px, 6vw, 44px);
    color: var(--brand-dark); text-shadow: 2px 2px 0 #fff;
    display: inline-flex; align-items: center; gap: 6px;
    flex-wrap: wrap; justify-content: center;
  }
  .eq-color {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 4px solid #fff;
    box-shadow: 0 4px 0 rgba(0,0,0,0.18);
    background: var(--c, #ccc);
    display: inline-block;
    vertical-align: middle;
  }
  .eq-q {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 4px dashed var(--brand);
    background: rgba(255,255,255,0.7);
    color: var(--brand-dark);
    font-family: 'Itim', cursive;
    font-size: 36px; line-height: 50px;
    text-align: center;
    box-shadow: 0 4px 0 rgba(0,0,0,0.10);
  }

  /* Palette */
  .palette {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center;
    padding: 12px 14px;
    background: rgba(255,255,255,0.6);
    border-radius: 22px;
    border: 3px dashed var(--card-border);
    max-width: 520px;
  }
  .swatch {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 4px solid #fff;
    box-shadow: 0 4px 0 rgba(0,0,0,0.18);
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
    position: relative;
    background: var(--c, #ccc);
  }
  .swatch:active { transform: translateY(2px) scale(0.94); box-shadow: 0 2px 0 rgba(0,0,0,0.18); }
  .swatch.disabled { opacity: 0.3; pointer-events: none; }

  .topbar-actions {
    display: flex; gap: 8px; justify-content: center; margin-top: 6px; flex-wrap: wrap;
  }
  .icon-btn {
    background: #fff; border: 3px solid var(--card-border);
    border-radius: 999px; padding: 8px 16px;
    font-family: 'Itim', cursive; font-size: 18px;
    cursor: pointer;
    box-shadow: 0 3px 0 rgba(0,0,0,0.08);
    transition: transform .12s, box-shadow .12s;
    color: var(--ink);
  }
  .icon-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.08); }
  .icon-btn:disabled { opacity: 0.4; pointer-events: none; }

  /* Recipe checklist (free mode) */
  .recipes {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
    margin-top: 6px;
  }
  .recipe {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,0.7);
    border: 3px solid var(--card-border);
    border-radius: 999px;
    padding: 4px 10px;
    font-family: 'Itim', cursive;
    font-size: 16px;
    color: #777;
    transition: background .25s, border-color .25s, color .25s;
  }
  .recipe.discovered {
    background: #fffbe0;
    border-color: var(--gold);
    color: var(--ink);
    box-shadow: 0 3px 0 rgba(238,205,30,0.5);
  }
  .recipe .rsw {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid #fff;
    box-shadow: 0 2px 0 rgba(0,0,0,0.15);
    background: var(--c, #ccc);
  }
  .recipe .rstate {
    font-size: 18px;
  }

  /* Quiz options */
  .opts {
    display: flex; gap: 12px;
    justify-content: center; flex-wrap: wrap;
    max-width: 480px;
  }
  .opts .opt {
    width: 80px; height: 80px;
    border-radius: 24px;
    background: var(--c, #ccc);
    border: 4px solid #fff;
    box-shadow: 0 5px 0 rgba(0,0,0,0.18);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Itim', cursive; font-size: 24px; color: #fff;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
    transition: transform .12s, box-shadow .12s, opacity .12s;
  }
  .opts .opt:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.18); }
  .opts .opt.good   { animation: pulseGood .5s ease; box-shadow: 0 5px 0 rgba(0,0,0,0.18), 0 0 0 5px var(--good); }
  .opts .opt.bad    { animation: pulseBad .4s ease; box-shadow: 0 5px 0 rgba(0,0,0,0.18), 0 0 0 5px var(--bad); }
  .opts .opt.faded  { opacity: 0.35; pointer-events: none; }
  @keyframes pulseGood {
    0% { transform: scale(1); } 50% { transform: scale(1.18); } 100% { transform: scale(1); }
  }
  @keyframes pulseBad {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .name-tag {
    background: #fff;
    border: 3px solid var(--card-border);
    border-radius: 999px;
    padding: 4px 18px;
    font-family: 'Itim', cursive;
    color: var(--brand-dark);
    font-size: 22px;
    text-shadow: 2px 2px 0 #fff;
    margin-top: 6px;
    min-height: 30px;
    display: inline-flex; align-items: center;
  }
  .name-tag.empty { color: #999; background: rgba(255,255,255,0.4); border-style: dashed; }

  /* Results */
  #resultsScreen { text-align: center; padding-top: 20px; }
  .trophy {
    font-size: clamp(120px, 22vw, 180px); line-height: 1;
    filter: drop-shadow(4px 6px 0 rgba(0,0,0,0.18));
    animation: bobBig 1.2s ease-in-out infinite;
  }
  @keyframes bobBig {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-12px) rotate(4deg); }
  }
  .winner-name {
    font-family: 'Itim', cursive;
    font-size: clamp(44px, 9vw, 72px);
    color: var(--brand-dark); margin: 18px 0 6px;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
  }
  .winner-sub {
    font-size: clamp(18px, 4vw, 24px);
    color: #555; margin: 0 0 6px; font-weight: 500;
  }
  .stars-row {
    font-size: clamp(48px, 10vw, 72px); line-height: 1;
    margin: 8px 0 4px; letter-spacing: 4px;
    filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.12));
  }
  .rating-text {
    font-family: 'Itim', cursive;
    font-size: clamp(28px, 6vw, 40px);
    color: var(--brand-dark); margin: 4px 0 16px;
  }
  .action-bar {
    display: flex; gap: 12px; justify-content: center; align-items: center;
    margin-top: 12px; flex-wrap: wrap;
  }
  .btn-main {
    font-family: 'Itim', cursive;
    font-size: 28px; padding: 16px 36px;
    border: 4px solid #fff; border-radius: 999px;
    background: var(--brand); color: #fff;
    box-shadow: 0 6px 0 var(--brand-dark);
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
    text-shadow: 2px 2px 0 var(--brand-dark);
  }
  .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--brand-dark); }
  .btn-ghost {
    font-family: 'Itim', cursive;
    font-size: 24px; padding: 14px 30px;
    border: 4px solid var(--brand); border-radius: 999px;
    background: #fff; color: var(--brand-dark);
    box-shadow: 0 5px 0 rgba(0,0,0,0.12);
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
  }
  .btn-ghost:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }

  .confetti {
    position: fixed; top: -20px;
    width: 12px; height: 18px;
    z-index: 90; pointer-events: none;
    animation: fall linear forwards;
  }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

  .home-btn, .back-btn {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #fff; border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    align-items: center; justify-content: center;
    font-size: 24px; text-decoration: none; color: var(--ink);
    z-index: 60;
    transition: transform .12s;
    font-family: inherit; padding: 0; cursor: pointer;
  }
  .home-btn { left: 12px; display: flex; font-size: 26px; }
  .back-btn { right: 12px; display: none; }
  .back-btn.show { display: flex; }
  .home-btn:active, .back-btn:active { transform: scale(0.92); }

  @media (min-width: 768px) {
    .lgrid { grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .hud { font-size: 26px; }
    .hud-item { padding: 8px 22px; min-width: 110px; }
    .beaker { width: 130px; height: 180px; }
    .swatch { width: 64px; height: 64px; }
    .opts .opt { width: 96px; height: 96px; }
  }
  @media (max-width: 480px) {
    .lcard { padding: 16px 10px 14px; border-width: 3px; border-radius: 20px; }
    .lcard .ltitle { font-size: 22px; }
    .hud { font-size: 18px; margin: 8px 10px 0; }
    .hud-item { padding: 5px 12px; min-width: 60px; }
    .beaker { width: 90px; height: 130px; }
    .swatch { width: 48px; height: 48px; border-width: 3px; }
    .stage { padding: 8px; gap: 10px; }
    .opts .opt { width: 64px; height: 64px; border-radius: 18px; }
    .recipes { gap: 6px; }
    .recipe { font-size: 14px; padding: 3px 8px; }
  }
</style>
</head>
<body>
<a class="home-btn" href="../" aria-label="กลับหน้าหลัก">🏠</a>
<button class="back-btn" id="backBtn" type="button" aria-label="เลือกโหมดใหม่">📋</button>
<div class="app">

  <section id="selectScreen" class="screen active">
    <header class="hero">
      <h1>🎨 ผสมสี</h1>
      <ul class="howto">
        <li><span class="howto-icon">🔴</span> เลือกสีจากจาน 2 สี</li>
        <li><span class="howto-icon">🧪</span> หยดลงในขวด ดูว่าได้สีอะไร</li>
        <li><span class="howto-icon">🎯</span> มีโหมดทำตามเป้าและทายสูตรด้วย!</li>
      </ul>
    </header>
    <div id="levelGrid" class="lgrid"></div>
  </section>

  <!-- FREE PLAY -->
  <section id="freeScreen" class="screen game-screen">
    <div class="hud">
      <div class="hud-item" style="color:#2980b9;">🧪 เล่นอิสระ</div>
      <div class="hud-item" id="discCount" style="color:var(--good-dark);">✨ <span id="discNum">0</span>/5</div>
    </div>
    <div class="stage">
      <div class="beaker-cell">
        <div class="beaker" id="freeBeaker"><div class="liquid" id="freeLiquid"></div></div>
        <div class="name-tag empty" id="freeNameTag">ขวดเปล่า — ลองหยดสี!</div>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" id="freeClearBtn">🧽 เทออก</button>
      </div>
      <div class="palette" id="freePalette"></div>
      <div class="recipes" id="freeRecipes"></div>
    </div>
  </section>

  <!-- TARGET MODE -->
  <section id="targetScreen" class="screen game-screen">
    <div class="hud">
      <div class="hud-item" style="color:var(--good-dark);">🎯 ข้อ <span id="tRound">1</span>/<span id="tTotal">3</span></div>
      <div class="hud-item" style="color:var(--bad-dark);">❌ <span id="tMisses">0</span></div>
    </div>
    <div class="stage">
      <div class="beaker-row">
        <div class="beaker-cell">
          <div class="beaker-label">เป้าหมาย</div>
          <div class="beaker target" id="targetBeaker"><div class="liquid" id="targetLiquid"></div></div>
          <div class="name-tag" id="targetName">—</div>
        </div>
        <div class="beaker-cell">
          <div class="beaker-label">ขวดของเรา</div>
          <div class="beaker" id="mixBeaker"><div class="liquid" id="mixLiquid"></div></div>
          <div class="name-tag empty" id="mixName">ขวดเปล่า</div>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" id="targetClearBtn">🧽 เทออก</button>
      </div>
      <div class="palette" id="targetPalette"></div>
    </div>
  </section>

  <!-- QUIZ MODE -->
  <section id="quizScreen" class="screen game-screen">
    <div class="hud">
      <div class="hud-item" style="color:#c0392b;">❓ ข้อ <span id="qRound">1</span>/<span id="qTotal">10</span></div>
      <div class="hud-item" style="color:var(--good-dark);">✅ <span id="qRight">0</span></div>
    </div>
    <div class="stage">
      <div class="equation" id="qEquation">—</div>
      <div class="opts" id="qOpts"></div>
    </div>
  </section>

  <!-- RESULTS -->
  <section id="resultsScreen" class="screen">
    <div class="trophy">🏆</div>
    <h2 id="resultTitle" class="winner-name">เก่งมาก!</h2>
    <p id="resultSub" class="winner-sub">—</p>
    <div id="resultStars" class="stars-row">⭐</div>
    <div id="resultText" class="rating-text">ลองอีกที!</div>
    <div class="action-bar">
      <button id="againBtn" class="btn-ghost">🔄 เล่นอีก</button>
      <button id="newBtn" class="btn-main">เลือกใหม่</button>
    </div>
  </section>

</div>

<script>
'use strict';

// ============================================================================
// COLORS — 10 fixed colors
// ============================================================================
const COLORS = {
  red:    { hex: '#e74c3c', name: 'แดง'   },
  yellow: { hex: '#f1c40f', name: 'เหลือง' },
  blue:   { hex: '#3498db', name: 'ฟ้า'   },
  white:  { hex: '#ffffff', name: 'ขาว'   },
  black:  { hex: '#2d3436', name: 'ดำ'    },
  orange: { hex: '#f39c12', name: 'ส้ม'   },
  green:  { hex: '#2ecc71', name: 'เขียว' },
  purple: { hex: '#9b59b6', name: 'ม่วง'  },
  pink:   { hex: '#ff6b9d', name: 'ชมพู'  },
  gray:   { hex: '#95a5a6', name: 'เทา'   },
};

// Recipes are unordered pairs (a,b) → result
const RECIPES = [
  { a: 'red',    b: 'yellow', result: 'orange' },
  { a: 'yellow', b: 'blue',   result: 'green'  },
  { a: 'red',    b: 'blue',   result: 'purple' },
  { a: 'red',    b: 'white',  result: 'pink'   },
  { a: 'black',  b: 'white',  result: 'gray'   },
];

function recipeFor(a, b) {
  return RECIPES.find(r => (r.a === a && r.b === b) || (r.a === b && r.b === a));
}

// LEVELS — three modes
const LEVELS = [
  // Free
  { id: 'free', mode: 'free', stars: 1, tag: 'free',
    title: 'เล่นอิสระ', sub: 'ลองทุกสูตร · ไม่มีจับเวลา', preview: '🧪',
    palette: ['red','yellow','blue','white','black'] },

  // Target — 3 difficulty levels
  { id: 'target1', mode: 'target', stars: 1, tag: 'target',
    title: 'ทำตามเป้า · ง่าย', sub: '3 สูตรพื้นฐาน', preview: '🎯',
    palette: ['red','yellow','blue'],
    questions: ['orange','green','purple'] },
  { id: 'target2', mode: 'target', stars: 2, tag: 'target',
    title: 'ทำตามเป้า · กลาง', sub: '+ ขาว ดำ ชมพู เทา', preview: '🎯',
    palette: ['red','yellow','blue','white','black'],
    questions: ['pink','gray','orange','green','purple'] },
  { id: 'target3', mode: 'target', stars: 3, tag: 'target',
    title: 'ทำตามเป้า · ยาก', sub: '5 สูตร สลับ 8 ข้อ', preview: '🎯',
    palette: ['red','yellow','blue','white','black'],
    questions: shuffleQuestionsHard() },

  // Quiz — 2 difficulty levels
  { id: 'quiz1', mode: 'quiz', stars: 1, tag: 'quiz',
    title: 'ทายสูตร · ง่าย', sub: '3 สูตรพื้นฐาน · 8 ข้อ', preview: '❓',
    quizRecipes: ['orange','green','purple'], rounds: 8 },
  { id: 'quiz2', mode: 'quiz', stars: 2, tag: 'quiz',
    title: 'ทายสูตร · ครบ', sub: 'ทุกสูตร · 10 ข้อ', preview: '❓',
    quizRecipes: ['orange','green','purple','pink','gray'], rounds: 10 },
];

function shuffleQuestionsHard() {
  // Build deterministically at module load: 8 picks from all 5 results, balanced
  const all = ['orange','green','purple','pink','gray'];
  const picks = [];
  // Each result at least once, then 3 random extras
  for (const r of all) picks.push(r);
  while (picks.length < 8) picks.push(all[Math.floor(Math.random() * all.length)]);
  // Shuffle
  for (let i = picks.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [picks[i], picks[j]] = [picks[j], picks[i]];
  }
  return picks;
}

// ============================================================================
// STATE
// ============================================================================
const state = {
  mode: null, level: null,

  // Free mode
  freeFill: [],     // up to 2 color ids
  discovered: new Set(), // recipe ids "a+b"

  // Target mode
  tRound: 0, tMisses: 0, tFill: [],

  // Quiz mode
  qRound: 0, qRight: 0, qWrong: 0, qCurrent: null,

  pendingTimers: [],
};
const FREE_DISCOVERED_KEY = 'colorMixDiscovered';

// ============================================================================
// AUDIO
// ============================================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
}
function tone(freq, ms, type='sine', vol=0.18) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  o.connect(g).connect(audioCtx.destination);
  const t = audioCtx.currentTime, d = ms/1000;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.01);
  g.gain.linearRampToValueAtTime(0, t + d);
  o.start(t); o.stop(t + d + 0.02);
}
function playDrop()  { tone(330, 90, 'sine', 0.10); }
function playMix()   { tone(523, 130, 'triangle', 0.16); setTimeout(()=>tone(784, 140, 'triangle', 0.14), 110); }
function playWrong() { tone(180, 200, 'sawtooth', 0.14); }
function playWin()   {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(()=>tone(f, 180, 'triangle', 0.18), i * 110));
}

// ============================================================================
// DOM
// ============================================================================
const $ = (id) => document.getElementById(id);
const screens = {
  select:  $('selectScreen'),
  free:    $('freeScreen'),
  target:  $('targetScreen'),
  quiz:    $('quizScreen'),
  results: $('resultsScreen'),
};
const levelGrid = $('levelGrid');

// ============================================================================
// UTIL
// ============================================================================
function buzz(p) { if (navigator.vibrate) navigator.vibrate(p); }
function showScreen(name) {
  for (const k of Object.keys(screens)) screens[k].classList.toggle('active', k===name);
  $('backBtn').classList.toggle('show', name === 'free' || name === 'target' || name === 'quiz');
}
function later(fn, ms) { const id = setTimeout(fn, ms); state.pendingTimers.push(id); return id; }
function clearTimers() { for (const id of state.pendingTimers) clearTimeout(id); state.pendingTimers = []; }
function shuffle(a) { const r = a.slice(); for (let i=r.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [r[i],r[j]]=[r[j],r[i]]; } return r; }

// ============================================================================
// SELECT SCREEN
// ============================================================================
function renderLevels() {
  levelGrid.innerHTML = '';
  for (const lvl of LEVELS) {
    const c = document.createElement('div');
    c.className = 'lcard';
    const tagLabel = lvl.tag === 'free' ? 'อิสระ' : lvl.tag === 'target' ? 'เป้าหมาย' : 'ทายสูตร';
    c.innerHTML = `
      <div class="stars">${'⭐'.repeat(lvl.stars)}</div>
      <div class="preview">${lvl.preview}</div>
      <div class="mode-tag ${lvl.tag}">${tagLabel}</div>
      <div class="ltitle">${lvl.title}</div>
      <div class="lsub">${lvl.sub}</div>
    `;
    c.addEventListener('click', () => { ensureAudio(); startLevel(lvl); });
    levelGrid.appendChild(c);
  }
}

function startLevel(lvl) {
  state.level = lvl;
  state.mode = lvl.mode;
  clearTimers();
  if (lvl.mode === 'free') startFree();
  else if (lvl.mode === 'target') startTarget();
  else if (lvl.mode === 'quiz') startQuiz();
}

// ============================================================================
// COMMON: drop a color into a beaker, then run a callback after the splash.
// ============================================================================
function dropColor(beakerEl, liquidEl, colorId, fillArr, onSettle) {
  if (fillArr.length >= 2) return;
  fillArr.push(colorId);

  // Animated drop falling into beaker
  const drop = document.createElement('div');
  drop.className = 'drop-anim';
  drop.style.setProperty('--dropC', COLORS[colorId].hex);
  drop.innerHTML = '<div class="drop-shape"></div>';
  beakerEl.appendChild(drop);
  playDrop();
  buzz(15);
  setTimeout(() => drop.remove(), 600);

  // Update liquid after splash
  later(() => {
    updateLiquid(beakerEl, liquidEl, fillArr);
    if (onSettle) onSettle();
  }, 380);
}

function updateLiquid(beakerEl, liquidEl, fillArr) {
  liquidEl.classList.remove('fill1', 'fill2');
  beakerEl.classList.remove('muddy');
  if (fillArr.length === 0) {
    liquidEl.style.background = 'transparent';
    return;
  }
  if (fillArr.length === 1) {
    liquidEl.classList.add('fill1');
    liquidEl.style.background = COLORS[fillArr[0]].hex;
    return;
  }
  // 2 drops — mix
  const result = mixOf(fillArr[0], fillArr[1]);
  liquidEl.classList.add('fill2');
  liquidEl.style.background = result.hex;
  if (!result.named) beakerEl.classList.add('muddy');
  beakerEl.classList.remove('pop'); void beakerEl.offsetWidth; beakerEl.classList.add('pop');
  playMix();
}

function mixOf(a, b) {
  if (a === b) return { hex: COLORS[a].hex, named: true, name: COLORS[a].name, id: a };
  const rec = recipeFor(a, b);
  if (rec) {
    const r = COLORS[rec.result];
    return { hex: r.hex, named: true, name: r.name, id: rec.result };
  }
  // Fallback: muddy average
  const ah = hexToRgb(COLORS[a].hex), bh = hexToRgb(COLORS[b].hex);
  const mid = {
    r: Math.round((ah.r + bh.r) / 2 * 0.85),
    g: Math.round((ah.g + bh.g) / 2 * 0.85),
    b: Math.round((ah.b + bh.b) / 2 * 0.85),
  };
  return { hex: rgbToHex(mid.r, mid.g, mid.b), named: false, name: '', id: null };
}

function hexToRgb(h) {
  h = h.replace('#','');
  return { r: parseInt(h.substr(0,2),16), g: parseInt(h.substr(2,2),16), b: parseInt(h.substr(4,2),16) };
}
function rgbToHex(r,g,b) {
  const t = (n) => n.toString(16).padStart(2,'0');
  return '#' + t(r) + t(g) + t(b);
}

// ============================================================================
// FREE MODE
// ============================================================================
function startFree() {
  state.freeFill = [];
  loadDiscovered();
  // Reset beaker
  const beaker = $('freeBeaker'), liquid = $('freeLiquid');
  beaker.classList.remove('muddy', 'pop', 'shake');
  liquid.classList.remove('fill1','fill2');
  liquid.style.background = 'transparent';
  $('freeNameTag').textContent = 'ขวดเปล่า — ลองหยดสี!';
  $('freeNameTag').classList.add('empty');

  // Palette (free mode shows the 5 base colors)
  const palette = $('freePalette');
  palette.innerHTML = '';
  for (const id of state.level.palette) {
    const sw = document.createElement('button');
    sw.type = 'button';
    sw.className = 'swatch';
    sw.style.setProperty('--c', COLORS[id].hex);
    sw.setAttribute('aria-label', COLORS[id].name);
    sw.addEventListener('click', () => onFreeSwatch(id));
    palette.appendChild(sw);
  }

  renderRecipes();
  showScreen('free');
}

function onFreeSwatch(id) {
  if (state.freeFill.length >= 2) return;
  const beaker = $('freeBeaker'), liquid = $('freeLiquid');
  dropColor(beaker, liquid, id, state.freeFill, () => {
    if (state.freeFill.length === 1) {
      $('freeNameTag').textContent = COLORS[id].name + ' · เลือกสีอีกหนึ่ง';
      $('freeNameTag').classList.remove('empty');
    } else if (state.freeFill.length === 2) {
      const m = mixOf(state.freeFill[0], state.freeFill[1]);
      if (m.named && m.id) {
        $('freeNameTag').textContent = '✨ ได้สี' + m.name + '!';
        $('freeNameTag').classList.remove('empty');
        // Mark recipe as discovered if it's a real recipe (not same+same)
        const rec = recipeFor(state.freeFill[0], state.freeFill[1]);
        if (rec) {
          const wasNew = !state.discovered.has(rec.result);
          state.discovered.add(rec.result);
          saveDiscovered();
          renderRecipes();
          if (wasNew) {
            buzz([20, 40, 80]);
            celebrate(40);
            if (state.discovered.size === RECIPES.length) {
              later(() => celebrate(100), 200);
            }
          }
        }
      } else {
        $('freeNameTag').textContent = 'อืม... สีไม่สวยเท่าไหร่';
        $('freeNameTag').classList.remove('empty');
      }
    }
  });
}

function renderRecipes() {
  const box = $('freeRecipes');
  box.innerHTML = '';
  for (const r of RECIPES) {
    const found = state.discovered.has(r.result);
    const el = document.createElement('div');
    el.className = 'recipe' + (found ? ' discovered' : '');
    if (found) {
      el.innerHTML = `
        <span class="rsw" style="--c:${COLORS[r.a].hex}"></span>+
        <span class="rsw" style="--c:${COLORS[r.b].hex}"></span>=
        <span class="rsw" style="--c:${COLORS[r.result].hex}"></span>
        <span>${COLORS[r.result].name}</span>
      `;
    } else {
      el.innerHTML = `
        <span class="rsw" style="--c:${COLORS[r.a].hex}"></span>+
        <span class="rsw" style="--c:${COLORS[r.b].hex}"></span>=
        <span class="rstate">❓</span>
      `;
    }
    box.appendChild(el);
  }
  $('discNum').textContent = state.discovered.size;
}

function saveDiscovered() {
  try { localStorage.setItem(FREE_DISCOVERED_KEY, JSON.stringify([...state.discovered])); } catch(e){}
}
function loadDiscovered() {
  try {
    const raw = localStorage.getItem(FREE_DISCOVERED_KEY);
    if (raw) state.discovered = new Set(JSON.parse(raw));
  } catch(e){}
}

$('freeClearBtn').addEventListener('click', () => {
  state.freeFill = [];
  const beaker = $('freeBeaker'), liquid = $('freeLiquid');
  beaker.classList.remove('muddy', 'pop');
  liquid.classList.remove('fill1','fill2');
  liquid.style.background = 'transparent';
  $('freeNameTag').textContent = 'ขวดเปล่า — ลองหยดสี!';
  $('freeNameTag').classList.add('empty');
  buzz(20);
});

// ============================================================================
// TARGET MODE
// ============================================================================
function startTarget() {
  state.tRound = 0;
  state.tMisses = 0;
  state.tFill = [];
  $('tTotal').textContent = state.level.questions.length;
  $('tMisses').textContent = '0';
  // Palette
  const palette = $('targetPalette');
  palette.innerHTML = '';
  for (const id of state.level.palette) {
    const sw = document.createElement('button');
    sw.type = 'button';
    sw.className = 'swatch';
    sw.style.setProperty('--c', COLORS[id].hex);
    sw.setAttribute('aria-label', COLORS[id].name);
    sw.addEventListener('click', () => onTargetSwatch(id, sw));
    palette.appendChild(sw);
  }
  showScreen('target');
  nextTarget();
}

function nextTarget() {
  state.tRound += 1;
  if (state.tRound > state.level.questions.length) { showResults('target'); return; }
  const targetId = state.level.questions[state.tRound - 1];
  const t = COLORS[targetId];
  $('tRound').textContent = state.tRound;
  // Set target beaker
  const tBeaker = $('targetBeaker'), tLiq = $('targetLiquid');
  tBeaker.classList.remove('muddy','pop','shake');
  tLiq.classList.remove('fill1');
  void tBeaker.offsetWidth;
  tLiq.classList.add('fill2');
  tLiq.style.background = t.hex;
  $('targetName').textContent = t.name;
  // Reset mix beaker
  resetMixBeaker();
}

function resetMixBeaker() {
  state.tFill = [];
  const beaker = $('mixBeaker'), liquid = $('mixLiquid');
  beaker.classList.remove('muddy','pop','shake');
  liquid.classList.remove('fill1','fill2');
  liquid.style.background = 'transparent';
  $('mixName').textContent = 'ขวดเปล่า';
  $('mixName').classList.add('empty');
  // Re-enable palette
  for (const sw of $('targetPalette').querySelectorAll('.swatch')) sw.classList.remove('disabled');
}

function onTargetSwatch(id, swEl) {
  if (state.tFill.length >= 2) return;
  const beaker = $('mixBeaker'), liquid = $('mixLiquid');
  swEl.classList.add('disabled');
  // Allow same color twice in target mode (so kids can experiment)
  dropColor(beaker, liquid, id, state.tFill, () => {
    if (state.tFill.length === 1) {
      $('mixName').textContent = COLORS[id].name;
      $('mixName').classList.remove('empty');
      // Re-enable other swatches so kid can pick second
      for (const sw of $('targetPalette').querySelectorAll('.swatch')) sw.classList.remove('disabled');
    } else if (state.tFill.length === 2) {
      const m = mixOf(state.tFill[0], state.tFill[1]);
      $('mixName').textContent = m.named ? m.name : '...';
      $('mixName').classList.remove('empty');
      const targetId = state.level.questions[state.tRound - 1];
      // Disable palette while we evaluate
      for (const sw of $('targetPalette').querySelectorAll('.swatch')) sw.classList.add('disabled');
      later(() => {
        if (m.id === targetId) {
          // Correct!
          playWin();
          buzz([30, 30, 80]);
          celebrate(50);
          later(nextTarget, 900);
        } else {
          state.tMisses += 1;
          $('tMisses').textContent = state.tMisses;
          beaker.classList.add('shake');
          playWrong();
          buzz([60, 40, 80]);
          later(() => {
            beaker.classList.remove('shake');
            resetMixBeaker();
          }, 700);
        }
      }, 350);
    }
  });
}

$('targetClearBtn').addEventListener('click', () => { resetMixBeaker(); buzz(20); });

// ============================================================================
// QUIZ MODE
// ============================================================================
function startQuiz() {
  state.qRound = 0;
  state.qRight = 0;
  state.qWrong = 0;
  $('qTotal').textContent = state.level.rounds;
  $('qRight').textContent = '0';
  showScreen('quiz');
  nextQuiz();
}

function nextQuiz() {
  state.qRound += 1;
  if (state.qRound > state.level.rounds) { showResults('quiz'); return; }
  $('qRound').textContent = state.qRound;
  // Pick a recipe from the level's pool
  const allowedResults = state.level.quizRecipes;
  const recipe = pickFromAllowedRecipes(allowedResults);
  // Pick which slot to hide: 0 = a, 1 = b, 2 = result
  const hide = Math.floor(Math.random() * 3);
  let answerId;
  if (hide === 0) answerId = recipe.a;
  else if (hide === 1) answerId = recipe.b;
  else answerId = recipe.result;

  // Render equation
  const eq = $('qEquation');
  const slot = (id) => `<span class="eq-color" style="--c:${COLORS[id].hex}" aria-label="${COLORS[id].name}"></span>`;
  const qslot = `<span class="eq-q">?</span>`;
  const a = hide === 0 ? qslot : slot(recipe.a);
  const b = hide === 1 ? qslot : slot(recipe.b);
  const r = hide === 2 ? qslot : slot(recipe.result);
  eq.innerHTML = `${a} <span>+</span> ${b} <span>=</span> ${r}`;

  // Build options: correct + 3 distractors
  const allColorIds = Object.keys(COLORS);
  const distractorPool = allColorIds.filter(id => id !== answerId);
  const distractors = shuffle(distractorPool).slice(0, 3);
  const opts = shuffle([answerId, ...distractors]);

  state.qCurrent = { answerId, hide };

  const optsEl = $('qOpts');
  optsEl.innerHTML = '';
  for (const id of opts) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'opt';
    btn.style.setProperty('--c', COLORS[id].hex);
    btn.setAttribute('aria-label', COLORS[id].name);
    btn.addEventListener('click', () => onQuizPick(btn, id));
    optsEl.appendChild(btn);
  }
}

function pickFromAllowedRecipes(allowedResults) {
  const eligible = RECIPES.filter(r => allowedResults.includes(r.result));
  return eligible[Math.floor(Math.random() * eligible.length)];
}

function onQuizPick(btn, id) {
  if (!state.qCurrent) return;
  const { answerId } = state.qCurrent;
  if (id === answerId) {
    btn.classList.add('good');
    state.qRight += 1;
    $('qRight').textContent = state.qRight;
    playWin();
    buzz(30);
    state.qCurrent = null; // lock
    for (const o of $('qOpts').querySelectorAll('.opt')) {
      if (o !== btn) o.classList.add('faded');
    }
    later(nextQuiz, 750);
  } else {
    btn.classList.add('bad');
    state.qWrong += 1;
    playWrong();
    buzz([30, 80, 30]);
    later(() => btn.classList.remove('bad'), 600);
  }
}

// ============================================================================
// RESULTS
// ============================================================================
function showResults(forMode) {
  let title, sub, stars, text, conf;
  if (forMode === 'target') {
    const total = state.level.questions.length;
    const misses = state.tMisses;
    title = 'ผสมครบทุกสี!';
    sub = `${state.level.title} · ผิด ${misses} ครั้ง`;
    if (misses === 0)        { stars='🌟🌟🌟'; text='ไร้ที่ติ!';    conf=140; }
    else if (misses <= 2)    { stars='⭐⭐';     text='เก่งมาก!';   conf=90;  }
    else                     { stars='⭐';         text='ผ่านแล้ว!'; conf=50;  }
  } else if (forMode === 'quiz') {
    const total = state.level.rounds;
    title = `ตอบถูก ${state.qRight}/${total}`;
    sub = `${state.level.title} · ผิด ${state.qWrong}`;
    const pct = state.qRight / total;
    if (pct >= 0.95)      { stars='🌟🌟🌟'; text='สุดยอด!';  conf=140; }
    else if (pct >= 0.8)  { stars='⭐⭐';     text='เก่ง!';     conf=90;  }
    else if (pct >= 0.5)  { stars='⭐';         text='ดี!';        conf=50;  }
    else                  { stars='✨';          text='ลองอีกที!'; conf=20;  }
  }
  $('resultTitle').textContent = title;
  $('resultSub').textContent   = sub;
  $('resultStars').textContent = stars;
  $('resultText').textContent  = text;
  showScreen('results');
  celebrate(conf);
  buzz([60, 40, 60, 40, 100]);
}

function celebrate(n) {
  const colors = ['#ff6b9d', '#ffd93d', '#7ed957', '#5bc0eb', '#ff914d', '#b388ff'];
  for (let i = 0; i < n; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = Math.random() * 0.8 + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    if (Math.random() > 0.5) c.style.borderRadius = '50%';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

// ============================================================================
// EVENTS
// ============================================================================
$('backBtn').addEventListener('click', () => {
  clearTimers();
  renderLevels();
  showScreen('select');
});
$('againBtn').addEventListener('click', () => {
  if (!state.level) { showScreen('select'); return; }
  ensureAudio();
  startLevel(state.level);
});
$('newBtn').addEventListener('click', () => {
  state.level = null;
  clearTimers();
  showScreen('select');
});

let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd < 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

renderLevels();
</script>
</body>
</html>
