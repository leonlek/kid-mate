<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🔍 อันไหนไม่เข้าพวก — เกมสำหรับเด็ก</title>
<meta name="description" content="เกมหาสิ่งที่ไม่เข้าพวก ฝึกการสังเกตและการจัดหมวดหมู่สำหรับเด็ก">
<meta name="theme-color" content="#ff6b9d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="อันไหนไม่เข้าพวก">
<meta name="mobile-web-app-capable" content="yes">

<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../icons/icon.svg">
<link rel="manifest" href="../manifest.webmanifest">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Itim&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-3: #b5e8ff; --grass-1: #7ed957;
    --brand: #ff6b9d; --brand-dark: #e54b82;
    --gold: #ffd93d; --good: #5bc13a; --good-dark: #3fa024;
    --bad: #ff5757; --bad-dark: #d83838;
    --ink: #2d3436; --card: #ffffff; --card-border: #ffd6e4;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Mitr', -apple-system, sans-serif;
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 10%, #fff9c4 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, #ffcfd2 0%, transparent 45%),
      linear-gradient(180deg, var(--sky-3) 0%, #d9f3c9 65%, var(--grass-1) 100%);
    background-attachment: fixed;
    user-select: none;
    -webkit-user-select: none;
  }
  body::before {
    content: '☁️ ☁️     ☁️';
    position: fixed; top: 20px; left: 0; right: 0;
    text-align: center; font-size: 42px;
    opacity: 0.55; pointer-events: none;
    letter-spacing: 80px;
    animation: drift 40s linear infinite;
    z-index: 0;
  }
  @keyframes drift {
    from { transform: translateX(-10%); }
    to { transform: translateX(10%); }
  }

  .app {
    max-width: 720px; margin: 0 auto;
    padding: 16px 16px env(safe-area-inset-bottom);
    position: relative; z-index: 1;
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column;
  }

  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; flex: 1; animation: fadeIn .35s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== Header / prompt ===== */
  .game-head {
    flex: 0 0 auto;
    text-align: center;
    padding: 8px 64px 4px;     /* leave room for the 🏠 + 🔄 buttons */
    margin-top: calc(8px + env(safe-area-inset-top));
  }
  .prompt {
    font-family: 'Itim', cursive;
    font-size: clamp(28px, 6.5vw, 46px);
    margin: 0; color: var(--brand-dark);
    text-shadow: 3px 3px 0 #fff, 5px 5px 0 rgba(0,0,0,0.07);
    line-height: 1.1;
  }
  .progress {
    margin: 8px auto 0;
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    max-width: 320px;
  }
  .dot {
    width: 16px; height: 16px; border-radius: 50%;
    background: #fff; border: 3px solid var(--card-border);
    transition: transform .25s, background .25s, border-color .25s;
  }
  .dot.done { background: var(--gold); border-color: #e0a800; transform: scale(1.1); }
  .dot.current { border-color: var(--brand); transform: scale(1.25); }

  /* ===== Cards grid ===== */
  .stage {
    flex: 1 1 auto;
    display: flex; align-items: center; justify-content: center;
    padding: 14px 4px;
    min-height: 0;
  }
  .cards {
    display: grid;
    gap: clamp(12px, 3.5vw, 22px);
    width: 100%;
    max-width: 560px;
    grid-template-columns: repeat(2, 1fr);
  }
  .cards.six { grid-template-columns: repeat(3, 1fr); max-width: 600px; }
  @media (max-width: 380px) {
    .cards.six { grid-template-columns: repeat(2, 1fr); }
  }

  .item {
    background: var(--card);
    border: 5px solid var(--card-border);
    border-radius: 28px;
    aspect-ratio: 1 / 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 6px 0 rgba(0,0,0,0.10);
    transition: transform .14s, box-shadow .14s, border-color .2s, opacity .3s, filter .3s;
    position: relative; overflow: hidden;
    min-height: 64px;
    -webkit-touch-callout: none;
  }
  .item .glyph {
    font-size: clamp(48px, 16vw, 92px);
    line-height: 1;
    pointer-events: none;
    transition: transform .2s;
  }
  .cards.six .item .glyph { font-size: clamp(40px, 13vw, 76px); }
  .item:active { transform: scale(0.95) translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.10); }
  .item:hover { border-color: var(--brand); }

  .item.wrong { animation: wiggle .45s ease; border-color: var(--bad); }
  @keyframes wiggle {
    0%,100% { transform: translateX(0) rotate(0); }
    15% { transform: translateX(-10px) rotate(-4deg); }
    30% { transform: translateX(10px) rotate(4deg); }
    45% { transform: translateX(-8px) rotate(-3deg); }
    60% { transform: translateX(8px) rotate(3deg); }
    80% { transform: translateX(-4px) rotate(-1deg); }
  }

  .item.dim { opacity: 0.32; filter: grayscale(0.7); }

  .item.correct {
    border-color: var(--good);
    box-shadow: 0 0 0 6px var(--gold), 0 6px 0 rgba(0,0,0,0.10);
    animation: pop .6s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 5;
  }
  .item.correct .glyph { transform: scale(1.15); }
  @keyframes pop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.22) rotate(4deg); }
    70%  { transform: scale(1.05) rotate(-2deg); }
    100% { transform: scale(1.12) rotate(0); }
  }
  .item.faded { opacity: 0.25; }

  /* ===== Big banner overlay (verbatim pattern from coloring) ===== */
  .overlay-msg {
    position: fixed; inset: 0;
    display: none; align-items: center; justify-content: center;
    pointer-events: none; z-index: 100;
    font-family: 'Itim', cursive; color: #fff; text-align: center;
  }
  .overlay-msg.shown { display: flex; }
  .overlay-msg .msg {
    background: var(--brand); border: 4px solid #fff; border-radius: 32px;
    padding: 28px 48px; font-size: clamp(40px, 7.5vw, 70px); line-height: 1.1;
    box-shadow: 0 8px 0 rgba(0,0,0,0.18);
    animation: msgPop .5s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-shadow: 3px 3px 0 var(--brand-dark);
    max-width: 90vw;
  }
  .overlay-msg .msg.win {
    background: var(--gold); color: var(--ink);
    text-shadow: 3px 3px 0 #fff, 4px 4px 0 rgba(0,0,0,0.15);
  }
  @keyframes msgPop {
    0%   { transform: scale(0.4) rotate(-6deg); opacity: 0; }
    60%  { transform: scale(1.1) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  .confetti {
    position: fixed; top: -20px;
    width: 12px; height: 18px;
    z-index: 90; pointer-events: none;
    animation: fall linear forwards;
  }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

  /* ===== Home + Replay buttons ===== */
  .home-btn, .replay-btn {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #fff; border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    align-items: center; justify-content: center;
    font-size: 24px; text-decoration: none; color: var(--ink);
    z-index: 60;
    transition: transform .12s;
    font-family: inherit; padding: 0; cursor: pointer;
  }
  .home-btn { left: 12px; display: flex; font-size: 26px; }
  .replay-btn { right: 12px; display: flex; font-size: 24px; }
  .home-btn:active, .replay-btn:active { transform: scale(0.92); }
</style>
</head>
<body>
<a class="home-btn" href="../" aria-label="กลับหน้าหลัก">🏠</a>
<button class="replay-btn" id="replayBtn" type="button" aria-label="เล่นใหม่">🔄</button>

<div class="app">
  <section id="playScreen" class="screen active">
    <header class="game-head">
      <h1 class="prompt">อันไหนไม่เข้าพวก?</h1>
      <div class="progress" id="progress"></div>
    </header>
    <div class="stage">
      <div class="cards" id="cards"></div>
    </div>
  </section>
</div>

<div id="overlayMsg" class="overlay-msg"></div>

<script>
'use strict';

// ============================================================================
// ROUND DATA — each round: exactly ONE odd item; the other 3 (or 5) share a
// property. `rule` is just a tag for variety; the kid never reads it.
// Each card: { e: emoji, size?: number(%), odd?: true }
// Curated so every round has exactly one clear, unambiguous answer.
// ============================================================================

// CATEGORY — three of one kind + one intruder
const CATEGORY = [
  ['🍎','🍌','🍇','🚗'],   // fruits + vehicle
  ['🐶','🐱','🐰','🌻'],   // animals + flower
  ['🚗','🚌','🚓','🍕'],   // vehicles + food
  ['🦋','🐝','🐞','⚽'],   // bugs + ball
  ['🍕','🍔','🌭','🐸'],   // food + frog
  ['⭐','🌙','☀️','🐟'],   // sky + fish
  ['🌸','🌺','🌻','🐢'],   // flowers + turtle
  ['🐠','🐬','🦀','🚀'],   // sea + rocket
  ['🎸','🥁','🎺','🍦'],   // instruments + ice cream
  ['👕','👗','👖','🐧'],   // clothes + penguin
  ['🏀','⚽','🎾','🍓'],   // balls + strawberry
  ['🚂','✈️','🚁','🐘'],   // transport + elephant
];

// COLOR — same idea/shape repeated; three share a color, one differs
const COLOR = [
  ['🔴','🔴','🔴','🔵'],
  ['🟦','🟦','🟦','🟥'],
  ['🟢','🟢','🟢','🟡'],
  ['❤️','❤️','❤️','💙'],
  ['🟣','🟣','🟣','🟠'],
  ['🍎','🍎','🍎','🍏'],   // red apples + green apple
  ['💛','💛','💛','💚'],
  ['🟧','🟧','🟧','🟪'],
  ['🔵','🔵','🔵','🟤'],
  ['💗','💗','💗','🖤'],
];

// SIZE — same emoji, three small + one big (or three big + one small)
const SIZE = [
  ['⭐','⭐','⭐','⭐'],
  ['🐶','🐶','🐶','🐶'],
  ['🍎','🍎','🍎','🍎'],
  ['🎈','🎈','🎈','🎈'],
  ['🌸','🌸','🌸','🌸'],
  ['🚗','🚗','🚗','🚗'],
  ['🐟','🐟','🐟','🐟'],
  ['❤️','❤️','❤️','❤️'],
];

// LIVING vs NON-LIVING — three living + one object (or reverse)
const LIVING = [
  ['🐶','🐱','🦜','🪑'],   // animals + chair
  ['🌳','🌷','🐛','🚲'],   // living + bicycle
  ['🐠','🐢','🦆','⚙️'],   // animals + gear
  ['🚗','🏠','📺','🐈'],   // objects + cat
  ['⚽','🎒','✏️','🐝'],   // objects + bee
  ['🦋','🐞','🐌','🧸'],   // bugs + teddy
  ['🌻','🌵','🍄','🔔'],   // plants + bell
  ['🪨','💡','🔑','🐸'],   // objects + frog
];

// SHAPE family — three round things + one not (or three pointy + one round)
const SHAPE = [
  ['⚽','🏀','🍊','📦'],   // round + box
  ['🔴','🟠','🟡','🔺'],   // circles + triangle
  ['🌕','🍩','⭕','⬛'],   // round + square
  ['🟥','🟦','🟩','🔵'],   // squares + circle
  ['🥚','🔵','🟠','⭐'],   // round + star
  ['🍪','🪙','🍩','📐'],   // round + ruler/triangle
  ['🔶','🔷','🔺','🟡'],   // angular + round
];

const RULES = [
  { key: 'category', data: CATEGORY, kind: 'pick' },
  { key: 'color',    data: COLOR,    kind: 'pick' },
  { key: 'size',     data: SIZE,     kind: 'size' },
  { key: 'living',   data: LIVING,   kind: 'pick' },
  { key: 'shape',    data: SHAPE,    kind: 'pick' },
];

// Rotation order so rule types alternate; repeats with reshuffled rounds.
const RULE_ORDER = ['category', 'color', 'size', 'living', 'category', 'shape', 'color', 'size'];

const TOTAL_ROUNDS = RULE_ORDER.length;
const PRAISE = ['เก่งมาก! 🌟', 'ถูกต้อง! 🎉', 'เยี่ยม! 👏', 'สุดยอด! ✨', 'หาเจอแล้ว! 🥳'];
const PROGRESS_KEY = 'oddOneOutProgress';

// ============================================================================
// STATE
// ============================================================================
const state = {
  round: 0,          // 0-based index into RULE_ORDER
  cards: [],         // [{ e, size, odd }] in display order
  oddIndex: -1,      // index in state.cards that is the odd one
  misses: 0,
  locked: false,
  hintShown: false,
  bagByRule: {},     // rule.key -> shuffled queue of round indices (avoid repeats)
  pendingTimers: [],
};

// ============================================================================
// DOM
// ============================================================================
const $ = (id) => document.getElementById(id);
const cardsEl = $('cards');
const progressEl = $('progress');
const overlay = $('overlayMsg');

// ============================================================================
// AUDIO — reused verbatim from coloring (ensureAudio / playWin) + a buzz tone
// ============================================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
}
function playWin() {
  [523, 659, 784].forEach((f,i) => setTimeout(() => {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'triangle';
    o.frequency.value = f;
    o.connect(g).connect(audioCtx.destination);
    const t = audioCtx.currentTime, d = 0.22;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.18, t + 0.01);
    g.gain.linearRampToValueAtTime(0, t + d);
    o.start(t); o.stop(t + d + 0.02);
  }, i * 110));
}
function playBuzz() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sawtooth';
  o.frequency.value = 150;
  o.connect(g).connect(audioCtx.destination);
  const t = audioCtx.currentTime, d = 0.18;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.12, t + 0.01);
  g.gain.linearRampToValueAtTime(0, t + d);
  o.frequency.setValueAtTime(150, t);
  o.frequency.linearRampToValueAtTime(90, t + d);
  o.start(t); o.stop(t + d + 0.02);
}
function playTap() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.value = 520;
  o.connect(g).connect(audioCtx.destination);
  const t = audioCtx.currentTime, d = 0.07;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.08, t + 0.005);
  g.gain.linearRampToValueAtTime(0, t + d);
  o.start(t); o.stop(t + d + 0.02);
}

// ============================================================================
// UTIL — buzz / confetti / overlay reused verbatim from coloring
// ============================================================================
function buzz(p) { if (navigator.vibrate) navigator.vibrate(p); }
function later(fn, ms) {
  const id = setTimeout(fn, ms);
  state.pendingTimers.push(id);
  return id;
}
function clearTimers() {
  for (const id of state.pendingTimers) clearTimeout(id);
  state.pendingTimers = [];
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function flashOverlay(text, ms, extra) {
  overlay.classList.add('shown');
  overlay.innerHTML = `<div class="msg ${extra || ''}">${text}</div>`;
  later(() => { overlay.classList.remove('shown'); overlay.innerHTML = ''; }, ms);
}

function celebrate(n) {
  const colors = ['#ff6b9d', '#ffd93d', '#7ed957', '#5bc0eb', '#ff914d', '#b388ff'];
  for (let i = 0; i < n; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = Math.random() * 0.6 + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    if (Math.random() > 0.5) c.style.borderRadius = '50%';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

// ============================================================================
// ROUND BUILDING
// ============================================================================
function ruleForRound(roundIdx) {
  const key = RULE_ORDER[roundIdx % RULE_ORDER.length];
  return RULES.find(r => r.key === key);
}

// Draw a round from a rule without repeating until its bag empties.
function drawRoundFrom(rule) {
  if (!state.bagByRule[rule.key] || state.bagByRule[rule.key].length === 0) {
    state.bagByRule[rule.key] = shuffle(rule.data.map((_, i) => i));
  }
  const idx = state.bagByRule[rule.key].pop();
  return rule.data[idx];
}

function buildRound(roundIdx) {
  const rule = ruleForRound(roundIdx);
  const raw = drawRoundFrom(rule);          // array of emoji; last one is "odd" by data convention
  let cards;

  if (rule.kind === 'size') {
    // Same emoji at four sizes: three small + one big (randomly which is big).
    const e = raw[0];
    const bigFirst = Math.random() < 0.5;   // sometimes 3 big + 1 small for variety
    cards = raw.map(() => ({ e, size: bigFirst ? 168 : 78, odd: false }));
    const oddPos = Math.floor(Math.random() * cards.length);
    cards[oddPos] = { e, size: bigFirst ? 78 : 168, odd: true };
  } else {
    // Data convention: the LAST emoji in the row is the odd one.
    cards = raw.map((e, i) => ({ e, size: 100, odd: i === raw.length - 1 }));
  }

  // For later rounds, optionally expand to 6 cards (add 2 more "same" items).
  if (roundIdx >= 4 && rule.kind !== 'size' && cards.length === 4) {
    const sameOnes = cards.filter(c => !c.odd);
    if (sameOnes.length >= 1) {
      cards.push({ ...sameOnes[0] });
      cards.push({ ...sameOnes[Math.min(1, sameOnes.length - 1)] });
    }
  }
  if (roundIdx >= 4 && rule.kind === 'size' && cards.length === 4) {
    const sm = cards.find(c => !c.odd);
    cards.push({ ...sm });
    cards.push({ ...sm });
  }

  cards = shuffle(cards);
  state.cards = cards;
  state.oddIndex = cards.findIndex(c => c.odd);
  state.misses = 0;
  state.hintShown = false;
  state.locked = false;
}

// ============================================================================
// RENDER
// ============================================================================
function renderProgress() {
  progressEl.innerHTML = '';
  for (let i = 0; i < TOTAL_ROUNDS; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < state.round ? ' done' : '') + (i === state.round ? ' current' : '');
    progressEl.appendChild(d);
  }
}

function renderCards() {
  cardsEl.innerHTML = '';
  cardsEl.classList.toggle('six', state.cards.length === 6);
  state.cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'item';
    el.dataset.idx = String(i);
    const g = document.createElement('span');
    g.className = 'glyph';
    g.textContent = card.e;
    if (card.size && card.size !== 100) g.style.fontSize = card.size + '%';
    el.appendChild(g);
    el.addEventListener('pointerdown', onCardTap, { passive: false });
    cardsEl.appendChild(el);
  });
}

function startRound() {
  clearTimers();
  if (overlay) { overlay.classList.remove('shown'); overlay.innerHTML = ''; }
  buildRound(state.round);
  renderProgress();
  renderCards();
}

// ============================================================================
// INTERACTION
// ============================================================================
function onCardTap(e) {
  e.preventDefault();
  ensureAudio();
  if (state.locked) return;
  const el = e.currentTarget;
  const idx = parseInt(el.dataset.idx, 10);

  if (idx === state.oddIndex) {
    correctPick(el);
  } else {
    wrongPick(el);
  }
}

function correctPick(el) {
  state.locked = true;
  playTap();
  el.classList.add('correct');
  // fade the others
  for (const other of cardsEl.querySelectorAll('.item')) {
    if (other !== el) other.classList.add('faded');
  }
  buzz([30, 25, 50]);
  playWin();
  celebrate(90);
  const praise = PRAISE[Math.floor(Math.random() * PRAISE.length)];
  flashOverlay(praise, 1300, 'win');
  saveProgress();

  later(() => {
    state.round++;
    if (state.round >= TOTAL_ROUNDS) {
      finishGame();
    } else {
      startRound();
    }
  }, 1450);
}

function wrongPick(el) {
  playBuzz();
  buzz(40);
  el.classList.remove('wrong');
  void el.offsetWidth;        // restart animation
  el.classList.add('wrong');
  later(() => el.classList.remove('wrong'), 500);

  state.misses++;
  // After 2 misses, dim the matching group as a hint (everything but the odd one).
  if (state.misses >= 2 && !state.hintShown) {
    state.hintShown = true;
    const items = cardsEl.querySelectorAll('.item');
    items.forEach((it, i) => {
      if (i !== state.oddIndex) it.classList.add('dim');
    });
  }
}

// ============================================================================
// FINISH — full set done, then auto-restart a fresh shuffled set (no dead end)
// ============================================================================
function finishGame() {
  renderProgress();
  flashOverlay('เก่งมากเลย! 🏆', 1800, 'win');
  playWin();
  celebrate(160);
  buzz([40, 30, 60, 30, 80]);
  later(() => {
    state.round = 0;
    startRound();
  }, 2000);
}

// ============================================================================
// PERSISTENCE — count completed rounds (no PII)
// ============================================================================
function saveProgress() {
  let n = 0;
  try { n = parseInt(localStorage.getItem(PROGRESS_KEY) || '0', 10) || 0; } catch (e) {}
  try { localStorage.setItem(PROGRESS_KEY, String(n + 1)); } catch (e) {}
}

// ============================================================================
// REPLAY button — restart from round 1 with a fresh shuffle
// ============================================================================
$('replayBtn').addEventListener('click', () => {
  ensureAudio();
  buzz(20);
  state.bagByRule = {};
  state.round = 0;
  startRound();
});

// ============================================================================
// Block double-tap zoom (reused verbatim from coloring)
// ============================================================================
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd < 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

// ============================================================================
// INIT
// ============================================================================
startRound();
</script>
</body>
</html>
