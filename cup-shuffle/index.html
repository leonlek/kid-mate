<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🥤 อยู่ไหน — เกมสำหรับเด็ก</title>
<meta name="description" content="เกมหาของใต้ถ้วยที่สับ ฝึกสายตาและความจำสำหรับเด็ก">
<meta name="theme-color" content="#ff6b9d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="อยู่ไหน">
<meta name="mobile-web-app-capable" content="yes">

<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../icons/icon.svg">
<link rel="manifest" href="../manifest.webmanifest">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Itim&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-3: #b5e8ff; --grass-1: #7ed957;
    --brand: #ff6b9d; --brand-dark: #e54b82;
    --gold: #ffd93d; --good: #5bc13a; --good-dark: #3fa024;
    --bad: #ff5757; --bad-dark: #d83838;
    --ink: #2d3436; --card: #ffffff; --card-border: #ffd6e4;
    --cup-1: #ff6b6b; --cup-2: #c92a2a;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Mitr', -apple-system, sans-serif;
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 10%, #fff9c4 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, #ffcfd2 0%, transparent 45%),
      linear-gradient(180deg, var(--sky-3) 0%, #d9f3c9 65%, var(--grass-1) 100%);
    background-attachment: fixed;
    user-select: none;
    -webkit-user-select: none;
  }
  body::before {
    content: '☁️ ☁️     ☁️';
    position: fixed; top: 20px; left: 0; right: 0;
    text-align: center; font-size: 42px;
    opacity: 0.55; pointer-events: none;
    letter-spacing: 80px;
    animation: drift 40s linear infinite;
    z-index: 0;
  }
  @keyframes drift {
    from { transform: translateX(-10%); }
    to { transform: translateX(10%); }
  }

  .app { max-width: 880px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
  body:has(#gameScreen.active) .app {
    max-width: 100%; padding: 0; height: 100vh; height: 100dvh;
  }
  body:has(#gameScreen.active)::before { display: none; }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn .35s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero { text-align: center; padding: 14px 10px 24px; }
  .hero h1 {
    font-family: 'Itim', cursive;
    font-size: clamp(42px, 9vw, 68px);
    margin: 0; color: var(--brand-dark);
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
    letter-spacing: 1px;
  }
  .hero p {
    font-size: clamp(16px, 3.4vw, 22px);
    margin: 12px 0 0; color: #555; font-weight: 500;
  }

  .speed-row {
    display: flex; justify-content: center; align-items: center;
    gap: 10px; margin: 8px 0 18px; flex-wrap: wrap;
  }
  .speed-label {
    font-family: 'Itim', cursive; font-size: 22px;
    color: var(--brand-dark); margin-right: 4px;
    text-shadow: 2px 2px 0 #fff;
  }
  .speed-pill {
    font-family: inherit; font-size: 18px; font-weight: 600;
    padding: 10px 22px; border: 3px solid #fff; border-radius: 999px;
    background: #fff; color: #777; cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.08);
    transition: transform .12s, background .15s, color .15s, box-shadow .12s;
    min-width: 92px;
  }
  .speed-pill:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.08); }
  .speed-pill.active {
    background: var(--brand); color: #fff; border-color: #fff;
    box-shadow: 0 4px 0 var(--brand-dark);
  }

  .lgrid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px; margin: 10px 0 32px;
  }
  .lcard {
    background: var(--card); border: 4px solid var(--card-border);
    border-radius: 24px; padding: 22px 14px 18px; text-align: center;
    cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.07);
    transition: transform .15s, box-shadow .15s, border-color .15s;
    position: relative; overflow: hidden;
  }
  .lcard:active { transform: scale(0.96) translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.07); }
  .lcard:hover { border-color: var(--brand); }
  .lcard .preview {
    display: flex; justify-content: center; align-items: end; gap: 6px;
    height: 70px; margin-bottom: 8px;
  }
  .lcard .preview .mini-cup {
    width: 22px; height: 32px;
    background: linear-gradient(180deg, var(--cup-1), var(--cup-2));
    clip-path: polygon(10% 0, 90% 0, 78% 100%, 22% 100%);
    filter: drop-shadow(1px 2px 0 rgba(0,0,0,0.15));
  }
  .lcard .ltitle {
    font-family: 'Itim', cursive; font-size: 26px;
    color: var(--brand-dark); text-shadow: 2px 2px 0 #fff;
  }
  .lcard .lsub { font-size: 14px; color: #777; font-weight: 500; margin-top: 4px; }
  .lcard .stars {
    position: absolute; top: 10px; right: 10px;
    font-size: 18px; letter-spacing: 1px;
  }

  /* Game screen */
  #gameScreen.active {
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .status-banner {
    flex: 0 0 auto;
    margin: 12px 14px 0;
    border-radius: 22px; padding: 14px 20px;
    background: linear-gradient(180deg, #fff8c8, #ffe88a);
    border: 4px solid #fff;
    box-shadow: 0 5px 0 rgba(0,0,0,0.10);
    text-align: center; line-height: 1.1;
    font-family: 'Itim', cursive;
    font-size: clamp(28px, 5.5vw, 42px);
    color: #6b4f00;
    text-shadow: 2px 2px 0 rgba(255,255,255,0.7);
    transition: transform .25s, background .3s, color .3s;
  }
  .status-banner.win { background: linear-gradient(180deg, #c8f3a0, #9ce070); color: #1f5b13; }
  .status-banner.fail { background: linear-gradient(180deg, #ffcfd2, #ff9c9c); color: #6b1515; }
  .status-banner.flash { transform: scale(1.04); box-shadow: 0 0 0 6px var(--gold), 0 8px 0 rgba(0,0,0,0.10); }

  .hud {
    flex: 0 0 auto; display: flex; justify-content: space-between;
    align-items: center; gap: 8px;
    margin: 10px 14px 0;
    font-family: 'Itim', cursive; font-size: 22px;
  }
  .hud-item {
    background: #fff; border: 3px solid var(--card-border);
    border-radius: 999px; padding: 6px 16px;
    box-shadow: 0 3px 0 rgba(0,0,0,0.08);
    min-width: 90px; text-align: center;
  }
  .hud-item.score { color: var(--good-dark); font-size: 26px; }

  .play-area {
    flex: 1 1 auto;
    display: flex; align-items: center; justify-content: center;
    padding: 12px; min-height: 0;
    position: relative;
  }
  .cups-row {
    position: relative;
    width: 100%; max-width: 760px;
    height: 100%;
    min-height: 280px;
  }

  .cup {
    position: absolute;
    bottom: 60px;
    left: 0;
    width: var(--cup-w, 100px);
    height: calc(var(--cup-w, 100px) * 1.3);
    cursor: pointer;
    will-change: transform;
    touch-action: manipulation;
  }
  .cup-shape {
    width: 100%; height: 100%;
    background: linear-gradient(180deg, var(--cup-1), var(--cup-2) 75%, #800000 100%);
    clip-path: polygon(8% 0, 92% 0, 80% 100%, 20% 100%);
    filter: drop-shadow(3px 5px 0 rgba(0,0,0,0.25));
    position: relative;
  }
  .cup-shape::before {
    content: '';
    position: absolute;
    top: 0; left: 8%; right: 8%; height: 14px;
    background: linear-gradient(180deg, rgba(0,0,0,0.25), transparent);
    border-radius: 50% / 100%;
  }
  .cup.tappable { cursor: pointer; }
  .cup.tappable:active .cup-shape { filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.25)) brightness(1.1); }
  .cup.lifted {
    transition: transform .35s cubic-bezier(0.34, 1.56, 0.64, 1);
    /* combined translate from base + lift */
    /* We always set inline transform to "translate(Xpx, 0px)" and add lift via inner */
  }
  .cup.lifted .cup-shape {
    animation: cupLift .35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes cupLift {
    0%   { transform: translateY(0) rotate(0); }
    100% { transform: translateY(-110px) rotate(-12deg); }
  }
  .cup.dropping .cup-shape {
    animation: cupDrop .25s ease-in forwards;
  }
  @keyframes cupDrop {
    0%   { transform: translateY(-110px) rotate(-12deg); }
    100% { transform: translateY(0) rotate(0); }
  }
  .cup.wrong .cup-shape {
    animation: cupShake .3s ease;
  }
  @keyframes cupShake {
    0%, 100% { transform: translateY(0) rotate(0); }
    25% { transform: translateY(-4px) rotate(-6deg); }
    75% { transform: translateY(-4px) rotate(6deg); }
  }

  .ball {
    position: absolute;
    bottom: 60px;
    left: 0;
    width: var(--cup-w, 100px);
    text-align: center;
    font-size: calc(var(--cup-w, 100px) * 0.55);
    line-height: 1;
    transform: translateY(-2px);
    pointer-events: none;
    z-index: 2;
    transition: opacity .2s;
  }
  .ball.hidden { opacity: 0; }

  /* Big banner overlay */
  .overlay-msg {
    position: fixed; inset: 0;
    display: none; align-items: center; justify-content: center;
    pointer-events: none; z-index: 100;
    font-family: 'Itim', cursive; color: #fff; text-align: center;
  }
  .overlay-msg.shown { display: flex; }
  .overlay-msg .msg {
    background: var(--brand); border: 4px solid #fff; border-radius: 32px;
    padding: 28px 48px; font-size: clamp(44px, 8vw, 80px); line-height: 1.1;
    box-shadow: 0 8px 0 rgba(0,0,0,0.18);
    animation: msgPop .5s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-shadow: 3px 3px 0 var(--brand-dark);
    max-width: 90vw;
  }
  .overlay-msg .msg.go { background: var(--good); text-shadow: 3px 3px 0 var(--good-dark); }
  .overlay-msg .msg.win {
    background: var(--gold); color: var(--ink);
    text-shadow: 3px 3px 0 #fff, 4px 4px 0 rgba(0,0,0,0.15);
  }
  @keyframes msgPop {
    0%   { transform: scale(0.4) rotate(-6deg); opacity: 0; }
    60%  { transform: scale(1.1) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  /* Results */
  #resultsScreen { text-align: center; padding-top: 20px; }
  .trophy {
    font-size: clamp(120px, 22vw, 180px); line-height: 1;
    filter: drop-shadow(4px 6px 0 rgba(0,0,0,0.18));
    animation: bobBig 1.2s ease-in-out infinite;
  }
  @keyframes bobBig {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-12px) rotate(4deg); }
  }
  .winner-name {
    font-family: 'Itim', cursive;
    font-size: clamp(44px, 9vw, 72px);
    color: var(--brand-dark); margin: 18px 0 6px;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
  }
  .winner-sub {
    font-size: clamp(18px, 4vw, 24px);
    color: #555; margin: 0 0 6px; font-weight: 500;
  }
  .stars-row {
    font-size: clamp(48px, 10vw, 72px); line-height: 1;
    margin: 8px 0 4px; letter-spacing: 4px;
    filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.12));
  }
  .rating-text {
    font-family: 'Itim', cursive;
    font-size: clamp(28px, 6vw, 40px);
    color: var(--brand-dark); margin: 4px 0 16px;
  }
  .action-bar {
    display: flex; gap: 12px; justify-content: center; align-items: center;
    margin-top: 12px; flex-wrap: wrap;
  }
  .btn-main {
    font-family: 'Itim', cursive;
    font-size: 28px; padding: 16px 36px;
    border: 4px solid #fff; border-radius: 999px;
    background: var(--brand); color: #fff;
    box-shadow: 0 6px 0 var(--brand-dark);
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
    text-shadow: 2px 2px 0 var(--brand-dark);
  }
  .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--brand-dark); }
  .btn-ghost {
    font-family: 'Itim', cursive;
    font-size: 24px; padding: 14px 30px;
    border: 4px solid var(--brand); border-radius: 999px;
    background: #fff; color: var(--brand-dark);
    box-shadow: 0 5px 0 rgba(0,0,0,0.12);
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
  }
  .btn-ghost:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }

  .confetti {
    position: fixed; top: -20px;
    width: 12px; height: 18px;
    z-index: 90; pointer-events: none;
    animation: fall linear forwards;
  }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

  .home-btn {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    left: 12px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #fff; border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; text-decoration: none; z-index: 60;
    transition: transform .12s;
  }
  .home-btn:active { transform: scale(0.92); }

  @media (max-width: 480px) {
    .lcard { padding: 16px 10px 14px; border-width: 3px; border-radius: 20px; }
    .lcard .ltitle { font-size: 22px; }
    .status-banner { padding: 10px 14px; margin: 8px 8px 0; }
    .hud { font-size: 18px; margin: 8px 10px 0; }
    .hud-item { padding: 5px 12px; min-width: 70px; }
    .play-area { padding: 8px; }
  }
  @media (min-width: 768px) {
    .lgrid { grid-template-columns: repeat(4, 1fr); gap: 18px; }
    .status-banner { padding: 18px 24px; }
    .hud { font-size: 26px; }
    .hud-item { padding: 8px 22px; min-width: 110px; }
    .hud-item.score { font-size: 30px; }
  }
</style>
</head>
<body>
<a class="home-btn" href="../" aria-label="กลับหน้าหลัก">🏠</a>
<div class="app">

  <section id="selectScreen" class="screen active">
    <header class="hero">
      <h1>🥤 อยู่ไหน</h1>
      <p>ดูว่าของอยู่ใต้ถ้วยไหน — ถ้วยจะสับ!<br/><small style="font-size:.85em;color:#888">10 รอบต่อระดับ</small></p>
    </header>

    <div class="speed-row" id="speedRow">
      <div class="speed-label">ความเร็วสับ:</div>
      <button class="speed-pill" data-speed="slow" type="button">🐢 ช้า</button>
      <button class="speed-pill active" data-speed="medium" type="button">🐇 กลาง</button>
      <button class="speed-pill" data-speed="fast" type="button">⚡ เร็ว</button>
    </div>

    <div id="levelGrid" class="lgrid"></div>
  </section>

  <section id="gameScreen" class="screen">
    <div id="statusBanner" class="status-banner">ดูตำแหน่งให้ดี...</div>
    <div class="hud">
      <div class="hud-item">รอบ <span id="roundNum">1</span> / <span id="totalRounds">10</span></div>
      <div class="hud-item score">✅ <span id="scoreCount">0</span></div>
    </div>
    <div class="play-area">
      <div class="cups-row" id="cupsRow"></div>
    </div>
  </section>

  <section id="resultsScreen" class="screen">
    <div class="trophy">🏆</div>
    <h2 id="resultScore" class="winner-name">ถูก 0 / 10</h2>
    <p id="resultSub" class="winner-sub">—</p>
    <div id="resultStars" class="stars-row">⭐</div>
    <div id="resultText" class="rating-text">ลองอีกที!</div>
    <div class="action-bar">
      <button id="againBtn" class="btn-ghost">🔄 เล่นอีก</button>
      <button id="newBtn" class="btn-main">เลือกใหม่</button>
    </div>
  </section>

</div>

<div id="overlayMsg" class="overlay-msg"></div>

<script>
'use strict';

// ============================================================================
// LEVELS
// ============================================================================
const LEVELS = [
  { id: 1, stars: 1, name: '3 ถ้วย ง่าย', subtitle: 'สำหรับ 3-4 ขวบ', numCups: 3, shuffles: 5,  cupSpeedMs: 720 },
  { id: 2, stars: 1, name: '3 ถ้วย กลาง', subtitle: 'สับมากขึ้น',     numCups: 3, shuffles: 8,  cupSpeedMs: 600 },
  { id: 3, stars: 2, name: '4 ถ้วย',      subtitle: 'ตามให้ทัน',      numCups: 4, shuffles: 10, cupSpeedMs: 540 },
  { id: 4, stars: 3, name: '5 ถ้วย',      subtitle: 'เกือบ Las Vegas', numCups: 5, shuffles: 14, cupSpeedMs: 480 },
];

const ROUNDS_PER_LEVEL = 10;

const SPEED_LEVELS = {
  slow:   1.5,
  medium: 1.0,
  fast:   0.65,
};
const SPEED_KEY = 'cupShuffleSpeed';

// ============================================================================
// STATE
// ============================================================================
const state = {
  level: null,
  speed: 'medium',
  score: 0,
  round: 0,
  cups: [],          // [{ id, el }]
  positions: [],     // positions[slotIdx] = cupId
  ballCupId: -1,
  phase: 'idle',     // idle | showing | shuffling | choosing | revealing
  pickedCupId: null,
  busy: false,
  pendingTimers: [],
};

// ============================================================================
// AUDIO
// ============================================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
}
function tone(freq, ms, type='sine', vol=0.22) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  o.connect(g).connect(audioCtx.destination);
  const t = audioCtx.currentTime, d = ms/1000;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.01);
  g.gain.linearRampToValueAtTime(0, t + d);
  o.start(t); o.stop(t + d + 0.02);
}
function playSwap()  { tone(180 + Math.random()*60, 80, 'triangle', 0.12); }
function playReveal(){ tone(440, 100, 'sine', 0.15); setTimeout(()=>tone(660, 200, 'sine', 0.18), 80); }
function playWin()   { [523, 659, 784].forEach((f,i) => setTimeout(()=>tone(f, 180, 'triangle', 0.20), i*100)); }
function playFail()  { tone(330, 90, 'sawtooth', 0.18); setTimeout(()=>tone(160, 220, 'sawtooth', 0.16), 90); }

// ============================================================================
// DOM
// ============================================================================
const $ = (id) => document.getElementById(id);
const screens = {
  select:  $('selectScreen'),
  game:    $('gameScreen'),
  results: $('resultsScreen'),
};
const levelGrid    = $('levelGrid');
const statusBanner = $('statusBanner');
const cupsRow      = $('cupsRow');
const overlay      = $('overlayMsg');
const roundNum     = $('roundNum');
const scoreCount   = $('scoreCount');

// ============================================================================
// UTIL
// ============================================================================
function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function buzz(p)   { if (navigator.vibrate) navigator.vibrate(p); }
function showScreen(name) { for (const k of Object.keys(screens)) screens[k].classList.toggle('active', k===name); }
function speedMul()  { return SPEED_LEVELS[state.speed] || 1; }
function sleep(ms)   { return new Promise(r => state.pendingTimers.push(setTimeout(r, ms))); }
function clearTimers(){ for (const id of state.pendingTimers) clearTimeout(id); state.pendingTimers = []; }
function setStatus(text, mood) {
  statusBanner.textContent = text;
  statusBanner.className = 'status-banner ' + (mood || '');
  statusBanner.classList.add('flash');
  setTimeout(()=>statusBanner.classList.remove('flash'), 350);
}

// ============================================================================
// SELECT
// ============================================================================
function renderLevels() {
  levelGrid.innerHTML = '';
  for (const lvl of LEVELS) {
    const c = document.createElement('div');
    c.className = 'lcard';
    const stars = '⭐'.repeat(lvl.stars);
    const cupsHtml = Array(lvl.numCups).fill('<div class="mini-cup"></div>').join('');
    c.innerHTML = `
      <div class="stars">${stars}</div>
      <div class="preview">${cupsHtml}</div>
      <div class="ltitle">${lvl.name}</div>
      <div class="lsub">${lvl.subtitle}</div>
    `;
    c.addEventListener('click', () => { ensureAudio(); startGame(lvl); });
    levelGrid.appendChild(c);
  }
}

// ============================================================================
// GAME
// ============================================================================
function startGame(level) {
  state.level = level;
  state.score = 0;
  state.round = 0;
  scoreCount.textContent = '0';
  showScreen('game');
  // Defer first round by one frame so layout settles
  requestAnimationFrame(() => requestAnimationFrame(() => newRound()));
}

async function newRound() {
  if (state.busy) return;
  state.busy = true;
  state.round += 1;
  state.pickedCupId = null;
  state.phase = 'showing';
  roundNum.textContent = state.round;
  setupCups();
  // Choose ball cup, lift it, show ball
  state.ballCupId = Math.floor(Math.random() * state.level.numCups);
  liftCup(state.ballCupId);
  showBallUnder(state.ballCupId);
  setStatus('ดูตำแหน่งให้ดี...', '');
  await sleep(1700);
  // Drop cup over ball, hide ball
  dropCup(state.ballCupId);
  hideBall();
  await sleep(450);
  // Shuffle
  state.phase = 'shuffling';
  setStatus('สับ! 🌀', '');
  await shuffle();
  // Choose
  state.phase = 'choosing';
  setStatus('อยู่ไหน? 🤔', '');
  for (const c of state.cups) c.el.classList.add('tappable');
  state.busy = false;
}

function setupCups() {
  cupsRow.innerHTML = '';
  state.cups = [];
  state.positions = [];
  // Compute cup width based on container width and number of cups
  const containerW = cupsRow.clientWidth || 720;
  const n = state.level.numCups;
  const minGap = 14, maxGap = 36;
  // Allocate ~75-85% of width to cups, rest to gaps
  let cupW = Math.min(140, (containerW - (n-1) * 24) / n);
  cupW = Math.max(60, cupW);
  let gap = (containerW - n * cupW) / Math.max(1, n - 1);
  if (n === 1) gap = 0;
  gap = Math.min(maxGap, Math.max(minGap, gap));
  cupsRow.style.setProperty('--cup-w', cupW + 'px');
  state._cupW = cupW;
  state._gap = gap;
  for (let i = 0; i < n; i++) {
    const cup = document.createElement('div');
    cup.className = 'cup';
    cup.dataset.cupId = i;
    cup.innerHTML = '<div class="cup-shape"></div><div class="ball-inner" style="display:none;">🎾</div>';
    cup.style.width = cupW + 'px';
    cup.style.height = (cupW * 1.3) + 'px';
    const x = slotX(i);
    cup.style.transform = `translate(${x}px, 0)`;
    cup.addEventListener('click', () => onCupTap(i));
    cupsRow.appendChild(cup);
    state.cups.push({ id: i, el: cup });
    state.positions.push(i);
  }
}

function slotX(slotIdx) {
  const containerW = cupsRow.clientWidth || 720;
  const n = state.level.numCups;
  const totalW = n * state._cupW + (n - 1) * state._gap;
  const startX = (containerW - totalW) / 2;
  return startX + slotIdx * (state._cupW + state._gap);
}

function liftCup(cupId) {
  const cup = state.cups[cupId];
  if (!cup) return;
  cup.el.classList.remove('dropping');
  cup.el.classList.add('lifted');
}
function dropCup(cupId) {
  const cup = state.cups[cupId];
  if (!cup) return;
  cup.el.classList.remove('lifted');
  cup.el.classList.add('dropping');
  setTimeout(() => cup.el.classList.remove('dropping'), 280);
}

function showBallUnder(cupId) {
  const cup = state.cups[cupId];
  if (!cup) return;
  // Render ball element absolutely at same x as the cup's current slot
  let ball = $('ballEl');
  if (!ball) {
    ball = document.createElement('div');
    ball.id = 'ballEl';
    ball.className = 'ball';
    ball.textContent = '🎾';
    cupsRow.appendChild(ball);
  }
  const slotIdx = state.positions.indexOf(cupId);
  const x = slotX(slotIdx);
  ball.style.transform = `translate(${x}px, 0)`;
  ball.classList.remove('hidden');
}
function hideBall() {
  const ball = $('ballEl');
  if (ball) ball.classList.add('hidden');
}
function removeBall() {
  const ball = $('ballEl');
  if (ball) ball.remove();
}

// Each shuffle picks two slots, swaps them with arc animation
async function shuffle() {
  const total = state.level.shuffles;
  const baseDur = state.level.cupSpeedMs * speedMul();
  for (let n = 0; n < total; n++) {
    const ok = await swapTwoCups(baseDur);
    if (!ok) break;
  }
}

function swapTwoCups(duration) {
  return new Promise((resolve) => {
    const numSlots = state.level.numCups;
    let i = Math.floor(Math.random() * numSlots);
    let j = Math.floor(Math.random() * numSlots);
    while (j === i) j = Math.floor(Math.random() * numSlots);
    const cupAtI = state.positions[i];
    const cupAtJ = state.positions[j];
    state.positions[i] = cupAtJ;
    state.positions[j] = cupAtI;
    const xI = slotX(i), xJ = slotX(j);
    arcAnim(state.cups[cupAtI].el, xI, xJ, 'up',   duration);
    arcAnim(state.cups[cupAtJ].el, xJ, xI, 'down', duration);
    playSwap();
    state.pendingTimers.push(setTimeout(resolve, duration + 20));
  });
}

function arcAnim(el, fromX, toX, dir, duration) {
  const peakY = dir === 'up' ? -55 : 35;
  const midX = (fromX + toX) / 2;
  if (el.animate) {
    el.animate([
      { transform: `translate(${fromX}px, 0)` },
      { transform: `translate(${midX}px, ${peakY}px)` },
      { transform: `translate(${toX}px, 0)` },
    ], { duration, easing: 'ease-in-out', fill: 'forwards' });
  }
  // After animation, lock final transform via inline style
  setTimeout(() => { el.style.transform = `translate(${toX}px, 0)`; }, duration);
}

async function onCupTap(cupId) {
  if (state.phase !== 'choosing' || state.busy) return;
  state.busy = true;
  state.pickedCupId = cupId;
  state.phase = 'revealing';
  for (const c of state.cups) c.el.classList.remove('tappable');
  liftCup(cupId);
  playReveal();
  if (cupId === state.ballCupId) {
    state.score += 1;
    scoreCount.textContent = state.score;
    showBallUnder(state.ballCupId);
    setStatus('ถูก! 🎉', 'win');
    buzz([20, 30, 20]);
    setTimeout(playWin, 200);
    await sleep(1500);
  } else {
    state.cups[cupId].el.classList.add('wrong');
    setStatus('โอ๊ะ... อยู่นี่!', 'fail');
    await sleep(450);
    liftCup(state.ballCupId);
    showBallUnder(state.ballCupId);
    buzz([60, 40, 80]);
    playFail();
    await sleep(1700);
  }
  // Drop cups, advance
  for (const c of state.cups) c.el.classList.remove('wrong');
  removeBall();
  state.busy = false;
  if (state.round >= ROUNDS_PER_LEVEL) {
    showResults();
  } else {
    newRound();
  }
}

// ============================================================================
// RESULTS
// ============================================================================
function showResults() {
  $('resultScore').textContent = `ถูก ${state.score} / ${ROUNDS_PER_LEVEL}`;
  $('resultSub').textContent   = state.level.name;
  const r = ratingFor(state.score);
  $('resultStars').textContent = r.stars;
  $('resultText').textContent  = r.text;
  showScreen('results');
  celebrate(r.confettiCount);
  buzz([60, 40, 60, 40, 100]);
}

function ratingFor(score) {
  if (score === ROUNDS_PER_LEVEL) return { stars: '🌟🌟🌟🌟🌟', text: 'ไร้ที่ติ!',  confettiCount: 160 };
  if (score >= 8)                  return { stars: '⭐⭐⭐⭐',     text: 'เก่งมาก!',  confettiCount: 120 };
  if (score >= 6)                  return { stars: '⭐⭐⭐',        text: 'เก่ง!',      confettiCount: 90  };
  if (score >= 3)                  return { stars: '⭐⭐',           text: 'ดี!',        confettiCount: 60  };
  return                                  { stars: '⭐',                text: 'ลองอีกที!',  confettiCount: 30 };
}

function celebrate(n) {
  const colors = ['#ff6b9d', '#ffd93d', '#7ed957', '#5bc0eb', '#ff914d', '#b388ff'];
  for (let i = 0; i < n; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = Math.random() * 0.8 + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    if (Math.random() > 0.5) c.style.borderRadius = '50%';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

// ============================================================================
// EVENTS
// ============================================================================
$('againBtn').addEventListener('click', () => {
  if (!state.level) { showScreen('select'); return; }
  ensureAudio();
  startGame(state.level);
});
$('newBtn').addEventListener('click', () => {
  state.level = null;
  clearTimers();
  showScreen('select');
});

let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd < 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

// Speed selector
function setSpeed(s) {
  if (!SPEED_LEVELS[s]) s = 'medium';
  state.speed = s;
  try { localStorage.setItem(SPEED_KEY, s); } catch (e) {}
  for (const btn of document.querySelectorAll('.speed-pill')) {
    btn.classList.toggle('active', btn.dataset.speed === s);
  }
}
$('speedRow').addEventListener('click', (e) => {
  const btn = e.target.closest('.speed-pill');
  if (!btn) return;
  setSpeed(btn.dataset.speed);
});

// Init
let savedSpeed = null;
try { savedSpeed = localStorage.getItem(SPEED_KEY); } catch (e) {}
setSpeed(savedSpeed || 'medium');
$('totalRounds').textContent = ROUNDS_PER_LEVEL;
renderLevels();
</script>
