<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🎮 เกมเด็ก — สนุก ฟรี เรียนรู้</title>
<meta name="description" content="รวมเกมสำหรับเด็กไทย ฟรี เล่นในเบราว์เซอร์ ไม่ต้องโหลดแอป">
<meta name="theme-color" content="#ff6b9d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="เกมเด็ก">
<meta name="mobile-web-app-capable" content="yes">

<meta property="og:type" content="website">
<meta property="og:title" content="🎮 เกมเด็ก — สนุก ฟรี เรียนรู้">
<meta property="og:description" content="รวมเกมสำหรับเด็กไทย ฟรี เล่นในเบราว์เซอร์ ไม่ต้องโหลดแอป">
<meta property="og:locale" content="th_TH">

<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon.svg">
<link rel="manifest" href="manifest.webmanifest">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Itim&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-3: #b5e8ff;
    --grass-1: #7ed957;
    --brand: #ff6b9d;
    --brand-dark: #e54b82;
    --ink: #2d3436;
    --card: #ffffff;
    --card-border: #ffd6e4;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Mitr', -apple-system, sans-serif;
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 10%, #fff9c4 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, #ffcfd2 0%, transparent 45%),
      linear-gradient(180deg, var(--sky-3) 0%, #d9f3c9 65%, var(--grass-1) 100%);
    background-attachment: fixed;
    user-select: none;
    -webkit-user-select: none;
  }
  body::before {
    content: '☁️ ☁️     ☁️';
    position: fixed; top: 20px; left: 0; right: 0;
    text-align: center; font-size: 42px;
    opacity: 0.7; pointer-events: none;
    letter-spacing: 80px;
    animation: drift 40s linear infinite;
  }
  @keyframes drift {
    from { transform: translateX(-10%); }
    to { transform: translateX(10%); }
  }

  .hub { max-width: 720px; margin: 0 auto; padding: 40px 20px 60px; position: relative; z-index: 1; }

  .hero { text-align: center; padding: 10px 10px 28px; }
  .hero h1 {
    font-family: 'Itim', 'Mitr', cursive;
    font-size: clamp(42px, 10vw, 72px);
    margin: 0;
    color: var(--brand-dark);
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
    letter-spacing: 1px;
  }
  .hero p {
    font-size: clamp(16px, 3.4vw, 22px);
    margin: 10px 0 0;
    color: #555;
    font-weight: 500;
  }

  .games {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 18px;
    margin-top: 10px;
  }

  .game-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 6px;
    background: var(--card);
    border: 4px solid var(--card-border);
    border-radius: 26px;
    padding: 28px 18px 22px;
    text-decoration: none;
    color: var(--ink);
    box-shadow: 0 6px 0 rgba(0,0,0,0.08);
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    position: relative;
    overflow: hidden;
  }
  .game-card::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 55%, rgba(0,0,0,0.03));
    pointer-events: none;
  }
  .game-card:active {
    transform: translateY(3px);
    box-shadow: 0 3px 0 rgba(0,0,0,0.08);
  }
  .game-card:hover { border-color: var(--brand); }

  .game-emoji {
    font-size: 96px;
    line-height: 1;
    filter: drop-shadow(3px 4px 0 rgba(0,0,0,0.12));
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50%      { transform: translateY(-8px) rotate(3deg); }
  }

  .game-title {
    font-family: 'Itim', cursive;
    font-size: 32px;
    color: var(--brand-dark);
    margin-top: 6px;
    text-shadow: 2px 2px 0 #fff;
  }
  .game-desc {
    font-size: 16px;
    color: #666;
    font-weight: 500;
    line-height: 1.4;
    max-width: 220px;
  }

  .game-card.soon {
    opacity: 0.62;
    cursor: default;
    pointer-events: none;
    background: #fafafa;
  }
  .game-card.soon .game-emoji { animation: none; filter: grayscale(0.3) drop-shadow(3px 4px 0 rgba(0,0,0,0.08)); }
  .soon-tag {
    position: absolute;
    top: 12px; right: 12px;
    background: #ddd;
    color: #555;
    font-family: 'Itim', cursive;
    font-size: 14px;
    padding: 4px 12px;
    border-radius: 999px;
  }

  @media (max-width: 480px) {
    .hub { padding: 30px 16px 60px; }
    .game-emoji { font-size: 80px; }
    .game-title { font-size: 28px; }
  }
</style>
</head>
<body>
  <main class="hub">
    <header class="hero">
      <h1>🎮 เกมเด็ก</h1>
      <p>เลือกเกมที่อยากเล่น</p>
    </header>

    <div class="games">
      <a class="game-card" href="./animal-race/">
        <div class="game-emoji">🏁</div>
        <div class="game-title">แข่งความเร็ว</div>
        <div class="game-desc">สัตว์ รถ เครื่องบิน อะไรเร็วที่สุด?</div>
      </a>

      <div class="game-card soon" aria-disabled="true">
        <span class="soon-tag">เร็วๆ นี้</span>
        <div class="game-emoji">✨</div>
        <div class="game-title">เกมใหม่</div>
        <div class="game-desc">กำลังคิดอยู่... มีอะไรอยากเล่นบ้าง?</div>
      </div>
    </div>
  </main>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => { /* ignore — hub still works online */ });
    });
  }
</script>
</body>
</html>
