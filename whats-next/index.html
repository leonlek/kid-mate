<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🧩 อะไรต่อไป — เกมสำหรับเด็ก</title>
<meta name="description" content="เกมหาว่าอะไรมาต่อ ฝึกการสังเกตแบบแผนและตรรกะเบื้องต้นสำหรับเด็ก">
<meta name="theme-color" content="#ff6b9d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="อะไรต่อไป">
<meta name="mobile-web-app-capable" content="yes">

<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../icons/icon.svg">
<link rel="manifest" href="../manifest.webmanifest">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Itim&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-3: #b5e8ff; --grass-1: #7ed957;
    --brand: #ff6b9d; --brand-dark: #e54b82;
    --gold: #ffd93d; --good: #5bc13a; --good-dark: #3fa024;
    --bad: #ff5757; --bad-dark: #d83838;
    --ink: #2d3436; --card: #ffffff; --card-border: #ffd6e4;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Mitr', -apple-system, sans-serif;
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 10%, #fff9c4 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, #ffcfd2 0%, transparent 45%),
      linear-gradient(180deg, var(--sky-3) 0%, #d9f3c9 65%, var(--grass-1) 100%);
    background-attachment: fixed;
    user-select: none;
    -webkit-user-select: none;
  }
  body::before {
    content: '☁️ ☁️     ☁️';
    position: fixed; top: 20px; left: 0; right: 0;
    text-align: center; font-size: 42px;
    opacity: 0.55; pointer-events: none;
    letter-spacing: 80px;
    animation: drift 40s linear infinite;
    z-index: 0;
  }
  @keyframes drift {
    from { transform: translateX(-10%); }
    to { transform: translateX(10%); }
  }

  .app {
    max-width: 720px; margin: 0 auto;
    padding: 16px 16px calc(20px + env(safe-area-inset-bottom));
    position: relative; z-index: 1;
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column;
  }

  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; flex: 1 1 auto; animation: fadeIn .35s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero { text-align: center; padding: 14px 10px 18px; }
  .hero h1 {
    font-family: 'Itim', cursive;
    font-size: clamp(40px, 9vw, 64px);
    margin: 0; color: var(--brand-dark);
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
    letter-spacing: 1px;
  }
  .hero p {
    font-size: clamp(16px, 3.4vw, 22px);
    margin: 12px 0 0; color: #555; font-weight: 500;
  }

  .howto {
    list-style: none; padding: 12px 18px; margin: 8px auto 18px;
    max-width: 380px; background: rgba(255,255,255,0.55);
    border: 2px dashed var(--card-border); border-radius: 18px;
    font-size: 16px; color: #555; font-weight: 500; text-align: left;
  }
  .howto li { display: flex; align-items: center; gap: 10px; padding: 3px 0; line-height: 1.3; }
  .howto-icon { font-size: 22px; flex-shrink: 0; width: 28px; text-align: center; }
  @media (min-width: 768px) { .howto { font-size: 18px; max-width: 440px; } .howto-icon { font-size: 26px; } }

  .start-btn {
    display: block; margin: 4px auto 0;
    font-family: 'Itim', cursive; font-size: 32px;
    background: var(--brand); color: #fff; border: 4px solid #fff;
    border-radius: 999px; padding: 16px 48px; cursor: pointer;
    box-shadow: 0 6px 0 var(--brand-dark);
    text-shadow: 2px 2px 0 var(--brand-dark);
    transition: transform .12s, box-shadow .12s;
  }
  .start-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--brand-dark); }

  /* ===== GAME ===== */
  #gameScreen { padding-top: 64px; }

  .scorebar {
    flex: 0 0 auto;
    display: flex; justify-content: center; align-items: center; gap: 14px;
    margin: 4px 64px 0;
    flex-wrap: wrap;
  }
  .pill {
    font-family: 'Itim', cursive; font-size: 22px;
    background: #fff; border: 3px solid var(--card-border);
    border-radius: 999px; padding: 6px 18px; color: var(--brand-dark);
    box-shadow: 0 3px 0 rgba(0,0,0,0.08);
    white-space: nowrap;
  }
  .pill .star { color: var(--gold); }

  .question {
    flex: 1 1 auto;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 22px; padding: 12px 0;
  }
  .prompt {
    font-family: 'Itim', cursive;
    font-size: clamp(24px, 5vw, 34px);
    color: var(--brand-dark); text-align: center;
    text-shadow: 2px 2px 0 #fff;
  }

  .pattern {
    display: flex; align-items: center; justify-content: center;
    flex-wrap: wrap; gap: clamp(6px, 2.2vw, 16px);
    background: #fff; border: 4px solid var(--card-border);
    border-radius: 28px; padding: clamp(12px, 3vw, 24px);
    box-shadow: 0 6px 0 rgba(0,0,0,0.10);
    max-width: 100%;
  }
  .cell {
    font-size: clamp(40px, 11vw, 76px);
    line-height: 1; width: clamp(54px, 13vw, 92px);
    height: clamp(54px, 13vw, 92px);
    display: flex; align-items: center; justify-content: center;
    flex: 0 0 auto;
  }
  .cell.slot {
    background: #fff5fa; border: 4px dashed var(--brand);
    border-radius: 20px;
    animation: slotPulse 1.2s ease-in-out infinite;
  }
  @keyframes slotPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  .cell.filled {
    animation: cellPop .5s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 4px solid var(--good); background: #f1fff0;
    border-radius: 20px;
  }
  @keyframes cellPop {
    0% { transform: scale(0.2) rotate(-12deg); opacity: 0; }
    60% { transform: scale(1.18) rotate(4deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  .choices {
    display: flex; justify-content: center; align-items: center;
    flex-wrap: wrap; gap: clamp(12px, 4vw, 24px);
    width: 100%;
  }
  .choice {
    font-size: clamp(44px, 12vw, 80px);
    width: clamp(78px, 22vw, 130px);
    height: clamp(78px, 22vw, 130px);
    display: flex; align-items: center; justify-content: center;
    background: var(--card); border: 5px solid var(--card-border);
    border-radius: 26px; cursor: pointer;
    box-shadow: 0 6px 0 rgba(0,0,0,0.10);
    transition: transform .12s, box-shadow .12s, border-color .12s;
    touch-action: manipulation;
  }
  .choice:active { transform: translateY(3px) scale(0.96); box-shadow: 0 2px 0 rgba(0,0,0,0.10); }
  .choice:hover { border-color: var(--brand); }
  .choice.wrong {
    animation: wiggle .5s ease;
    border-color: var(--bad);
  }
  @keyframes wiggle {
    0%, 100% { transform: translateX(0) rotate(0); }
    20% { transform: translateX(-10px) rotate(-6deg); }
    40% { transform: translateX(10px) rotate(6deg); }
    60% { transform: translateX(-7px) rotate(-4deg); }
    80% { transform: translateX(7px) rotate(4deg); }
  }
  .choice.correct {
    border-color: var(--good); background: #f1fff0;
    animation: rightPop .5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes rightPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.22); }
    100% { transform: scale(1); }
  }
  .choice.dim { opacity: 0.35; pointer-events: none; }

  /* Big banner overlay */
  .overlay-msg {
    position: fixed; inset: 0;
    display: none; align-items: center; justify-content: center;
    pointer-events: none; z-index: 100;
    font-family: 'Itim', cursive; color: #fff; text-align: center;
  }
  .overlay-msg.shown { display: flex; }
  .overlay-msg .msg {
    background: var(--brand); border: 4px solid #fff; border-radius: 32px;
    padding: 24px 44px; font-size: clamp(34px, 7vw, 64px); line-height: 1.1;
    box-shadow: 0 8px 0 rgba(0,0,0,0.18);
    animation: msgPop .5s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-shadow: 3px 3px 0 var(--brand-dark);
    max-width: 90vw;
  }
  .overlay-msg .msg.win {
    background: var(--gold); color: var(--ink);
    text-shadow: 3px 3px 0 #fff, 4px 4px 0 rgba(0,0,0,0.15);
  }
  @keyframes msgPop {
    0%   { transform: scale(0.4) rotate(-6deg); opacity: 0; }
    60%  { transform: scale(1.1) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  .confetti {
    position: fixed; top: -20px;
    width: 12px; height: 18px;
    z-index: 90; pointer-events: none;
    animation: fall linear forwards;
  }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

  .home-btn, .replay-btn {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #fff; border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    align-items: center; justify-content: center;
    font-size: 24px; text-decoration: none; color: var(--ink);
    z-index: 60;
    transition: transform .12s;
    font-family: inherit; padding: 0; cursor: pointer;
  }
  .home-btn { left: 12px; display: flex; font-size: 26px; }
  .replay-btn { right: 12px; display: none; font-size: 24px; }
  .replay-btn.show { display: flex; }
  .home-btn:active, .replay-btn:active { transform: scale(0.92); }
</style>
</head>
<body>
<a class="home-btn" href="../" aria-label="กลับหน้าหลัก">🏠</a>
<button class="replay-btn" id="replayBtn" type="button" aria-label="เล่นใหม่">🔄</button>

<div class="app">

  <section id="startScreen" class="screen active">
    <header class="hero">
      <h1>🧩 อะไรต่อไป</h1>
      <p>มองดูแถวภาพ แล้วทายว่าอะไรมาต่อ</p>
    </header>
    <ul class="howto">
      <li><span class="howto-icon">👀</span> ดูภาพในแถวว่าเรียงยังไง</li>
      <li><span class="howto-icon">❓</span> ช่องว่างต้องเป็นภาพอะไร</li>
      <li><span class="howto-icon">👆</span> แตะภาพที่ถูกด้านล่าง</li>
    </ul>
    <button class="start-btn" id="startBtn" type="button">เริ่มเล่น ▶</button>
  </section>

  <section id="gameScreen" class="screen">
    <div class="scorebar">
      <div class="pill" id="levelPill">ข้อ 1</div>
      <div class="pill"><span class="star">⭐</span> <span id="scoreNum">0</span></div>
    </div>
    <div class="question">
      <div class="prompt" id="prompt">อะไรมาต่อ?</div>
      <div class="pattern" id="pattern"></div>
      <div class="choices" id="choices"></div>
    </div>
  </section>

</div>

<div id="overlayMsg" class="overlay-msg"></div>

<script>
'use strict';

// ============================================================================
// EMOJI SETS — grouped so a single pattern uses distinct, easy-to-tell-apart
// items. Kids read by shape & color, so each pool member is visually distinct.
// ============================================================================
const SETS = [
  ['🔴','🔵','🟡','🟢','🟣','🟠'],          // colored circles
  ['🟥','🟦','🟨','🟩','🟪','🟧'],          // colored squares
  ['🍎','🍌','🍇','🍓','🍊','🍉'],          // fruit
  ['🐶','🐱','🐰','🐸','🐵','🐷'],          // animals
  ['⭐','❤️','⚡','🌸','🍀','🌈'],          // shapes/nature
  ['🚗','🚌','🚲','✈️','🚀','⛵'],          // vehicles
  ['🐝','🦋','🐌','🐞','🐠','🐢'],          // little critters
];

// ============================================================================
// STATE
// ============================================================================
const TOTAL = 10;
const state = {
  level: 0,
  score: 0,
  answer: null,
  answered: false,
  pendingTimers: [],
};

const PRAISE = ['เก่งมาก! 🎉', 'ถูกต้อง! 🌟', 'สุดยอด! 👏', 'ใช่เลย! 😄', 'เยี่ยม! ✨', 'แม่นมาก! 🏆'];

// ============================================================================
// DOM
// ============================================================================
const $ = (id) => document.getElementById(id);
const screens = { start: $('startScreen'), game: $('gameScreen') };
const overlay = $('overlayMsg');
const patternEl = $('pattern');
const choicesEl = $('choices');
const levelPill = $('levelPill');
const scoreNum = $('scoreNum');
const promptEl = $('prompt');

// ============================================================================
// AUDIO
// ============================================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
}
function playWin() {
  [523, 659, 784].forEach((f,i) => setTimeout(() => {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'triangle';
    o.frequency.value = f;
    o.connect(g).connect(audioCtx.destination);
    const t = audioCtx.currentTime, d = 0.22;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.18, t + 0.01);
    g.gain.linearRampToValueAtTime(0, t + d);
    o.start(t); o.stop(t + d + 0.02);
  }, i * 110));
}
function playBuzz() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sawtooth';
  o.frequency.value = 180;
  o.connect(g).connect(audioCtx.destination);
  const t = audioCtx.currentTime, d = 0.18;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.09, t + 0.01);
  g.gain.linearRampToValueAtTime(0, t + d);
  o.frequency.linearRampToValueAtTime(120, t + d);
  o.start(t); o.stop(t + d + 0.02);
}

// ============================================================================
// UTIL
// ============================================================================
function buzz(p) { if (navigator.vibrate) navigator.vibrate(p); }
function showScreen(name) {
  for (const k of Object.keys(screens)) screens[k].classList.toggle('active', k===name);
  $('replayBtn').classList.toggle('show', name === 'game');
}
function later(fn, ms) {
  const id = setTimeout(fn, ms);
  state.pendingTimers.push(id);
  return id;
}
function clearTimers() {
  state.pendingTimers.forEach(clearTimeout);
  state.pendingTimers = [];
}
function rand(n) { return Math.floor(Math.random() * n); }
function pick(arr) { return arr[rand(arr.length)]; }
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = rand(i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
// Pick k distinct items from a set
function pickDistinct(set, k) {
  return shuffle(set).slice(0, k);
}

// ============================================================================
// PATTERN GENERATORS — each returns the full sequence (length includes the
// final answer cell). Difficulty rises with the level. Generated fresh each
// time so patterns don't repeat. `size` arrays mean growing/shrinking scale.
// ============================================================================

// Build a repeating sequence from a unit, total length `len`.
function repeatUnit(unit, len) {
  const out = [];
  for (let i = 0; i < len; i++) out.push(unit[i % unit.length]);
  return out;
}

// AB AB AB ...  -> needs 2 distinct
function genAB(set) {
  const [a, b] = pickDistinct(set, 2);
  return repeatUnit([a, b], 6);          // ABABAB? shown as A B A B A ?
}
// AAB AAB ...
function genAAB(set) {
  const [a, b] = pickDistinct(set, 2);
  return repeatUnit([a, a, b], 6);       // AAB AA?
}
// ABB ABB ...
function genABB(set) {
  const [a, b] = pickDistinct(set, 2);
  return repeatUnit([a, b, b], 6);       // ABB AB?
}
// ABC ABC ...
function genABC(set) {
  const [a, b, c] = pickDistinct(set, 3);
  return repeatUnit([a, b, c], 6);       // ABC AB?
}
// ABCD ABCD ... (harder 4-cycle)
function genABCD(set) {
  const [a, b, c, d] = pickDistinct(set, 4);
  return repeatUnit([a, b, c, d], 8);    // ABCD ABC?
}
// AABB AABB ...
function genAABB(set) {
  const [a, b] = pickDistinct(set, 2);
  return repeatUnit([a, a, b, b], 8);
}
// Size-growing repeat on a single emoji: small -> medium -> big -> repeat
function genGrow(set) {
  const e = pick(set);
  // represent sizes as a tuple {emoji, size}
  const sizes = ['0.55em', '0.8em', '1.1em'];
  const unit = sizes.map(s => ({ e, size: s }));
  return repeatUnit(unit, 6);            // s m b s m ?
}

// Difficulty ladder: each entry is {gen, minSet}
const LADDER = [
  genAB, genAB, genAAB, genABB, genABC, genGrow, genAABB, genABC, genABCD, genABCD
];

// ============================================================================
// ROUND BUILDING
// ============================================================================
function cellKey(c) {
  // normalize a cell (string or {e,size}) to a comparable key
  return (typeof c === 'object') ? (c.e + '|' + c.size) : c;
}
function renderCell(c, cls) {
  const div = document.createElement('div');
  div.className = 'cell' + (cls ? ' ' + cls : '');
  if (typeof c === 'object') {
    div.textContent = c.e;
    div.style.fontSize = c.size;
  } else {
    div.textContent = c;
  }
  return div;
}

function buildRound() {
  const gen = LADDER[Math.min(state.level, LADDER.length - 1)];
  const set = pick(SETS);
  const seq = gen(set);
  const answer = seq[seq.length - 1];
  const shown = seq.slice(0, seq.length - 1);

  state.answer = answer;
  state.answered = false;

  // ---- render pattern row (shown cells + a ❓ slot) ----
  patternEl.innerHTML = '';
  shown.forEach(c => patternEl.appendChild(renderCell(c)));
  const slot = renderCell('❓', 'slot');
  slot.id = 'slotCell';
  patternEl.appendChild(slot);

  // ---- build 3 choices: 1 correct + 2 distractors from same kind ----
  const choices = buildChoices(seq, set, answer);
  renderChoices(choices);

  levelPill.textContent = 'ข้อ ' + (state.level + 1);
}

// Distractors are other members of the pattern (or set) that are NOT the
// answer, so they look plausible but only one truly continues the pattern.
function buildChoices(seq, set, answer) {
  const ansKey = cellKey(answer);
  const pool = [];
  const seen = new Set([ansKey]);

  // Prefer items that already appear in the sequence (they belong to the
  // same family) but are not the correct next item.
  for (const c of seq) {
    const k = cellKey(c);
    if (!seen.has(k)) { seen.add(k); pool.push(c); }
  }
  // Top up from the raw set if needed.
  for (const e of set) {
    if (pool.length >= 2) break;
    const k = cellKey(e);
    if (!seen.has(k)) { seen.add(k); pool.push(e); }
  }
  // If the pattern is size-based, the answer is an object; build size variants.
  if (typeof answer === 'object' && pool.length < 2) {
    const others = ['0.55em', '0.8em', '1.1em'].filter(s => s !== answer.size);
    for (const s of others) {
      const cand = { e: answer.e, size: s };
      if (!seen.has(cellKey(cand))) { seen.add(cellKey(cand)); pool.push(cand); }
    }
  }
  const distractors = shuffle(pool).slice(0, 2);
  return shuffle([answer, ...distractors]);
}

function renderChoices(choices) {
  choicesEl.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('div');
    btn.className = 'choice';
    btn.setAttribute('role', 'button');
    if (typeof c === 'object') {
      btn.textContent = c.e;
      btn.style.fontSize = c.size;
    } else {
      btn.textContent = c;
    }
    btn.addEventListener('pointerdown', (e) => { e.preventDefault(); onChoose(btn, c); });
    choicesEl.appendChild(btn);
  });
}

// ============================================================================
// ANSWER HANDLING
// ============================================================================
function onChoose(btn, choice) {
  ensureAudio();
  if (state.answered) return;
  const correct = cellKey(choice) === cellKey(state.answer);

  if (!correct) {
    btn.classList.add('wrong');
    buzz(40);
    playBuzz();
    setTimeout(() => btn.classList.remove('wrong'), 520);
    return;
  }

  // Correct!
  state.answered = true;
  state.score++;
  scoreNum.textContent = state.score;
  buzz([30, 40, 60]);

  btn.classList.add('correct');
  // dim the other choices
  [...choicesEl.children].forEach(c => { if (c !== btn) c.classList.add('dim'); });

  // flip ❓ slot into the answer with a pop
  const slot = $('slotCell');
  if (slot) {
    slot.classList.remove('slot');
    slot.classList.add('filled');
    if (typeof choice === 'object') { slot.textContent = choice.e; slot.style.fontSize = choice.size; }
    else { slot.textContent = choice; }
  }

  celebrate(36);
  playWin();
  flashOverlay(pick(PRAISE), 900, 'win');

  later(nextRound, 1150);
}

function nextRound() {
  state.level++;
  if (state.level >= TOTAL) { finishGame(); return; }
  buildRound();
}

function finishGame() {
  flashOverlay('เยี่ยมมาก! 🏆<br>ครบ ' + TOTAL + ' ข้อแล้ว', 2600, 'win');
  celebrate(80);
  playWin();
  later(() => playWin(), 400);
  later(startGame, 2800);
}

// ============================================================================
// FLOW
// ============================================================================
function startGame() {
  clearTimers();
  state.level = 0;
  state.score = 0;
  state.answered = false;
  scoreNum.textContent = '0';
  showScreen('game');
  buildRound();
}

// ============================================================================
// OVERLAY + CONFETTI (shared visual language)
// ============================================================================
function flashOverlay(text, ms, extra) {
  overlay.classList.add('shown');
  overlay.innerHTML = `<div class="msg ${extra || ''}">${text}</div>`;
  setTimeout(() => { overlay.classList.remove('shown'); overlay.innerHTML = ''; }, ms);
}

function celebrate(n) {
  const colors = ['#ff6b9d', '#ffd93d', '#7ed957', '#5bc0eb', '#ff914d', '#b388ff'];
  for (let i = 0; i < n; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = Math.random() * 0.8 + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    if (Math.random() > 0.5) c.style.borderRadius = '50%';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

// ============================================================================
// EVENTS
// ============================================================================
$('startBtn').addEventListener('click', () => { ensureAudio(); startGame(); });
$('replayBtn').addEventListener('click', () => { ensureAudio(); startGame(); });

// block double-tap zoom
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd < 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

// Init
showScreen('start');
</script>
