<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🐭 ตามทางหนู — เกมสำหรับเด็ก</title>
<meta name="description" content="เกมลากนิ้วตามเส้นทางพาหนูไปหาชีส ฝึกสมาธิยาวและการควบคุมนิ้วสำหรับเด็ก">
<meta name="theme-color" content="#ff6b9d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ตามทางหนู">
<meta name="mobile-web-app-capable" content="yes">

<meta property="og:type" content="website">
<meta property="og:title" content="🐭 ตามทางหนู — เกมสำหรับเด็ก">
<meta property="og:description" content="ลากนิ้วตามทางพาหนูไปหาชีส ฝึกสมาธิและการควบคุมนิ้ว">
<meta property="og:locale" content="th_TH">

<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../icons/icon.svg">
<link rel="manifest" href="../manifest.webmanifest">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Itim&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-3: #b5e8ff;
    --grass-1: #7ed957;
    --brand: #ff6b9d;
    --brand-dark: #e54b82;
    --gold: #ffd93d;
    --good: #5bc13a;
    --good-dark: #3fa024;
    --bad: #ff5757;
    --bad-dark: #d83838;
    --ink: #2d3436;
    --paper: #fffef9;
    --card: #ffffff;
    --card-border: #ffd6e4;
    --path-color: #ffe0eb;
    --path-stroke: #ffb8d1;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Mitr', -apple-system, sans-serif;
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 10%, #fff9c4 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, #ffcfd2 0%, transparent 45%),
      linear-gradient(180deg, var(--sky-3) 0%, #d9f3c9 65%, var(--grass-1) 100%);
    background-attachment: fixed;
    user-select: none;
    -webkit-user-select: none;
  }
  body::before {
    content: '☁️ ☁️     ☁️';
    position: fixed; top: 20px; left: 0; right: 0;
    text-align: center; font-size: 42px;
    opacity: 0.55; pointer-events: none;
    letter-spacing: 80px;
    animation: drift 40s linear infinite;
    z-index: 0;
  }
  @keyframes drift {
    from { transform: translateX(-10%); }
    to { transform: translateX(10%); }
  }

  .app { max-width: 880px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
  body:has(#gameScreen.active) .app {
    max-width: 100%;
    padding: 0;
    height: 100vh;
    height: 100dvh;
  }
  body:has(#gameScreen.active)::before { display: none; }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn .35s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .hero { text-align: center; padding: 14px 10px 24px; }
  .hero h1 {
    font-family: 'Itim', 'Mitr', cursive;
    font-size: clamp(42px, 9vw, 68px);
    margin: 0;
    color: var(--brand-dark);
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
    letter-spacing: 1px;
  }
  .hero p {
    font-size: clamp(16px, 3.4vw, 22px);
    margin: 12px 0 0;
    color: #555;
    font-weight: 500;
  }

  /* Speed selector */
  .speed-row {
    display: flex; justify-content: center; align-items: center;
    gap: 10px; margin: 8px 0 18px; flex-wrap: wrap;
  }
  .speed-label {
    font-family: 'Itim', cursive;
    font-size: 22px;
    color: var(--brand-dark);
    margin-right: 4px;
    text-shadow: 2px 2px 0 #fff;
  }
  .speed-pill {
    font-family: inherit;
    font-size: 18px; font-weight: 600;
    padding: 10px 22px;
    border: 3px solid #fff;
    border-radius: 999px;
    background: #fff;
    color: #777;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.08);
    transition: transform .12s, background .15s, color .15s, box-shadow .12s;
    min-width: 92px;
  }
  .speed-pill:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.08); }
  .speed-pill.active {
    background: var(--brand); color: #fff; border-color: #fff;
    box-shadow: 0 4px 0 var(--brand-dark);
  }

  /* Level cards */
  .lgrid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin: 10px 0 32px;
  }
  .lcard {
    background: var(--card);
    border: 4px solid var(--card-border);
    border-radius: 22px;
    padding: 16px 12px 14px;
    text-align: center;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s, border-color .15s;
    box-shadow: 0 5px 0 rgba(0,0,0,0.07);
    position: relative;
    overflow: hidden;
  }
  .lcard:active { transform: scale(0.96) translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.07); }
  .lcard:hover { border-color: var(--brand); }
  .lcard svg.preview {
    width: 100%;
    height: 70px;
    display: block;
    margin: 4px auto 8px;
  }
  .lcard svg.preview path {
    stroke: var(--path-stroke);
    stroke-width: 14;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }
  .lcard .ltitle {
    font-family: 'Itim', cursive;
    font-size: 22px;
    color: var(--brand-dark);
    text-shadow: 2px 2px 0 #fff;
  }
  .lcard .stars {
    position: absolute;
    top: 8px; right: 10px;
    font-size: 16px;
    letter-spacing: 1px;
  }
  .lcard.completed::before {
    content: '✓';
    position: absolute;
    top: 8px; left: 10px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--good);
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 0 var(--good-dark);
    z-index: 1;
  }

  /* Game screen layout */
  #gameScreen.active {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }

  .status-banner {
    flex: 0 0 auto;
    margin: 12px 14px 0;
    border-radius: 22px;
    padding: 14px 20px;
    background: linear-gradient(180deg, #fff8c8, #ffe88a);
    border: 4px solid #fff;
    box-shadow: 0 5px 0 rgba(0,0,0,0.10);
    text-align: center;
    font-family: 'Itim', cursive;
    font-size: clamp(26px, 5vw, 38px);
    color: #6b4f00;
    text-shadow: 2px 2px 0 rgba(255,255,255,0.7);
    transition: transform .25s, background .3s, color .3s;
    line-height: 1.1;
  }
  .status-banner.win {
    background: linear-gradient(180deg, #c8f3a0, #9ce070);
    color: #1f5b13;
  }
  .status-banner.fail {
    background: linear-gradient(180deg, #ffcfd2, #ff9c9c);
    color: #6b1515;
  }
  .status-banner.flash { transform: scale(1.04); box-shadow: 0 0 0 6px var(--gold), 0 8px 0 rgba(0,0,0,0.10); }

  .hud {
    flex: 0 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin: 10px 14px 0;
    font-family: 'Itim', cursive;
    font-size: 22px;
  }
  .hud-item {
    background: #fff;
    border: 3px solid var(--card-border);
    border-radius: 999px;
    padding: 6px 16px;
    box-shadow: 0 3px 0 rgba(0,0,0,0.08);
    min-width: 80px;
    text-align: center;
    color: var(--ink);
  }
  .hud-item.level { color: var(--brand-dark); }

  /* Stage — holds the SVG path and emojis */
  .stage-area {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    min-height: 0;
    overflow: hidden;
  }
  /* The 4:3 maze stage. Width is constrained by both the parent's width
     and remaining viewport height — same trick as follow-me. */
  .maze-stage {
    position: relative;
    aspect-ratio: 4 / 3;
    width: min(100%, 760px, calc((100dvh - 230px) * 4 / 3));
    background: #fff;
    border-radius: 28px;
    border: 4px solid #fff;
    box-shadow: 0 6px 0 rgba(0,0,0,0.10);
    overflow: hidden;
    touch-action: none;
  }
  .maze-stage svg.maze {
    width: 100%; height: 100%;
    display: block;
  }
  .maze-stage svg.maze .bg-path {
    stroke: var(--path-color);
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    transition: stroke .25s ease;
  }
  .maze-stage svg.maze .accent-path {
    stroke: var(--path-stroke);
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    stroke-dasharray: 6 12;
    opacity: 0.7;
    transition: stroke .25s ease;
  }
  .maze-stage.fail svg.maze .bg-path { stroke: #ffd6d6; }
  .maze-stage.fail svg.maze .accent-path { stroke: var(--bad); }
  .maze-stage.win svg.maze .bg-path { stroke: #d6f5b8; }
  .maze-stage.win svg.maze .accent-path { stroke: var(--good); }

  /* Mouse + cheese — HTML elements positioned over SVG by % of stage */
  .trace-emoji {
    position: absolute;
    transform: translate(-50%, -50%);
    font-size: 56px;
    line-height: 1;
    pointer-events: none;
    filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.18));
    z-index: 2;
  }
  .trace-emoji.mouse {
    pointer-events: auto;
    cursor: grab;
    touch-action: none;
    z-index: 3;
    will-change: left, top;
    animation: idleBob 1.5s ease-in-out infinite;
  }
  .trace-emoji.mouse.tracing {
    cursor: grabbing;
    animation: none;
  }
  .trace-emoji.mouse.snapping {
    transition: left .45s cubic-bezier(0.34, 1.56, 0.64, 1),
                top  .45s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .trace-emoji.mouse.shake {
    animation: mouseShake .4s ease;
  }
  @keyframes idleBob {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50%      { transform: translate(-50%, -55%) scale(1.05); }
  }
  @keyframes mouseShake {
    0%, 100% { transform: translate(-50%, -50%) rotate(0); }
    25%      { transform: translate(-58%, -50%) rotate(-12deg); }
    75%      { transform: translate(-42%, -50%) rotate(12deg); }
  }
  .trace-emoji.cheese {
    animation: cheeseDance 1.8s ease-in-out infinite;
    filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.22));
  }
  @keyframes cheeseDance {
    0%, 100% { transform: translate(-50%, -50%) rotate(-6deg); }
    50%      { transform: translate(-50%, -55%) rotate(6deg); }
  }

  /* Trail dots that mark where finger has been */
  .trail-dot {
    position: absolute;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--gold);
    transform: translate(-50%, -50%);
    pointer-events: none;
    box-shadow: 0 1px 0 rgba(0,0,0,0.2);
    animation: trailFade .9s linear forwards;
    z-index: 1;
  }
  @keyframes trailFade {
    0%   { opacity: 0.95; transform: translate(-50%, -50%) scale(0.6); }
    20%  { opacity: 0.95; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
  }

  /* Big banner overlay */
  .overlay-msg {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 100;
    font-family: 'Itim', cursive;
    color: #fff;
    text-align: center;
  }
  .overlay-msg.shown { display: flex; }
  .overlay-msg .msg {
    background: var(--brand);
    border: 4px solid #fff;
    border-radius: 32px;
    padding: 28px 48px;
    font-size: clamp(44px, 8vw, 80px);
    line-height: 1.1;
    box-shadow: 0 8px 0 rgba(0,0,0,0.18);
    animation: msgPop .5s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-shadow: 3px 3px 0 var(--brand-dark);
    max-width: 90vw;
  }
  .overlay-msg .msg.go { background: var(--good); text-shadow: 3px 3px 0 var(--good-dark); }
  .overlay-msg .msg.win {
    background: var(--gold); color: var(--ink);
    text-shadow: 3px 3px 0 #fff, 4px 4px 0 rgba(0,0,0,0.15);
  }
  @keyframes msgPop {
    0%   { transform: scale(0.4) rotate(-6deg); opacity: 0; }
    60%  { transform: scale(1.1) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  /* Results */
  #resultsScreen { text-align: center; padding-top: 20px; }
  .trophy {
    font-size: clamp(120px, 22vw, 180px);
    line-height: 1;
    filter: drop-shadow(4px 6px 0 rgba(0,0,0,0.18));
    animation: bobBig 1.2s ease-in-out infinite;
  }
  @keyframes bobBig {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-12px) rotate(4deg); }
  }
  .winner-name {
    font-family: 'Itim', cursive;
    font-size: clamp(44px, 9vw, 72px);
    color: var(--brand-dark);
    margin: 18px 0 6px;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
  }
  .winner-sub {
    font-size: clamp(18px, 4vw, 24px);
    color: #555; margin: 0 0 6px; font-weight: 500;
  }
  .stars-row {
    font-size: clamp(48px, 10vw, 72px);
    line-height: 1; margin: 8px 0 4px;
    letter-spacing: 4px;
    filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.12));
  }
  .rating-text {
    font-family: 'Itim', cursive;
    font-size: clamp(28px, 6vw, 40px);
    color: var(--brand-dark);
    margin: 4px 0 16px;
  }
  .action-bar {
    display: flex; gap: 12px; justify-content: center; align-items: center;
    margin-top: 12px; flex-wrap: wrap;
  }
  .btn-main {
    font-family: 'Itim', cursive;
    font-size: 28px; padding: 16px 36px;
    border: 4px solid #fff; border-radius: 999px;
    background: var(--brand); color: #fff;
    box-shadow: 0 6px 0 var(--brand-dark);
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
    text-shadow: 2px 2px 0 var(--brand-dark);
  }
  .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--brand-dark); }
  .btn-ghost {
    font-family: 'Itim', cursive;
    font-size: 24px; padding: 14px 30px;
    border: 4px solid var(--brand); border-radius: 999px;
    background: #fff; color: var(--brand-dark);
    box-shadow: 0 5px 0 rgba(0,0,0,0.12);
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
  }
  .btn-ghost:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }

  .confetti {
    position: fixed; top: -20px;
    width: 12px; height: 18px;
    z-index: 90; pointer-events: none;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }

  /* Home button */
  .home-btn {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    left: 12px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #fff;
    border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    text-decoration: none;
    z-index: 60;
    transition: transform .12s;
  }
  .home-btn:active { transform: scale(0.92); }

  /* iPad */
  @media (min-width: 768px) {
    /* 4 cols × 3 rows for 12 levels — leaves no awkward partial row */
    .lgrid { grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .lcard { padding: 18px 12px 16px; }
    .lcard .ltitle { font-size: 22px; }
    .lcard svg.preview { height: 90px; }
    .status-banner { padding: 18px 24px; }
    .hud { font-size: 26px; }
    .hud-item { padding: 8px 22px; min-width: 110px; }
    .trace-emoji { font-size: 76px; }
  }
  @media (min-width: 1024px) {
    .trace-emoji { font-size: 88px; }
    .lgrid { grid-template-columns: repeat(6, 1fr); }
  }

  /* Phone */
  @media (max-width: 480px) {
    .lcard { padding: 12px 8px 10px; border-width: 3px; border-radius: 18px; }
    .lcard .ltitle { font-size: 18px; }
    .lcard svg.preview { height: 56px; }
    .status-banner { padding: 10px 14px; margin: 8px 8px 0; font-size: 22px; }
    .hud { font-size: 18px; margin: 8px 10px 0; }
    .hud-item { padding: 5px 12px; min-width: 70px; }
    .stage-area { padding: 8px; }
    .trace-emoji { font-size: 44px; }
    .maze-stage { border-width: 3px; border-radius: 22px; }
  }
</style>
</head>
<body>
<a class="home-btn" href="../" aria-label="กลับหน้าหลัก">🏠</a>
<div class="app">

  <!-- SELECT -->
  <section id="selectScreen" class="screen active">
    <header class="hero">
      <h1>🐭 ตามทางหนู</h1>
      <p>ลากนิ้วตามเส้นพาหนูไปหาชีส 🧀<br/><small style="font-size:.85em;color:#888">ห้ามให้นิ้วหลุดออกนอกเส้น!</small></p>
    </header>

    <div class="speed-row" id="speedRow">
      <div class="speed-label">ความกว้างเส้น:</div>
      <button class="speed-pill" data-speed="slow" type="button">🐢 กว้าง</button>
      <button class="speed-pill active" data-speed="medium" type="button">🐇 กลาง</button>
      <button class="speed-pill" data-speed="fast" type="button">⚡ แคบ</button>
    </div>

    <div id="levelGrid" class="lgrid"></div>
  </section>

  <!-- GAME -->
  <section id="gameScreen" class="screen">
    <div id="statusBanner" class="status-banner">วางนิ้วบน 🐭</div>

    <div class="hud">
      <div class="hud-item level" id="levelBox">ระดับ <span id="levelNum">1</span> / <span id="levelTotal">12</span></div>
      <div class="hud-item">หลุด: <span id="failCount">0</span></div>
    </div>

    <div class="stage-area">
      <div id="mazeStage" class="maze-stage">
        <svg class="maze" id="mazeSvg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
          <path id="bgPath" class="bg-path" d=""/>
          <path id="accentPath" class="accent-path" d=""/>
          <path id="hitPath" d="" stroke="transparent" fill="none" stroke-linecap="round" stroke-linejoin="round" pointer-events="none"/>
        </svg>
        <div id="mouse" class="trace-emoji mouse">🐭</div>
        <div id="cheese" class="trace-emoji cheese">🧀</div>
      </div>
    </div>
  </section>

  <!-- RESULTS -->
  <section id="resultsScreen" class="screen">
    <div class="trophy">🏆</div>
    <h2 id="resultTitle" class="winner-name">เก่งมาก!</h2>
    <p id="resultSub" class="winner-sub">ผ่านครบทุกระดับ</p>
    <p id="resultFails" class="winner-sub">หลุดทั้งหมด: 0 ครั้ง</p>
    <div id="resultStars" class="stars-row">⭐</div>
    <div id="resultText" class="rating-text">เยี่ยม!</div>
    <div class="action-bar">
      <button id="againBtn" class="btn-ghost">🔄 เล่นอีก</button>
      <button id="newBtn" class="btn-main">เลือกใหม่</button>
    </div>
  </section>

</div>

<div id="overlayMsg" class="overlay-msg"></div>

<script>
'use strict';

// ============================================================================
// LEVELS — SVG path data in 800×600 viewBox
// Mouse spawns at start of path; cheese at end. Stroke-width is forgiveness.
// Each path is intentionally smooth or right-angled with rounded joins so 3yo
// fingers can follow without precise tracking.
// ============================================================================
const LEVELS = [
  // ---- ⭐ EASY (3-4 yo) — straight + smooth curves ----
  {
    id: 1, stars: 1, name: 'เส้นตรง',
    path: 'M 100 300 L 700 300',
    baseStroke: 90,
  },
  {
    id: 2, stars: 1, name: 'หักมุม',
    path: 'M 100 150 L 400 150 L 400 450 L 700 450',
    baseStroke: 80,
  },
  {
    id: 3, stars: 1, name: '🌈 รุ้งกินน้ำ',
    path: 'M 100 500 Q 400 50 700 500',
    baseStroke: 80,
  },
  {
    id: 4, stars: 1, name: '🌊 คลื่น',
    path: 'M 100 300 Q 200 130 300 300 T 500 300 T 700 300',
    baseStroke: 75,
  },

  // ---- ⭐⭐ MID — sharp turns + sweeping curves ----
  {
    id: 5, stars: 2, name: 'ซิกแซก',
    path: 'M 100 100 L 350 100 L 350 300 L 550 300 L 550 500 L 700 500',
    baseStroke: 70,
  },
  {
    id: 6, stars: 2, name: '🏔️ ภูเขา',
    path: 'M 100 500 L 220 150 L 340 500 L 460 150 L 580 500 L 700 500',
    baseStroke: 65,
  },
  {
    id: 7, stars: 2, name: '🐍 งู',
    path: 'M 80 300 Q 200 100 320 300 Q 440 500 560 300 Q 680 100 720 300',
    baseStroke: 65,
  },
  {
    id: 8, stars: 2, name: 'หลายตวัด',
    path: 'M 100 100 L 700 100 L 700 250 L 200 250 L 200 400 L 700 400 L 700 540 L 100 540',
    baseStroke: 60,
  },

  // ---- ⭐⭐⭐ HARD — long traces + crossings ----
  {
    id: 9, stars: 3, name: '♾️ เลข 8',
    path: 'M 200 300 C 200 100 400 100 400 300 C 400 500 600 500 600 300 C 600 100 400 100 400 300 C 400 500 200 500 200 300 L 80 300',
    baseStroke: 55,
  },
  {
    id: 10, stars: 3, name: '🌀 ก้นหอย',
    path: 'M 100 100 L 700 100 L 700 500 L 100 500 L 100 220 L 580 220 L 580 380 L 240 380',
    baseStroke: 55,
  },
  {
    id: 11, stars: 3, name: 'เขาวงกต',
    path: 'M 80 80 L 720 80 L 720 220 L 200 220 L 200 360 L 720 360 L 720 540 L 80 540 L 80 460',
    baseStroke: 55,
  },

  // ---- ⭐⭐⭐⭐ FINAL BOSS ----
  {
    id: 12, stars: 4, name: '⭐ ดาว',
    path: 'M 400 100 L 475 230 L 600 240 L 495 340 L 530 470 L 400 390 L 270 470 L 305 340 L 200 240 L 325 230',
    baseStroke: 50,
  },
];

// ============================================================================
// TUNING
// ============================================================================
const VIEWBOX_W = 800;
const VIEWBOX_H = 600;
const REACH_DIST = 70;        // SVG units — how close to cheese center counts as "reached"
const TRAIL_INTERVAL = 30;    // ms between dropping trail dots
const FAIL_RECOVER_MS = 700;  // pause after fail before player can retry
const ADVANCE_PAUSE_MS = 1000; // pause after success before next level

// Speed-slider modifies stroke width to control forgiveness:
//   slow   = wider path (3yo)
//   medium = base
//   fast   = narrower (older kids — more precision needed)
const SPEED_LEVELS = {
  slow:   { strokeAdd:  +20 },
  medium: { strokeAdd:    0 },
  fast:   { strokeAdd:  -15 },
};
const HIT_PAD = 8;            // hit-test stroke is this much wider than visible
const SPEED_KEY = 'fingerMazeSpeed';
const PROGRESS_KEY = 'fingerMazeProgress';

// ============================================================================
// STATE
// ============================================================================
const state = {
  speed: 'medium',
  levelIdx: 0,
  status: 'idle',          // idle | tracing | failing | won
  fails: 0,                // total fails across the session
  totalFails: 0,
  pointerId: null,
  lastTrailMs: 0,
  startSvg: null,          // {x,y} in SVG coords
  endSvg:   null,
  bestProgress: {},        // { lvl1: bool, ... } from localStorage
};

// ============================================================================
// AUDIO (Web Audio API)
// ============================================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (Ctx) audioCtx = new Ctx();
    } catch (e) { /* unsupported — silent */ }
  }
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
}
function playTone(freq, durationMs, type = 'sine', vol = 0.22) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  osc.connect(gain).connect(audioCtx.destination);
  const t = audioCtx.currentTime;
  const dur = durationMs / 1000;
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + 0.012);
  gain.gain.linearRampToValueAtTime(0,    t + dur);
  osc.start(t); osc.stop(t + dur + 0.02);
}
function playFail() {
  if (!audioCtx) return;
  // Quick "oh no" descending squeak
  playTone(440, 90, 'sawtooth', 0.18);
  setTimeout(() => playTone(220, 220, 'sawtooth', 0.18), 90);
}
function playWin() {
  // Ascending chord
  const t = [392, 523.25, 659.25, 783.99]; // G4 C5 E5 G5
  t.forEach((f, i) => setTimeout(() => playTone(f, 220, 'triangle', 0.20), i * 110));
}

// ============================================================================
// DOM
// ============================================================================
const $ = (id) => document.getElementById(id);
const screens = {
  select:  $('selectScreen'),
  game:    $('gameScreen'),
  results: $('resultsScreen'),
};
const levelGrid    = $('levelGrid');
const statusBanner = $('statusBanner');
const overlay      = $('overlayMsg');
const levelNum     = $('levelNum');
const failCount    = $('failCount');
const mazeStage    = $('mazeStage');
const mazeSvg      = $('mazeSvg');
const bgPath       = $('bgPath');
const accentPath   = $('accentPath');
const hitPath      = $('hitPath');
const mouse        = $('mouse');
const cheese       = $('cheese');
const resultTitle  = $('resultTitle');
const resultSub    = $('resultSub');
const resultFails  = $('resultFails');
const resultStars  = $('resultStars');
const resultText   = $('resultText');

// ============================================================================
// UTIL
// ============================================================================
function buzz(p) { if (navigator.vibrate) navigator.vibrate(p); }
function showScreen(name) {
  for (const k of Object.keys(screens)) screens[k].classList.toggle('active', k === name);
}
function speedPreset() { return SPEED_LEVELS[state.speed] || SPEED_LEVELS.medium; }

// ============================================================================
// SELECT — render level cards
// ============================================================================
function renderLevels() {
  levelGrid.innerHTML = '';
  for (let i = 0; i < LEVELS.length; i++) {
    const lvl = LEVELS[i];
    const card = document.createElement('div');
    card.className = 'lcard';
    if (state.bestProgress['l' + lvl.id]) card.classList.add('completed');
    const stars = '⭐'.repeat(lvl.stars);
    card.innerHTML = `
      <div class="stars">${stars}</div>
      <svg class="preview" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
        <path d="${lvl.path}" />
      </svg>
      <div class="ltitle">${i + 1}. ${lvl.name}</div>
    `;
    card.addEventListener('click', () => {
      ensureAudio();
      startSession(i);
    });
    levelGrid.appendChild(card);
  }
}

// ============================================================================
// SESSION (multi-level)
// ============================================================================
function startSession(startIdx) {
  state.levelIdx = startIdx;
  state.totalFails = 0;
  loadLevel();
  showScreen('game');
}

function loadLevel() {
  const lvl = LEVELS[state.levelIdx];
  // Set path data
  bgPath.setAttribute('d', lvl.path);
  accentPath.setAttribute('d', lvl.path);
  hitPath.setAttribute('d', lvl.path);
  // Stroke widths — visible + accent (dashed) + hit (forgiveness)
  const visible = Math.max(28, lvl.baseStroke + speedPreset().strokeAdd);
  bgPath.setAttribute('stroke-width', visible);
  accentPath.setAttribute('stroke-width', visible - 6);
  hitPath.setAttribute('stroke-width', visible + HIT_PAD);
  hitPath.setAttribute('stroke-linecap', 'round');
  hitPath.setAttribute('stroke-linejoin', 'round');
  // Mouse + cheese to start/end
  state.startSvg = bgPath.getPointAtLength(0);
  state.endSvg   = bgPath.getPointAtLength(bgPath.getTotalLength());
  setEmojiAtSvg(mouse, state.startSvg);
  setEmojiAtSvg(cheese, state.endSvg);
  // Reset
  clearTrail();
  state.fails = 0;
  state.status = 'idle';
  failCount.textContent = '0';
  levelNum.textContent = state.levelIdx + 1;
  setStatus('วางนิ้วบน 🐭', '');
  mazeStage.classList.remove('fail', 'win');
  mouse.classList.remove('shake', 'tracing', 'snapping');
}

function setEmojiAtSvg(emoji, pt) {
  const xPct = (pt.x / VIEWBOX_W) * 100;
  const yPct = (pt.y / VIEWBOX_H) * 100;
  emoji.style.left = xPct + '%';
  emoji.style.top  = yPct + '%';
}

function setStatus(text, mood) {
  statusBanner.textContent = text;
  statusBanner.className = 'status-banner ' + (mood || '');
  statusBanner.classList.add('flash');
  setTimeout(() => statusBanner.classList.remove('flash'), 350);
}

// ============================================================================
// HIT TESTING
// ============================================================================
function clientToSvg(cx, cy) {
  const r = mazeStage.getBoundingClientRect();
  return {
    x: ((cx - r.left) / r.width)  * VIEWBOX_W,
    y: ((cy - r.top)  / r.height) * VIEWBOX_H,
  };
}

function isInPath(sx, sy) {
  // SVGGeometryElement.isPointInStroke takes a DOMPointInit object
  // (modern API) — older Safari requires SVGPoint. Try both.
  if (hitPath.isPointInStroke) {
    try {
      // Some browsers accept plain objects; others insist on SVGPoint.
      const pt = mazeSvg.createSVGPoint();
      pt.x = sx; pt.y = sy;
      return hitPath.isPointInStroke(pt);
    } catch (e) {
      try { return hitPath.isPointInStroke({ x: sx, y: sy }); }
      catch (_) { return false; }
    }
  }
  return false;
}

function distSq(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return dx * dx + dy * dy;
}

// ============================================================================
// DRAG HANDLING
// ============================================================================
mouse.addEventListener('pointerdown', (e) => {
  if (state.status === 'failing' || state.status === 'won') return;
  e.preventDefault();
  state.status = 'tracing';
  state.pointerId = e.pointerId;
  state.lastTrailMs = 0;
  try { mouse.setPointerCapture(e.pointerId); } catch (_) {}
  mouse.classList.add('tracing');
  mouse.classList.remove('snapping', 'shake');
  setStatus('ลากตามเส้น!', '');
  ensureAudio();
}, { passive: false });

mouse.addEventListener('pointermove', (e) => {
  if (state.status !== 'tracing' || e.pointerId !== state.pointerId) return;
  const sv = clientToSvg(e.clientX, e.clientY);
  // Reached cheese?
  if (distSq(sv, state.endSvg) < REACH_DIST * REACH_DIST) {
    win();
    return;
  }
  // Inside path?
  if (isInPath(sv.x, sv.y)) {
    setEmojiAtSvg(mouse, sv);
    addTrail(sv);
  } else {
    fail();
  }
}, { passive: false });

mouse.addEventListener('pointerup', (e) => {
  if (state.status !== 'tracing' || e.pointerId !== state.pointerId) return;
  // Finger lifted before reaching cheese — counts as fail
  fail();
});

mouse.addEventListener('pointercancel', (e) => {
  if (state.status === 'tracing' && e.pointerId === state.pointerId) fail();
});

// ============================================================================
// TRAIL
// ============================================================================
function addTrail(sv) {
  const now = performance.now();
  if (now - state.lastTrailMs < TRAIL_INTERVAL) return;
  state.lastTrailMs = now;
  const dot = document.createElement('div');
  dot.className = 'trail-dot';
  dot.style.left = (sv.x / VIEWBOX_W) * 100 + '%';
  dot.style.top  = (sv.y / VIEWBOX_H) * 100 + '%';
  mazeStage.appendChild(dot);
  setTimeout(() => dot.remove(), 950);
}
function clearTrail() {
  for (const d of mazeStage.querySelectorAll('.trail-dot')) d.remove();
}

// ============================================================================
// FAIL / WIN
// ============================================================================
function fail() {
  if (state.status !== 'tracing') return;
  state.status = 'failing';
  state.fails += 1;
  state.totalFails += 1;
  failCount.textContent = state.fails;
  try { mouse.releasePointerCapture(state.pointerId); } catch (_) {}
  state.pointerId = null;
  buzz([60, 40, 80]);
  playFail();
  mazeStage.classList.add('fail');
  mouse.classList.remove('tracing');
  mouse.classList.add('shake');
  setStatus('โธ่... ลองใหม่', 'fail');
  setTimeout(() => {
    mouse.classList.remove('shake');
    mouse.classList.add('snapping');
    setEmojiAtSvg(mouse, state.startSvg);
    setTimeout(() => mouse.classList.remove('snapping'), 470);
    mazeStage.classList.remove('fail');
    state.status = 'idle';
    setStatus('วางนิ้วบน 🐭', '');
    clearTrail();
  }, FAIL_RECOVER_MS);
}

function win() {
  if (state.status !== 'tracing') return;
  state.status = 'won';
  try { mouse.releasePointerCapture(state.pointerId); } catch (_) {}
  state.pointerId = null;
  // Snap mouse exactly onto cheese
  setEmojiAtSvg(mouse, state.endSvg);
  mouse.classList.remove('tracing');
  mazeStage.classList.add('win');
  buzz([80, 30, 80, 30, 120]);
  playWin();
  // Mark progress
  const lvl = LEVELS[state.levelIdx];
  state.bestProgress['l' + lvl.id] = true;
  saveProgress();
  setStatus('ถึงแล้ว! 🎉', 'win');
  // Brief celebration overlay then advance / show results
  setTimeout(() => {
    if (state.levelIdx + 1 >= LEVELS.length) {
      flashOverlay('ผ่านครบทุกระดับ!', 1100, 'win');
      setTimeout(showResults, 800);
    } else {
      flashOverlay('เก่ง! ระดับถัดไป →', 900, 'go');
      setTimeout(() => {
        state.levelIdx += 1;
        loadLevel();
      }, 850);
    }
  }, 200);
}

function flashOverlay(text, durationMs, extra) {
  overlay.classList.add('shown');
  overlay.innerHTML = `<div class="msg ${extra || ''}">${text}</div>`;
  setTimeout(() => {
    overlay.classList.remove('shown');
    overlay.innerHTML = '';
  }, durationMs);
}

// ============================================================================
// RESULTS
// ============================================================================
function showResults() {
  resultTitle.textContent  = `ผ่านครบ ${LEVELS.length} ระดับ!`;
  resultSub.textContent    = `ความกว้างเส้น: ${state.speed === 'slow' ? '🐢 กว้าง' : state.speed === 'fast' ? '⚡ แคบ' : '🐇 กลาง'}`;
  resultFails.textContent  = `หลุดทั้งหมด: ${state.totalFails} ครั้ง`;
  const r = ratingFor(state.totalFails);
  resultStars.textContent = r.stars;
  resultText.textContent  = r.text;
  showScreen('results');
  celebrate(r.confettiCount);
  buzz([60, 40, 60, 40, 100]);
}

function ratingFor(fails) {
  // Tuned for 12 levels — expected fails scale up roughly with level count.
  if (fails === 0)  return { stars: '🌟🌟🌟🌟🌟', text: 'ไร้ที่ติ!',     confettiCount: 160 };
  if (fails <= 5)   return { stars: '⭐⭐⭐⭐',     text: 'เก่งมาก!',     confettiCount: 120 };
  if (fails <= 12)  return { stars: '⭐⭐⭐',        text: 'เก่ง!',        confettiCount: 90  };
  if (fails <= 24)  return { stars: '⭐⭐',           text: 'ดี!',           confettiCount: 60  };
  return                  { stars: '⭐',                text: 'ผ่านแล้ว!',     confettiCount: 40  };
}

function celebrate(n) {
  const colors = ['#ff6b9d', '#ffd93d', '#7ed957', '#5bc0eb', '#ff914d', '#b388ff'];
  for (let i = 0; i < n; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = Math.random() * 0.8 + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    if (Math.random() > 0.5) c.style.borderRadius = '50%';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

// ============================================================================
// PERSISTENCE
// ============================================================================
function loadProgress() {
  try {
    const raw = localStorage.getItem(PROGRESS_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object') state.bestProgress = parsed;
    }
  } catch (e) {}
}
function saveProgress() {
  try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(state.bestProgress)); }
  catch (e) {}
}

// ============================================================================
// EVENTS
// ============================================================================
$('againBtn').addEventListener('click', () => {
  ensureAudio();
  startSession(0);
});
$('newBtn').addEventListener('click', () => {
  renderLevels();
  showScreen('select');
});

// Prevent double-tap zoom on iOS
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd < 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

// ============================================================================
// SPEED SELECTOR
// ============================================================================
function setSpeed(s) {
  if (!SPEED_LEVELS[s]) s = 'medium';
  state.speed = s;
  try { localStorage.setItem(SPEED_KEY, s); } catch (e) {}
  for (const btn of document.querySelectorAll('.speed-pill')) {
    btn.classList.toggle('active', btn.dataset.speed === s);
  }
}
$('speedRow').addEventListener('click', (e) => {
  const btn = e.target.closest('.speed-pill');
  if (!btn) return;
  setSpeed(btn.dataset.speed);
});

// ============================================================================
// INIT
// ============================================================================
let savedSpeed = null;
try { savedSpeed = localStorage.getItem(SPEED_KEY); } catch (e) {}
setSpeed(savedSpeed || 'medium');
loadProgress();
$('levelTotal').textContent = LEVELS.length;
renderLevels();
// Hub registers the service worker; its scope covers this page too.
</script>
