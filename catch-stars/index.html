<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🌟 จับดาว — เกมสำหรับเด็ก</title>
<meta name="description" content="เกมรับดาวที่ตกจากฟ้า หลบดาวร้าย ฝึกการคาดเดาและจับเวลา">
<meta name="theme-color" content="#ff6b9d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="จับดาว">
<meta name="mobile-web-app-capable" content="yes">

<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../icons/icon.svg">
<link rel="manifest" href="../manifest.webmanifest">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Itim&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-3: #b5e8ff; --grass-1: #7ed957;
    --brand: #ff6b9d; --brand-dark: #e54b82;
    --gold: #ffd93d; --good: #5bc13a; --good-dark: #3fa024;
    --bad: #ff5757; --bad-dark: #d83838;
    --ink: #2d3436; --card: #ffffff; --card-border: #ffd6e4;
    --night-1: #2c3e50;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Mitr', -apple-system, sans-serif;
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 10%, #fff9c4 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, #ffcfd2 0%, transparent 45%),
      linear-gradient(180deg, var(--sky-3) 0%, #d9f3c9 65%, var(--grass-1) 100%);
    background-attachment: fixed;
    user-select: none;
    -webkit-user-select: none;
  }
  body::before {
    content: '☁️ ☁️     ☁️';
    position: fixed; top: 20px; left: 0; right: 0;
    text-align: center; font-size: 42px;
    opacity: 0.55; pointer-events: none;
    letter-spacing: 80px;
    animation: drift 40s linear infinite;
    z-index: 0;
  }
  @keyframes drift {
    from { transform: translateX(-10%); }
    to { transform: translateX(10%); }
  }

  .app { max-width: 880px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
  body:has(#gameScreen.active) .app {
    max-width: 100%; padding: 0; height: 100vh; height: 100dvh;
  }
  body:has(#gameScreen.active)::before { display: none; }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn .35s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero { text-align: center; padding: 14px 10px 24px; }
  .hero h1 {
    font-family: 'Itim', cursive;
    font-size: clamp(42px, 9vw, 68px);
    margin: 0; color: var(--brand-dark);
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
    letter-spacing: 1px;
  }
  .hero p {
    font-size: clamp(16px, 3.4vw, 22px);
    margin: 12px 0 0; color: #555; font-weight: 500;
  }

  .speed-row {
    display: flex; justify-content: center; align-items: center;
    gap: 10px; margin: 8px 0 18px; flex-wrap: wrap;
  }
  .speed-label {
    font-family: 'Itim', cursive; font-size: 22px;
    color: var(--brand-dark); margin-right: 4px;
    text-shadow: 2px 2px 0 #fff;
  }
  .speed-pill {
    font-family: inherit; font-size: 18px; font-weight: 600;
    padding: 10px 22px; border: 3px solid #fff; border-radius: 999px;
    background: #fff; color: #777; cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.08);
    transition: transform .12s, background .15s, color .15s, box-shadow .12s;
    min-width: 92px;
  }
  .speed-pill:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.08); }
  .speed-pill.active {
    background: var(--brand); color: #fff; border-color: #fff;
    box-shadow: 0 4px 0 var(--brand-dark);
  }

  .lgrid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px; margin: 10px 0 32px;
  }
  .lcard {
    background: var(--card); border: 4px solid var(--card-border);
    border-radius: 24px; padding: 22px 14px 18px; text-align: center;
    cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.07);
    transition: transform .15s, box-shadow .15s, border-color .15s;
    position: relative; overflow: hidden;
  }
  .lcard:active { transform: scale(0.96) translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.07); }
  .lcard:hover { border-color: var(--brand); }
  .lcard .preview {
    font-size: 56px; line-height: 1;
    filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.12));
    margin-bottom: 6px;
  }
  .lcard .ltitle {
    font-family: 'Itim', cursive; font-size: 26px;
    color: var(--brand-dark); text-shadow: 2px 2px 0 #fff;
  }
  .lcard .lsub { font-size: 14px; color: #777; font-weight: 500; margin-top: 4px; }
  .lcard .stars {
    position: absolute; top: 10px; right: 10px;
    font-size: 18px; letter-spacing: 1px;
  }

  /* Game */
  #gameScreen.active {
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .hud {
    flex: 0 0 auto; display: flex; justify-content: space-between;
    align-items: center; gap: 8px;
    margin: 12px 14px 0;
    font-family: 'Itim', cursive; font-size: 22px;
  }
  .hud-item {
    background: #fff; border: 3px solid var(--card-border);
    border-radius: 999px; padding: 6px 16px;
    box-shadow: 0 3px 0 rgba(0,0,0,0.08);
    min-width: 80px; text-align: center;
  }
  .hud-item.score { color: var(--brand-dark); font-size: 26px; min-width: 110px; }
  .hud-item.time  { color: #2980b9; }
  .hud-item.miss  { color: var(--bad-dark); }

  .play-area {
    flex: 1 1 auto;
    position: relative; overflow: hidden;
    margin: 12px;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.6), transparent 50%),
      radial-gradient(circle at 80% 25%, rgba(255,217,61,0.3), transparent 60%),
      linear-gradient(180deg, #4e6a8a 0%, #6688aa 60%, #88a8c4 100%);
    border-radius: 26px;
    border: 4px solid #fff;
    box-shadow: 0 5px 0 rgba(0,0,0,0.12), inset 0 0 60px rgba(0,0,0,0.15);
    min-height: 280px;
    touch-action: none;
  }
  /* Twinkling background stars (decorative) */
  .play-area::before, .play-area::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(2px 2px at 20% 30%, #fff, transparent),
      radial-gradient(2px 2px at 60% 70%, #fff, transparent),
      radial-gradient(1px 1px at 50% 50%, #fff, transparent),
      radial-gradient(2px 2px at 30% 80%, #fff, transparent),
      radial-gradient(1px 1px at 75% 20%, #fff, transparent),
      radial-gradient(2px 2px at 85% 60%, #fff, transparent),
      radial-gradient(1px 1px at 10% 70%, #fff, transparent);
    background-size: 100% 100%;
    opacity: 0.5;
    pointer-events: none;
  }
  .play-area::after {
    animation: twinkle 3s ease-in-out infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.3; } to { opacity: 0.7; } }

  .falling {
    position: absolute;
    font-size: 56px;
    line-height: 1;
    transform: translate(-50%, -50%);
    pointer-events: none;
    will-change: transform;
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
  }
  .falling.bomb { filter: drop-shadow(0 0 8px rgba(255,80,80,0.7)); }

  .basket {
    position: absolute;
    bottom: 14px;
    width: 130px; height: 70px;
    transform: translateX(-50%);
    cursor: grab;
    touch-action: none;
    z-index: 10;
    pointer-events: auto;
  }
  .basket-shape {
    width: 100%; height: 100%;
    background: linear-gradient(180deg, #ad6f3a, #6e3f1c);
    clip-path: polygon(8% 0%, 92% 0%, 80% 100%, 20% 100%);
    border-radius: 14px 14px 30px 30px;
    box-shadow: 0 6px 0 rgba(0,0,0,0.25), inset 0 -8px 0 rgba(0,0,0,0.18);
    position: relative;
    overflow: hidden;
  }
  .basket-shape::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 8px;
    background: rgba(0,0,0,0.3);
  }
  .basket.dragging { cursor: grabbing; }
  .basket.flash {
    animation: basketFlash .35s ease;
  }
  @keyframes basketFlash {
    0%, 100% { transform: translateX(-50%) scale(1); }
    50%      { transform: translateX(-50%) scale(1.12); }
  }
  .basket.shake {
    animation: basketShake .35s ease;
  }
  @keyframes basketShake {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    25% { transform: translateX(-50%) translateY(4px) rotate(-3deg); }
    75% { transform: translateX(-50%) translateY(4px) rotate(3deg); }
  }

  .pop-burst {
    position: absolute;
    pointer-events: none;
    font-size: 42px;
    transform: translate(-50%, -50%);
    z-index: 5;
    animation: popBurst .5s ease-out forwards;
  }
  @keyframes popBurst {
    0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.6); opacity: 0; }
  }
  .pop-score {
    position: absolute;
    pointer-events: none;
    font-family: 'Itim', cursive;
    font-size: 32px;
    color: var(--gold);
    text-shadow: 2px 2px 0 #fff, 4px 4px 0 var(--brand-dark);
    transform: translate(-50%, -50%);
    z-index: 6;
    animation: popScore .9s ease-out forwards;
  }
  @keyframes popScore {
    0%   { transform: translate(-50%, -50%) scale(0.6); opacity: 0; }
    20%  { transform: translate(-50%, -90%) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%, -200%) scale(1); opacity: 0; }
  }

  /* Overlay */
  .overlay-msg {
    position: fixed; inset: 0;
    display: none; align-items: center; justify-content: center;
    pointer-events: none; z-index: 100;
    font-family: 'Itim', cursive; color: #fff; text-align: center;
  }
  .overlay-msg.shown { display: flex; }
  .overlay-msg .msg {
    background: var(--brand); border: 4px solid #fff; border-radius: 32px;
    padding: 28px 48px; font-size: clamp(44px, 8vw, 80px); line-height: 1.1;
    box-shadow: 0 8px 0 rgba(0,0,0,0.18);
    animation: msgPop .5s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-shadow: 3px 3px 0 var(--brand-dark);
    max-width: 90vw;
  }
  .overlay-msg .msg.go { background: var(--good); text-shadow: 3px 3px 0 var(--good-dark); }
  .overlay-msg .msg.win {
    background: var(--gold); color: var(--ink);
    text-shadow: 3px 3px 0 #fff, 4px 4px 0 rgba(0,0,0,0.15);
  }
  @keyframes msgPop {
    0%   { transform: scale(0.4) rotate(-6deg); opacity: 0; }
    60%  { transform: scale(1.1) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  /* Results */
  #resultsScreen { text-align: center; padding-top: 20px; }
  .trophy {
    font-size: clamp(120px, 22vw, 180px); line-height: 1;
    filter: drop-shadow(4px 6px 0 rgba(0,0,0,0.18));
    animation: bobBig 1.2s ease-in-out infinite;
  }
  @keyframes bobBig {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-12px) rotate(4deg); }
  }
  .winner-name {
    font-family: 'Itim', cursive;
    font-size: clamp(44px, 9vw, 72px);
    color: var(--brand-dark); margin: 18px 0 6px;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
  }
  .winner-sub {
    font-size: clamp(18px, 4vw, 24px);
    color: #555; margin: 0 0 6px; font-weight: 500;
  }
  .stars-row {
    font-size: clamp(48px, 10vw, 72px); line-height: 1;
    margin: 8px 0 4px; letter-spacing: 4px;
    filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.12));
  }
  .rating-text {
    font-family: 'Itim', cursive;
    font-size: clamp(28px, 6vw, 40px);
    color: var(--brand-dark); margin: 4px 0 16px;
  }
  .action-bar {
    display: flex; gap: 12px; justify-content: center; align-items: center;
    margin-top: 12px; flex-wrap: wrap;
  }
  .btn-main {
    font-family: 'Itim', cursive;
    font-size: 28px; padding: 16px 36px;
    border: 4px solid #fff; border-radius: 999px;
    background: var(--brand); color: #fff;
    box-shadow: 0 6px 0 var(--brand-dark);
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
    text-shadow: 2px 2px 0 var(--brand-dark);
  }
  .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--brand-dark); }
  .btn-ghost {
    font-family: 'Itim', cursive;
    font-size: 24px; padding: 14px 30px;
    border: 4px solid var(--brand); border-radius: 999px;
    background: #fff; color: var(--brand-dark);
    box-shadow: 0 5px 0 rgba(0,0,0,0.12);
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
  }
  .btn-ghost:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }

  .confetti {
    position: fixed; top: -20px;
    width: 12px; height: 18px;
    z-index: 90; pointer-events: none;
    animation: fall linear forwards;
  }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

  .home-btn {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    left: 12px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #fff; border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; text-decoration: none; z-index: 60;
    transition: transform .12s;
  }
  .home-btn:active { transform: scale(0.92); }

  @media (min-width: 768px) {
    .basket { width: 160px; height: 90px; }
    .lgrid { grid-template-columns: repeat(4, 1fr); gap: 18px; }
    .hud { font-size: 26px; }
    .hud-item { padding: 8px 22px; min-width: 110px; }
    .hud-item.score { font-size: 32px; min-width: 140px; }
    .falling { font-size: 70px; }
  }
  @media (min-width: 1024px) {
    .basket { width: 180px; height: 100px; }
    .falling { font-size: 80px; }
  }
  @media (max-width: 480px) {
    .basket { width: 100px; height: 56px; bottom: 10px; }
    .lcard { padding: 16px 10px 14px; border-width: 3px; border-radius: 20px; }
    .lcard .ltitle { font-size: 22px; }
    .hud { font-size: 18px; margin: 8px 10px 0; }
    .hud-item { padding: 5px 12px; min-width: 70px; }
    .hud-item.score { font-size: 22px; min-width: 90px; }
    .play-area { margin: 8px; }
    .falling { font-size: 44px; }
  }
</style>
</head>
<body>
<a class="home-btn" href="../" aria-label="กลับหน้าหลัก">🏠</a>
<div class="app">

  <section id="selectScreen" class="screen active">
    <header class="hero">
      <h1>🌟 จับดาว</h1>
      <p>ลากตะกร้ารับ ⭐ และ 🌙 — หลบ ☄️!<br/><small style="font-size:.85em;color:#888">รับดาวร้าย 3 ครั้ง = จบ</small></p>
    </header>

    <div class="speed-row" id="speedRow">
      <div class="speed-label">ความเร็วตก:</div>
      <button class="speed-pill" data-speed="slow" type="button">🐢 ช้า</button>
      <button class="speed-pill active" data-speed="medium" type="button">🐇 กลาง</button>
      <button class="speed-pill" data-speed="fast" type="button">⚡ เร็ว</button>
    </div>

    <div id="levelGrid" class="lgrid"></div>
  </section>

  <section id="gameScreen" class="screen">
    <div class="hud">
      <div class="hud-item score">🌟 <span id="scoreCount">0</span></div>
      <div class="hud-item miss">❤️ <span id="lives">3</span></div>
      <div class="hud-item time">⏱ <span id="timeLeft">60</span></div>
    </div>
    <div class="play-area" id="playArea">
      <div id="basket" class="basket"><div class="basket-shape"></div></div>
    </div>
  </section>

  <section id="resultsScreen" class="screen">
    <div class="trophy">🏆</div>
    <h2 id="resultScore" class="winner-name">0 คะแนน</h2>
    <p id="resultSub" class="winner-sub">—</p>
    <div id="resultStars" class="stars-row">⭐</div>
    <div id="resultText" class="rating-text">ลองอีกที!</div>
    <div class="action-bar">
      <button id="againBtn" class="btn-ghost">🔄 เล่นอีก</button>
      <button id="newBtn" class="btn-main">เลือกใหม่</button>
    </div>
  </section>

</div>

<div id="overlayMsg" class="overlay-msg"></div>

<script>
'use strict';

// ============================================================================
// LEVELS
// ============================================================================
const LEVELS = [
  { id: 1, stars: 1, name: 'ฟ้าใส',   subtitle: 'ดาวดีเท่านั้น',     preview: '⭐',
    hasBombs: false, bombRate: 0.0,   spawnMul: 1.4 },
  { id: 2, stars: 1, name: 'มีดาวร้าย', subtitle: 'หลบ ☄️ ด้วย',         preview: '☄️',
    hasBombs: true,  bombRate: 0.20,  spawnMul: 1.0 },
  { id: 3, stars: 2, name: 'ดาวร่วงมาก',subtitle: 'หลายแบบ',             preview: '🌠',
    hasBombs: true,  bombRate: 0.28,  spawnMul: 0.7 },
  { id: 4, stars: 3, name: 'พายุดาว',  subtitle: 'รัวๆ — ระวังตา',     preview: '⚡',
    hasBombs: true,  bombRate: 0.32,  spawnMul: 0.5 },
];

const ROUND_MS = 60000;
const SPAWN_MIN_MS = 600;
const SPAWN_MAX_MS = 1100;
const FALL_BASE_MS = 4500;
const SPEED_LEVELS = {
  slow:   { fallMul: 1.5, spawnMul: 1.4 },
  medium: { fallMul: 1.0, spawnMul: 1.0 },
  fast:   { fallMul: 0.7, spawnMul: 0.7 },
};
const SPEED_KEY = 'catchStarsSpeed';
const STAR_TYPES = [
  { emoji: '⭐', value: 1, weight: 5 },
  { emoji: '🌟', value: 2, weight: 2 },
  { emoji: '🌙', value: 1, weight: 2 },
  { emoji: '🍀', value: 3, weight: 1 },  // rare jackpot
];

// ============================================================================
// STATE
// ============================================================================
const state = {
  level: null,
  speed: 'medium',
  score: 0,
  lives: 3,
  startTime: 0,
  endTime: 0,
  timeLeftSec: 60,
  running: false,
  items: new Map(),       // id -> { id, el, kind, value, x, anim }
  itemSeq: 0,
  spawnTimer: null,
  tickTimer: null,
  basketX: 0,             // basket center X in playArea coords (px)
  basketDragging: false,
  pointerId: null,
  pointerOffsetX: 0,
  pendingTimers: [],
};

// ============================================================================
// AUDIO
// ============================================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
}
function tone(freq, ms, type='sine', vol=0.18) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  o.connect(g).connect(audioCtx.destination);
  const t = audioCtx.currentTime, d = ms/1000;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.01);
  g.gain.linearRampToValueAtTime(0, t + d);
  o.start(t); o.stop(t + d + 0.02);
}
function playCatch(value) {
  const base = 440 + value * 80;
  tone(base, 90, 'triangle', 0.16);
  setTimeout(() => tone(base * 1.5, 90, 'sine', 0.10), 60);
}
function playBomb() {
  tone(220, 80, 'sawtooth', 0.18);
  setTimeout(() => tone(110, 200, 'sawtooth', 0.18), 80);
}

// ============================================================================
// DOM
// ============================================================================
const $ = (id) => document.getElementById(id);
const screens = {
  select:  $('selectScreen'),
  game:    $('gameScreen'),
  results: $('resultsScreen'),
};
const levelGrid    = $('levelGrid');
const playArea     = $('playArea');
const basket       = $('basket');
const overlay      = $('overlayMsg');
const scoreCount   = $('scoreCount');
const livesEl      = $('lives');
const timeLeftEl   = $('timeLeft');

// ============================================================================
// UTIL
// ============================================================================
function buzz(p) { if (navigator.vibrate) navigator.vibrate(p); }
function showScreen(name) { for (const k of Object.keys(screens)) screens[k].classList.toggle('active', k===name); }
function speedPreset() { return SPEED_LEVELS[state.speed] || SPEED_LEVELS.medium; }
function later(fn, ms) {
  const id = setTimeout(fn, ms);
  state.pendingTimers.push(id);
  return id;
}
function clearTimers() {
  for (const id of state.pendingTimers) clearTimeout(id);
  state.pendingTimers = [];
}

// ============================================================================
// SELECT
// ============================================================================
function renderLevels() {
  levelGrid.innerHTML = '';
  for (const lvl of LEVELS) {
    const c = document.createElement('div');
    c.className = 'lcard';
    c.innerHTML = `
      <div class="stars">${'⭐'.repeat(lvl.stars)}</div>
      <div class="preview">${lvl.preview}</div>
      <div class="ltitle">${lvl.name}</div>
      <div class="lsub">${lvl.subtitle}</div>
    `;
    c.addEventListener('click', () => { ensureAudio(); startGame(lvl); });
    levelGrid.appendChild(c);
  }
}

// ============================================================================
// GAME
// ============================================================================
function startGame(level) {
  state.level = level;
  state.score = 0;
  state.lives = 3;
  state.timeLeftSec = Math.ceil(ROUND_MS / 1000);
  state.items.clear();
  state.itemSeq = 0;
  scoreCount.textContent = '0';
  livesEl.textContent = '3';
  timeLeftEl.textContent = state.timeLeftSec;
  // Clear any leftover items
  for (const el of playArea.querySelectorAll('.falling, .pop-burst, .pop-score')) el.remove();
  clearTimers();
  showScreen('game');
  // Position basket center
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const r = playArea.getBoundingClientRect();
    state.basketX = r.width / 2;
    setBasketPosition(state.basketX);
    state.startTime = performance.now();
    state.endTime = state.startTime + ROUND_MS;
    state.running = true;
    state.tickTimer = setInterval(tick, 200);
    state.tickTimer2 = setInterval(checkCatches, 30);
    scheduleSpawn();
    later(spawn, 350);
  }));
}

function tick() {
  if (!state.running) return;
  const remain = Math.max(0, state.endTime - performance.now());
  const newSec = Math.ceil(remain / 1000);
  if (newSec !== state.timeLeftSec) {
    state.timeLeftSec = newSec;
    timeLeftEl.textContent = newSec;
  }
  if (remain <= 0) endRound();
}

function scheduleSpawn() {
  if (!state.running) return;
  const baseInterval = SPAWN_MIN_MS + Math.random() * (SPAWN_MAX_MS - SPAWN_MIN_MS);
  const interval = baseInterval * speedPreset().spawnMul * state.level.spawnMul;
  state.spawnTimer = later(() => {
    if (state.running) spawn();
    scheduleSpawn();
  }, Math.max(150, interval));
}

function pickStarType() {
  const total = STAR_TYPES.reduce((a, b) => a + b.weight, 0);
  let r = Math.random() * total;
  for (const t of STAR_TYPES) {
    r -= t.weight;
    if (r <= 0) return t;
  }
  return STAR_TYPES[0];
}

function spawn() {
  if (!state.running) return;
  const id = ++state.itemSeq;
  const isBomb = state.level.hasBombs && Math.random() < state.level.bombRate;
  let kind, emoji, value;
  if (isBomb) {
    kind = 'bomb'; emoji = '☄️'; value = 0;
  } else {
    const t = pickStarType();
    kind = 'star'; emoji = t.emoji; value = t.value;
  }
  const r = playArea.getBoundingClientRect();
  // Spawn at random horizontal, top of stage (y = 0)
  const sizeGuess = window.innerWidth >= 1024 ? 80 : window.innerWidth >= 768 ? 70 : (window.innerWidth >= 480 ? 56 : 44);
  const x = sizeGuess/2 + Math.random() * Math.max(100, r.width - sizeGuess);
  const el = document.createElement('div');
  el.className = 'falling' + (isBomb ? ' bomb' : '');
  el.textContent = emoji;
  el.style.left = x + 'px';
  el.style.top  = '0px';
  playArea.appendChild(el);
  // Animate falling
  const fallMs = FALL_BASE_MS * speedPreset().fallMul * (0.85 + Math.random() * 0.3);
  const totalY = r.height + 80;
  const anim = el.animate([
    { transform: 'translate(-50%, -50%)' },
    { transform: `translate(-50%, ${totalY}px)` },
  ], { duration: fallMs, easing: 'linear', fill: 'forwards' });
  const item = { id, el, kind, value, x, fallMs, startedAt: performance.now(), anim };
  anim.onfinish = () => {
    if (state.items.has(id)) {
      // Reached bottom without being caught
      el.remove();
      state.items.delete(id);
    }
  };
  state.items.set(id, item);
}

function checkCatches() {
  if (!state.running) return;
  const playRect = playArea.getBoundingClientRect();
  const basketRect = basket.getBoundingClientRect();
  // Convert basket to playArea coords
  const bLeft = basketRect.left - playRect.left;
  const bTop  = basketRect.top - playRect.top;
  const bRight = bLeft + basketRect.width;
  const bMidY = bTop + basketRect.height * 0.4;  // upper area of basket counts as catch zone
  for (const [id, item] of state.items) {
    const r = item.el.getBoundingClientRect();
    const cy = r.top + r.height/2 - playRect.top;
    const cx = r.left + r.width/2 - playRect.left;
    if (cy >= bMidY && cy <= bMidY + basketRect.height * 0.5) {
      if (cx >= bLeft && cx <= bRight) {
        catchItem(item);
      }
    }
  }
}

function catchItem(item) {
  if (!state.items.has(item.id)) return;
  state.items.delete(item.id);
  if (item.anim) item.anim.cancel();
  const playRect = playArea.getBoundingClientRect();
  const r = item.el.getBoundingClientRect();
  const x = r.left + r.width/2 - playRect.left;
  const y = r.top + r.height/2 - playRect.top;
  item.el.remove();

  if (item.kind === 'bomb') {
    state.lives -= 1;
    livesEl.textContent = state.lives;
    spawnBurst(x, y, '💥');
    basket.classList.remove('shake');
    void basket.offsetWidth;
    basket.classList.add('shake');
    playBomb();
    buzz([60, 40, 80]);
    if (state.lives <= 0) endRound();
  } else {
    state.score += item.value;
    scoreCount.textContent = state.score;
    spawnBurst(x, y, '✨');
    spawnPopScore(x, y, '+' + item.value);
    basket.classList.remove('flash');
    void basket.offsetWidth;
    basket.classList.add('flash');
    playCatch(item.value);
    buzz(15);
  }
}

function spawnBurst(x, y, glyph) {
  const el = document.createElement('div');
  el.className = 'pop-burst';
  el.textContent = glyph;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  playArea.appendChild(el);
  setTimeout(() => el.remove(), 550);
}
function spawnPopScore(x, y, text) {
  const el = document.createElement('div');
  el.className = 'pop-score';
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  playArea.appendChild(el);
  setTimeout(() => el.remove(), 950);
}

function setBasketPosition(x) {
  const r = playArea.getBoundingClientRect();
  const halfBasket = basket.getBoundingClientRect().width / 2;
  x = Math.max(halfBasket, Math.min(r.width - halfBasket, x));
  state.basketX = x;
  basket.style.left = x + 'px';
}

// ============================================================================
// BASKET DRAG (pointer events on the play area)
// ============================================================================
playArea.addEventListener('pointerdown', (e) => {
  if (!state.running) return;
  e.preventDefault();
  state.basketDragging = true;
  state.pointerId = e.pointerId;
  try { playArea.setPointerCapture(e.pointerId); } catch (_) {}
  basket.classList.add('dragging');
  const r = playArea.getBoundingClientRect();
  setBasketPosition(e.clientX - r.left);
}, { passive: false });

playArea.addEventListener('pointermove', (e) => {
  if (!state.basketDragging || e.pointerId !== state.pointerId) return;
  const r = playArea.getBoundingClientRect();
  setBasketPosition(e.clientX - r.left);
});

function endBasketDrag(e) {
  if (!state.basketDragging || e.pointerId !== state.pointerId) return;
  state.basketDragging = false;
  state.pointerId = null;
  basket.classList.remove('dragging');
  try { playArea.releasePointerCapture(e.pointerId); } catch (_) {}
}
playArea.addEventListener('pointerup', endBasketDrag);
playArea.addEventListener('pointercancel', endBasketDrag);

function endRound() {
  state.running = false;
  if (state.spawnTimer) clearTimeout(state.spawnTimer);
  if (state.tickTimer)  clearInterval(state.tickTimer);
  if (state.tickTimer2) clearInterval(state.tickTimer2);
  for (const item of state.items.values()) {
    if (item.anim) item.anim.cancel();
    item.el.remove();
  }
  state.items.clear();
  showResults();
}

// ============================================================================
// RESULTS
// ============================================================================
function showResults() {
  $('resultScore').textContent = state.score + ' คะแนน!';
  let sub = state.level.name;
  if (state.lives <= 0) sub += ' · โดน ☄️ 3 ครั้ง';
  $('resultSub').textContent = sub;
  const r = ratingFor(state.score);
  $('resultStars').textContent = r.stars;
  $('resultText').textContent  = r.text;
  showScreen('results');
  celebrate(r.confettiCount);
  buzz([60, 40, 60, 40, 100]);
}

function ratingFor(score) {
  if (score >= 70) return { stars: '🌟🌟🌟🌟🌟', text: 'สุดยอด!',     confettiCount: 160 };
  if (score >= 45) return { stars: '⭐⭐⭐⭐',     text: 'เก่งมาก!',    confettiCount: 120 };
  if (score >= 25) return { stars: '⭐⭐⭐',        text: 'เก่ง!',        confettiCount: 90  };
  if (score >= 12) return { stars: '⭐⭐',           text: 'ดีมาก!',      confettiCount: 60  };
  if (score >= 1)  return { stars: '⭐',                text: 'ดี!',          confettiCount: 40  };
  return                  { stars: '✨',                  text: 'ลองอีกที!',  confettiCount: 20  };
}

function celebrate(n) {
  const colors = ['#ff6b9d', '#ffd93d', '#7ed957', '#5bc0eb', '#ff914d', '#b388ff'];
  for (let i = 0; i < n; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = Math.random() * 0.8 + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    if (Math.random() > 0.5) c.style.borderRadius = '50%';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

// ============================================================================
// EVENTS
// ============================================================================
$('againBtn').addEventListener('click', () => {
  if (!state.level) { showScreen('select'); return; }
  ensureAudio();
  startGame(state.level);
});
$('newBtn').addEventListener('click', () => {
  state.level = null;
  clearTimers();
  showScreen('select');
});

let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd < 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

function setSpeed(s) {
  if (!SPEED_LEVELS[s]) s = 'medium';
  state.speed = s;
  try { localStorage.setItem(SPEED_KEY, s); } catch (e) {}
  for (const btn of document.querySelectorAll('.speed-pill')) {
    btn.classList.toggle('active', btn.dataset.speed === s);
  }
}
$('speedRow').addEventListener('click', (e) => {
  const btn = e.target.closest('.speed-pill');
  if (!btn) return;
  setSpeed(btn.dataset.speed);
});

// Init
let savedSpeed = null;
try { savedSpeed = localStorage.getItem(SPEED_KEY); } catch (e) {}
setSpeed(savedSpeed || 'medium');
renderLevels();
</script>
</body>
</html>
