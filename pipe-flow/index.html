<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

<meta property="og:description" content="หมุนท่อให้น้ำไหลถึงปลายทาง ฝึกการคิดและวางแผน">

<style>
  :root {
    --sky-3: #b5e8ff;
    --grass-1: #7ed957;
    --brand: #ff6b9d;
    --brand-dark: #e54b82;
    --gold: #ffd93d;
    --good: #5bc13a;
    --good-dark: #3fa024;
    --ink: #2d3436;
    --paper: #fffef9;
    --card: #ffffff;
    --card-border: #ffd6e4;

    --tile: #eef6ff;
    --tile-dark: #d9e9f7;
    --pipe: #9aa7b3;
    --pipe-dark: #6b7a8a;
    --water: #4cc9f0;
    --water-dark: #2a9bc8;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Mitr', -apple-system, sans-serif;
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 10%, #fff9c4 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, #ffcfd2 0%, transparent 45%),
      linear-gradient(180deg, var(--sky-3) 0%, #d9f3c9 65%, var(--grass-1) 100%);
    background-attachment: fixed;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  body::before {
    content: '☁️ ☁️     ☁️';
    position: fixed; top: 20px; left: 0; right: 0;
    text-align: center; font-size: 42px;
    opacity: 0.55; pointer-events: none;
    letter-spacing: 80px;
    animation: drift 40s linear infinite;
    z-index: 0;
  }
  @keyframes drift {
    from { transform: translateX(-10%); }
    to { transform: translateX(10%); }
  }

  .app { max-width: 880px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
  body:has(#gameScreen.active) .app {
    max-width: 100%;
    padding: 0;
  }
  body:has(#gameScreen.active)::before { display: none; }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn .35s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero { text-align: center; padding: 14px 10px 18px; }
  .hero h1 {
    font-family: 'Itim', 'Mitr', cursive;
    font-size: clamp(42px, 9vw, 68px);
    margin: 0;
    color: var(--brand-dark);
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
    letter-spacing: 1px;
  }
  .hero p.hint {
    font-family: 'Itim', cursive;
    font-size: clamp(20px, 4vw, 28px);
    margin: 8px 0 0;
    color: var(--brand-dark);
  }

  .home-btn, .back-btn {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #fff;
    border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    align-items: center; justify-content: center;
    font-size: 26px;
    text-decoration: none;
    color: var(--ink);
    z-index: 60;
    transition: transform .12s;
    font-family: inherit;
    padding: 0;
    cursor: pointer;
  }
  .home-btn { left: 12px; display: flex; }
  .back-btn { right: 12px; display: none; }
  .back-btn.show { display: flex; }
  .home-btn:active, .back-btn:active { transform: scale(0.92); }

  .howto {
    list-style: none;
    padding: 12px 18px;
    margin: 8px auto 14px;
    max-width: 380px;
    background: rgba(255,255,255,0.55);
    border: 2px dashed var(--card-border);
    border-radius: 18px;
    font-size: 16px;
    color: #555;
    font-weight: 500;
    text-align: left;
  }
  .howto li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 3px 0;
    line-height: 1.3;
  }
  .howto-icon { font-size: 22px; flex-shrink: 0; width: 28px; text-align: center; }

  .lgrid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin: 14px 0;
  }
  .lcard {
    background: var(--card);
    border: 4px solid var(--card-border);
    border-radius: 22px;
    padding: 14px 10px 12px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 5px 0 rgba(0,0,0,0.08);
    transition: transform .15s, box-shadow .15s, border-color .15s;
    position: relative;
  }
  .lcard:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.08); }
  .lcard.cleared { border-color: var(--good); }
  .lcard.cleared::before {
    content: '⭐';
    position: absolute;
    top: -10px; right: -8px;
    font-size: 32px;
    filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.15));
  }
  .lcard .ltitle {
    font-family: 'Itim', cursive;
    font-size: 22px;
    color: var(--brand-dark);
    margin-bottom: 6px;
  }
  .lcard .preview {
    display: grid;
    gap: 2px;
    width: 100%;
    max-width: 130px;
    margin: 0 auto;
    aspect-ratio: 1 / 1;
    background: var(--tile-dark);
    padding: 4px;
    border-radius: 8px;
  }
  .lcard .preview .p-cell {
    background: var(--tile);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    line-height: 1;
  }
  .lcard .preview .p-cell.src { background: #cdeffd; }
  .lcard .preview .p-cell.dst { background: #d4f0c2; }
  .lcard .preview .p-cell.pipe { background: #e3e8ee; }

  @media (min-width: 480px) {
    .lgrid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (min-width: 720px) {
    .lgrid { grid-template-columns: repeat(4, 1fr); }
  }

  #gameScreen {
    height: 100vh;
    height: 100dvh;
    display: none;
    flex-direction: column;
    padding: calc(12px + env(safe-area-inset-top)) 8px calc(12px + env(safe-area-inset-bottom));
  }
  #gameScreen.active { display: flex; }

  .hud {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 60px 0 8px;
    font-family: 'Itim', cursive;
    font-size: 22px;
  }
  .hud-item {
    background: #fff;
    border: 3px solid var(--card-border);
    box-shadow: 0 3px 0 rgba(0,0,0,0.08);
    border-radius: 999px;
    padding: 6px 18px;
    min-width: 90px;
    text-align: center;
    color: var(--brand-dark);
  }
  .hud-item span { color: var(--ink); font-weight: 700; }

  .stage-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    min-height: 0;
  }

  .board {
    position: relative;
    background: var(--tile-dark);
    border: 4px solid var(--card-border);
    border-radius: 18px;
    padding: 8px;
    display: grid;
    box-shadow: 0 6px 0 rgba(0,0,0,0.08);
    touch-action: manipulation;
    gap: 3px;
  }
  .cell {
    width: var(--cs);
    height: var(--cs);
    position: relative;
    background: var(--tile);
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
  }
  .cell.empty { cursor: default; }
  .cell.fixed { cursor: default; }
  .cell.src { background: #cdeffd; box-shadow: inset 0 0 0 2px var(--water-dark); }
  .cell.dst { background: #d4f0c2; box-shadow: inset 0 0 0 2px var(--good-dark); }
  .cell svg { display: block; width: 100%; height: 100%; }
  .cell .pipe-rot { transition: transform .18s cubic-bezier(.34,1.4,.6,1); transform-origin: 32px 32px; }
  .cell .water-stroke { stroke: var(--water); opacity: 0; transition: opacity .2s; }
  .cell.flow .water-stroke { opacity: 1; }
  .cell .label {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: calc(var(--cs) * 0.55);
    pointer-events: none;
    filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.12));
  }
  .cell.spin .pipe-rot { animation: spin .35s ease; }
  @keyframes spin {
    0% { transform: rotate(var(--from, 0deg)); }
    100% { transform: rotate(var(--to, 90deg)); }
  }
  .cell.dst.flow {
    animation: pulse-good 0.7s ease-in-out infinite alternate;
  }
  @keyframes pulse-good {
    from { box-shadow: inset 0 0 0 2px var(--good-dark); }
    to   { box-shadow: inset 0 0 0 4px var(--good-dark), 0 0 14px var(--good); }
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 12px;
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
  }
  .ctrl-btn {
    background: #fff;
    border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    border-radius: 18px;
    width: 64px;
    height: 64px;
    font-size: 30px;
    cursor: pointer;
    transition: transform .08s;
    padding: 0;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ctrl-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--brand-dark); }
  .ctrl-btn.aux {
    border-color: #aaa;
    box-shadow: 0 3px 0 #888;
  }

  .win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    animation: fadeIn .35s;
  }
  .win-overlay.show { display: flex; }
  .win-card {
    background: #fff;
    border: 5px solid var(--gold);
    border-radius: 28px;
    padding: 28px 28px 24px;
    text-align: center;
    box-shadow: 0 8px 0 rgba(0,0,0,0.15);
    max-width: 320px;
    width: 86%;
    animation: pop-in .4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop-in {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .win-card h2 {
    font-family: 'Itim', cursive;
    color: var(--brand-dark);
    font-size: 44px;
    margin: 0 0 4px;
    text-shadow: 2px 2px 0 #fff, 4px 4px 0 rgba(0,0,0,0.08);
  }
  .win-card .moves-result {
    font-size: 18px;
    color: #555;
    margin-bottom: 18px;
  }
  .win-card .moves-result b { color: var(--brand-dark); font-size: 22px; }
  .win-card .big-btn {
    display: block;
    width: 100%;
    margin: 8px 0;
    padding: 14px 18px;
    border: none;
    border-radius: 999px;
    font-family: 'Itim', cursive;
    font-size: 24px;
    color: #fff;
    background: var(--brand);
    box-shadow: 0 4px 0 var(--brand-dark);
    cursor: pointer;
    transition: transform .1s;
  }
  .win-card .big-btn.secondary {
    background: #fff;
    color: var(--brand-dark);
    border: 3px solid var(--brand);
    box-shadow: 0 4px 0 var(--brand-dark);
  }
  .win-card .big-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--brand-dark); }

  .confetti {
    position: fixed;
    top: -20px;
    width: 14px; height: 18px;
    z-index: 90; pointer-events: none;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }

  @media (max-width: 480px) {
    .ctrl-btn { width: 58px; height: 58px; font-size: 26px; border-radius: 16px; }
    .hud { font-size: 18px; margin-top: 56px; }
    .hud-item { padding: 4px 14px; min-width: 80px; }
    .lcard { padding: 10px 6px 8px; border-width: 3px; border-radius: 18px; }
    .lcard .ltitle { font-size: 18px; }
  }

  @media (min-width: 768px) {
    .ctrl-btn { width: 72px; height: 72px; font-size: 34px; }
  }
</style>
</head>
<body>
<a class="home-btn" href="../" aria-label="กลับหน้าหลัก">🏠</a>
<button class="back-btn" id="backBtn" type="button" aria-label="เลือกด่านใหม่">📋</button>

<div class="app">

  <section id="selectScreen" class="screen active">
    <header class="hero">
      <h1>💧 ต่อท่อน้ำ</h1>
      <ul class="howto">
        <li><span class="howto-icon">👆</span> แตะที่ท่อเพื่อหมุน 90°</li>
        <li><span class="howto-icon">💧</span> ต่อท่อจากต้นน้ำไปต้นไม้</li>
        <li><span class="howto-icon">🌱</span> น้ำต้องไหลถึงปลายทาง</li>
        <li><span class="howto-icon">🔄</span> เริ่มด่านใหม่ได้ตลอด</li>
      </ul>
      <p class="hint">เลือกด่าน</p>
    </header>
    <div class="lgrid" id="levelGrid"></div>
  </section>

  <section id="gameScreen" class="screen">
    <div class="hud">
      <div class="hud-item">ด่าน <span id="levelNum">1</span></div>
      <div class="hud-item">หมุน <span id="rotCount">0</span></div>
    </div>
    <div class="stage-area">
      <div class="board" id="board"></div>
    </div>
    <div class="controls">
      <button class="ctrl-btn aux" id="resetBtn" aria-label="เริ่มใหม่">🔄</button>
    </div>
  </section>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-card">
    <h2>เก่งมาก! 🎉</h2>
    <div class="moves-result">ใช้ทั้งหมด <b id="winMoves">0</b> ครั้ง</div>
    <button class="big-btn" id="nextBtn">ด่านต่อไป ➡️</button>
    <button class="big-btn secondary" id="selectBtn">เลือกด่านอื่น</button>
  </div>
</div>

<script>
'use strict';

const SIDES = ['top', 'right', 'bottom', 'left'];
const SIDE_DX = { top: 0, right: 1, bottom: 0, left: -1 };
const SIDE_DY = { top: -1, right: 0, bottom: 1, left: 0 };
const OPPOSITE = { top: 'bottom', right: 'left', bottom: 'top', left: 'right' };

// Base openings for rotation 0; rotation N (0..3) rotates them N*90 clockwise.
const BASE_OPENINGS = {
  straight: ['top', 'bottom'],
  elbow:    ['top', 'right'],
  tee:      ['top', 'left', 'right'],
  source:   ['right'],
  sink:     ['left'],
};

function rotateSide(side, rot) {
  const i = SIDES.indexOf(side);
  return SIDES[(i + rot) % 4];
}

function openingsOf(type, rot) {
  const base = BASE_OPENINGS[type];
  if (!base) return [];
  return base.map(s => rotateSide(s, rot));
}

// Levels: design solved layout, then we'll shuffle rotations at runtime.
// Each piece: {x, y, type, rot} where rot is the SOLVED rotation.
// source/sink have a `side` matching the opening direction in the solved state.

const LEVELS = [
  {
    w: 3, h: 3,
    source: { x: 0, y: 1, side: 'right' },
    sink:   { x: 2, y: 1, side: 'left' },
    pieces: [
      { x: 1, y: 1, type: 'straight', rot: 1 },
    ],
  },
  {
    w: 4, h: 3,
    source: { x: 0, y: 1, side: 'right' },
    sink:   { x: 3, y: 1, side: 'left' },
    pieces: [
      { x: 1, y: 1, type: 'straight', rot: 1 },
      { x: 2, y: 1, type: 'straight', rot: 1 },
    ],
  },
  {
    w: 4, h: 4,
    source: { x: 0, y: 0, side: 'right' },
    sink:   { x: 3, y: 3, side: 'top' },
    pieces: [
      { x: 1, y: 0, type: 'straight', rot: 1 },
      { x: 2, y: 0, type: 'straight', rot: 1 },
      { x: 3, y: 0, type: 'elbow', rot: 2 },
      { x: 3, y: 1, type: 'straight', rot: 0 },
      { x: 3, y: 2, type: 'straight', rot: 0 },
    ],
  },
  {
    w: 5, h: 4,
    source: { x: 0, y: 1, side: 'right' },
    sink:   { x: 4, y: 2, side: 'left' },
    pieces: [
      { x: 1, y: 1, type: 'elbow', rot: 2 },
      { x: 1, y: 2, type: 'elbow', rot: 0 },
      { x: 2, y: 2, type: 'straight', rot: 1 },
      { x: 3, y: 2, type: 'straight', rot: 1 },
      { x: 2, y: 0, type: 'elbow', rot: 2 },
    ],
  },
  {
    w: 5, h: 5,
    source: { x: 0, y: 2, side: 'right' },
    sink:   { x: 4, y: 2, side: 'left' },
    pieces: [
      { x: 1, y: 2, type: 'elbow', rot: 3 },
      { x: 1, y: 1, type: 'elbow', rot: 1 },
      { x: 2, y: 1, type: 'straight', rot: 1 },
      { x: 3, y: 1, type: 'elbow', rot: 2 },
      { x: 3, y: 2, type: 'elbow', rot: 0 },
      { x: 0, y: 0, type: 'elbow', rot: 1 },
    ],
  },
  {
    w: 5, h: 5,
    source: { x: 0, y: 0, side: 'right' },
    sink:   { x: 4, y: 4, side: 'left' },
    pieces: [
      { x: 1, y: 0, type: 'elbow', rot: 2 },
      { x: 1, y: 1, type: 'straight', rot: 0 },
      { x: 1, y: 2, type: 'elbow', rot: 0 },
      { x: 2, y: 2, type: 'straight', rot: 1 },
      { x: 3, y: 2, type: 'elbow', rot: 2 },
      { x: 3, y: 3, type: 'straight', rot: 0 },
      { x: 3, y: 4, type: 'elbow', rot: 0 },
      { x: 4, y: 1, type: 'tee', rot: 0 },
    ],
  },
  {
    w: 6, h: 5,
    source: { x: 0, y: 2, side: 'right' },
    sink:   { x: 5, y: 0, side: 'bottom' },
    pieces: [
      { x: 1, y: 2, type: 'straight', rot: 1 },
      { x: 2, y: 2, type: 'straight', rot: 1 },
      { x: 3, y: 2, type: 'straight', rot: 1 },
      { x: 4, y: 2, type: 'straight', rot: 1 },
      { x: 5, y: 2, type: 'elbow', rot: 3 },
      { x: 5, y: 1, type: 'straight', rot: 0 },
      { x: 0, y: 4, type: 'tee', rot: 0 },
      { x: 3, y: 4, type: 'elbow', rot: 3 },
    ],
  },
  {
    w: 6, h: 5,
    source: { x: 0, y: 0, side: 'right' },
    sink:   { x: 5, y: 4, side: 'top' },
    pieces: [
      { x: 1, y: 0, type: 'straight', rot: 1 },
      { x: 2, y: 0, type: 'straight', rot: 1 },
      { x: 3, y: 0, type: 'straight', rot: 1 },
      { x: 4, y: 0, type: 'elbow', rot: 2 },
      { x: 4, y: 1, type: 'straight', rot: 0 },
      { x: 4, y: 2, type: 'straight', rot: 0 },
      { x: 4, y: 3, type: 'elbow', rot: 0 },
      { x: 5, y: 3, type: 'elbow', rot: 2 },
      { x: 0, y: 4, type: 'tee', rot: 1 },
      { x: 2, y: 2, type: 'elbow', rot: 0 },
    ],
  },
  {
    w: 6, h: 6,
    source: { x: 0, y: 0, side: 'right' },
    sink:   { x: 5, y: 5, side: 'top' },
    pieces: [
      { x: 1, y: 0, type: 'straight', rot: 1 },
      { x: 2, y: 0, type: 'elbow', rot: 2 },
      { x: 2, y: 1, type: 'elbow', rot: 0 },
      { x: 3, y: 1, type: 'straight', rot: 1 },
      { x: 4, y: 1, type: 'elbow', rot: 2 },
      { x: 4, y: 2, type: 'elbow', rot: 0 },
      { x: 5, y: 2, type: 'elbow', rot: 2 },
      { x: 5, y: 3, type: 'straight', rot: 0 },
      { x: 5, y: 4, type: 'straight', rot: 0 },
      { x: 0, y: 3, type: 'tee', rot: 1 },
      { x: 3, y: 4, type: 'elbow', rot: 0 },
    ],
  },
  {
    w: 7, h: 6,
    source: { x: 0, y: 2, side: 'right' },
    sink:   { x: 6, y: 3, side: 'left' },
    pieces: [
      { x: 1, y: 2, type: 'elbow', rot: 3 },
      { x: 1, y: 1, type: 'elbow', rot: 1 },
      { x: 2, y: 1, type: 'straight', rot: 1 },
      { x: 3, y: 1, type: 'elbow', rot: 2 },
      { x: 3, y: 2, type: 'straight', rot: 0 },
      { x: 3, y: 3, type: 'elbow', rot: 0 },
      { x: 4, y: 3, type: 'straight', rot: 1 },
      { x: 5, y: 3, type: 'straight', rot: 1 },
      { x: 4, y: 0, type: 'elbow', rot: 2 },
      { x: 0, y: 5, type: 'tee', rot: 0 },
      { x: 6, y: 0, type: 'elbow', rot: 3 },
    ],
  },
];

const SHUFFLE_PIECE = ['straight', 'elbow', 'tee'];

const state = {
  levelIdx: 0,
  rotations: 0,
  won: false,
  cellSize: 56,
  cells: [],
  width: 0,
  height: 0,
  source: null,
  sink: null,
  cleared: new Set(),
  startRots: [],
  cellEls: [],
};

const STORAGE_KEY = 'pipe-flow-cleared-v1';

function loadCleared() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const arr = JSON.parse(raw);
      if (Array.isArray(arr)) state.cleared = new Set(arr);
    }
  } catch (_) {}
}
function saveCleared() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...state.cleared]));
  } catch (_) {}
}

function rotForSide(type, side) {
  // Returns rot such that openingsOf(type, rot) includes `side` as a/the opening.
  const base = BASE_OPENINGS[type][0];
  return (SIDES.indexOf(side) - SIDES.indexOf(base) + 4) % 4;
}

function buildSolvedGrid(level) {
  const cells = Array.from({ length: level.h }, () =>
    Array.from({ length: level.w }, () => null)
  );
  cells[level.source.y][level.source.x] = {
    type: 'source', rot: rotForSide('source', level.source.side), fixed: true,
    x: level.source.x, y: level.source.y,
  };
  cells[level.sink.y][level.sink.x] = {
    type: 'sink', rot: rotForSide('sink', level.sink.side), fixed: true,
    x: level.sink.x, y: level.sink.y,
  };
  level.pieces.forEach(p => {
    cells[p.y][p.x] = { type: p.type, rot: p.rot, fixed: false, x: p.x, y: p.y };
  });
  return cells;
}

// Verify solved layout actually connects source to sink — sanity check at dev time.
function isSolvable(level) {
  const cells = buildSolvedGrid(level);
  const reached = computeFlow(cells, level.w, level.h, level.source);
  return reached.has(level.sink.x + ',' + level.sink.y);
}

function computeFlow(cells, w, h, source) {
  const reached = new Set();
  const key = (x, y) => x + ',' + y;
  const startKey = key(source.x, source.y);
  reached.add(startKey);
  const queue = [[source.x, source.y]];
  while (queue.length) {
    const [x, y] = queue.shift();
    const cell = cells[y][x];
    if (!cell) continue;
    const outs = openingsOf(cell.type, cell.rot);
    for (const side of outs) {
      const nx = x + SIDE_DX[side];
      const ny = y + SIDE_DY[side];
      if (nx < 0 || ny < 0 || nx >= w || ny >= h) continue;
      const nb = cells[ny][nx];
      if (!nb) continue;
      const nbOuts = openingsOf(nb.type, nb.rot);
      if (!nbOuts.includes(OPPOSITE[side])) continue;
      const k = key(nx, ny);
      if (reached.has(k)) continue;
      reached.add(k);
      queue.push([nx, ny]);
    }
  }
  return reached;
}

// Seeded RNG so the shuffle is stable per (level, attempt) but still feels random.
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = seed;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function shuffleStartRotations(level, seed) {
  const rng = mulberry32(seed);
  const rots = [];
  for (const p of level.pieces) {
    let r;
    if (p.type === 'straight') {
      // straight only has 2 distinct states; force the wrong one half the time.
      r = (p.rot + (rng() < 0.5 ? 1 : 0)) % 4;
    } else {
      let tries = 0;
      do {
        r = Math.floor(rng() * 4);
        tries++;
      } while (r === p.rot && tries < 4);
      if (r === p.rot) r = (p.rot + 1) % 4;
    }
    rots.push(r);
  }
  return rots;
}

function startLevel(idx, attemptSeed) {
  state.levelIdx = idx;
  state.rotations = 0;
  state.won = false;
  const level = LEVELS[idx];
  state.width = level.w;
  state.height = level.h;
  state.source = level.source;
  state.sink = level.sink;

  const seed = (attemptSeed != null) ? attemptSeed : (idx * 1000 + 7);
  const startRots = shuffleStartRotations(level, seed);
  state.startRots = startRots;

  state.cells = buildSolvedGrid(level);
  level.pieces.forEach((p, i) => {
    state.cells[p.y][p.x].rot = startRots[i];
  });

  document.getElementById('levelNum').textContent = idx + 1;
  document.getElementById('rotCount').textContent = '0';
  document.getElementById('winOverlay').classList.remove('show');

  document.getElementById('selectScreen').classList.remove('active');
  document.getElementById('gameScreen').classList.add('active');
  document.getElementById('backBtn').classList.add('show');

  renderBoard();
  if (navigator.vibrate) navigator.vibrate(8);
}

function computeCellSize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const padding = 22;
  const reservedTop = 130;
  const reservedBottom = vw < 480 ? 110 : 130;
  const maxW = Math.min(vw - 16, 560) - padding;
  const maxH = vh - reservedTop - reservedBottom - padding;
  const cellW = Math.floor((maxW - (state.width - 1) * 3) / state.width);
  const cellH = Math.floor((maxH - (state.height - 1) * 3) / state.height);
  const cs = Math.max(36, Math.min(cellW, cellH, 80));
  return cs;
}

function pipeSVG(type, rot, isFixed) {
  if (type === 'source') {
    return `
      <g class="pipe-rot" style="transform: rotate(${rot * 90}deg);">
        <rect x="22" y="22" width="20" height="20" rx="4" fill="${'#2a9bc8'}"/>
        <rect x="32" y="26" width="20" height="12" fill="${'#9aa7b3'}"/>
        <rect x="32" y="28" width="22" height="8" class="water-stroke" fill="#4cc9f0" style="opacity:1"/>
      </g>
    `;
  }
  if (type === 'sink') {
    return `
      <g class="pipe-rot" style="transform: rotate(${rot * 90}deg);">
        <rect x="22" y="22" width="20" height="20" rx="4" fill="${'#3fa024'}"/>
        <rect x="12" y="26" width="20" height="12" fill="${'#9aa7b3'}"/>
        <rect x="10" y="28" width="22" height="8" class="water-stroke" fill="#4cc9f0"/>
      </g>
    `;
  }

  // Generic pipe shape: gray bar(s) along base openings, with inner water bar(s).
  const base = BASE_OPENINGS[type];
  if (!base) return '';
  const parts = base.map(side => {
    // Each opening renders as a rect from the side to the center.
    // Side 'top' = rect from y=0 to y=32 centered horizontally.
    if (side === 'top')    return `<rect x="22" y="0" width="20" height="34" fill="#9aa7b3"/><rect x="26" y="0" width="12" height="34" class="water-stroke"/>`;
    if (side === 'bottom') return `<rect x="22" y="30" width="20" height="34" fill="#9aa7b3"/><rect x="26" y="30" width="12" height="34" class="water-stroke"/>`;
    if (side === 'left')   return `<rect x="0" y="22" width="34" height="20" fill="#9aa7b3"/><rect x="0" y="26" width="34" height="12" class="water-stroke"/>`;
    if (side === 'right')  return `<rect x="30" y="22" width="34" height="20" fill="#9aa7b3"/><rect x="30" y="26" width="34" height="12" class="water-stroke"/>`;
    return '';
  }).join('');

  const hub = `<rect x="22" y="22" width="20" height="20" rx="3" fill="#6b7a8a"/>` +
              `<rect x="26" y="26" width="12" height="12" rx="2" class="water-stroke"/>`;

  return `
    <g class="pipe-rot" style="transform: rotate(${rot * 90}deg);">
      ${parts}
      ${hub}
    </g>
  `;
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  const cs = computeCellSize();
  state.cellSize = cs;
  board.style.setProperty('--cs', cs + 'px');
  board.style.gridTemplateColumns = `repeat(${state.width}, ${cs}px)`;
  board.style.gridTemplateRows = `repeat(${state.height}, ${cs}px)`;
  board.style.width = (cs * state.width + (state.width - 1) * 3 + 16) + 'px';
  board.style.height = (cs * state.height + (state.height - 1) * 3 + 16) + 'px';

  state.cellEls = Array.from({ length: state.height }, () => new Array(state.width).fill(null));

  for (let y = 0; y < state.height; y++) {
    for (let x = 0; x < state.width; x++) {
      const cell = document.createElement('div');
      const c = state.cells[y][x];
      cell.className = 'cell';
      if (!c) {
        cell.classList.add('empty');
      } else {
        if (c.type === 'source') cell.classList.add('src', 'fixed');
        else if (c.type === 'sink') cell.classList.add('dst', 'fixed');
        cell.innerHTML = `<svg viewBox="0 0 64 64">${pipeSVG(c.type, c.rot, c.fixed)}</svg>`;
        if (c.type === 'source') {
          const lbl = document.createElement('div');
          lbl.className = 'label';
          lbl.textContent = '💧';
          cell.appendChild(lbl);
        } else if (c.type === 'sink') {
          const lbl = document.createElement('div');
          lbl.className = 'label';
          lbl.textContent = '🌱';
          cell.appendChild(lbl);
        }
        if (!c.fixed) {
          cell.addEventListener('pointerdown', (ev) => {
            ev.preventDefault();
            rotateCell(x, y);
          });
        }
      }
      board.appendChild(cell);
      state.cellEls[y][x] = cell;
    }
  }

  recomputeAndPaintFlow();
}

function rotateCell(x, y) {
  if (state.won) return;
  const c = state.cells[y][x];
  if (!c || c.fixed) return;

  const fromRot = c.rot;
  const toRot = (c.rot + 1) % 4;
  c.rot = toRot;

  const cellEl = state.cellEls[y][x];
  const rotG = cellEl.querySelector('.pipe-rot');
  if (rotG) {
    rotG.style.transition = 'transform .18s cubic-bezier(.34,1.4,.6,1)';
    rotG.style.transform = `rotate(${toRot * 90}deg)`;
  }

  state.rotations++;
  document.getElementById('rotCount').textContent = state.rotations;
  if (navigator.vibrate) navigator.vibrate(6);

  recomputeAndPaintFlow();

  if (checkWin()) onWin();
}

function recomputeAndPaintFlow() {
  const reached = computeFlow(state.cells, state.width, state.height, state.source);
  for (let y = 0; y < state.height; y++) {
    for (let x = 0; x < state.width; x++) {
      const el = state.cellEls[y][x];
      if (!el) continue;
      const k = x + ',' + y;
      // A cell shows water only if reached AND its opening pointing toward an upstream
      // neighbour matches that neighbour's outgoing flow. computeFlow already enforces this,
      // so reached == has water.
      if (reached.has(k)) el.classList.add('flow');
      else el.classList.remove('flow');
    }
  }
}

function checkWin() {
  const reached = computeFlow(state.cells, state.width, state.height, state.source);
  return reached.has(state.sink.x + ',' + state.sink.y);
}

function onWin() {
  state.won = true;
  state.cleared.add(state.levelIdx);
  saveCleared();
  document.getElementById('winMoves').textContent = state.rotations;
  setTimeout(() => {
    document.getElementById('winOverlay').classList.add('show');
    confetti();
  }, 420);
  if (navigator.vibrate) navigator.vibrate([20, 50, 20, 50, 20]);
}

function resetLevel() {
  // Reuse the same starting rotations (don't re-shuffle on reset).
  const level = LEVELS[state.levelIdx];
  state.rotations = 0;
  state.won = false;
  state.cells = buildSolvedGrid(level);
  level.pieces.forEach((p, i) => {
    state.cells[p.y][p.x].rot = state.startRots[i];
  });
  document.getElementById('rotCount').textContent = '0';
  document.getElementById('winOverlay').classList.remove('show');
  renderBoard();
  if (navigator.vibrate) navigator.vibrate(8);
}

function nextLevel() {
  const next = state.levelIdx + 1;
  if (next < LEVELS.length) startLevel(next);
  else backToSelect();
}

function backToSelect() {
  document.getElementById('gameScreen').classList.remove('active');
  document.getElementById('selectScreen').classList.add('active');
  document.getElementById('backBtn').classList.remove('show');
  document.getElementById('winOverlay').classList.remove('show');
  renderLevelSelect();
}

function confetti() {
  const colors = ['#ff6b9d', '#ffd93d', '#5bc13a', '#74b9ff', '#fd79a8', '#fdcb6e', '#4cc9f0'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[i % colors.length];
    c.style.animationDuration = (1.4 + Math.random() * 1.2) + 's';
    c.style.animationDelay = (Math.random() * 0.4) + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3000);
  }
}

function renderLevelSelect() {
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  LEVELS.forEach((lvl, i) => {
    const card = document.createElement('div');
    card.className = 'lcard' + (state.cleared.has(i) ? ' cleared' : '');
    card.innerHTML = `<div class="ltitle">ด่าน ${i + 1}</div>`;

    const prev = document.createElement('div');
    prev.className = 'preview';
    prev.style.gridTemplateColumns = `repeat(${lvl.w}, 1fr)`;
    prev.style.gridTemplateRows = `repeat(${lvl.h}, 1fr)`;

    const cellMap = Array.from({ length: lvl.h }, () => new Array(lvl.w).fill(null));
    cellMap[lvl.source.y][lvl.source.x] = 'src';
    cellMap[lvl.sink.y][lvl.sink.x] = 'dst';
    lvl.pieces.forEach(p => { cellMap[p.y][p.x] = 'pipe'; });

    for (let y = 0; y < lvl.h; y++) {
      for (let x = 0; x < lvl.w; x++) {
        const p = document.createElement('div');
        p.className = 'p-cell';
        const t = cellMap[y][x];
        if (t === 'src') { p.classList.add('src'); p.textContent = '💧'; }
        else if (t === 'dst') { p.classList.add('dst'); p.textContent = '🌱'; }
        else if (t === 'pipe') { p.classList.add('pipe'); }
        prev.appendChild(p);
      }
    }
    card.appendChild(prev);
    card.addEventListener('click', () => startLevel(i));
    grid.appendChild(card);
  });
}

document.getElementById('resetBtn').addEventListener('click', resetLevel);
document.getElementById('backBtn').addEventListener('click', backToSelect);
document.getElementById('nextBtn').addEventListener('click', nextLevel);
document.getElementById('selectBtn').addEventListener('click', backToSelect);

let resizeTimer = null;
window.addEventListener('resize', () => {
  if (!document.getElementById('gameScreen').classList.contains('active')) return;
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => renderBoard(), 120);
});

// Dev sanity: warn (console only) if any solved layout doesn't actually connect.
(function verifyLevels() {
  for (let i = 0; i < LEVELS.length; i++) {
    if (!isSolvable(LEVELS[i])) {
      console.warn('Level ' + (i + 1) + ' solved layout does not connect source to sink.');
    }
  }
})();

loadCleared();
renderLevelSelect();
</script>
