<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🔍 หาให้เจอ — เกมสำหรับเด็ก</title>
<meta name="description" content="เกมหาภาพ ฝึกสายตาและสมาธิ แตะหาสิ่งที่ซ่อนอยู่ให้เจอ">
<meta name="theme-color" content="#ff6b9d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="หาให้เจอ">
<meta name="mobile-web-app-capable" content="yes">

<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../icons/icon.svg">
<link rel="manifest" href="../manifest.webmanifest">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Itim&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-3: #b5e8ff; --grass-1: #7ed957;
    --brand: #ff6b9d; --brand-dark: #e54b82;
    --gold: #ffd93d; --good: #5bc13a; --good-dark: #3fa024;
    --bad: #ff5757; --bad-dark: #d83838;
    --ink: #2d3436; --card: #ffffff; --card-border: #ffd6e4;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Mitr', -apple-system, sans-serif;
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 10%, #fff9c4 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, #ffcfd2 0%, transparent 45%),
      linear-gradient(180deg, var(--sky-3) 0%, #d9f3c9 65%, var(--grass-1) 100%);
    background-attachment: fixed;
    user-select: none;
    -webkit-user-select: none;
  }
  body::before {
    content: '☁️ ☁️     ☁️';
    position: fixed; top: 20px; left: 0; right: 0;
    text-align: center; font-size: 42px;
    opacity: 0.55; pointer-events: none;
    letter-spacing: 80px;
    animation: drift 40s linear infinite;
    z-index: 0;
  }
  @keyframes drift {
    from { transform: translateX(-10%); }
    to { transform: translateX(10%); }
  }

  .app { max-width: 100%; margin: 0 auto; padding: 0; position: relative; z-index: 1;
    height: 100vh; height: 100dvh; }

  .home-btn {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    left: 12px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #fff; border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; text-decoration: none; color: var(--ink);
    z-index: 60;
    transition: transform .12s;
  }
  .home-btn:active { transform: scale(0.92); }

  /* Game layout */
  .game {
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .top-bar {
    flex: 0 0 auto;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin: 10px 70px 6px 70px;
    flex-wrap: nowrap;
  }
  .target-card {
    background: #fff;
    border: 4px solid var(--card-border);
    border-radius: 22px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.10);
    padding: 6px 18px;
    display: flex; align-items: center; gap: 10px;
    font-family: 'Itim', cursive;
    font-size: clamp(20px, 4.6vw, 30px);
    color: var(--brand-dark);
    white-space: nowrap;
    min-width: 0;
  }
  .target-card .target-emoji {
    font-size: clamp(34px, 8vw, 50px);
    animation: targetBob 1.2s ease-in-out infinite;
    line-height: 1;
  }
  @keyframes targetBob {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-4px) scale(1.08); }
  }
  .counter {
    flex: 0 0 auto;
    background: var(--gold);
    border: 4px solid #fff;
    border-radius: 999px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.12);
    padding: 6px 16px;
    font-family: 'Itim', cursive;
    font-size: clamp(20px, 4.4vw, 28px);
    color: var(--ink);
    white-space: nowrap;
  }

  .reset-btn {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    right: 12px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #fff; border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; color: var(--ink);
    z-index: 60; cursor: pointer;
    font-family: inherit; padding: 0;
    transition: transform .12s;
  }
  .reset-btn:active { transform: scale(0.92) rotate(-30deg); }

  /* Play field */
  .field-wrap {
    flex: 1 1 auto;
    display: flex; align-items: center; justify-content: center;
    padding: 8px 10px 12px;
    min-height: 0;
  }
  .field {
    position: relative;
    background:
      radial-gradient(circle at 30% 25%, #ffffff 0%, #fff7fb 100%);
    border: 5px solid #fff;
    border-radius: 28px;
    box-shadow: 0 6px 0 rgba(0,0,0,0.10);
    width: 100%;
    height: 100%;
    max-width: 700px;
    overflow: hidden;
    touch-action: none;
  }

  .item {
    position: absolute;
    display: flex; align-items: center; justify-content: center;
    width: 64px; height: 64px;
    margin: -32px 0 0 -32px; /* center on x/y */
    cursor: pointer;
    border: none; background: transparent; padding: 0;
    line-height: 1;
    -webkit-user-select: none; user-select: none;
  }
  .item .glyph {
    pointer-events: none;
    display: block;
  }
  .item.wiggle .glyph { animation: itemWiggle 0.4s ease; }
  @keyframes itemWiggle {
    0%, 100% { transform: rotate(var(--rot)) translateX(0); }
    25% { transform: rotate(calc(var(--rot) - 12deg)) translateX(-4px); }
    75% { transform: rotate(calc(var(--rot) + 12deg)) translateX(4px); }
  }
  .item.pop .glyph { animation: itemPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  @keyframes itemPop {
    0% { transform: scale(1) rotate(var(--rot)); opacity: 1; }
    50% { transform: scale(1.5) rotate(var(--rot)); opacity: 1; }
    100% { transform: scale(0) rotate(var(--rot)); opacity: 0; }
  }

  .spark {
    position: absolute;
    font-size: 40px;
    pointer-events: none;
    z-index: 5;
    margin: -20px 0 0 -20px;
    animation: sparkUp 0.6s ease-out forwards;
  }
  @keyframes sparkUp {
    0% { transform: scale(0.4) translateY(0); opacity: 1; }
    100% { transform: scale(1.6) translateY(-30px); opacity: 0; }
  }

  /* Big banner overlay */
  .overlay-msg {
    position: fixed; inset: 0;
    display: none; align-items: center; justify-content: center;
    pointer-events: none; z-index: 100;
    font-family: 'Itim', cursive; color: #fff; text-align: center;
  }
  .overlay-msg.shown { display: flex; }
  .overlay-msg .msg {
    background: var(--gold); color: var(--ink); border: 4px solid #fff; border-radius: 32px;
    padding: 28px 48px; font-size: clamp(40px, 7.5vw, 70px); line-height: 1.1;
    box-shadow: 0 8px 0 rgba(0,0,0,0.18);
    animation: msgPop .5s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-shadow: 3px 3px 0 #fff, 4px 4px 0 rgba(0,0,0,0.15);
    max-width: 90vw;
  }
  @keyframes msgPop {
    0%   { transform: scale(0.4) rotate(-6deg); opacity: 0; }
    60%  { transform: scale(1.1) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  .confetti {
    position: fixed; top: -20px;
    width: 12px; height: 18px;
    z-index: 90; pointer-events: none;
    animation: fall linear forwards;
  }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

  @media (max-width: 480px) {
    .top-bar { margin: 8px 62px 4px 62px; gap: 8px; }
    .target-card { padding: 5px 12px; }
    .field-wrap { padding: 6px 8px 10px; }
  }
</style>
</head>
<body>
<a class="home-btn" href="../" aria-label="กลับหน้าหลัก">🏠</a>
<button class="reset-btn" id="resetBtn" type="button" aria-label="เล่นใหม่">🔄</button>

<div class="app">
  <section class="game">
    <div class="top-bar">
      <div class="target-card">
        <span>หา</span>
        <span class="target-emoji" id="targetEmoji">🍎</span>
        <span>ให้เจอ!</span>
      </div>
      <div class="counter" id="counter">0 / 1</div>
    </div>
    <div class="field-wrap">
      <div class="field" id="field"></div>
    </div>
  </section>
</div>

<div id="overlayMsg" class="overlay-msg"></div>

<script>
'use strict';

// ============================================================================
// EMOJI POOL — ~30 distinct, visually clear emoji for ages 3-8
// ============================================================================
const POOL = [
  '🍎','🍌','🍓','🍉','🍊','🍇','🍒','🥕','🌽','🍄',
  '🐶','🐱','🐰','🐸','🐤','🐠','🦋','🐞','🐝','🐢',
  '🌸','🌻','🌈','⭐','🍦','🎈','🚗','⚽','🎵','❤️',
  '🦄','🐧','🌟','🍩','🚀'
];

// ============================================================================
// STATE
// ============================================================================
const state = {
  round: 0,
  target: '🍎',
  total: 1,
  found: 0,
  busy: false,
};

// ============================================================================
// AUDIO
// ============================================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
}
function playDing() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.value = 880;
  o.connect(g).connect(audioCtx.destination);
  const t = audioCtx.currentTime, d = 0.16;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.16, t + 0.005);
  g.gain.linearRampToValueAtTime(0, t + d);
  o.start(t); o.stop(t + d + 0.02);
}
function playWin() {
  [523, 659, 784].forEach((f,i) => setTimeout(() => {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'triangle';
    o.frequency.value = f;
    o.connect(g).connect(audioCtx.destination);
    const t = audioCtx.currentTime, d = 0.22;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.18, t + 0.01);
    g.gain.linearRampToValueAtTime(0, t + d);
    o.start(t); o.stop(t + d + 0.02);
  }, i * 110));
}

// ============================================================================
// UTIL
// ============================================================================
const $ = (id) => document.getElementById(id);
const field = $('field');
const overlay = $('overlayMsg');
const targetEmoji = $('targetEmoji');
const counterEl = $('counter');

function buzz(p) { if (navigator.vibrate) navigator.vibrate(p); }
function rand(a, b) { return a + Math.random() * (b - a); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

const PRAISE = ['เยี่ยมมาก!', 'เก่งมาก!', 'สุดยอด!', 'หาเจอแล้ว!', 'ดีมากเลย!'];

function flashOverlay(text, ms) {
  overlay.classList.add('shown');
  overlay.innerHTML = `<div class="msg">${text}</div>`;
  setTimeout(() => { overlay.classList.remove('shown'); overlay.innerHTML = ''; }, ms);
}

function celebrate(n) {
  const colors = ['#ff6b9d', '#ffd93d', '#7ed957', '#5bc0eb', '#ff914d', '#b388ff'];
  for (let i = 0; i < n; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = Math.random() * 0.8 + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    if (Math.random() > 0.5) c.style.borderRadius = '50%';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

// ============================================================================
// ROUND BUILDING
// ============================================================================
// Difficulty ramps with round number: more distractors, eventually 2-3 targets.
function roundConfig(round) {
  // targets to find
  let targets = 1;
  if (round >= 3) targets = 2;
  if (round >= 6) targets = 3;
  // distractor count grows, capped so field never gets too crowded
  const distractors = Math.min(10 + round * 4, 40);
  return { targets, distractors };
}

function updateCounter() {
  counterEl.textContent = state.found + ' / ' + state.total;
}

// Place items at random positions, avoiding heavy overlap so targets stay reachable.
function placedPositions(count, w, h) {
  const pad = 38;            // keep items off the edges
  const minDist = 62;        // minimum center-to-center spacing
  const positions = [];
  let guard = 0;
  while (positions.length < count && guard < count * 200) {
    guard++;
    const x = rand(pad, w - pad);
    const y = rand(pad, h - pad);
    let ok = true;
    for (const p of positions) {
      const dx = p.x - x, dy = p.y - y;
      if (dx * dx + dy * dy < minDist * minDist) { ok = false; break; }
    }
    if (ok) positions.push({ x, y });
  }
  // If we couldn't fit all (tiny screen), relax and fill the rest loosely.
  while (positions.length < count) {
    positions.push({ x: rand(pad, w - pad), y: rand(pad, h - pad) });
  }
  return positions;
}

function makeItem(emoji, x, y, isTarget) {
  const el = document.createElement('button');
  el.className = 'item';
  el.type = 'button';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  const rot = rand(-22, 22);
  const size = rand(40, 56);
  const glyph = document.createElement('span');
  glyph.className = 'glyph';
  glyph.textContent = emoji;
  glyph.style.fontSize = size + 'px';
  glyph.style.transform = 'rotate(' + rot + 'deg)';
  glyph.style.setProperty('--rot', rot + 'deg');
  el.style.setProperty('--rot', rot + 'deg');
  el.appendChild(glyph);
  el.dataset.target = isTarget ? '1' : '0';
  el.addEventListener('pointerdown', (e) => { e.preventDefault(); onTap(el); });
  return el;
}

function buildRound() {
  state.busy = true;
  field.innerHTML = '';
  const cfg = roundConfig(state.round);

  // Choose target emoji + distinct distractor emoji
  const shuffled = shuffle(POOL.slice());
  const target = shuffled[0];
  const distractorEmojis = shuffled.slice(1);

  state.target = target;
  state.total = cfg.targets;
  state.found = 0;
  targetEmoji.textContent = target;
  updateCounter();

  // Field size (measure after layout)
  const w = field.clientWidth || 320;
  const h = field.clientHeight || 400;

  const totalItems = cfg.targets + cfg.distractors;
  const positions = placedPositions(totalItems, w, h);

  // Build the list of emoji: K targets + distractors (cycle through distinct pool)
  const items = [];
  for (let i = 0; i < cfg.targets; i++) items.push({ emoji: target, isTarget: true });
  for (let i = 0; i < cfg.distractors; i++) {
    items.push({ emoji: distractorEmojis[i % distractorEmojis.length], isTarget: false });
  }
  shuffle(items);

  // Make sure we never place more items than positions we got
  const n = Math.min(items.length, positions.length);
  // If positions got truncated, ensure all targets are still included
  if (n < items.length) {
    // move any targets into the first n slots
    items.sort((a, b) => (b.isTarget ? 1 : 0) - (a.isTarget ? 1 : 0));
    shuffle(positions);
  }
  for (let i = 0; i < n; i++) {
    const it = items[i];
    field.appendChild(makeItem(it.emoji, positions[i].x, positions[i].y, it.isTarget));
  }

  state.busy = false;
}

// ============================================================================
// INTERACTION
// ============================================================================
function spark(x, y, emoji) {
  const s = document.createElement('div');
  s.className = 'spark';
  s.textContent = emoji;
  s.style.left = x + 'px';
  s.style.top = y + 'px';
  field.appendChild(s);
  setTimeout(() => s.remove(), 650);
}

function onTap(el) {
  if (state.busy) return;
  ensureAudio();

  if (el.dataset.target === '1') {
    if (el.dataset.done === '1') return;
    el.dataset.done = '1';
    el.style.pointerEvents = 'none';
    el.classList.add('pop');
    const x = parseFloat(el.style.left), y = parseFloat(el.style.top);
    spark(x, y, '⭐');
    playDing();
    buzz(20);
    state.found++;
    updateCounter();
    setTimeout(() => { if (el.parentNode) el.remove(); }, 360);

    if (state.found >= state.total) {
      winRound();
    }
  } else {
    // Distractor: gentle wiggle, no penalty
    el.classList.remove('wiggle');
    void el.offsetWidth; // restart animation
    el.classList.add('wiggle');
    buzz(8);
    setTimeout(() => el.classList.remove('wiggle'), 420);
  }
}

function winRound() {
  state.busy = true;
  celebrate(70);
  playWin();
  buzz([30, 60, 30]);
  flashOverlay(pick(PRAISE), 1500);
  setTimeout(() => {
    state.round++;
    buildRound();
  }, 1600);
}

// ============================================================================
// CONTROLS
// ============================================================================
$('resetBtn').addEventListener('click', () => {
  ensureAudio();
  state.round = 0;
  buildRound();
});

// Block double-tap zoom
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd < 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

// Rebuild positions on resize/orientation change (fresh round to stay valid)
let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (!state.busy) buildRound(); }, 250);
});

// ============================================================================
// INIT — wait for layout so field has measurable size
// ============================================================================
function init() {
  // give fonts/layout a tick so clientWidth/Height are real
  requestAnimationFrame(() => requestAnimationFrame(buildRound));
}
init();
</script>
</body>
</html>
