<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🎵 จำตามฉัน — เกมสำหรับเด็ก</title>
<meta name="description" content="เกมจำลำดับเสียงและสีสำหรับเด็ก ฝึกความจำในใจ ฟรี ไม่ต้องโหลดแอป">
<meta name="theme-color" content="#ff6b9d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="จำตามฉัน">
<meta name="mobile-web-app-capable" content="yes">

<meta property="og:type" content="website">
<meta property="og:title" content="🎵 จำตามฉัน — เกมสำหรับเด็ก">
<meta property="og:description" content="จำลำดับเสียงและสี ฝึกความจำในใจ">
<meta property="og:locale" content="th_TH">

<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../icons/icon.svg">
<link rel="manifest" href="../manifest.webmanifest">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Itim&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-3: #b5e8ff;
    --grass-1: #7ed957;
    --brand: #ff6b9d;
    --brand-dark: #e54b82;
    --gold: #ffd93d;
    --good: #5bc13a;
    --good-dark: #3fa024;
    --bad: #ff5757;
    --bad-dark: #d83838;
    --ink: #2d3436;
    --paper: #fffef9;
    --card: #ffffff;
    --card-border: #ffd6e4;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Mitr', -apple-system, sans-serif;
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 10%, #fff9c4 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, #ffcfd2 0%, transparent 45%),
      linear-gradient(180deg, var(--sky-3) 0%, #d9f3c9 65%, var(--grass-1) 100%);
    background-attachment: fixed;
    user-select: none;
    -webkit-user-select: none;
  }
  body::before {
    content: '☁️ ☁️     ☁️';
    position: fixed; top: 20px; left: 0; right: 0;
    text-align: center; font-size: 42px;
    opacity: 0.55; pointer-events: none;
    letter-spacing: 80px;
    animation: drift 40s linear infinite;
    z-index: 0;
  }
  @keyframes drift {
    from { transform: translateX(-10%); }
    to { transform: translateX(10%); }
  }

  .app { max-width: 880px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
  body:has(#gameScreen.active) .app {
    max-width: 100%;
    padding: 0;
    height: 100vh;
    height: 100dvh;
  }
  body:has(#gameScreen.active)::before { display: none; }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn .35s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .hero { text-align: center; padding: 14px 10px 24px; }
  .hero h1 {
    font-family: 'Itim', 'Mitr', cursive;
    font-size: clamp(42px, 9vw, 68px);
    margin: 0;
    color: var(--brand-dark);
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
    letter-spacing: 1px;
  }
  .hero p {
    font-size: clamp(16px, 3.4vw, 22px);
    margin: 12px 0 0;
    color: #555;
    font-weight: 500;
  }

  /* Speed selector — same as other games */
  .speed-row {
    display: flex; justify-content: center; align-items: center;
    gap: 10px; margin: 8px 0 18px; flex-wrap: wrap;
  }
  .speed-label {
    font-family: 'Itim', cursive;
    font-size: 22px;
    color: var(--brand-dark);
    margin-right: 4px;
    text-shadow: 2px 2px 0 #fff;
  }
  .speed-pill {
    font-family: inherit;
    font-size: 18px; font-weight: 600;
    padding: 10px 22px;
    border: 3px solid #fff;
    border-radius: 999px;
    background: #fff;
    color: #777;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.08);
    transition: transform .12s, background .15s, color .15s, box-shadow .12s;
    min-width: 92px;
  }
  .speed-pill:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.08); }
  .speed-pill.active {
    background: var(--brand); color: #fff; border-color: #fff;
    box-shadow: 0 4px 0 var(--brand-dark);
  }

  /* Level cards */
  .lgrid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin: 10px 0 32px;
  }
  .lcard {
    background: var(--card);
    border: 4px solid var(--card-border);
    border-radius: 24px;
    padding: 24px 16px 22px;
    text-align: center;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s, border-color .15s;
    box-shadow: 0 5px 0 rgba(0,0,0,0.07);
    position: relative;
    overflow: hidden;
  }
  .lcard::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.03));
    pointer-events: none;
  }
  .lcard:active { transform: scale(0.96) translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.07); }
  .lcard:hover { border-color: var(--brand); }
  .lcard .preview {
    display: grid;
    gap: 8px;
    margin: 0 auto 14px;
    width: max-content;
  }
  .lcard.l-easy .preview { grid-template-columns: repeat(2, 56px); }
  .lcard.l-hard .preview { grid-template-columns: repeat(3, 44px); }
  .lcard .preview .dot {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 14px;
    border: 3px solid rgba(0,0,0,0.15);
    box-shadow: 0 3px 0 rgba(0,0,0,0.12);
  }
  .lcard .ltitle {
    font-family: 'Itim', cursive;
    font-size: 26px;
    color: var(--brand-dark);
    text-shadow: 2px 2px 0 #fff;
  }
  .lcard .lsub { font-size: 14px; color: #777; font-weight: 500; margin-top: 4px; }
  .lcard .stars {
    position: absolute;
    top: 10px; right: 10px;
    font-size: 18px;
    letter-spacing: 1px;
  }
  .lcard .best-tag {
    position: absolute;
    top: 10px; left: 10px;
    background: var(--gold);
    color: var(--ink);
    font-family: 'Itim', cursive;
    font-size: 16px;
    padding: 4px 12px;
    border-radius: 999px;
    box-shadow: 0 2px 0 rgba(0,0,0,0.12);
  }

  /* Game screen layout */
  #gameScreen.active {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }

  .status-banner {
    flex: 0 0 auto;
    margin: 12px 14px 0;
    border-radius: 22px;
    padding: 14px 20px;
    background: linear-gradient(180deg, #fff8c8, #ffe88a);
    border: 4px solid #fff;
    box-shadow: 0 5px 0 rgba(0,0,0,0.10);
    text-align: center;
    font-family: 'Itim', cursive;
    font-size: clamp(28px, 5.5vw, 42px);
    color: #6b4f00;
    text-shadow: 2px 2px 0 rgba(255,255,255,0.7);
    transition: transform .25s, background .3s, color .3s;
    line-height: 1.1;
  }
  .status-banner.player {
    background: linear-gradient(180deg, #c8f3a0, #9ce070);
    color: #1f5b13;
  }
  .status-banner.win {
    background: linear-gradient(180deg, #ffcfd2, #ff9c9c);
    color: var(--brand-dark);
  }
  .status-banner.flash { transform: scale(1.04); box-shadow: 0 0 0 6px var(--gold), 0 8px 0 rgba(0,0,0,0.10); }

  .hud {
    flex: 0 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin: 10px 14px 0;
    font-family: 'Itim', cursive;
    font-size: 22px;
  }
  .hud-item {
    background: #fff;
    border: 3px solid var(--card-border);
    border-radius: 999px;
    padding: 6px 16px;
    box-shadow: 0 3px 0 rgba(0,0,0,0.08);
    min-width: 80px;
    text-align: center;
    color: var(--ink);
  }
  .hud-item.round { color: var(--brand-dark); font-size: 26px; min-width: 110px; }
  .hud-item.best { color: #b8860b; }
  .hud-item.bump { animation: bump .35s ease; }
  @keyframes bump {
    0% { transform: scale(1); }
    50% { transform: scale(1.18); }
    100% { transform: scale(1); }
  }

  .pads-area {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    min-height: 0;       /* allow flex item to shrink below content size */
    overflow: hidden;
  }
  /* Pad grid is sized by both width (with sane max) and viewport height.
     The viewport-height constraint stops a 2x2 grid from being a 600px tall
     square on iPad landscape, where only ~500px of vertical space exists. */
  .pads-grid {
    display: grid;
    gap: 14px;
    container-type: size;   /* enable cqmin for pad font sizing */
  }
  .pads-grid.cols-2 {
    grid-template-columns: repeat(2, 1fr);
    aspect-ratio: 1 / 1;
    width: min(100%, 540px, calc(100dvh - 230px));
  }
  .pads-grid.cols-3 {
    grid-template-columns: repeat(3, 1fr);
    aspect-ratio: 3 / 2;
    width: min(100%, 780px, calc((100dvh - 230px) * 1.5));
  }
  .pads-grid.watching .pad {
    cursor: default;
    filter: brightness(0.78) saturate(0.85);
  }
  .pads-grid.watching .pad.lit {
    filter: brightness(1.6) saturate(1.4);
  }

  .pad {
    aspect-ratio: 1;
    border-radius: 28px;
    border: 6px solid rgba(0,0,0,0.15);
    box-shadow: 0 8px 0 rgba(0,0,0,0.18), inset 0 -8px 0 rgba(0,0,0,0.10);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38cqmin;     /* scales with grid size, never overflows pad */
    line-height: 1;
    cursor: pointer;
    transition: transform .12s, filter .15s, box-shadow .15s;
    position: relative;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  .pad::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at top, rgba(255,255,255,0.45), transparent 60%);
    pointer-events: none;
  }
  .pad:active {
    transform: translateY(4px);
    box-shadow: 0 4px 0 rgba(0,0,0,0.18), inset 0 -8px 0 rgba(0,0,0,0.10);
  }
  .pad.lit {
    transform: scale(1.06);
    filter: brightness(1.6) saturate(1.4);
    box-shadow:
      0 10px 0 rgba(0,0,0,0.18),
      0 0 0 8px rgba(255,255,255,0.85),
      0 0 40px 12px rgba(255,255,255,0.6),
      inset 0 -6px 0 rgba(0,0,0,0.08);
    z-index: 5;
  }
  .pad.wrong {
    animation: padShake .45s ease;
    filter: grayscale(0.5) brightness(0.6);
  }
  @keyframes padShake {
    0%, 100% { transform: translateX(0); }
    20%      { transform: translateX(-12px) rotate(-3deg); }
    50%      { transform: translateX(12px) rotate(3deg); }
    80%      { transform: translateX(-6px); }
  }

  /* Big banner overlay */
  .overlay-msg {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 100;
    font-family: 'Itim', cursive;
    color: #fff;
    text-align: center;
  }
  .overlay-msg.shown { display: flex; }
  .overlay-msg .msg {
    background: var(--brand);
    border: 4px solid #fff;
    border-radius: 32px;
    padding: 28px 48px;
    font-size: clamp(44px, 8vw, 80px);
    line-height: 1.1;
    box-shadow: 0 8px 0 rgba(0,0,0,0.18);
    animation: msgPop .5s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-shadow: 3px 3px 0 var(--brand-dark);
    max-width: 90vw;
  }
  .overlay-msg .msg.go { background: var(--good); text-shadow: 3px 3px 0 var(--good-dark); }
  .overlay-msg .msg.win {
    background: var(--gold); color: var(--ink);
    text-shadow: 3px 3px 0 #fff, 4px 4px 0 rgba(0,0,0,0.15);
  }
  @keyframes msgPop {
    0%   { transform: scale(0.4) rotate(-6deg); opacity: 0; }
    60%  { transform: scale(1.1) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  /* Results */
  #resultsScreen { text-align: center; padding-top: 20px; }
  .trophy {
    font-size: clamp(120px, 22vw, 180px);
    line-height: 1;
    filter: drop-shadow(4px 6px 0 rgba(0,0,0,0.18));
    animation: bobBig 1.2s ease-in-out infinite;
  }
  @keyframes bobBig {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-12px) rotate(4deg); }
  }
  .winner-name {
    font-family: 'Itim', cursive;
    font-size: clamp(44px, 9vw, 72px);
    color: var(--brand-dark);
    margin: 18px 0 6px;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
  }
  .winner-sub {
    font-size: clamp(18px, 4vw, 24px);
    color: #555; margin: 0 0 6px; font-weight: 500;
  }
  .new-best {
    font-family: 'Itim', cursive;
    font-size: clamp(28px, 6vw, 38px);
    color: var(--brand-dark);
    background: var(--gold);
    display: inline-block;
    padding: 6px 22px;
    border-radius: 999px;
    margin: 8px 0 4px;
    box-shadow: 0 4px 0 #c9a90c;
    animation: pulseBadge 1.3s ease-in-out infinite;
  }
  @keyframes pulseBadge {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.06); }
  }
  .stars-row {
    font-size: clamp(48px, 10vw, 72px);
    line-height: 1; margin: 8px 0 4px;
    letter-spacing: 4px;
    filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.12));
  }
  .rating-text {
    font-family: 'Itim', cursive;
    font-size: clamp(28px, 6vw, 40px);
    color: var(--brand-dark);
    margin: 4px 0 16px;
  }
  .action-bar {
    display: flex; gap: 12px; justify-content: center; align-items: center;
    margin-top: 12px; flex-wrap: wrap;
  }
  .btn-main {
    font-family: 'Itim', cursive;
    font-size: 28px; padding: 16px 36px;
    border: 4px solid #fff; border-radius: 999px;
    background: var(--brand); color: #fff;
    box-shadow: 0 6px 0 var(--brand-dark);
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
    text-shadow: 2px 2px 0 var(--brand-dark);
  }
  .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--brand-dark); }
  .btn-ghost {
    font-family: 'Itim', cursive;
    font-size: 24px; padding: 14px 30px;
    border: 4px solid var(--brand); border-radius: 999px;
    background: #fff; color: var(--brand-dark);
    box-shadow: 0 5px 0 rgba(0,0,0,0.12);
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
  }
  .btn-ghost:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }

  .confetti {
    position: fixed; top: -20px;
    width: 12px; height: 18px;
    z-index: 90; pointer-events: none;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }

  /* Home button */
  .home-btn {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    left: 12px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #fff;
    border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    text-decoration: none;
    z-index: 60;
    transition: transform .12s;
  }
  .home-btn:active { transform: scale(0.92); }

  /* iPad / tablet */
  @media (min-width: 768px) {
    .pads-grid { gap: 18px; }
    .pad { border-radius: 36px; }
    .status-banner { padding: 18px 24px; }
    .hud { font-size: 26px; }
    .hud-item { padding: 8px 22px; min-width: 110px; }
    .hud-item.round { font-size: 30px; min-width: 140px; }
    .lgrid { gap: 22px; }
    .lcard { padding: 30px 18px 24px; }
    .lcard.l-easy .preview { grid-template-columns: repeat(2, 70px); }
    .lcard.l-hard .preview { grid-template-columns: repeat(3, 56px); }
    .lcard .ltitle { font-size: 32px; }
  }

  /* Phone */
  @media (max-width: 480px) {
    .lcard { padding: 18px 12px 16px; border-width: 3px; border-radius: 20px; }
    .lcard .ltitle { font-size: 22px; }
    .pads-grid { gap: 10px; }
    .pad { border-radius: 22px; border-width: 4px; }
    .status-banner { padding: 10px 14px; margin: 8px 8px 0; }
    .hud { font-size: 18px; margin: 8px 10px 0; }
    .hud-item { padding: 5px 12px; min-width: 70px; }
    .hud-item.round { font-size: 22px; min-width: 90px; }
    .pads-area { padding: 10px; }
  }

  /* Landscape phone */
  @media (max-height: 500px) and (orientation: landscape) {
    .pads-area { padding: 6px; }
    .status-banner { font-size: 22px; padding: 6px 12px; }
  }
</style>
</head>
<body>
<a class="home-btn" href="../" aria-label="กลับหน้าหลัก">🏠</a>
<div class="app">

  <!-- SELECT -->
  <section id="selectScreen" class="screen active">
    <header class="hero">
      <h1>🎵 จำตามฉัน</h1>
      <p>ดูเสียงและสีแล้วทำตามให้ครบ จะจำได้กี่รอบ?<br/><small style="font-size:.85em;color:#888">เลือกระดับที่อยากเล่น</small></p>
    </header>

    <div class="speed-row" id="speedRow">
      <div class="speed-label">ความเร็ว:</div>
      <button class="speed-pill" data-speed="slow" type="button">🐢 ช้า</button>
      <button class="speed-pill active" data-speed="medium" type="button">🐇 กลาง</button>
      <button class="speed-pill" data-speed="fast" type="button">⚡ เร็ว</button>
    </div>

    <div id="levelGrid" class="lgrid"></div>
  </section>

  <!-- GAME -->
  <section id="gameScreen" class="screen">
    <div id="statusBanner" class="status-banner">เริ่ม!</div>

    <div class="hud">
      <div class="hud-item round" id="roundBox">รอบ <span id="roundCount">1</span></div>
      <div class="hud-item best">🏆 <span id="bestCount">0</span></div>
    </div>

    <div class="pads-area">
      <div id="padsGrid" class="pads-grid cols-2"></div>
    </div>
  </section>

  <!-- RESULTS -->
  <section id="resultsScreen" class="screen">
    <div class="trophy">🏆</div>
    <h2 id="resultRound" class="winner-name">ทำได้ 0 รอบ</h2>
    <p id="resultPrev" class="winner-sub">สถิติเดิม: 0 รอบ</p>
    <div id="newBestBadge" class="new-best" style="display:none;">🌟 สถิติใหม่!</div>
    <div id="resultStars" class="stars-row">⭐</div>
    <div id="resultText" class="rating-text">ลองอีกที!</div>
    <div class="action-bar">
      <button id="againBtn" class="btn-ghost">🔄 เล่นอีก</button>
      <button id="newBtn" class="btn-main">เลือกใหม่</button>
    </div>
  </section>

</div>

<div id="overlayMsg" class="overlay-msg"></div>

<script>
'use strict';

// ============================================================================
// PADS
// ============================================================================
// Each pad shows an animal face on a colored background. Faces have their own
// colors so they pop on any pad — using same-color emoji (🍎 on red, 🐳 on blue)
// blended too much. Tones are the classic Simon notes (C-E-G-A) extended for L2.
const PADS_4 = [
  { id: 'red',    color: '#e74c3c', emoji: '🐶', freq: 261.63 }, // C4
  { id: 'yellow', color: '#f1c40f', emoji: '🐱', freq: 329.63 }, // E4
  { id: 'blue',   color: '#3498db', emoji: '🐰', freq: 392.00 }, // G4
  { id: 'green',  color: '#2ecc71', emoji: '🐼', freq: 440.00 }, // A4
];
const PADS_6 = [
  ...PADS_4,
  { id: 'purple', color: '#9b59b6', emoji: '🦁', freq: 523.25 }, // C5
  { id: 'pink',   color: '#ff6b9d', emoji: '🦊', freq: 587.33 }, // D5
];

const LEVELS = [
  {
    id: 'easy',  stars: 1,
    title: '4 ปุ่ม',
    subtitle: 'สำหรับ 3-5 ขวบ',
    pads: PADS_4,
    cols: 2,
    bestKey: 'easy',
  },
  {
    id: 'hard',  stars: 2,
    title: '6 ปุ่ม',
    subtitle: 'สำหรับ 5-8 ขวบ',
    pads: PADS_6,
    cols: 3,
    bestKey: 'hard',
  },
];

// ============================================================================
// TUNING (load-bearing)
// ============================================================================
// Speed presets: light = how long pad stays lit; gap = silence between pads.
// 'slow' is gentle for 3-year-olds; 'fast' approaches classic Simon's late game.
const SPEED_LEVELS = {
  slow:   { lightMs: 750, gapMs: 320 },
  medium: { lightMs: 540, gapMs: 200 },
  fast:   { lightMs: 380, gapMs: 130 },
};
const PLAYER_FLASH_MS = 230;     // how long a pad lights when *player* taps
const ROUND_BREAK_MS  = 700;     // pause between rounds (after success)
const START_DELAY_MS  = 900;     // pause before sequence first plays
const GAMEOVER_DELAY_MS = 1400;  // pause before showing results

const SPEED_KEY = 'followMeSpeed';
const BEST_KEY  = 'followMeBest';

// ============================================================================
// STATE
// ============================================================================
const state = {
  level: null,
  speed: 'medium',
  pads: [],
  padEls: [],
  sequence: [],
  playerStep: 0,
  round: 0,
  best: { easy: 0, hard: 0 },
  phase: 'idle',           // idle | watching | playing | transition | gameover
  isNewBest: false,
  finalScore: 0,
  pendingTimers: [],
};

// ============================================================================
// AUDIO (Web Audio API — no asset files needed)
// ============================================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (Ctx) audioCtx = new Ctx();
    } catch (e) { /* unsupported — game continues silently */ }
  }
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
  return audioCtx;
}

function playTone(freq, durationMs) {
  const ctx = ensureAudio();
  if (!ctx) return;
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  // Add a softer second harmonic for warmth
  const osc2  = ctx.createOscillator();
  const gain2 = ctx.createGain();
  osc2.type = 'triangle';
  osc2.frequency.value = freq * 2;
  osc.connect(gain).connect(ctx.destination);
  osc2.connect(gain2).connect(ctx.destination);

  const t = ctx.currentTime;
  const dur = durationMs / 1000;
  // Envelope to avoid clicks
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.28, t + 0.015);
  gain.gain.linearRampToValueAtTime(0.20, t + dur - 0.06);
  gain.gain.linearRampToValueAtTime(0,    t + dur);
  gain2.gain.setValueAtTime(0, t);
  gain2.gain.linearRampToValueAtTime(0.07, t + 0.015);
  gain2.gain.linearRampToValueAtTime(0,    t + dur);

  osc.start(t);  osc.stop(t + dur + 0.02);
  osc2.start(t); osc2.stop(t + dur + 0.02);
}

function playBuzzer() {
  const ctx = ensureAudio();
  if (!ctx) return;
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.connect(gain).connect(ctx.destination);
  const t = ctx.currentTime;
  osc.frequency.setValueAtTime(160, t);
  osc.frequency.linearRampToValueAtTime(60, t + 0.5);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.32, t + 0.015);
  gain.gain.linearRampToValueAtTime(0,    t + 0.5);
  osc.start(t); osc.stop(t + 0.55);
}

function playWinChime() {
  // Brief ascending arpeggio when a round completes
  const notes = [523.25, 659.25, 783.99]; // C5, E5, G5
  notes.forEach((f, i) => {
    setTimeout(() => playTone(f, 180), i * 90);
  });
}

// ============================================================================
// DOM
// ============================================================================
const $ = (id) => document.getElementById(id);
const screens = {
  select:  $('selectScreen'),
  game:    $('gameScreen'),
  results: $('resultsScreen'),
};
const levelGrid    = $('levelGrid');
const padsGrid     = $('padsGrid');
const statusBanner = $('statusBanner');
const overlay      = $('overlayMsg');
const roundBox     = $('roundBox');
const roundCount   = $('roundCount');
const bestCount    = $('bestCount');
const resultRound  = $('resultRound');
const resultPrev   = $('resultPrev');
const newBestBadge = $('newBestBadge');
const resultStars  = $('resultStars');
const resultText   = $('resultText');

// ============================================================================
// UTIL
// ============================================================================
function pickIndex(n) { return Math.floor(Math.random() * n); }
function buzz(p)      { if (navigator.vibrate) navigator.vibrate(p); }
function showScreen(name) {
  for (const k of Object.keys(screens)) screens[k].classList.toggle('active', k === name);
}
function speedPreset() { return SPEED_LEVELS[state.speed] || SPEED_LEVELS.medium; }
function later(fn, ms) {
  const id = setTimeout(fn, ms);
  state.pendingTimers.push(id);
  return id;
}
function clearTimers() {
  for (const id of state.pendingTimers) clearTimeout(id);
  state.pendingTimers = [];
}

// ============================================================================
// SELECT SCREEN
// ============================================================================
function renderLevels() {
  levelGrid.innerHTML = '';
  for (const lvl of LEVELS) {
    const card = document.createElement('div');
    card.className = `lcard l-${lvl.id}`;
    const stars = '⭐'.repeat(lvl.stars);
    const dots = lvl.pads.map(p =>
      `<div class="dot" style="background:${p.color}"></div>`
    ).join('');
    const bestVal = state.best[lvl.bestKey] || 0;
    const bestTag = bestVal > 0
      ? `<div class="best-tag">🏆 ${bestVal}</div>`
      : '';
    card.innerHTML = `
      ${bestTag}
      <div class="stars">${stars}</div>
      <div class="preview">${dots}</div>
      <div class="ltitle">${lvl.title}</div>
      <div class="lsub">${lvl.subtitle}</div>
    `;
    card.addEventListener('click', () => startGame(lvl));
    levelGrid.appendChild(card);
  }
}

// ============================================================================
// GAME LIFECYCLE
// ============================================================================
function startGame(level) {
  // First user gesture — initialize audio
  ensureAudio();

  state.level = level;
  state.pads = level.pads;
  state.sequence = [];
  state.playerStep = 0;
  state.round = 0;
  state.phase = 'idle';
  state.isNewBest = false;
  state.finalScore = 0;
  clearTimers();

  renderPads();
  setStatus('เริ่ม!', '');
  roundCount.textContent = '1';
  bestCount.textContent = state.best[level.bestKey] || 0;
  showScreen('game');
  later(nextRound, START_DELAY_MS);
}

function renderPads() {
  padsGrid.innerHTML = '';
  padsGrid.classList.remove('cols-2', 'cols-3', 'watching');
  padsGrid.classList.add('cols-' + state.level.cols);
  state.padEls = [];
  for (let i = 0; i < state.pads.length; i++) {
    const p = state.pads[i];
    const el = document.createElement('div');
    el.className = 'pad';
    el.dataset.idx = i;
    el.style.background = p.color;
    el.textContent = p.emoji;
    el.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      onPadPress(i);
    }, { passive: false });
    padsGrid.appendChild(el);
    state.padEls.push(el);
  }
}

function setStatus(text, mood) {
  statusBanner.textContent = text;
  statusBanner.className = 'status-banner ' + (mood || '');
  statusBanner.classList.add('flash');
  later(() => statusBanner.classList.remove('flash'), 350);
}

function nextRound() {
  state.round += 1;
  state.sequence.push(pickIndex(state.pads.length));
  state.playerStep = 0;
  state.phase = 'watching';
  roundCount.textContent = state.round;
  setStatus('ดู!', '');
  padsGrid.classList.add('watching');
  later(() => playSequence(() => {
    state.phase = 'playing';
    padsGrid.classList.remove('watching');
    setStatus('ถึงตาเรา!', 'player');
  }), 350);
}

function playSequence(onDone) {
  const { lightMs, gapMs } = speedPreset();
  let i = 0;
  function step() {
    if (state.phase !== 'watching') return;  // aborted
    if (i >= state.sequence.length) { onDone(); return; }
    flashPad(state.sequence[i], lightMs, true);
    i++;
    later(step, lightMs + gapMs);
  }
  step();
}

function flashPad(idx, ms, withSound) {
  const el = state.padEls[idx];
  if (!el) return;
  const pad = state.pads[idx];
  el.classList.add('lit');
  if (withSound) playTone(pad.freq, Math.min(ms, 600));
  later(() => el.classList.remove('lit'), ms);
}

function onPadPress(idx) {
  if (state.phase !== 'playing') return;
  const expected = state.sequence[state.playerStep];
  flashPad(idx, PLAYER_FLASH_MS, true);
  buzz(15);
  if (idx === expected) {
    state.playerStep += 1;
    if (state.playerStep === state.sequence.length) {
      // Round complete!
      state.phase = 'transition';
      bumpRound();
      later(() => {
        playWinChime();
        setStatus('เก่ง!', 'win');
      }, 280);
      later(nextRound, ROUND_BREAK_MS);
    }
  } else {
    // WRONG
    state.phase = 'gameover';
    state.padEls[idx].classList.add('wrong');
    playBuzzer();
    buzz([60, 60, 60, 60, 120]);
    setStatus('โธ่...', '');
    padsGrid.classList.add('watching');
    later(endGame, GAMEOVER_DELAY_MS);
  }
}

function bumpRound() {
  roundBox.classList.remove('bump');
  void roundBox.offsetWidth;
  roundBox.classList.add('bump');
}

function endGame() {
  state.finalScore = state.round - 1;
  const prev = state.best[state.level.bestKey] || 0;
  state.isNewBest = state.finalScore > prev;
  if (state.isNewBest) {
    state.best[state.level.bestKey] = state.finalScore;
    saveBest();
  }
  showResults(prev);
}

// ============================================================================
// RESULTS
// ============================================================================
function showResults(prevBest) {
  resultRound.textContent = `ทำได้ ${state.finalScore} รอบ!`;
  resultPrev.textContent  = `สถิติเดิม: ${prevBest} รอบ`;
  newBestBadge.style.display = state.isNewBest ? 'inline-block' : 'none';
  const r = ratingFor(state.finalScore);
  resultStars.textContent = r.stars;
  resultText.textContent  = r.text;
  showScreen('results');
  celebrate(state.isNewBest ? 160 : r.confettiCount);
  buzz([60, 40, 60, 40, 100]);
}

function ratingFor(rounds) {
  if (rounds >= 12) return { stars: '🌟🌟🌟🌟🌟', text: 'สุดยอด!',     confettiCount: 140 };
  if (rounds >= 8)  return { stars: '⭐⭐⭐⭐',     text: 'เก่งมาก!',    confettiCount: 110 };
  if (rounds >= 5)  return { stars: '⭐⭐⭐',        text: 'เก่ง!',        confettiCount: 80  };
  if (rounds >= 3)  return { stars: '⭐⭐',           text: 'ดีมาก!',       confettiCount: 60  };
  if (rounds >= 1)  return { stars: '⭐',                text: 'ดี!',          confettiCount: 40  };
  return                  { stars: '✨',                  text: 'ลองอีกที!',    confettiCount: 20  };
}

function celebrate(n) {
  const colors = ['#ff6b9d', '#ffd93d', '#7ed957', '#5bc0eb', '#ff914d', '#b388ff'];
  for (let i = 0; i < n; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = Math.random() * 0.8 + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    if (Math.random() > 0.5) c.style.borderRadius = '50%';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

// ============================================================================
// PERSISTENCE
// ============================================================================
function loadBest() {
  try {
    const raw = localStorage.getItem(BEST_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object') {
        state.best = { easy: 0, hard: 0, ...parsed };
      }
    }
  } catch (e) { /* ignore */ }
}

function saveBest() {
  try { localStorage.setItem(BEST_KEY, JSON.stringify(state.best)); } catch (e) { /* ignore */ }
}

// ============================================================================
// EVENT BINDINGS
// ============================================================================
$('againBtn').addEventListener('click', () => {
  if (!state.level) { showScreen('select'); return; }
  startGame(state.level);
});
$('newBtn').addEventListener('click', () => {
  state.level = null;
  clearTimers();
  renderLevels();   // refresh best-tags in case of new high score
  showScreen('select');
});

// Prevent double-tap zoom on iOS
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd < 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

// ============================================================================
// SPEED SELECTOR
// ============================================================================
function setSpeed(s) {
  if (!SPEED_LEVELS[s]) s = 'medium';
  state.speed = s;
  try { localStorage.setItem(SPEED_KEY, s); } catch (e) {}
  for (const btn of document.querySelectorAll('.speed-pill')) {
    btn.classList.toggle('active', btn.dataset.speed === s);
  }
}
$('speedRow').addEventListener('click', (e) => {
  const btn = e.target.closest('.speed-pill');
  if (!btn) return;
  setSpeed(btn.dataset.speed);
});

// ============================================================================
// INIT
// ============================================================================
let savedSpeed = null;
try { savedSpeed = localStorage.getItem(SPEED_KEY); } catch (e) {}
setSpeed(savedSpeed || 'medium');
loadBest();
renderLevels();
// Hub registers the service worker; its scope covers this page too.
</script>
</body>
</html>
