<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>📏 เรียงเล็กใหญ่ — เกมสำหรับเด็ก</title>
<meta name="description" content="เกมเรียงสิ่งของจากเล็กไปใหญ่ ฝึกการเปรียบเทียบขนาดและลำดับ">
<meta name="theme-color" content="#ff6b9d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="เรียงเล็กใหญ่">
<meta name="mobile-web-app-capable" content="yes">

<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../icons/icon.svg">
<link rel="manifest" href="../manifest.webmanifest">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Itim&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-3: #b5e8ff; --grass-1: #7ed957;
    --brand: #ff6b9d; --brand-dark: #e54b82;
    --gold: #ffd93d; --good: #5bc13a; --good-dark: #3fa024;
    --bad: #ff5757; --bad-dark: #d83838;
    --ink: #2d3436; --card: #ffffff; --card-border: #ffd6e4;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Mitr', -apple-system, sans-serif;
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 10%, #fff9c4 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, #ffcfd2 0%, transparent 45%),
      linear-gradient(180deg, var(--sky-3) 0%, #d9f3c9 65%, var(--grass-1) 100%);
    background-attachment: fixed;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  body::before {
    content: '☁️ ☁️     ☁️';
    position: fixed; top: 20px; left: 0; right: 0;
    text-align: center; font-size: 42px;
    opacity: 0.55; pointer-events: none;
    letter-spacing: 80px;
    animation: drift 40s linear infinite;
    z-index: 0;
  }
  @keyframes drift {
    from { transform: translateX(-10%); }
    to { transform: translateX(10%); }
  }

  .app {
    max-width: 900px; margin: 0 auto;
    min-height: 100vh; min-height: 100dvh;
    padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
  }

  .screen { display: none; flex: 1 1 auto; flex-direction: column; }
  .screen.active { display: flex; animation: fadeIn .35s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---- Header / prompt ---- */
  .hero { text-align: center; padding: 10px 10px 6px; flex: 0 0 auto; }
  .hero h1 {
    font-family: 'Itim', cursive;
    font-size: clamp(34px, 8vw, 60px);
    margin: 0; color: var(--brand-dark);
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
    letter-spacing: 1px;
  }

  .prompt {
    flex: 0 0 auto;
    text-align: center;
    margin: 4px auto 0;
    max-width: 560px;
    background: #fff;
    border: 4px solid var(--card-border);
    border-radius: 999px;
    padding: 10px 22px;
    box-shadow: 0 5px 0 rgba(0,0,0,0.08);
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .prompt .arrow { font-size: clamp(26px, 6vw, 38px); line-height: 1; }
  .prompt .ptext {
    font-family: 'Itim', cursive;
    font-size: clamp(22px, 5vw, 34px);
    color: var(--brand-dark);
    text-shadow: 1px 1px 0 #fff;
  }
  .prompt.flip-anim { animation: promptPop .4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes promptPop {
    0% { transform: scale(0.8); }
    60% { transform: scale(1.06); }
    100% { transform: scale(1); }
  }

  /* ---- Play stage ---- */
  .stage-area {
    flex: 1 1 auto;
    display: flex; align-items: center; justify-content: center;
    min-height: 0; padding: 6px;
  }
  .stage {
    display: flex; align-items: flex-end; justify-content: center;
    flex-wrap: wrap;
    gap: clamp(8px, 3vw, 26px);
    width: 100%;
    max-width: 760px;
  }

  .item {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    background: none; border: none; padding: 0; margin: 0;
    font-family: inherit;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
    transition: transform .18s cubic-bezier(0.34, 1.56, 0.64, 1), filter .18s;
    touch-action: manipulation;
    min-width: 64px; min-height: 64px;
  }
  .item .glyph {
    display: block;
    filter: drop-shadow(2px 4px 0 rgba(0,0,0,0.16));
    pointer-events: none;
  }
  .item:active { transform: scale(0.92); }
  .item.locked {
    cursor: default;
    transform: translateY(-10px);
    filter: drop-shadow(0 0 0 transparent);
  }
  .item.locked:active { transform: translateY(-10px); }

  /* number badge appears on a locked item */
  .item .badge {
    position: absolute;
    top: -14px; left: 50%;
    transform: translateX(-50%) scale(0);
    width: 46px; height: 46px;
    border-radius: 50%;
    background: var(--brand);
    border: 4px solid #fff;
    box-shadow: 0 3px 0 var(--brand-dark);
    color: #fff;
    font-family: 'Itim', cursive;
    font-size: 24px;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    z-index: 5;
  }
  .item.locked .badge {
    animation: badgePop .4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes badgePop {
    0% { transform: translateX(-50%) scale(0) rotate(-20deg); }
    70% { transform: translateX(-50%) scale(1.2) rotate(6deg); }
    100% { transform: translateX(-50%) scale(1) rotate(0); }
  }

  .item.wiggle { animation: wiggle .5s ease; }
  @keyframes wiggle {
    0%,100% { transform: translateX(0) rotate(0); }
    15% { transform: translateX(-9px) rotate(-5deg); }
    30% { transform: translateX(9px) rotate(5deg); }
    45% { transform: translateX(-7px) rotate(-4deg); }
    60% { transform: translateX(7px) rotate(4deg); }
    75% { transform: translateX(-4px) rotate(-2deg); }
  }

  .item.win-wave {
    animation: winWave .7s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes winWave {
    0% { transform: translateY(-10px) scale(1); }
    40% { transform: translateY(-34px) scale(1.18); }
    100% { transform: translateY(-10px) scale(1); }
  }

  /* ---- Controls ---- */
  .controls {
    flex: 0 0 auto;
    display: flex; justify-content: center; gap: 14px;
    padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
  }
  .btn {
    background: #fff;
    border: 4px solid var(--card-border);
    border-radius: 999px;
    padding: 12px 26px;
    min-height: 64px;
    font-family: 'Itim', cursive;
    font-size: 24px;
    color: var(--brand-dark);
    cursor: pointer;
    box-shadow: 0 5px 0 rgba(0,0,0,0.10);
    transition: transform .12s, box-shadow .12s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.10); }

  /* ---- Home button ---- */
  .home-btn {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    left: 12px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #fff; border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; text-decoration: none; color: var(--ink);
    z-index: 60;
    transition: transform .12s;
  }
  .home-btn:active { transform: scale(0.92); }

  /* ---- Overlay banner ---- */
  .overlay-msg {
    position: fixed; inset: 0;
    display: none; align-items: center; justify-content: center;
    pointer-events: none; z-index: 100;
    font-family: 'Itim', cursive; color: #fff; text-align: center;
  }
  .overlay-msg.shown { display: flex; }
  .overlay-msg .msg {
    background: var(--gold); color: var(--ink); border: 4px solid #fff; border-radius: 32px;
    padding: 24px 44px; font-size: clamp(38px, 7.5vw, 66px); line-height: 1.1;
    box-shadow: 0 8px 0 rgba(0,0,0,0.18);
    animation: msgPop .5s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-shadow: 3px 3px 0 #fff, 4px 4px 0 rgba(0,0,0,0.15);
    max-width: 90vw;
  }
  @keyframes msgPop {
    0%   { transform: scale(0.4) rotate(-6deg); opacity: 0; }
    60%  { transform: scale(1.1) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  .confetti {
    position: fixed; top: -20px;
    width: 12px; height: 18px;
    z-index: 90; pointer-events: none;
    animation: fall linear forwards;
  }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

  @media (max-width: 420px) {
    .item .badge { width: 38px; height: 38px; font-size: 20px; top: -10px; }
    .stage { gap: 6px; }
  }
</style>
</head>
<body>
<a class="home-btn" href="../" aria-label="กลับหน้าหลัก">🏠</a>

<div class="app">
  <section id="playScreen" class="screen active">
    <header class="hero">
      <h1>📏 เรียงเล็กใหญ่</h1>
    </header>

    <div class="prompt" id="prompt">
      <span class="arrow" id="promptArrow">🔼</span>
      <span class="ptext" id="promptText">แตะจากเล็กไปใหญ่</span>
    </div>

    <div class="stage-area">
      <div class="stage" id="stage"></div>
    </div>

    <div class="controls">
      <button class="btn" id="replayBtn" type="button">🔄 เล่นใหม่</button>
    </div>
  </section>
</div>

<div id="overlayMsg" class="overlay-msg"></div>

<script>
'use strict';

// ============================================================================
// OBJECT POOL — each object is one emoji rendered at varied sizes
// ============================================================================
const OBJECTS = ['🐘','🎈','⭐','🍎','🐟','🌳','🏀','🐻','🍦','🚗','🌸','🍩','🐱','🦋','☂️','🍄','🎁','🐢'];

// Size steps (font-size px on a 800-ish scale, downscaled responsively).
// Clearly distinguishable: each step is well separated.
const SIZE_STEPS = [40, 64, 92, 124, 160];

// ============================================================================
// AUDIO — reused pattern from the coloring game
// ============================================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
}
function playDing(idx) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'triangle';
  o.frequency.value = 523 + (idx || 0) * 90;     // rises as the kid locks more
  o.connect(g).connect(audioCtx.destination);
  const t = audioCtx.currentTime, d = 0.18;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.16, t + 0.01);
  g.gain.linearRampToValueAtTime(0, t + d);
  o.start(t); o.stop(t + d + 0.02);
}
function playBuzz() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(180, audioCtx.currentTime);
  o.frequency.linearRampToValueAtTime(120, audioCtx.currentTime + 0.18);
  o.connect(g).connect(audioCtx.destination);
  const t = audioCtx.currentTime, d = 0.2;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.10, t + 0.01);
  g.gain.linearRampToValueAtTime(0, t + d);
  o.start(t); o.stop(t + d + 0.02);
}
function playWin() {
  [523, 659, 784, 1047].forEach((f,i) => setTimeout(() => {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'triangle';
    o.frequency.value = f;
    o.connect(g).connect(audioCtx.destination);
    const t = audioCtx.currentTime, d = 0.22;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.18, t + 0.01);
    g.gain.linearRampToValueAtTime(0, t + d);
    o.start(t); o.stop(t + d + 0.02);
  }, i * 110));
}

// ============================================================================
// UTIL
// ============================================================================
const $ = (id) => document.getElementById(id);
function buzz(p) { if (navigator.vibrate) navigator.vibrate(p); }

function flashOverlay(text, ms) {
  const overlay = $('overlayMsg');
  overlay.classList.add('shown');
  overlay.innerHTML = `<div class="msg">${text}</div>`;
  setTimeout(() => { overlay.classList.remove('shown'); overlay.innerHTML = ''; }, ms);
}

function celebrate(n) {
  const colors = ['#ff6b9d', '#ffd93d', '#7ed957', '#5bc0eb', '#ff914d', '#b388ff'];
  for (let i = 0; i < n; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = Math.random() * 0.8 + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    if (Math.random() > 0.5) c.style.borderRadius = '50%';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const PRAISES = ['เก่งมาก!', 'เยี่ยม!', 'สุดยอด!', 'ถูกต้อง!', 'เก่งจัง!', 'ดีมาก!'];

// ============================================================================
// GAME STATE
// ============================================================================
const state = {
  round: 0,        // increments each completed round
  count: 3,        // number of items this round
  ascending: true, // true = small→large, false = large→small
  nextRank: 0,     // which size-rank the kid must tap next (0-based into ordered list)
  items: [],       // [{rank, el}] rank = position in correct order
  busy: false,     // true during win transition (block taps)
};

const stage = $('stage');
const promptText = $('promptText');
const promptArrow = $('promptArrow');
const promptBox = $('prompt');

// ----------------------------------------------------------------------------
// Build a round
// ----------------------------------------------------------------------------
function newRound(reset) {
  if (reset) state.round = 0;
  state.busy = false;
  state.nextRank = 0;

  // Difficulty ramp: start at 3 items, grow to 5.
  state.count = Math.min(3 + Math.floor(state.round / 2), 5);

  // Direction: first round always ascending (easiest to grasp),
  // afterwards alternate-ish with some randomness.
  if (state.round === 0) state.ascending = true;
  else state.ascending = Math.random() < 0.55;

  const obj = OBJECTS[Math.floor(Math.random() * OBJECTS.length)];

  // Pick `count` distinct sizes (smallest-first reference list).
  const sizes = SIZE_STEPS.slice(0, state.count);

  // rank: index in the REQUIRED tap order (0 = first to tap).
  // Ascending  -> first tap = smallest -> rank follows ascending size.
  // Descending -> first tap = largest  -> rank follows descending size.
  // Build a list of {size, rank}.
  const ordered = sizes.map((size, i) => ({ size, rank: state.ascending ? i : (state.count - 1 - i) }));

  // Shuffle their left→right placement.
  const placed = shuffle(ordered);

  // Update prompt
  promptText.textContent = state.ascending ? 'แตะจากเล็กไปใหญ่' : 'แตะจากใหญ่ไปเล็ก';
  promptArrow.textContent = state.ascending ? '🐭➡️🐘' : '🐘➡️🐭';
  promptBox.classList.remove('flip-anim');
  void promptBox.offsetWidth;
  promptBox.classList.add('flip-anim');

  // Responsive max size: shrink the biggest emoji so a row of `count` fits.
  const stageW = Math.min(window.innerWidth - 40, 740);
  const totalUnits = sizes.reduce((s, v) => s + v, 0) + sizes.length * 18; // + gaps
  const scale = Math.min(1, stageW / totalUnits);

  // Render
  stage.innerHTML = '';
  state.items = placed.map((p) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'item';
    const px = Math.round(p.size * scale * 1.05);
    btn.innerHTML = `<span class="glyph" style="font-size:${px}px">${obj}</span><span class="badge"></span>`;
    btn.dataset.rank = String(p.rank);
    btn.addEventListener('pointerdown', onItemTap);
    stage.appendChild(btn);
    return { rank: p.rank, el: btn, locked: false };
  });
}

// ----------------------------------------------------------------------------
// Tap handler
// ----------------------------------------------------------------------------
function onItemTap(e) {
  e.preventDefault();
  ensureAudio();
  if (state.busy) return;

  const el = e.currentTarget;
  const rank = parseInt(el.dataset.rank, 10);
  const item = state.items.find((it) => it.el === el);
  if (!item || item.locked) return;

  if (rank === state.nextRank) {
    // Correct!
    item.locked = true;
    el.classList.add('locked');
    const badge = el.querySelector('.badge');
    if (badge) badge.textContent = String(state.nextRank + 1);
    playDing(state.nextRank);
    buzz(30);
    state.nextRank++;

    if (state.nextRank >= state.count) {
      winRound();
    }
  } else {
    // Wrong -> wiggle + buzz, no lock, keep trying.
    el.classList.remove('wiggle');
    void el.offsetWidth;
    el.classList.add('wiggle');
    playBuzz();
    buzz([40, 40, 40]);
  }
}

// ----------------------------------------------------------------------------
// Win
// ----------------------------------------------------------------------------
function winRound() {
  state.busy = true;
  buzz([60, 40, 120]);
  playWin();

  // Wave: items grow/lift in rank order.
  state.items
    .slice()
    .sort((a, b) => a.rank - b.rank)
    .forEach((it, i) => {
      setTimeout(() => {
        it.el.classList.remove('win-wave');
        void it.el.offsetWidth;
        it.el.classList.add('win-wave');
      }, i * 140);
    });

  celebrate(80);
  const praise = PRAISES[Math.floor(Math.random() * PRAISES.length)];
  flashOverlay('🎉 ' + praise, 1500);

  setTimeout(() => {
    state.round++;
    newRound(false);
  }, 1900);
}

// ----------------------------------------------------------------------------
// Controls
// ----------------------------------------------------------------------------
$('replayBtn').addEventListener('click', () => {
  ensureAudio();
  newRound(true);
});

// Re-fit on rotation/resize (rebuild current round layout, keep settings).
let resizeTimer = null;
window.addEventListener('resize', () => {
  if (state.busy) return;
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    // Only rebuild if nothing has been locked yet, to avoid losing progress.
    if (state.nextRank === 0) {
      const savedRound = state.round;
      newRound(false);
      state.round = savedRound;
    }
  }, 250);
});

// Block double-tap zoom on iOS.
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd < 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

// Init
newRound(true);
</script>
</body>
</html>
