<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🧩 จิ๊กซอว์ — เกมสำหรับเด็ก</title>
<meta name="description" content="เกมต่อจิ๊กซอว์ภาพง่ายๆ ฝึกการสังเกตและการลาก">
<meta name="theme-color" content="#ff6b9d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="จิ๊กซอว์">
<meta name="mobile-web-app-capable" content="yes">

<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../icons/icon.svg">
<link rel="manifest" href="../manifest.webmanifest">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Itim&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-3: #b5e8ff; --grass-1: #7ed957;
    --brand: #ff6b9d; --brand-dark: #e54b82;
    --gold: #ffd93d; --good: #5bc13a; --good-dark: #3fa024;
    --bad: #ff5757; --bad-dark: #d83838;
    --ink: #2d3436; --card: #ffffff; --card-border: #ffd6e4;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Mitr', -apple-system, sans-serif;
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 10%, #fff9c4 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, #ffcfd2 0%, transparent 45%),
      linear-gradient(180deg, var(--sky-3) 0%, #d9f3c9 65%, var(--grass-1) 100%);
    background-attachment: fixed;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  body::before {
    content: '☁️ ☁️     ☁️';
    position: fixed; top: 20px; left: 0; right: 0;
    text-align: center; font-size: 42px;
    opacity: 0.55; pointer-events: none;
    letter-spacing: 80px;
    animation: drift 40s linear infinite;
    z-index: 0;
  }
  @keyframes drift { from { transform: translateX(-10%); } to { transform: translateX(10%); } }

  .app { max-width: 880px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
  body:has(#gameScreen.active) .app {
    max-width: 100%; padding: 0; min-height: 100vh; min-height: 100dvh;
  }
  body:has(#gameScreen.active)::before { display: none; }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn .35s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero { text-align: center; padding: 14px 10px 18px; }
  .hero h1 {
    font-family: 'Itim', cursive;
    font-size: clamp(42px, 9vw, 68px);
    margin: 0; color: var(--brand-dark);
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
    letter-spacing: 1px;
  }
  .howto {
    list-style: none; padding: 12px 18px; margin: 8px auto 18px;
    max-width: 360px; background: rgba(255,255,255,0.55);
    border: 2px dashed var(--card-border); border-radius: 18px;
    font-size: 16px; color: #555; font-weight: 500; text-align: left;
  }
  .howto li { display: flex; align-items: center; gap: 10px; padding: 3px 0; line-height: 1.3; }
  .howto-icon { font-size: 22px; flex-shrink: 0; width: 28px; text-align: center; }
  @media (min-width: 768px) { .howto { font-size: 18px; max-width: 440px; } .howto-icon { font-size: 26px; } }

  .lgrid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px; margin: 10px 0 32px;
  }
  .lcard {
    background: var(--card); border: 4px solid var(--card-border);
    border-radius: 24px; padding: 22px 14px 18px; text-align: center;
    cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.07);
    transition: transform .15s, box-shadow .15s, border-color .15s;
    position: relative; overflow: hidden;
  }
  .lcard:active { transform: scale(0.96) translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.07); }
  .lcard:hover { border-color: var(--brand); }
  .lcard .preview {
    font-size: 56px; line-height: 1;
    filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.12));
    margin-bottom: 6px;
  }
  .lcard .ltitle {
    font-family: 'Itim', cursive; font-size: 26px;
    color: var(--brand-dark); text-shadow: 2px 2px 0 #fff;
  }
  .lcard .lsub { font-size: 14px; color: #777; font-weight: 500; margin-top: 4px; }
  .lcard .stars { position: absolute; top: 10px; right: 10px; font-size: 18px; letter-spacing: 1px; }

  /* Game */
  #gameScreen.active {
    display: flex; flex-direction: column;
    min-height: 100vh; min-height: 100dvh;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    overflow: hidden;
  }
  .hud {
    flex: 0 0 auto; display: flex; justify-content: center; gap: 10px;
    margin: 10px 14px 0; font-family: 'Itim', cursive; font-size: 22px;
    flex-wrap: wrap;
  }
  .hud-item {
    background: #fff; border: 3px solid var(--card-border);
    border-radius: 999px; padding: 6px 16px;
    box-shadow: 0 3px 0 rgba(0,0,0,0.08);
    min-width: 80px; text-align: center;
  }
  .hud-item.placed { color: var(--good-dark); }
  .hud-item.time   { color: #2980b9; }

  .stage {
    flex: 1 1 auto;
    display: flex; flex-direction: column;
    align-items: center; padding: 10px;
    gap: 12px;
    overflow: hidden;
  }

  .preview-tag {
    font-family: 'Itim', cursive;
    color: var(--brand-dark);
    font-size: 20px;
    text-shadow: 2px 2px 0 #fff;
    margin: 0;
  }

  .mini-preview {
    width: 70px; height: 70px;
    background: #fff;
    border: 3px solid var(--card-border);
    border-radius: 14px;
    box-shadow: 0 3px 0 rgba(0,0,0,0.08);
    display: grid;
    overflow: hidden;
    flex-shrink: 0;
  }
  .mini-preview .mp-cell {
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    line-height: 1;
  }
  .preview-row { display: flex; align-items: center; gap: 14px; }

  .board {
    background: #fffbf2;
    border: 4px dashed var(--brand);
    border-radius: 22px;
    box-shadow: 0 5px 0 rgba(0,0,0,0.08);
    padding: 8px;
    display: grid;
    gap: 6px;
    width: min(86vw, 380px);
    aspect-ratio: 1;
  }
  .slot {
    background: #fff;
    border: 2px dashed #ffd6e4;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(28px, 8vw, 56px);
    line-height: 1;
    position: relative;
  }
  .slot.hover { background: #ffe9f1; border-color: var(--brand); }
  .slot.filled { background: #e8ffe0; border: 2px solid var(--good); animation: pop .4s ease; }
  @keyframes pop {
    0% { transform: scale(0.85); } 60% { transform: scale(1.08); } 100% { transform: scale(1); }
  }

  .tray-label {
    font-family: 'Itim', cursive;
    color: #555;
    font-size: 16px;
    margin: 0;
  }
  .tray {
    background: rgba(255,255,255,0.5);
    border: 3px dashed var(--card-border);
    border-radius: 22px;
    padding: 10px;
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
    width: min(96vw, 420px);
    min-height: 80px;
  }
  .piece {
    width: 64px; height: 64px;
    background: #fff;
    border: 3px solid var(--card-border);
    border-radius: 14px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.10);
    display: flex; align-items: center; justify-content: center;
    font-size: 38px;
    line-height: 1;
    cursor: grab;
    touch-action: none;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .piece:active { cursor: grabbing; }
  .piece.dragging {
    transition: none;
    box-shadow: 0 8px 16px rgba(0,0,0,0.25);
    transform: scale(1.05);
    z-index: 1000;
  }
  .piece.shake { animation: shake .35s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }
  @media (max-width: 480px) {
    .piece { width: 52px; height: 52px; font-size: 30px; border-width: 2px; }
    .tray { padding: 6px; gap: 6px; }
  }

  /* === Real jigsaw piece (SVG) === */
  .board.jboard {
    background: #fffbf2;
    border: 4px dashed var(--brand);
    padding: 0; gap: 0;
    aspect-ratio: auto;
    position: relative;
    width: auto;        /* set inline */
    height: auto;       /* set inline */
    display: block;
    overflow: visible;  /* tab outlines may peek slightly */
  }
  .jslot {
    position: absolute;
    pointer-events: none;
  }
  .jslot path.outline {
    fill: rgba(255, 230, 240, 0.55);
    stroke: rgba(229, 75, 130, 0.45);
    stroke-width: 2;
    stroke-dasharray: 5 4;
  }
  .jslot.filled { display: none; }
  .piece.jpiece {
    display: block;
    width: auto; height: auto;
    background: transparent;
    border: none; border-radius: 0;
    box-shadow: none;
    padding: 0;
    overflow: visible;
    filter: drop-shadow(0 4px 3px rgba(0,0,0,0.22));
  }
  .piece.jpiece path.outline {
    fill: none;
    stroke: #fff;
    stroke-width: 2.5;
    stroke-linejoin: round;
    opacity: 0.85;
    pointer-events: none;
  }
  .tray.jtray {
    background: rgba(255,255,255,0.5);
    border: 3px dashed var(--card-border);
    border-radius: 22px;
    padding: 12px;
    display: grid;
    grid-template-columns: repeat(4, auto);
    justify-content: center;
    justify-items: center;
    align-items: center;
    gap: 6px;
    width: max-content;
    max-width: 96vw;
  }

  /* Results */
  #resultsScreen { text-align: center; padding-top: 20px; }
  .trophy {
    font-size: clamp(120px, 22vw, 180px); line-height: 1;
    filter: drop-shadow(4px 6px 0 rgba(0,0,0,0.18));
    animation: bobBig 1.2s ease-in-out infinite;
  }
  @keyframes bobBig {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-12px) rotate(4deg); }
  }
  .winner-name {
    font-family: 'Itim', cursive;
    font-size: clamp(44px, 9vw, 72px);
    color: var(--brand-dark); margin: 18px 0 6px;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
  }
  .winner-sub {
    font-size: clamp(18px, 4vw, 24px);
    color: #555; margin: 0 0 6px; font-weight: 500;
  }
  .stars-row {
    font-size: clamp(48px, 10vw, 72px); line-height: 1;
    margin: 8px 0 4px; letter-spacing: 4px;
    filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.12));
  }
  .rating-text {
    font-family: 'Itim', cursive;
    font-size: clamp(28px, 6vw, 40px);
    color: var(--brand-dark); margin: 4px 0 16px;
  }
  .action-bar {
    display: flex; gap: 12px; justify-content: center; align-items: center;
    margin-top: 12px; flex-wrap: wrap;
  }
  .btn-main {
    font-family: 'Itim', cursive;
    font-size: 28px; padding: 16px 36px;
    border: 4px solid #fff; border-radius: 999px;
    background: var(--brand); color: #fff;
    box-shadow: 0 6px 0 var(--brand-dark);
    cursor: pointer; text-shadow: 2px 2px 0 var(--brand-dark);
    transition: transform .12s, box-shadow .12s;
  }
  .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--brand-dark); }
  .btn-ghost {
    font-family: 'Itim', cursive;
    font-size: 24px; padding: 14px 30px;
    border: 4px solid var(--brand); border-radius: 999px;
    background: #fff; color: var(--brand-dark);
    box-shadow: 0 5px 0 rgba(0,0,0,0.12); cursor: pointer;
    transition: transform .12s, box-shadow .12s;
  }
  .btn-ghost:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }

  .confetti {
    position: fixed; top: -20px;
    width: 12px; height: 18px;
    z-index: 90; pointer-events: none;
    animation: fall linear forwards;
  }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

  .home-btn, .back-btn {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #fff; border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    align-items: center; justify-content: center;
    font-size: 24px; text-decoration: none; color: var(--ink);
    z-index: 60;
    transition: transform .12s;
    font-family: inherit; padding: 0; cursor: pointer;
  }
  .home-btn { left: 12px; display: flex; font-size: 26px; }
  .back-btn { right: 12px; display: none; }
  .back-btn.show { display: flex; }
  .home-btn:active, .back-btn:active { transform: scale(0.92); }

  @media (min-width: 768px) {
    .lgrid { grid-template-columns: repeat(4, 1fr); gap: 18px; }
    .hud { font-size: 26px; }
    .hud-item { padding: 8px 22px; min-width: 110px; }
    .board { width: 420px; }
    .piece { width: 76px; height: 76px; font-size: 46px; }
  }
  @media (max-width: 480px) {
    .lcard { padding: 16px 10px 14px; border-width: 3px; border-radius: 20px; }
    .lcard .ltitle { font-size: 22px; }
    .hud { font-size: 18px; margin: 8px 10px 0; }
    .hud-item { padding: 5px 12px; min-width: 60px; }
  }
</style>
</head>
<body>
<a class="home-btn" href="../" aria-label="กลับหน้าหลัก">🏠</a>
<button class="back-btn" id="backBtn" type="button" aria-label="เลือกด่านใหม่">📋</button>
<div class="app">

  <section id="selectScreen" class="screen active">
    <header class="hero">
      <h1>🧩 จิ๊กซอว์</h1>
      <ul class="howto">
        <li><span class="howto-icon">👀</span> ดูภาพตัวอย่างเล็กๆ</li>
        <li><span class="howto-icon">✋</span> ลากชิ้นไปวางในช่องที่ถูก</li>
        <li><span class="howto-icon">🏆</span> ต่อให้ครบทุกชิ้น!</li>
      </ul>
    </header>

    <div id="levelGrid" class="lgrid"></div>
  </section>

  <section id="gameScreen" class="screen">
    <div class="hud">
      <div class="hud-item placed">🧩 <span id="placedCount">0</span>/<span id="placedTotal">4</span></div>
      <div class="hud-item time">⏱ <span id="timeText">0:00</span></div>
    </div>
    <div class="stage">
      <div class="preview-row">
        <span class="preview-tag">ภาพตัวอย่าง:</span>
        <div id="miniPreview" class="mini-preview"></div>
      </div>
      <div id="board" class="board"></div>
      <p class="tray-label">↓ ลากชิ้นจากตรงนี้ ↓</p>
      <div id="tray" class="tray"></div>
    </div>
  </section>

  <section id="resultsScreen" class="screen">
    <div class="trophy">🏆</div>
    <h2 id="resultTitle" class="winner-name">ต่อสำเร็จ!</h2>
    <p id="resultSub" class="winner-sub">0:00 · ลอง 0 ครั้ง</p>
    <div id="resultStars" class="stars-row">⭐</div>
    <div id="resultText" class="rating-text">ลองอีกที!</div>
    <div class="action-bar">
      <button id="againBtn" class="btn-ghost">🔄 เล่นอีก</button>
      <button id="newBtn" class="btn-main">เลือกใหม่</button>
    </div>
  </section>

</div>

<script>
'use strict';

// JIGSAW SCENES — inline SVG illustrations, cut into interlocking pieces at runtime.
// Each viewBox aspect = cols : rows (so pieces map cleanly to integer cell sizes).

const FRUIT_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" preserveAspectRatio="none">

const FARM_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" preserveAspectRatio="none">
<rect width="300" height="180" fill="#bce8ff"/>

const TAB_DEPTH_FRAC = 0.18; // tab depth as fraction of cell size

// === Jigsaw shape generator ===
// edges[r][c] = { top, right, bottom, left }; each ∈ {-1, 0, 1}
// 0 = flat (board border), 1 = tab (bumps outward), -1 = blank (bumps inward)
// Neighbors must be complementary: piece below's top = -(piece's bottom).
function makeEdges(cols, rows) {
  const e = [];
  for (let r = 0; r < rows; r++) {
    e[r] = [];
    for (let c = 0; c < cols; c++) {
      const cell = {};
      cell.top    = (r === 0)        ? 0 : -e[r-1][c].bottom;
      cell.left   = (c === 0)        ? 0 : -e[r][c-1].right;
      cell.right  = (c === cols - 1) ? 0 : (Math.random() < 0.5 ? 1 : -1);
      cell.bottom = (r === rows - 1) ? 0 : (Math.random() < 0.5 ? 1 : -1);
      e[r][c] = cell;
    }
  }
  return e;
}

// Build SVG path d="..." for one piece. Traverses clockwise: top → right → bottom → left.
// Piece outer box is (S+2T) × (S+2T); cell area is (T,T) to (T+S, T+S).
function piecePath(edges, S, T) {
  const segs = [`M ${T} ${T}`];
  segs.push(edgeSeg(edges.top,    S, T, 0));
  segs.push(edgeSeg(edges.right,  S, T, 1));
  segs.push(edgeSeg(edges.bottom, S, T, 2));
  segs.push(edgeSeg(edges.left,   S, T, 3));
  segs.push('Z');
  return segs.join(' ');
}

// One edge segment, traveling in `dir`: 0=right (+x), 1=down (+y), 2=left (-x), 3=up (-y).
// d: 0 flat, 1 tab (bumps outward), -1 blank (bumps inward).
function edgeSeg(d, S, T, dir) {
  function rot(x, y) {
    // Rotate reference frame (dir=0: right) by 90° clockwise per dir step.
    switch (dir) {
      case 0: return [x, y];
      case 1: return [-y, x];
      case 2: return [-x, -y];
      case 3: return [y, -x];
    }
  }
  if (d === 0) {
    const [dx, dy] = rot(S, 0);
    return `l ${dx.toFixed(2)} ${dy.toFixed(2)}`;
  }
  // Reference (dir=0, top edge going right): tab bumps to -y (outward = up for top edge).
  // d=+1 → s=-1 (y bump negative); d=-1 → s=+1 (y bump positive, blank goes into cell).
  const s = -d;
  // Smooth knob: line 35% → cubic to peak (50%, sT) → cubic to (65%, 0) → line 35%.
  // Control points chosen so tangents at junctions are horizontal (no kinks).
  const cmds = [
    ['l', 0.35*S, 0],
    ['c', 0.05*S, 0,       0.10*S, s*T,     0.15*S, s*T],
    ['c', 0.05*S, 0,       0.10*S, -s*T,    0.15*S, -s*T],
    ['l', 0.35*S, 0],
  ];
  const out = [];
  for (const c of cmds) {
    if (c[0] === 'l') {
      const [rx, ry] = rot(c[1], c[2]);
      out.push(`l ${rx.toFixed(2)} ${ry.toFixed(2)}`);
    } else {
      const [r1x, r1y] = rot(c[1], c[2]);
      const [r2x, r2y] = rot(c[3], c[4]);
      const [rex, rey] = rot(c[5], c[6]);
      out.push(`c ${r1x.toFixed(2)} ${r1y.toFixed(2)} ${r2x.toFixed(2)} ${r2y.toFixed(2)} ${rex.toFixed(2)} ${rey.toFixed(2)}`);
    }
  }
  return out.join(' ');
}

  tickTimer: null,
  cellSize: 0,
  tabDepth: 0,
};

// AUDIO
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
}
function tone(freq, ms, type='sine', vol=0.18) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  o.connect(g).connect(audioCtx.destination);
  const t = audioCtx.currentTime, d = ms/1000;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.01);
  g.gain.linearRampToValueAtTime(0, t + d);
  o.start(t); o.stop(t + d + 0.02);
}
function playSnap()  { tone(660, 90, 'triangle', 0.16); setTimeout(()=>tone(990, 100, 'triangle', 0.14), 80); }
function playMiss()  { tone(180, 180, 'sawtooth', 0.14); }
function playWin()   {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(()=>tone(f, 180, 'triangle', 0.18), i * 120));
}

// DOM
const $ = (id) => document.getElementById(id);
const screens = { select: $('selectScreen'), game: $('gameScreen'), results: $('resultsScreen') };
const levelGrid = $('levelGrid');
const board   = $('board');
const tray    = $('tray');

// UTIL
function shuffle(a) { const r = a.slice(); for (let i=r.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [r[i],r[j]]=[r[j],r[i]]; } return r; }
function buzz(p) { if (navigator.vibrate) navigator.vibrate(p); }
function showScreen(name) {
  for (const k of Object.keys(screens)) screens[k].classList.toggle('active', k===name);
  $('backBtn').classList.toggle('show', name === 'game');
}
function abortGame() {
  if (state.tickTimer) clearInterval(state.tickTimer);
  board.innerHTML = ''; tray.innerHTML = '';
  state.drag = null;
}

// SELECT
function renderLevels() {
  levelGrid.innerHTML = '';
  for (const lvl of LEVELS) {
    const c = document.createElement('div');
    c.className = 'lcard';
    c.innerHTML = `
      <div class="stars">${'⭐'.repeat(lvl.stars)}</div>
      <div class="preview">${lvl.preview}</div>
      <div class="ltitle">${lvl.name}</div>
      <div class="lsub">${lvl.subtitle}</div>
    `;
    c.addEventListener('click', () => { ensureAudio(); startGame(lvl); });
    levelGrid.appendChild(c);
  }
}

const SVG_NS = 'http://www.w3.org/2000/svg';

// GAME
function startGame(level) {
  if (state.tickTimer) clearInterval(state.tickTimer);
  state.level = level;
  state.placed = 0;
  state.misses = 0;
  state.drag = null;
  board.innerHTML = '';
  tray.innerHTML = '';

  const def = SCENES_SVG[level.scene];
  const { svg, cols, rows } = def;
  state.scene = def;
  state.total = cols * rows;

  // Cell size from viewport
  const target = Math.min(window.innerWidth * 0.84, window.innerWidth >= 768 ? 380 : 320);
  const S = Math.floor(target / cols);
  const T = Math.round(S * TAB_DEPTH_FRAC);
  state.cellSize = S;
  state.tabDepth = T;

  const boardW = S * cols, boardH = S * rows;
  state.edges = makeEdges(cols, rows);
  state.sceneDataUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);

  $('placedCount').textContent = '0';
  $('placedTotal').textContent = state.total;
  $('timeText').textContent = '0:00';

  // Mini preview = just the SVG image
  const mini = $('miniPreview');
  mini.style.gridTemplateColumns = '';
  mini.style.gridTemplateRows = '';
  mini.innerHTML = `<img alt="" src="${state.sceneDataUrl}" style="width:100%;height:100%;object-fit:cover;display:block;">`;

  // Board
  board.className = 'board jboard';
  board.style.width = boardW + 'px';
  board.style.height = boardH + 'px';
  board.innerHTML = '';

  const piecesInfo = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const idx = r * cols + c;
      const path = piecePath(state.edges[r][c], S, T);
      const pieceW = S + 2 * T;
      const pieceX = c * S - T;
      const pieceY = r * S - T;

      // Slot outline (ghost)
      const slot = document.createElementNS(SVG_NS, 'svg');
      slot.setAttribute('class', 'jslot');
      slot.setAttribute('viewBox', `0 0 ${pieceW} ${pieceW}`);
      slot.setAttribute('width', pieceW);
      slot.setAttribute('height', pieceW);
      slot.dataset.idx = idx;
      slot.style.left = pieceX + 'px';
      slot.style.top  = pieceY + 'px';
      slot.style.width  = pieceW + 'px';
      slot.style.height = pieceW + 'px';
      const slotPath = document.createElementNS(SVG_NS, 'path');
      slotPath.setAttribute('class', 'outline');
      slotPath.setAttribute('d', path);
      slot.appendChild(slotPath);
      board.appendChild(slot);

      piecesInfo.push({ idx, r, c, path, pieceW, pieceX, pieceY });
    }
  }

  // Tray
  tray.className = 'tray jtray';
  tray.innerHTML = '';

  for (const info of shuffle(piecesInfo)) {
    const piece = makeJigsawPiece(info, boardW, boardH);
    piece.addEventListener('pointerdown', (e) => startDrag(e, piece));
    tray.appendChild(piece);
  }

  showScreen('game');
  state.startTime = performance.now();
  state.tickTimer = setInterval(tickTime, 250);
}

function makeJigsawPiece(info, boardW, boardH) {
  const { idx, r, c, path, pieceW } = info;
  const S = state.cellSize, T = state.tabDepth;
  const svg = document.createElementNS(SVG_NS, 'svg');
  svg.setAttribute('class', 'piece jpiece');
  svg.setAttribute('viewBox', `0 0 ${pieceW} ${pieceW}`);
  svg.setAttribute('width', pieceW);
  svg.setAttribute('height', pieceW);
  svg.dataset.idx = idx;
  svg.dataset.row = r;
  svg.dataset.col = c;
  svg.style.touchAction = 'none';
  svg.style.cursor = 'grab';

  const defs = document.createElementNS(SVG_NS, 'defs');
  const pat  = document.createElementNS(SVG_NS, 'pattern');
  const patId = `pat-${idx}-${Math.random().toString(36).slice(2,7)}`;
  pat.setAttribute('id', patId);
  pat.setAttribute('patternUnits', 'userSpaceOnUse');
  pat.setAttribute('x', String(T - c * S));
  pat.setAttribute('y', String(T - r * S));
  pat.setAttribute('width',  String(boardW));
  pat.setAttribute('height', String(boardH));
  const img = document.createElementNS(SVG_NS, 'image');
  img.setAttributeNS('http://www.w3.org/1999/xlink', 'xlink:href', state.sceneDataUrl);
  img.setAttribute('href', state.sceneDataUrl);
  img.setAttribute('width', String(boardW));
  img.setAttribute('height', String(boardH));
  img.setAttribute('preserveAspectRatio', 'none');
  pat.appendChild(img);
  defs.appendChild(pat);
  svg.appendChild(defs);

  const fill = document.createElementNS(SVG_NS, 'path');
  fill.setAttribute('d', path);
  fill.setAttribute('fill', `url(#${patId})`);
  svg.appendChild(fill);

  const stroke = document.createElementNS(SVG_NS, 'path');
  stroke.setAttribute('class', 'outline');
  stroke.setAttribute('d', path);
  svg.appendChild(stroke);

  return svg;
}

function tickTime() {
  const ms = performance.now() - state.startTime;
  const s = Math.floor(ms / 1000);
  const mm = Math.floor(s / 60);
  const ss = String(s % 60).padStart(2, '0');
  $('timeText').textContent = mm + ':' + ss;
}

function startDrag(e, piece) {
  if (state.drag) return;
  e.preventDefault();
  const rect = piece.getBoundingClientRect();
  piece.classList.add('dragging');

  // SVG viewBox keeps the visual size; just lift to body via fixed positioning.
  piece.style.position = 'fixed';
  piece.style.left = rect.left + 'px';
  piece.style.top  = rect.top + 'px';
  document.body.appendChild(piece);
  try { piece.setPointerCapture(e.pointerId); } catch(_) {}

  const offsetX = e.clientX - rect.left;
  const offsetY = e.clientY - rect.top;

  state.drag = { piece, offsetX, offsetY, pointerId: e.pointerId };

  piece.onpointermove = onDragMove;
  piece.onpointerup = piece.onpointercancel = onDragEnd;
}

function onDragMove(e) {
  const d = state.drag;
  if (!d) return;
  d.piece.style.left = (e.clientX - d.offsetX) + 'px';
  d.piece.style.top  = (e.clientY - d.offsetY) + 'px';
}

function onDragEnd(e) {
  const d = state.drag;
  if (!d) return;
  const p = d.piece;
  try { p.releasePointerCapture(d.pointerId); } catch(_) {}
  p.onpointermove = p.onpointerup = p.onpointercancel = null;
  state.drag = null;

  // Snap if piece center is within threshold of the correct slot's center.
  const r = p.getBoundingClientRect();
  const cx = r.left + r.width / 2;
  const cy = r.top  + r.height / 2;
  const slot = board.querySelector(`.jslot[data-idx="${p.dataset.idx}"]`);
  if (slot && !slot.classList.contains('filled')) {
    const sr = slot.getBoundingClientRect();
    const sx = sr.left + sr.width / 2;
    const sy = sr.top  + sr.height / 2;
    if (Math.hypot(cx - sx, cy - sy) <= state.cellSize * 0.5) {
      snapPiece(p, slot);
      return;
    }
  }

  // Wrong / not close enough — count as a miss only if dropped over the board area.
  const boardRect = board.getBoundingClientRect();
  const overBoard = cx >= boardRect.left && cx <= boardRect.right && cy >= boardRect.top && cy <= boardRect.bottom;
  if (overBoard) {
    state.misses += 1;
    playMiss();
    buzz([30, 80, 30]);
    returnPiece(p, true);
  } else {
    returnPiece(p, false);
  }
}

function snapPiece(piece, slot) {
  piece.classList.remove('dragging');
  piece.style.position = 'absolute';
  piece.style.left = slot.style.left;
  piece.style.top  = slot.style.top;
  piece.style.pointerEvents = 'none';
  board.appendChild(piece);
  slot.classList.add('filled');
  state.placed += 1;
  $('placedCount').textContent = state.placed;
  playSnap();
  buzz([20, 40, 20]);
  if (state.placed === state.total) {
    setTimeout(endGame, 500);
  }
}

function returnPiece(piece, shake) {
  piece.classList.remove('dragging');
  piece.style.position = '';
  piece.style.left = piece.style.top = '';
  tray.appendChild(piece);
  if (shake) {
    piece.classList.add('shake');
    setTimeout(() => piece.classList.remove('shake'), 380);
  }
}

function endGame() {
  if (state.tickTimer) clearInterval(state.tickTimer);
  state.endTime = performance.now();
  showResults();
}

// RESULTS
function showResults() {
  const seconds = Math.floor((state.endTime - state.startTime) / 1000);
  const mm = Math.floor(seconds / 60);
  const ss = String(seconds % 60).padStart(2, '0');
  const r = ratingFor(state.misses, state.level);
  $('resultTitle').textContent = r.title;
  $('resultSub').textContent   = `${mm}:${ss} · ลองผิด ${state.misses} ครั้ง`;
  $('resultStars').textContent = r.stars;
  $('resultText').textContent  = r.text;
  showScreen('results');
  celebrate(r.confetti);
  playWin();
  buzz([60, 40, 60, 40, 100]);
}

function ratingFor(misses, level) {
  if (misses <= level.parMisses)            return { stars: '🌟🌟🌟', text: 'สุดยอด!', title: 'เก่งมาก!',  confetti: 140 };
  if (misses <= level.parMisses * 2 + 1)    return { stars: '⭐⭐',     text: 'เก่ง!',    title: 'ผ่านแล้ว!', confetti: 90 };
  return                                            { stars: '⭐',         text: 'ดีมาก!',  title: 'ผ่าน',       confetti: 50 };
}

function celebrate(n) {
  const colors = ['#ff6b9d', '#ffd93d', '#7ed957', '#5bc0eb', '#ff914d', '#b388ff'];
  for (let i = 0; i < n; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = Math.random() * 0.8 + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    if (Math.random() > 0.5) c.style.borderRadius = '50%';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

// EVENTS
$('backBtn').addEventListener('click', () => { abortGame(); renderLevels(); showScreen('select'); });
$('againBtn').addEventListener('click', () => {
  if (!state.level) { showScreen('select'); return; }
  ensureAudio(); startGame(state.level);
});
$('newBtn').addEventListener('click', () => {
  state.level = null; showScreen('select');
});

let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd < 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

renderLevels();
</script>
</body>
</html>
