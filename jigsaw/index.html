<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🧩 จิ๊กซอว์ — เกมสำหรับเด็ก</title>
<meta name="description" content="เกมต่อจิ๊กซอว์ภาพง่ายๆ ฝึกการสังเกตและการลาก">
<meta name="theme-color" content="#ff6b9d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="จิ๊กซอว์">
<meta name="mobile-web-app-capable" content="yes">

<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../icons/icon.svg">
<link rel="manifest" href="../manifest.webmanifest">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Itim&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-3: #b5e8ff; --grass-1: #7ed957;
    --brand: #ff6b9d; --brand-dark: #e54b82;
    --gold: #ffd93d; --good: #5bc13a; --good-dark: #3fa024;
    --bad: #ff5757; --bad-dark: #d83838;
    --ink: #2d3436; --card: #ffffff; --card-border: #ffd6e4;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Mitr', -apple-system, sans-serif;
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 10%, #fff9c4 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, #ffcfd2 0%, transparent 45%),
      linear-gradient(180deg, var(--sky-3) 0%, #d9f3c9 65%, var(--grass-1) 100%);
    background-attachment: fixed;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  body::before {
    content: '☁️ ☁️     ☁️';
    position: fixed; top: 20px; left: 0; right: 0;
    text-align: center; font-size: 42px;
    opacity: 0.55; pointer-events: none;
    letter-spacing: 80px;
    animation: drift 40s linear infinite;
    z-index: 0;
  }
  @keyframes drift { from { transform: translateX(-10%); } to { transform: translateX(10%); } }

  .app { max-width: 880px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
  body:has(#gameScreen.active) .app {
    max-width: 100%; padding: 0; min-height: 100vh; min-height: 100dvh;
  }
  body:has(#gameScreen.active)::before { display: none; }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn .35s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero { text-align: center; padding: 14px 10px 18px; }
  .hero h1 {
    font-family: 'Itim', cursive;
    font-size: clamp(42px, 9vw, 68px);
    margin: 0; color: var(--brand-dark);
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
    letter-spacing: 1px;
  }
  .howto {
    list-style: none; padding: 12px 18px; margin: 8px auto 18px;
    max-width: 360px; background: rgba(255,255,255,0.55);
    border: 2px dashed var(--card-border); border-radius: 18px;
    font-size: 16px; color: #555; font-weight: 500; text-align: left;
  }
  .howto li { display: flex; align-items: center; gap: 10px; padding: 3px 0; line-height: 1.3; }
  .howto-icon { font-size: 22px; flex-shrink: 0; width: 28px; text-align: center; }
  @media (min-width: 768px) { .howto { font-size: 18px; max-width: 440px; } .howto-icon { font-size: 26px; } }

  .lgrid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px; margin: 10px 0 32px;
  }
  .lcard {
    background: var(--card); border: 4px solid var(--card-border);
    border-radius: 24px; padding: 22px 14px 18px; text-align: center;
    cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.07);
    transition: transform .15s, box-shadow .15s, border-color .15s;
    position: relative; overflow: hidden;
  }
  .lcard:active { transform: scale(0.96) translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.07); }
  .lcard:hover { border-color: var(--brand); }
  .lcard .preview {
    font-size: 56px; line-height: 1;
    filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.12));
    margin-bottom: 6px;
  }
  .lcard .ltitle {
    font-family: 'Itim', cursive; font-size: 26px;
    color: var(--brand-dark); text-shadow: 2px 2px 0 #fff;
  }
  .lcard .lsub { font-size: 14px; color: #777; font-weight: 500; margin-top: 4px; }
  .lcard .stars { position: absolute; top: 10px; right: 10px; font-size: 18px; letter-spacing: 1px; }

  /* Game */
  #gameScreen.active {
    display: flex; flex-direction: column;
    min-height: 100vh; min-height: 100dvh;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    overflow: hidden;
  }
  .hud {
    flex: 0 0 auto; display: flex; justify-content: center; gap: 10px;
    margin: 10px 14px 0; font-family: 'Itim', cursive; font-size: 22px;
    flex-wrap: wrap;
  }
  .hud-item {
    background: #fff; border: 3px solid var(--card-border);
    border-radius: 999px; padding: 6px 16px;
    box-shadow: 0 3px 0 rgba(0,0,0,0.08);
    min-width: 80px; text-align: center;
  }
  .hud-item.placed { color: var(--good-dark); }
  .hud-item.time   { color: #2980b9; }

  .stage {
    flex: 1 1 auto;
    display: flex; flex-direction: column;
    align-items: center; padding: 10px;
    gap: 12px;
    overflow: hidden;
  }

  .preview-tag {
    font-family: 'Itim', cursive;
    color: var(--brand-dark);
    font-size: 20px;
    text-shadow: 2px 2px 0 #fff;
    margin: 0;
  }

  .mini-preview {
    width: 70px; height: 70px;
    background: #fff;
    border: 3px solid var(--card-border);
    border-radius: 14px;
    box-shadow: 0 3px 0 rgba(0,0,0,0.08);
    display: grid;
    overflow: hidden;
    flex-shrink: 0;
  }
  .mini-preview .mp-cell {
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    line-height: 1;
  }
  .preview-row { display: flex; align-items: center; gap: 14px; }

  .board {
    background: #fffbf2;
    border: 4px dashed var(--brand);
    border-radius: 22px;
    box-shadow: 0 5px 0 rgba(0,0,0,0.08);
    padding: 8px;
    display: grid;
    gap: 6px;
    width: min(86vw, 380px);
    aspect-ratio: 1;
  }
  .slot {
    background: #fff;
    border: 2px dashed #ffd6e4;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(28px, 8vw, 56px);
    line-height: 1;
    position: relative;
  }
  .slot.hover { background: #ffe9f1; border-color: var(--brand); }
  .slot.filled { background: #e8ffe0; border: 2px solid var(--good); animation: pop .4s ease; }
  @keyframes pop {
    0% { transform: scale(0.85); } 60% { transform: scale(1.08); } 100% { transform: scale(1); }
  }

  .tray-label {
    font-family: 'Itim', cursive;
    color: #555;
    font-size: 16px;
    margin: 0;
  }
  .tray {
    background: rgba(255,255,255,0.5);
    border: 3px dashed var(--card-border);
    border-radius: 22px;
    padding: 10px;
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
    width: min(96vw, 420px);
    min-height: 80px;
  }
  .piece {
    width: 64px; height: 64px;
    background: #fff;
    border: 3px solid var(--card-border);
    border-radius: 14px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.10);
    display: flex; align-items: center; justify-content: center;
    font-size: 38px;
    line-height: 1;
    cursor: grab;
    touch-action: none;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .piece:active { cursor: grabbing; }
  .piece.dragging {
    transition: none;
    box-shadow: 0 8px 16px rgba(0,0,0,0.25);
    transform: scale(1.05);
    z-index: 1000;
    pointer-events: none;
  }
  .piece.shake { animation: shake .35s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }
  @media (max-width: 480px) {
    .piece { width: 52px; height: 52px; font-size: 30px; border-width: 2px; }
    .tray { padding: 6px; gap: 6px; }
  }

  /* Results */
  #resultsScreen { text-align: center; padding-top: 20px; }
  .trophy {
    font-size: clamp(120px, 22vw, 180px); line-height: 1;
    filter: drop-shadow(4px 6px 0 rgba(0,0,0,0.18));
    animation: bobBig 1.2s ease-in-out infinite;
  }
  @keyframes bobBig {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-12px) rotate(4deg); }
  }
  .winner-name {
    font-family: 'Itim', cursive;
    font-size: clamp(44px, 9vw, 72px);
    color: var(--brand-dark); margin: 18px 0 6px;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
  }
  .winner-sub {
    font-size: clamp(18px, 4vw, 24px);
    color: #555; margin: 0 0 6px; font-weight: 500;
  }
  .stars-row {
    font-size: clamp(48px, 10vw, 72px); line-height: 1;
    margin: 8px 0 4px; letter-spacing: 4px;
    filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.12));
  }
  .rating-text {
    font-family: 'Itim', cursive;
    font-size: clamp(28px, 6vw, 40px);
    color: var(--brand-dark); margin: 4px 0 16px;
  }
  .action-bar {
    display: flex; gap: 12px; justify-content: center; align-items: center;
    margin-top: 12px; flex-wrap: wrap;
  }
  .btn-main {
    font-family: 'Itim', cursive;
    font-size: 28px; padding: 16px 36px;
    border: 4px solid #fff; border-radius: 999px;
    background: var(--brand); color: #fff;
    box-shadow: 0 6px 0 var(--brand-dark);
    cursor: pointer; text-shadow: 2px 2px 0 var(--brand-dark);
    transition: transform .12s, box-shadow .12s;
  }
  .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--brand-dark); }
  .btn-ghost {
    font-family: 'Itim', cursive;
    font-size: 24px; padding: 14px 30px;
    border: 4px solid var(--brand); border-radius: 999px;
    background: #fff; color: var(--brand-dark);
    box-shadow: 0 5px 0 rgba(0,0,0,0.12); cursor: pointer;
    transition: transform .12s, box-shadow .12s;
  }
  .btn-ghost:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }

  .confetti {
    position: fixed; top: -20px;
    width: 12px; height: 18px;
    z-index: 90; pointer-events: none;
    animation: fall linear forwards;
  }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

  .home-btn, .back-btn {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #fff; border: 3px solid var(--brand);
    box-shadow: 0 3px 0 var(--brand-dark);
    align-items: center; justify-content: center;
    font-size: 24px; text-decoration: none; color: var(--ink);
    z-index: 60;
    transition: transform .12s;
    font-family: inherit; padding: 0; cursor: pointer;
  }
  .home-btn { left: 12px; display: flex; font-size: 26px; }
  .back-btn { right: 12px; display: none; }
  .back-btn.show { display: flex; }
  .home-btn:active, .back-btn:active { transform: scale(0.92); }

  @media (min-width: 768px) {
    .lgrid { grid-template-columns: repeat(4, 1fr); gap: 18px; }
    .hud { font-size: 26px; }
    .hud-item { padding: 8px 22px; min-width: 110px; }
    .board { width: 420px; }
    .piece { width: 76px; height: 76px; font-size: 46px; }
  }
  @media (max-width: 480px) {
    .lcard { padding: 16px 10px 14px; border-width: 3px; border-radius: 20px; }
    .lcard .ltitle { font-size: 22px; }
    .hud { font-size: 18px; margin: 8px 10px 0; }
    .hud-item { padding: 5px 12px; min-width: 60px; }
  }
</style>
</head>
<body>
<a class="home-btn" href="../" aria-label="กลับหน้าหลัก">🏠</a>
<button class="back-btn" id="backBtn" type="button" aria-label="เลือกด่านใหม่">📋</button>
<div class="app">

  <section id="selectScreen" class="screen active">
    <header class="hero">
      <h1>🧩 จิ๊กซอว์</h1>
      <ul class="howto">
        <li><span class="howto-icon">👀</span> ดูภาพตัวอย่างเล็กๆ</li>
        <li><span class="howto-icon">✋</span> ลากชิ้นไปวางในช่องที่ถูก</li>
        <li><span class="howto-icon">🏆</span> ต่อให้ครบทุกชิ้น!</li>
      </ul>
    </header>

    <div id="levelGrid" class="lgrid"></div>
  </section>

  <section id="gameScreen" class="screen">
    <div class="hud">
      <div class="hud-item placed">🧩 <span id="placedCount">0</span>/<span id="placedTotal">4</span></div>
      <div class="hud-item time">⏱ <span id="timeText">0:00</span></div>
    </div>
    <div class="stage">
      <div class="preview-row">
        <span class="preview-tag">ภาพตัวอย่าง:</span>
        <div id="miniPreview" class="mini-preview"></div>
      </div>
      <div id="board" class="board"></div>
      <p class="tray-label">↓ ลากชิ้นจากตรงนี้ ↓</p>
      <div id="tray" class="tray"></div>
    </div>
  </section>

  <section id="resultsScreen" class="screen">
    <div class="trophy">🏆</div>
    <h2 id="resultTitle" class="winner-name">ต่อสำเร็จ!</h2>
    <p id="resultSub" class="winner-sub">0:00 · ลอง 0 ครั้ง</p>
    <div id="resultStars" class="stars-row">⭐</div>
    <div id="resultText" class="rating-text">ลองอีกที!</div>
    <div class="action-bar">
      <button id="againBtn" class="btn-ghost">🔄 เล่นอีก</button>
      <button id="newBtn" class="btn-main">เลือกใหม่</button>
    </div>
  </section>

</div>

<script>
'use strict';

// SCENES — each is a grid of emoji cells; placed in order row-by-row
const SCENES = {
  puppy:    { cols: 2, rows: 2, cells: ['🌳','☀️','🐶','🦴'] },
  fruit:    { cols: 2, rows: 2, cells: ['🍎','🍌','🍇','🍓'] },
  farm:     { cols: 3, rows: 3, cells: ['☀️','☁️','🌳','🐮','🐔','🐷','🌾','🌾','🐸'] },
  ocean:    { cols: 3, rows: 3, cells: ['☁️','🌤','☁️','🐬','🐠','🐡','🌊','🦀','🐚'] },
  city:     { cols: 4, rows: 3, cells: ['☀️','☁️','✈️','☁️','🏢','🏠','🏬','🌳','🚗','🚕','🚌','🚲'] },
  space:    { cols: 4, rows: 3, cells: ['🌟','🌙','⭐','🌟','🚀','🛸','👽','🪐','🌎','☄️','🌠','✨'] },
};

const LEVELS = [
  { id: 1, stars: 1, name: 'ง่ายมาก',  subtitle: '4 ชิ้น',  preview: '🍎', scene: 'fruit', parMisses: 1 },
  { id: 2, stars: 1, name: 'ง่าย',      subtitle: '4 ชิ้น',  preview: '🐶', scene: 'puppy', parMisses: 2 },
  { id: 3, stars: 2, name: 'ปานกลาง',  subtitle: '9 ชิ้น',  preview: '🐮', scene: 'farm',  parMisses: 3 },
  { id: 4, stars: 2, name: 'ทะเล',      subtitle: '9 ชิ้น',  preview: '🐬', scene: 'ocean', parMisses: 3 },
  { id: 5, stars: 3, name: 'ในเมือง',   subtitle: '12 ชิ้น', preview: '🏠', scene: 'city',  parMisses: 5 },
  { id: 6, stars: 3, name: 'อวกาศ',     subtitle: '12 ชิ้น', preview: '🚀', scene: 'space', parMisses: 5 },
];

// STATE
const state = {
  level: null,
  scene: null,
  total: 0,
  placed: 0,
  misses: 0,
  drag: null,
  startTime: 0,
  endTime: 0,
  tickTimer: null,
};

// AUDIO
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
}
function tone(freq, ms, type='sine', vol=0.18) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  o.connect(g).connect(audioCtx.destination);
  const t = audioCtx.currentTime, d = ms/1000;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.01);
  g.gain.linearRampToValueAtTime(0, t + d);
  o.start(t); o.stop(t + d + 0.02);
}
function playSnap()  { tone(660, 90, 'triangle', 0.16); setTimeout(()=>tone(990, 100, 'triangle', 0.14), 80); }
function playMiss()  { tone(180, 180, 'sawtooth', 0.14); }
function playWin()   {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(()=>tone(f, 180, 'triangle', 0.18), i * 120));
}

// DOM
const $ = (id) => document.getElementById(id);
const screens = { select: $('selectScreen'), game: $('gameScreen'), results: $('resultsScreen') };
const levelGrid = $('levelGrid');
const board   = $('board');
const tray    = $('tray');

// UTIL
function shuffle(a) { const r = a.slice(); for (let i=r.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [r[i],r[j]]=[r[j],r[i]]; } return r; }
function buzz(p) { if (navigator.vibrate) navigator.vibrate(p); }
function showScreen(name) {
  for (const k of Object.keys(screens)) screens[k].classList.toggle('active', k===name);
  $('backBtn').classList.toggle('show', name === 'game');
}
function abortGame() {
  if (state.tickTimer) clearInterval(state.tickTimer);
  board.innerHTML = ''; tray.innerHTML = '';
  state.drag = null;
}

// SELECT
function renderLevels() {
  levelGrid.innerHTML = '';
  for (const lvl of LEVELS) {
    const c = document.createElement('div');
    c.className = 'lcard';
    c.innerHTML = `
      <div class="stars">${'⭐'.repeat(lvl.stars)}</div>
      <div class="preview">${lvl.preview}</div>
      <div class="ltitle">${lvl.name}</div>
      <div class="lsub">${lvl.subtitle}</div>
    `;
    c.addEventListener('click', () => { ensureAudio(); startGame(lvl); });
    levelGrid.appendChild(c);
  }
}

// GAME
function startGame(level) {
  const scene = SCENES[level.scene];
  state.level = level;
  state.scene = scene;
  state.total = scene.cols * scene.rows;
  state.placed = 0;
  state.misses = 0;
  state.drag = null;

  if (state.tickTimer) clearInterval(state.tickTimer);
  $('placedCount').textContent = '0';
  $('placedTotal').textContent = state.total;
  $('timeText').textContent = '0:00';

  // Mini preview
  const mini = $('miniPreview');
  mini.style.gridTemplateColumns = `repeat(${scene.cols}, 1fr)`;
  mini.style.gridTemplateRows    = `repeat(${scene.rows}, 1fr)`;
  mini.innerHTML = '';
  scene.cells.forEach((emoji) => {
    const c = document.createElement('div');
    c.className = 'mp-cell';
    c.textContent = emoji;
    mini.appendChild(c);
  });

  // Board
  board.style.gridTemplateColumns = `repeat(${scene.cols}, 1fr)`;
  board.style.gridTemplateRows    = `repeat(${scene.rows}, 1fr)`;
  board.innerHTML = '';
  scene.cells.forEach((emoji, idx) => {
    const slot = document.createElement('div');
    slot.className = 'slot';
    slot.dataset.idx = idx;
    slot.dataset.emoji = emoji;
    board.appendChild(slot);
  });

  // Tray
  tray.innerHTML = '';
  const order = shuffle(scene.cells.map((_, i) => i));
  order.forEach((idx) => {
    const p = document.createElement('div');
    p.className = 'piece';
    p.dataset.idx = idx;
    p.textContent = scene.cells[idx];
    p.addEventListener('pointerdown', (e) => startDrag(e, p));
    tray.appendChild(p);
  });

  showScreen('game');
  state.startTime = performance.now();
  state.tickTimer = setInterval(tickTime, 250);
}

function tickTime() {
  const ms = performance.now() - state.startTime;
  const s = Math.floor(ms / 1000);
  const mm = Math.floor(s / 60);
  const ss = String(s % 60).padStart(2, '0');
  $('timeText').textContent = mm + ':' + ss;
}

function startDrag(e, piece) {
  if (state.drag) return;
  e.preventDefault();
  const rect = piece.getBoundingClientRect();
  piece.setPointerCapture(e.pointerId);
  piece.classList.add('dragging');

  // Lock size & lift to body via fixed positioning
  piece.style.width  = rect.width + 'px';
  piece.style.height = rect.height + 'px';
  piece.style.position = 'fixed';
  piece.style.left = rect.left + 'px';
  piece.style.top  = rect.top + 'px';
  document.body.appendChild(piece);

  const offsetX = e.clientX - rect.left;
  const offsetY = e.clientY - rect.top;

  state.drag = { piece, offsetX, offsetY, pointerId: e.pointerId, lastSlot: null };

  piece.onpointermove = onDragMove;
  piece.onpointerup = piece.onpointercancel = onDragEnd;
}

function onDragMove(e) {
  const d = state.drag;
  if (!d) return;
  const p = d.piece;
  p.style.left = (e.clientX - d.offsetX) + 'px';
  p.style.top  = (e.clientY - d.offsetY) + 'px';

  // Hover indication
  p.style.pointerEvents = 'none';
  const el = document.elementFromPoint(e.clientX, e.clientY);
  p.style.pointerEvents = '';
  const slot = el && el.closest && el.closest('.slot');
  if (d.lastSlot && d.lastSlot !== slot) d.lastSlot.classList.remove('hover');
  if (slot && !slot.classList.contains('filled')) slot.classList.add('hover');
  d.lastSlot = slot;
}

function onDragEnd(e) {
  const d = state.drag;
  if (!d) return;
  const p = d.piece;
  try { p.releasePointerCapture(d.pointerId); } catch(_) {}
  p.onpointermove = p.onpointerup = p.onpointercancel = null;
  if (d.lastSlot) d.lastSlot.classList.remove('hover');

  // What's under?
  p.style.pointerEvents = 'none';
  const el = document.elementFromPoint(e.clientX, e.clientY);
  p.style.pointerEvents = '';
  const slot = el && el.closest && el.closest('.slot');
  state.drag = null;

  if (slot && !slot.classList.contains('filled') && slot.dataset.idx === p.dataset.idx) {
    // Correct
    placePiece(p, slot);
  } else if (slot && !slot.classList.contains('filled')) {
    // Wrong slot → shake, return to tray
    slot.classList.add('hover');
    setTimeout(() => slot.classList.remove('hover'), 300);
    state.misses += 1;
    playMiss();
    buzz([30, 80, 30]);
    returnPiece(p, true);
  } else {
    // Dropped not on slot — just return
    returnPiece(p, false);
  }
}

function placePiece(piece, slot) {
  // Snap piece into slot, then convert slot to filled
  piece.classList.remove('dragging');
  piece.style.position = '';
  piece.style.left = piece.style.top = '';
  piece.style.width = piece.style.height = '';
  piece.style.pointerEvents = 'none';
  // Remove piece from body (cleanup) and mark slot
  piece.remove();
  slot.textContent = slot.dataset.emoji;
  slot.classList.add('filled');
  state.placed += 1;
  $('placedCount').textContent = state.placed;
  playSnap();
  buzz([20, 40, 20]);
  if (state.placed === state.total) {
    setTimeout(endGame, 500);
  }
}

function returnPiece(piece, shake) {
  // Put piece back in tray; reset styling
  piece.classList.remove('dragging');
  piece.style.position = '';
  piece.style.left = piece.style.top = '';
  piece.style.width = piece.style.height = '';
  tray.appendChild(piece);
  if (shake) {
    piece.classList.add('shake');
    setTimeout(() => piece.classList.remove('shake'), 380);
  }
}

function endGame() {
  if (state.tickTimer) clearInterval(state.tickTimer);
  state.endTime = performance.now();
  showResults();
}

// RESULTS
function showResults() {
  const seconds = Math.floor((state.endTime - state.startTime) / 1000);
  const mm = Math.floor(seconds / 60);
  const ss = String(seconds % 60).padStart(2, '0');
  const r = ratingFor(state.misses, state.level);
  $('resultTitle').textContent = r.title;
  $('resultSub').textContent   = `${mm}:${ss} · ลองผิด ${state.misses} ครั้ง`;
  $('resultStars').textContent = r.stars;
  $('resultText').textContent  = r.text;
  showScreen('results');
  celebrate(r.confetti);
  playWin();
  buzz([60, 40, 60, 40, 100]);
}

function ratingFor(misses, level) {
  if (misses <= level.parMisses)            return { stars: '🌟🌟🌟', text: 'สุดยอด!', title: 'เก่งมาก!',  confetti: 140 };
  if (misses <= level.parMisses * 2 + 1)    return { stars: '⭐⭐',     text: 'เก่ง!',    title: 'ผ่านแล้ว!', confetti: 90 };
  return                                            { stars: '⭐',         text: 'ดีมาก!',  title: 'ผ่าน',       confetti: 50 };
}

function celebrate(n) {
  const colors = ['#ff6b9d', '#ffd93d', '#7ed957', '#5bc0eb', '#ff914d', '#b388ff'];
  for (let i = 0; i < n; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = Math.random() * 0.8 + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    if (Math.random() > 0.5) c.style.borderRadius = '50%';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

// EVENTS
$('backBtn').addEventListener('click', () => { abortGame(); renderLevels(); showScreen('select'); });
$('againBtn').addEventListener('click', () => {
  if (!state.level) { showScreen('select'); return; }
  ensureAudio(); startGame(state.level);
});
$('newBtn').addEventListener('click', () => {
  state.level = null; showScreen('select');
});

let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd < 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

renderLevels();
</script>
</body>
</html>
